<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>اختبار جامعة الملك سعود</title>
<style>
:root{--primary:#0b6b86;--primary2:#168ca7;--gold:#c99a32;--bg:#eef5f7;--card:#fff;--text:#17242d;--muted:#71808a;--line:#dce7eb;--good:#198754;--bad:#c43c3c}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#f8fbfc,var(--bg));font-family:Tahoma,Arial,sans-serif;color:var(--text)}
.wrap{max-width:920px;margin:auto;padding:18px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.brand{display:flex;gap:12px;align-items:center}
.logo{width:58px;height:58px;border-radius:18px;background:linear-gradient(135deg,var(--primary),var(--primary2));display:grid;place-items:center;color:#fff;font-weight:900;box-shadow:0 8px 22px rgba(11,107,134,.25)}
.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:26px;box-shadow:0 15px 40px rgba(25,64,76,.10)}
.hidden{display:none!important}
.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:22px;align-items:center}
.hero h1{margin:0 0 10px;font-size:34px}
.hero p{color:var(--muted);line-height:1.9}
.stat{min-height:230px;border-radius:20px;background:linear-gradient(145deg,var(--primary),#164c61);color:#fff;display:grid;place-items:center;text-align:center}
.stat strong{font-size:64px;display:block}
label{display:block;margin:14px 0 7px;font-weight:700}
input,select{width:100%;padding:13px;border:1px solid var(--line);border-radius:12px;font-size:16px;background:#fff}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
button{border:0;border-radius:12px;padding:12px 18px;font-size:16px;font-weight:800;cursor:pointer}
.primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff}
.secondary{background:#edf3f5;color:#284653}
.meta{display:flex;justify-content:space-between;color:var(--muted);gap:10px}
.progress{height:11px;background:#e7eef1;border-radius:99px;overflow:hidden;margin:14px 0 22px}
.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--gold));width:0}
.question{font-size:24px;line-height:1.7;font-weight:900;margin:15px 0}
.option{width:100%;display:flex;gap:12px;align-items:center;text-align:right;padding:14px;margin:9px 0;border:1px solid var(--line);background:#fff;border-radius:14px;font-size:17px}
.option:hover{background:#f7fbfc}
.option.selected{border:2px solid var(--primary);background:#eff9fb}
.badge{width:36px;height:36px;border-radius:10px;background:#edf5f7;display:grid;place-items:center;color:var(--primary);font-weight:900;flex:0 0 auto}
.result{text-align:center}
.score{font-size:58px;color:var(--primary);font-weight:900}
.review-item{border:1px solid var(--line);border-radius:15px;padding:15px;margin:10px 0}
.correct{color:var(--good);font-weight:800}
.wrong{color:var(--bad);font-weight:800}
.small{color:var(--muted);font-size:14px}
@media(max-width:700px){.wrap{padding:10px}.hero{grid-template-columns:1fr}.hero h1{font-size:28px}.card{padding:18px}.question{font-size:21px}.row{grid-template-columns:1fr}.stat{min-height:160px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="brand">
      <div class="logo">KSU</div>
      <div><strong>اختبار جامعة الملك سعود</strong><div class="small">نسخة تدريبية مستقلة</div></div>
    </div>
  </div>

  <section id="home" class="card hero">
    <div>
      <h1>ابدأ الاختبار مباشرة</h1>
      <p>جميع الأسئلة مدمجة داخل الموقع. لا تحتاج إلى تحميل Excel أو أي ملف.</p>
      <label>الاسم</label>
      <input id="studentName" placeholder="اكتب اسمك">
      <div class="row">
        <div>
          <label>عدد الأسئلة</label>
          <select id="questionCount"></select>
        </div>
        <div>
          <label>ترتيب الأسئلة</label>
          <select id="orderMode">
            <option value="normal">بالترتيب</option>
            <option value="random">عشوائي</option>
          </select>
        </div>
      </div>
      <div class="actions"><button class="primary" id="startBtn">ابدأ الاختبار</button></div>
    </div>
    <div class="stat"><div><strong id="totalCount"></strong><span>سؤالًا في البنك</span></div></div>
  </section>

  <section id="quiz" class="card hidden">
    <div class="meta"><span id="counter"></span><span id="page"></span></div>
    <div class="progress"><span id="bar"></span></div>
    <div id="questionText" class="question"></div>
    <div id="options"></div>
    <div class="actions">
      <button class="secondary" id="prevBtn">السابق</button>
      <button class="primary" id="nextBtn">التالي</button>
      <button class="secondary" id="finishBtn">إنهاء الاختبار</button>
    </div>
  </section>

  <section id="result" class="card result hidden">
    <h2>النتيجة النهائية</h2>
    <div class="score" id="score"></div>
    <p id="percent"></p>
    <p id="resultName" class="small"></p>
    <div class="actions" style="justify-content:center">
      <button class="primary" id="reviewBtn">مراجعة الإجابات</button>
      <button class="secondary" id="restartBtn">إعادة الاختبار</button>
    </div>
  </section>

  <section id="review" class="card hidden">
    <h2>مراجعة الإجابات</h2>
    <div id="reviewList"></div>
    <button class="secondary" id="backBtn">العودة للنتيجة</button>
  </section>
</div>

<script>
const bank = [{"question": "تُعد جامعة الملك سعود وفق النظام الأساسي:", "options": ["مؤسسة تعليمية حكومية تابعة لوزارة التعليم", "مؤسسة أكاديمية مستقلة غير هادفة للربح", "هيئة أكاديمية مستقلة هادفة للربح", "مؤسسة خاصة ربحية"], "answer": 1, "explanation": "جامعة الملك سعود مؤسسة أكاديمية مستقلة غير هادفة للربح.", "page": "8"}, {"question": "يقصد بـ«الهيئة» في النظام الأساسي:", "options": ["وزارة التعليم", "مجلس شؤون الجامعات", "الهيئة الملكية لمدينة الرياض", "هيئة تقويم التعليم والتدريب"], "answer": 2, "explanation": "الهيئة هي الهيئة الملكية لمدينة الرياض.", "page": "8"}, {"question": "أي جهة تعتمد سياسة الإفصاح وتعارض المصالح في الجامعة؟", "options": ["رئيس الجامعة", "مجلس إدارة الجامعة", "مجلس إدارة الهيئة", "لجنة المراجعة"], "answer": 2, "explanation": "اعتماد سياسة الإفصاح وتعارض المصالح من اختصاص مجلس إدارة الهيئة.", "page": "9"}, {"question": "أي عبارة توضح الفرق الصحيح في تعيين رئيس الجامعة؟", "options": ["مجلس إدارة الهيئة يرشح، ومجلس إدارة الجامعة يعين", "مجلس إدارة الجامعة يرشح، ومجلس إدارة الهيئة يعين", "رئيس الجامعة يرشح نفسه، والهيئة تعتمد", "وزارة التعليم ترشح، ومجلس الجامعة يعين"], "answer": 1, "explanation": "مجلس إدارة الجامعة يرشح رئيس الجامعة، ومجلس إدارة الهيئة يعينه.", "page": "9 و12"}, {"question": "تمنح الجامعة الشهادات الفخرية:", "options": ["بقرار من وزارة التعليم", "وفق ما يقره مجلس إدارة الجامعة", "بقرار من لجنة المراجعة", "بقرار من هيئة تقويم التعليم والتدريب"], "answer": 1, "explanation": "تمنح الجامعة الشهادات الفخرية وفق ما يقره المجلس.", "page": "10"}, {"question": "من أهداف الجامعة:", "options": ["تحقيق الربح المالي", "تلبية احتياجات سوق العمل والاقتصاد المعرفي", "الإشراف على الجامعات الأخرى", "حصر خدمات التعليم العالي في مدينة الرياض"], "answer": 1, "explanation": "من أهداف الجامعة تلبية احتياجات سوق العمل والاقتصاد المعرفي.", "page": "11"}, {"question": "أي مما يلي يُعد من صلاحيات الجامعة؟", "options": ["تعيين رئيس الجامعة", "اعتماد سياسة الإفصاح وتعارض المصالح", "إبرام الاتفاقيات ومذكرات التفاهم", "تعيين أعضاء لجنة المراجعة"], "answer": 2, "explanation": "إبرام الاتفاقيات ومذكرات التفاهم من صلاحيات الجامعة.", "page": "11"}, {"question": "أي مما يلي من صلاحيات الجامعة وليس من اختصاص مجلس إدارة الهيئة؟", "options": ["اعتماد الميزانية والحساب الختامي", "إعداد الدراسات الاستراتيجية وتقديم الخدمات الاستشارية", "تعيين أعضاء المجلس", "اعتماد استراتيجية الاستثمار"], "answer": 1, "explanation": "إعداد الدراسات الاستراتيجية وتقديم الخدمات الاستشارية من صلاحيات الجامعة.", "page": "11"}, {"question": "مدة عضوية أعضاء مجلس إدارة الجامعة، عدا رئيس الجامعة:", "options": ["سنتان قابلة للتجديد مرة", "ثلاث سنوات قابلة للتجديد مرة", "ثلاث سنوات قابلة للتجديد مرتين", "أربع سنوات غير قابلة للتجديد"], "answer": 2, "explanation": "المدة ثلاث سنوات قابلة للتجديد مرتين.", "page": "12"}, {"question": "من يقر الهيكل التنظيمي للجامعة؟", "options": ["مجلس إدارة الهيئة", "مجلس إدارة الجامعة بناءً على اقتراح رئيس الجامعة", "رئيس الجامعة منفردًا", "وزارة التعليم"], "answer": 1, "explanation": "يقر مجلس إدارة الجامعة الهيكل التنظيمي بناءً على اقتراح رئيس الجامعة.", "page": "12"}];
const letters = ["أ","ب","ج","د"];
let selected=[], answers={}, current=0;

const $=id=>document.getElementById(id);
function show(id){["home","quiz","result","review"].forEach(x=>$(x).classList.add("hidden"));$(id).classList.remove("hidden")}
function shuffle(arr){arr=[...arr];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}

function setup(){
  $("totalCount").textContent=bank.length;
  const count=$("questionCount");
  const opts=[5,10,20,50,100].filter(n=>n<bank.length);
  opts.forEach(n=>count.add(new Option(n,n)));
  count.add(new Option("كل الأسئلة",bank.length));
}
setup();

$("startBtn").onclick=()=>{
  const n=Number($("questionCount").value);
  let ids=[...bank.keys()];
  if($("orderMode").value==="random") ids=shuffle(ids);
  selected=ids.slice(0,n);
  answers={};current=0;show("quiz");render();
};

function render(){
  const qi=selected[current], q=bank[qi];
  $("counter").textContent=`السؤال ${current+1} من ${selected.length}`;
  $("page").textContent=q.page?`الصفحة: ${q.page}`:"";
  $("bar").style.width=`${(current+1)/selected.length*100}%`;
  $("questionText").textContent=q.question;
  const box=$("options");box.innerHTML="";
  q.options.forEach((text,i)=>{
    const b=document.createElement("button");
    b.className="option"+(answers[qi]===i?" selected":"");
    b.innerHTML=`<span class="badge">${letters[i]}</span><span>${text}</span>`;
    b.onclick=()=>{answers[qi]=i;render()};
    box.appendChild(b);
  });
  $("prevBtn").disabled=current===0;
  $("nextBtn").textContent=current===selected.length-1?"عرض النتيجة":"التالي";
}
$("prevBtn").onclick=()=>{if(current>0){current--;render()}};
$("nextBtn").onclick=()=>{if(current<selected.length-1){current++;render()}else finish()};
$("finishBtn").onclick=()=>{if(confirm("هل تريد إنهاء الاختبار الآن؟"))finish()};

function finish(){
  let correct=0;
  selected.forEach(i=>{if(answers[i]===bank[i].answer)correct++});
  $("score").textContent=`${correct} / ${selected.length}`;
  $("percent").textContent=`النسبة: ${Math.round(correct/selected.length*100)}٪`;
  $("resultName").textContent=$("studentName").value?`المتدرب: ${$("studentName").value}`:"";
  show("result");
}
$("reviewBtn").onclick=()=>{
  const list=$("reviewList");list.innerHTML="";
  selected.forEach((i,pos)=>{
    const q=bank[i], ok=answers[i]===q.answer;
    const item=document.createElement("div");item.className="review-item";
    const yours=answers[i]===undefined?"لم تُجب":`${letters[answers[i]]}) ${q.options[answers[i]]}`;
    item.innerHTML=`<strong>${pos+1}. ${q.question}</strong>
    <p class="${ok?"correct":"wrong"}">${ok?"✅ إجابتك صحيحة":"❌ إجابتك: "+yours}</p>
    <p class="correct">الإجابة الصحيحة: ${letters[q.answer]}) ${q.options[q.answer]}</p>
    ${q.explanation?`<p>${q.explanation}</p>`:""}
    ${q.page?`<div class="small">الصفحة: ${q.page}</div>`:""}`;
    list.appendChild(item);
  });
  show("review");
};
$("backBtn").onclick=()=>show("result");
$("restartBtn").onclick=()=>show("home");
</script>
</body>
</html>
