لخاصة في ظل مرحلة الإصلاح التشريعىي المتسارعة في المملكة .»"},{"chapter":3,"id":"KSU-187","page":"43","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","ت تمب الكلية بنشاطها البحنري الواسع في مجالات علم المواد والكياء الحيوية والجيولوجيا البيئية، وتُسهم ف ي تغذية الكليات العلمية الأخرى بالمقررات الأساسية في الرياضيات والفب ياء والكياء ."],"a":3,"e":"ورد في المذكرة: «ت تمب الكلية بنشاطها البحنري الواسع في مجالات علم المواد والكياء الحيوية والجيولوجيا البيئية، وتُسهم ف ي تغذية الكليات العلمية الأخرى بالمقررات الأساسية في الرياضيات والفب ياء والكياء .»"},{"chapter":3,"id":"KSU-188","page":"44","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","تُركّز الكلية على ربط التصم المعماري والعمران ي بالهوية الثقافية السعودية والموروث الحضاري لشبه الجزيرة، مع توظيف أحدث التقنيات كنمذجة معلومات البناء ( BIM) و تصم الاستدامة البيئية .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «تُركّز الكلية على ربط التصم المعماري والعمران ي بالهوية الثقافية السعودية والموروث الحضاري لشبه الجزيرة، مع توظيف أحدث التقنيات كنمذجة معلومات البناء ( BIM) و تصم الاستدامة البيئية .»"},{"chapter":3,"id":"KSU-189","page":"45","q":"أكمل العبارة الصحيحة وفق المذكرة: «كلية العلوم الإنسانية والاجتماعية المعروفة سابقًا بكلية الآداب هي أول كليات جامعة الملك سع ود وأقدمها على الإطلاق، نشئت ُ أ بأمر ملكي عام ____ ه / 1957 م لتكون النواة الأول للجامعة .»","o":["1377","1382","1379","1378"],"a":0,"e":"ورد في المذكرة: «كلية العلوم الإنسانية والاجتماعية المعروفة سابقًا بكلية الآداب هي أول كليات جامعة الملك سع ود وأقدمها على الإطلاق، نشئت ُ أ بأمر ملكي عام 1377 ه / 1957 م لتكون النواة الأول للجامعة .»"},{"chapter":3,"id":"KSU-190","page":"42","q":"ما المقصود بـ «تضم الكلية حالياً أربعة أقسام أكادية هي» وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","إ دارة التمريض والتعل، والتمريض الباطن ي الجراحي، وتمريض صحة المجتمع والصحة النفسية والعقل ية، وتمريض صحة الأمومة والطفولة ."],"a":3,"e":"ورد في المذكرة: «تضم الكلية حالياً أربعة أقسام أكادية هي : إ دارة التمريض والتعل، والتمريض الباطن ي الجراحي، وتمريض صحة المجتمع والصحة النفسية والعقل ية، وتمريض صحة الأمومة والطفولة .»"},{"chapter":3,"id":"KSU-191","page":"51","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","عمادة السنة الأول المشبركة عمادة التطوير والجودة تقوم عمادة التعاملات الإلكبرونية والاتصالات بمهمة تحديث البنية التحتية التقنية للجامعة و تطوير منظومة اتصالاتها الداخلية والخارجية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":2,"e":"ورد في المذكرة: «عمادة السنة الأول المشبركة عمادة التطوير والجودة تقوم عمادة التعاملات الإلكبرونية والاتصالات بمهمة تحديث البنية التحتية التقنية للجامعة و تطوير منظومة اتصالاتها الداخلية والخارجية .»"},{"chapter":3,"id":"KSU-192","page":"52","q":"أكمل العبارة الصحيحة وفق المذكرة: «كما تلبر م بتطبيق أفضل ممارسات الجودة والتحسي المستمر، بما يتوافق مع متطلبات المواصفة الدولية ISO ____ : 2015 ، دعماً لأهداف الجامعة الاسبراتيجية نحو التمب والريادة .»","o":["9002","9006","9001","9003"],"a":2,"e":"ورد في المذكرة: «كما تلبر م بتطبيق أفضل ممارسات الجودة والتحسي المستمر، بما يتوافق مع متطلبات المواصفة الدولية ISO 9001 : 2015 ، دعماً لأهداف الجامعة الاسبراتيجية نحو التمب والريادة .»"},{"chapter":3,"id":"KSU-193","page":"43","q":"ما المقصود بـ «تضم الكلية ستة أقسام هندسية هي» وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","الهندسة الكهربائ ية، والهندسة المدنية، والهندسة الكيائية، والهندسة الميكانيكية، والهندسة الصناعية، وهندسة ا لببرول والغاز الطبيعىي .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":1,"e":"ورد في المذكرة: «تضم الكلية ستة أقسام هندسية هي : الهندسة الكهربائ ية، والهندسة المدنية، والهندسة الكيائية، والهندسة الميكانيكية، والهندسة الصناعية، وهندسة ا لببرول والغاز الطبيعىي .»"},{"chapter":3,"id":"KSU-194","page":"43","q":"ما المقصود بـ «تتكون الكلية من تسعة أقسام أكادية هي» وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","الإدارة، والاقتصاد، والتسويق، والمالية، والمحاسبة، ونظم المعلومات الإدارية، والتحليل الكمي، والإدارة العامة، والإدارة الصحية ."],"a":3,"e":"ورد في المذكرة: «تتكون الكلية من تسعة أقسام أكادية هي : الإدارة، والاقتصاد، والتسويق، والمالية، والمحاسبة، ونظم المعلومات الإدارية، والتحليل الكمي، والإدارة العامة، والإدارة الصحية .»"},{"chapter":3,"id":"KSU-195","page":"49","q":"أكمل العبارة الصحيحة وفق المذكرة: «وتعود ن شأة الدراسات العليا في الجامعة إل مرحلة مبكرة من تاريخها، حيث تطورت من كلية الدراسات العليا إل عمادة مستقلة في عام ____ ه، تزامناً مع صدور اللائحة الموحدة للدراسات العليا .»","o":["1418","1419","1423","1420"],"a":0,"e":"ورد في المذكرة: «وتعود ن شأة الدراسات العليا في الجامعة إل مرحلة مبكرة من تاريخها، حيث تطورت من كلية الدراسات العليا إل عمادة مستقلة في عام 1418 ه، تزامناً مع صدور اللائحة الموحدة للدراسات العليا .»"},{"chapter":3,"id":"KSU-196","page":"47","q":"أكمل العبارة الصحيحة وفق المذكرة: «تهدف الكلية إل تنمية المواهب الإبداعية السعودية وتوظيف الفنون في صناعات الاقتصاد الإبداعي ضمن أهداف رؤية المملكة ____ ، وتُمثل إضافةً نوعية متمب ة في منظومة التعل العالي السعودي .»","o":["2030","2032","2031","2035"],"a":0,"e":"ورد في المذكرة: «تهدف الكلية إل تنمية المواهب الإبداعية السعودية وتوظيف الفنون في صناعات الاقتصاد الإبداعي ضمن أهداف رؤية المملكة 2030 ، وتُمثل إضافةً نوعية متمب ة في منظومة التعل العالي السعودي .»"},{"chapter":3,"id":"KSU-197","page":"41","q":"أكمل العبارة الصحيحة وفق المذكرة: «كلية طب الأسنان تأسست كلية طب الأسنان عام ____ ه / 1975 م لتكون أول كلية لتعل طب الأسنان في المملكة العربية السعودية، وتحتل المرتبة الأول بي كليات طب الأسنان على مستوى المملكة .»","o":["1400","1396","1397","1395"],"a":3,"e":"ورد في المذكرة: «كلية طب الأسنان تأسست كلية طب الأسنان عام 1395 ه / 1975 م لتكون أول كلية لتعل طب الأسنان في المملكة العربية السعودية، وتحتل المرتبة الأول بي كليات طب الأسنان على مستوى المملكة .»"},{"chapter":3,"id":"KSU-198","page":"45","q":"أكمل العبارة الصحيحة وفق المذكرة: «تعود بدايات كلية اللغات وعلومها إل عام ____ ه / 1977 م حيث جاءت تحت مسم \" مركز اللغات الأوروبية والبرجمة \" ضمن كلية الآداب، ثم استقلّت بمسم \" كلية اللغات والبرجمة \" عام 1415 ه .»","o":["1402","1397","1398","1399"],"a":1,"e":"ورد في المذكرة: «تعود بدايات كلية اللغات وعلومها إل عام 1397 ه / 1977 م حيث جاءت تحت مسم \" مركز اللغات الأوروبية والبرجمة \" ضمن كلية الآداب، ثم استقلّت بمسم \" كلية اللغات والبرجمة \" عام 1415 ه .»"},{"chapter":3,"id":"KSU-199","page":"50","q":"ما المقصود بـ «وتلبر م العماد ة بتطبيق متطلبات المواصفة الدولية ISO 9001» وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","في إدارة الجودة، وتسعى إل مواكبة التطور في تقنية المعلومات والتحول نحو البيئة الرقمية المتكاملة .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «وتلبر م العماد ة بتطبيق متطلبات المواصفة الدولية ISO 9001 : 2015 في إدارة الجودة، وتسعى إل مواكبة التطور في تقنية المعلومات والتحول نحو البيئة الرقمية المتكاملة .»"},{"chapter":3,"id":"KSU-200","page":"37","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","ويعكس هذا التكامل بي الكليات والمعاهد والعمادات نموذجاً مؤسسياً متكاملاً يدعم كفاءة الأداء، ويعزز جودة المخرجات التعلية والبحثية، ويسهم في تحقيق مستهدفات الجامعة الاسبراتيجية .","يُطبق ذلك على التعليم العام فقط.","ويعكس هذا التكامل بي الكليات والمعاهد والعمادات نموذجاً مؤسسياً متكاملاً يدعم كفاءة الأداء، ويعزز جودة المخرجات التعلية والبحثية، ويسهم في تحقيق مسلا تهدفات الجامعة الاسبراتيجية ."],"a":1,"e":"ورد في المذكرة: «ويعكس هذا التكامل بي الكليات والمعاهد والعمادات نموذجاً مؤسسياً متكاملاً يدعم كفاءة الأداء، ويعزز جودة المخرجات التعلية والبحثية، ويسهم في تحقيق مستهدفات الجامعة الاسبراتيجية .»"},{"chapter":3,"id":"KSU-201","page":"46","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يشبرط للقبول في الكلية اجتياز اختبارات اللياقة البدنية والكفا ءة الحركية إضافةً إل المتطلبات الأكادية المعتادة، وتُسهم الكلية في تطوير القطاع الرياض ي وتعزيز نمط الحياة الصخي .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «يشبرط للقبول في الكلية اجتياز اختبارات اللياقة البدنية والكفا ءة الحركية إضافةً إل المتطلبات الأكادية المعتادة، وتُسهم الكلية في تطوير القطاع الرياض ي وتعزيز نمط الحياة الصخي .»"},{"chapter":3,"id":"KSU-202","page":"42","q":"أكمل العبارة الصحيحة وفق المذكرة: «تأسست كلية الأمب سلطان بن عبدالعزيز للخدمات الطبية الطارئة عام ____ ه / 2008 م، لتكون الأول من نوعها في المملكة العربية السعودية والشرق الأوسط في تخصص الخدمات الطبية الطارئة .»","o":["1429","1430","1434","1431"],"a":0,"e":"ورد في المذكرة: «تأسست كلية الأمب سلطان بن عبدالعزيز للخدمات الطبية الطارئة عام 1429 ه / 2008 م، لتكون الأول من نوعها في المملكة العربية السعودية والشرق الأوسط في تخصص الخدمات الطبية الطارئة .»"},{"chapter":3,"id":"KSU-203","page":"49","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","تُعن عمادة الدراسات العليا بتنظ وإدارة برامج الدراسات العليا في جامعة الملك سعود، وتشمل ب رامج الماجستب والدكتوراه والدبلوم العالي بنظام التعل الاعتيادي والمستمر والتنفيذي .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «تُعن عمادة الدراسات العليا بتنظ وإدارة برامج الدراسات العليا في جامعة الملك سعود، وتشمل ب رامج الماجستب والدكتوراه والدبلوم العالي بنظام التعل الاعتيادي والمستمر والتنفيذي .»"},{"chapter":3,"id":"KSU-204","page":"48","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","تنسجم رسالة الكلية مع توجهات الجامعة في تعزيز التعل التطبيقري وريادة الأعمال، وتُسهم بتوفب خريجي مؤهلي ومنتجي يُحوِلون أنفسهم من طالنري عمل إل أصحاب عمل ورواد في مجالاتهم .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «تنسجم رسالة الكلية مع توجهات الجامعة في تعزيز التعل التطبيقري وريادة الأعمال، وتُسهم بتوفب خريجي مؤهلي ومنتجي يُحوِلون أنفسهم من طالنري عمل إل أصحاب عمل ورواد في مجالاتهم .»"},{"chapter":3,"id":"KSU-205","page":"52","q":"أكمل العبارة الصحيحة وفق المذكرة: «عمادة تطوير المهارات نشئت ُ أ عمادة الموارد البشرية بموجب قرار مجلس التعل العالي بجلسته الثالثة والأربعفيي ش عبان ____ ه، وتُعدّ المحرك الرئيس للعملية الإدارية في الجامعة .»","o":["1428","1427","1429","1432"],"a":1,"e":"ورد في المذكرة: «عمادة تطوير المهارات نشئت ُ أ عمادة الموارد البشرية بموجب قرار مجلس التعل العالي بجلسته الثالثة والأربعفيي ش عبان 1427 ه، وتُعدّ المحرك الرئيس للعملية الإدارية في الجامعة .»"},{"chapter":3,"id":"KSU-206","page":"46","q":"ما المقصود بـ «تضم الكلية أقساماً متخصصة تشمل» وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","الإدارة الرياضية والبرويحية، والبربية ال بدنية وعلوم الحركة، والميكانيكا الحيوية والسلوك الحركي، وفسيولوجيا الجهد البدن ي ."],"a":3,"e":"ورد في المذكرة: «تضم الكلية أقساماً متخصصة تشمل : الإدارة الرياضية والبرويحية، والبربية ال بدنية وعلوم الحركة، والميكانيكا الحيوية والسلوك الحركي، وفسيولوجيا الجهد البدن ي .»"},{"chapter":3,"id":"KSU-207","page":"51","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["وتضم العمادة أقساماً أكادية تغطي مهارات التطوي ر الذانري، ومهارات اللغة الإنجلب ية، والعلوم الأساسية، وهي مرحلة لا تهدف إل تأهيل الطلاب أكادياً وفق متطلبات الكليات المختلفة .","وتضم العمادة أقساماً أكادية تغطي مهارات التطوي ر الذانري، ومهارات اللغة الإنجلب ية، والعلوم الأساسية، وهي مرحلة تهدف إل تأهيل الطلاب أكادياً وفق متطلبات الكليات المختلفة .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «وتضم العمادة أقساماً أكادية تغطي مهارات التطوي ر الذانري، ومهارات اللغة الإنجلب ية، والعلوم الأساسية، وهي مرحلة تهدف إل تأهيل الطلاب أكادياً وفق متطلبات الكليات المختلفة .»"},{"chapter":3,"id":"KSU-208","page":"40","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يضم المستشق أقساماً تخصصية مثل قسم طب وجراحة العيون، وقسم طب وجراحة الأنف والأذن والحنجرة، والمركز الجامعىي للسكري، والعيادات التخصصية والعامة، والخدمات الطبية المساندة ."],"a":3,"e":"ورد في المذكرة: «يضم المستشق أقساماً تخصصية مثل قسم طب وجراحة العيون، وقسم طب وجراحة الأنف والأذن والحنجرة، والمركز الجامعىي للسكري، والعيادات التخصصية والعامة، والخدمات الطبية المساندة .»"},{"chapter":3,"id":"KSU-209","page":"45","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","تُشارك الكلية في المؤتمرات الدولية وتُقدّم خدمات ترجم ة متخصصة للقطاعي العام والخاص، وتسعى إل ريادة عالمية في تخصصاتها بوصفها نافذةً للتواص ل مع ثقافات الشعوب وحضاراتها .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":1,"e":"ورد في المذكرة: «تُشارك الكلية في المؤتمرات الدولية وتُقدّم خدمات ترجم ة متخصصة للقطاعي العام والخاص، وتسعى إل ريادة عالمية في تخصصاتها بوصفها نافذةً للتواص ل مع ثقافات الشعوب وحضاراتها .»"},{"chapter":3,"id":"KSU-210","page":"51","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","وقد حرصت الجامعة منذ تأسيسها على الاهتمام بهذا الجانب، إذ أوجدت وحدات متخصصة لإدارة شبكات الاتصال وخدمات الهاتف الرقمي لجميع مرافق الجامعة من مناطق أكادية وخدمية وسكنية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":1,"e":"ورد في المذكرة: «وقد حرصت الجامعة منذ تأسيسها على الاهتمام بهذا الجانب، إذ أوجدت وحدات متخصصة لإدارة شبكات الاتصال وخدمات الهاتف الرقمي لجميع مرافق الجامعة من مناطق أكادية وخدمية وسكنية .»"},{"chapter":3,"id":"KSU-211","page":"52","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["وتسعى العمادة إل تطوير خدماتها وفق المعايب الوطنية والدولية، ورفع كفاءة الأداء المؤسسي، عبر تطوير القيادات الأكادية والإدارية، وب ناء شراكات داخلية وخارجية ، والتوسع في البرامج النوعية وخدمة المجتمع .","وتسعى العمادة إل تطوير خدماتها بخلاف المعايب الوطنية والدولية، ورفع كفاءة الأداء المؤسسي، عبر تطوير القيادات الأكادية والإدارية، وب ناء شراكات داخلية وخارجية ، والتوسع في البرامج النوعية وخدمة المجتمع .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «وتسعى العمادة إل تطوير خدماتها وفق المعايب الوطنية والدولية، ورفع كفاءة الأداء المؤسسي، عبر تطوير القيادات الأكادية والإدارية، وب ناء شراكات داخلية وخارجية ، والتوسع في البرامج النوعية وخدمة المجتمع .»"},{"chapter":3,"id":"KSU-212","page":"36","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","وتتوزع هذه الكليات على تخصصات متنوعة تغطي جميع المجالات العلمية والإنسانية والطبية والهندسية، مما يجعل الجامعة مؤسسة تعلية شاملة تستجيب لمختلف احتياجات السوق والمج تمع ."],"a":3,"e":"ورد في المذكرة: «وتتوزع هذه الكليات على تخصصات متنوعة تغطي جميع المجالات العلمية والإنسانية والطبية والهندسية، مما يجعل الجامعة مؤسسة تعلية شاملة تستجيب لمختلف احتياجات السوق والمج تمع .»"},{"chapter":3,"id":"KSU-213","page":"43","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","تمنح الكلية درجات البكالوريوس والماجست ير و الدكتوراه، وتُعدّ من أعرق كليات إدارة الأعمال في المنطقة العربية وتحتل مكانة بحثية بارزة في الدرا سات الاقتصادية والإدارية ."],"a":3,"e":"ورد في المذكرة: «تمنح الكلية درجات البكالوريوس والماجست ير و الدكتوراه، وتُعدّ من أعرق كليات إدارة الأعمال في المنطقة العربية وتحتل مكانة بحثية بارزة في الدرا سات الاقتصادية والإدارية .»"},{"chapter":3,"id":"KSU-214","page":"46","q":"أكمل العبارة الصحيحة وفق المذكرة: «نشئت ُ أ كلية السياحة والآثار عام ____ ه / 2005 م، وتضم أقساماً متخصصة تشمل : الآثار، وإدارة موارد البراث والإرشاد السياحي، والإدارة السياحية والفندقية .»","o":["1431","1426","1428","1427"],"a":1,"e":"ورد في المذكرة: «نشئت ُ أ كلية السياحة والآثار عام 1426 ه / 2005 م، وتضم أقساماً متخصصة تشمل : الآثار، وإدارة موارد البراث والإرشاد السياحي، والإدارة السياحية والفندقية .»"},{"chapter":3,"id":"KSU-215","page":"42","q":"أكمل العبارة الصحيحة وفق المذكرة: «كلية الأمب سلطان بن عبدالعزيز للخدمات الطبية الطارئة أنشئت عام ____ ه / 1976 م لتكون أول كلية تمريض في المملكة العربية السعودية تمنح درجة البكالوريوس في علوم التمريض .»","o":["1398","1401","1396","1397"],"a":2,"e":"ورد في المذكرة: «كلية الأمب سلطان بن عبدالعزيز للخدمات الطبية الطارئة أنشئت عام 1396 ه / 1976 م لتكون أول كلية تمريض في المملكة العربية السعودية تمنح درجة البكالوريوس في علوم التمريض .»"},{"chapter":3,"id":"KSU-216","page":"51","q":"أكمل العبارة الصحيحة وفق المذكرة: «حرصاً من جامعة الملك سعود على ضمان الجودة في جميع مساراتها ومخرجاتها، سّست ُ أ إدارة الجودة بتاري خ ____ / 9 / 20 ه ، ثم تم تحويلها ال عمادة الجودة في 1429 / 7 / 5 ه .»","o":["1433","1428","1429","1430"],"a":1,"e":"ورد في المذكرة: «حرصاً من جامعة الملك سعود على ضمان الجودة في جميع مساراتها ومخرجاتها، سّست ُ أ إدارة الجودة بتاري خ 1428 / 9 / 20 ه ، ثم تم تحويلها ال عمادة الجودة في 1429 / 7 / 5 ه .»"},{"chapter":3,"id":"KSU-217","page":"36","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يتألف الهيكل الأكادي والتنظي للجامعة من نظام متوقف وشامل يجمع بي الأصالة والحداثة، ويعكس التطور المستمر في المجالات التعلية والبحثية والإدارية على جميع المستويات .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يتألف الهيكل الأكادي والتنظي للجامعة من نظام متقدم وشامل يجمع بي الأصالة والحداثة، ويعكس التطور المستمر في المجالات التعلية والبحثية والإدارية على جميع المستويات ."],"a":3,"e":"ورد في المذكرة: «يتألف الهيكل الأكادي والتنظي للجامعة من نظام متقدم وشامل يجمع بي الأصالة والحداثة، ويعكس التطور المستمر في المجالات التعلية والبحثية والإدارية على جميع المستويات .»"},{"chapter":3,"id":"KSU-218","page":"42","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","تمنح درجة البكالوريوس في تخصص الخدمات الطبية الطارئة، وتهدف إل إعداد كو ادر مؤهلة علمياً وفنياً لقيادة منظومة الطوارئ والإسعاف ما قبل المستشق وطب الحشود والكوارث .","يُطبق ذلك على التعليم العام فقط.","تمنح درجة البكالوريوس في تخصص الخدمات الطبية الطارئة، ولا تهدف إل إعداد كو ادر مؤهلة علمياً وفنياً لقيادة منظومة الطوارئ والإسعاف ما قبل المستشق وطب الحشود والكوارث ."],"a":1,"e":"ورد في المذكرة: «تمنح درجة البكالوريوس في تخصص الخدمات الطبية الطارئة، وتهدف إل إعداد كو ادر مؤهلة علمياً وفنياً لقيادة منظومة الطوارئ والإسعاف ما قبل المستشق وطب الحشود والكوارث .»"},{"chapter":3,"id":"KSU-219","page":"46","q":"أكمل العبارة الصحيحة وفق المذكرة: «كلية علوم الرياضة والنشاط البدن ي تأسست كلية الحقوق والعلوم السياسية عام ____ ه / 2006 م بموجب قرار مجلس التعل العالي، وتُعدّ من الكليات حديثة النشأة في الجامعة .»","o":["1427","1429","1428","1432"],"a":0,"e":"ورد في المذكرة: «كلية علوم الرياضة والنشاط البدن ي تأسست كلية الحقوق والعلوم السياسية عام 1427 ه / 2006 م بموجب قرار مجلس التعل العالي، وتُعدّ من الكليات حديثة النشأة في الجامعة .»"},{"chapter":3,"id":"KSU-220","page":"52","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","وتد اختصاصها للا يشمل جميع شؤون منسونري الجامعة من تعيي وتعاقد وتدريب وابتعاث وترقيات واستحقاقات، لكافة الفئات من أعضاء هيئة التدريس والموظفي السعوديي وغب السعوديي .","وتد اختصاصها ليشمل جميع شؤون منسونري الجامعة من تعيي وتعاقد وتدريب وابتعاث وترقيات واستحقاقات، لكافة الفئات من أعضاء هيئة التدريس والموظفي السعوديي وغب السعوديي ."],"a":3,"e":"ورد في المذكرة: «وتد اختصاصها ليشمل جميع شؤون منسونري الجامعة من تعيي وتعاقد وتدريب وابتعاث وترقيات واستحقاقات، لكافة الفئات من أعضاء هيئة التدريس والموظفي السعوديي وغب السعوديي .»"},{"chapter":3,"id":"KSU-221","page":"48","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["تنسجم رسالة الكلية مع أهداف الجامعة في تقد تعل متمي ز وإنتاج بحوث إبداعية تخدم المجتمع وتُسهم في بناء اقتصاد المعرفة عبر بيئة محفزة للتعلم وت وظيف أمثل للتقنية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":0,"e":"ورد في المذكرة: «تنسجم رسالة الكلية مع أهداف الجامعة في تقد تعل متمي ز وإنتاج بحوث إبداعية تخدم المجتمع وتُسهم في بناء اقتصاد المعرفة عبر بيئة محفزة للتعلم وت وظيف أمثل للتقنية .»"},{"chapter":3,"id":"KSU-222","page":"41","q":"ما المقصود بـ «تضم الكلية خمسة أقسام أكادية هي» وفق المذكرة؟","o":["الكياء الصيدلية، وعلم الأدوية والسموم، والصيدلانيات، والعقاقب ، والصيدلة الإك لينيكية الذي نسر ُ أ عام 1401 ه .","الكياء الصيدلية، وعلم الأدوية والسموم، والصيدلانيات، والعقاقب ، والصيدلة الإك لينيكية الذي نسر ُ أ عام 1399 ه .","الكياء الصيدلية، وعلم الأدوية والسموم، والصيدلانيات، والعقاقب ، والصيدلة الإك لينيكية الذي نسر ُ أ عام 1404 ه .","الكياء الصيدلية، وعلم الأدوية والسموم، والصيدلانيات، والعقاقب ، والصيدلة الإك لينيكية الذي نسر ُ أ عام 1400 ه ."],"a":1,"e":"ورد في المذكرة: «تضم الكلية خمسة أقسام أكادية هي : الكياء الصيدلية، وعلم الأدوية والسموم، والصيدلانيات، والعقاقب ، والصيدلة الإك لينيكية الذي نسر ُ أ عام 1399 ه .»"},{"chapter":3,"id":"KSU-223","page":"43","q":"أكمل العبارة الصحيحة وفق المذكرة: «كلية الهندسة الكليات العلمية تُعدّ كلية العلوم من أعرق كليات جامعة الملك سعود وأقدمها، إذ سِست ُ أ عام ____ 7 ه / 195 7 م لتكون ثان ي الكليات في تاري خ الجامعة .»","o":["142","138","139","137"],"a":3,"e":"ورد في المذكرة: «كلية الهندسة الكليات العلمية تُعدّ كلية العلوم من أعرق كليات جامعة الملك سعود وأقدمها، إذ سِست ُ أ عام 137 7 ه / 195 7 م لتكون ثان ي الكليات في تاري خ الجامعة .»"},{"chapter":3,"id":"KSU-224","page":"45","q":"ما المقصود بـ «تضم الكلية أقساماً إنسانية واجتماعية متنوعة هي» وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","اللغة العربية وآدابها، والتاري خ، والجغرافيا، والدراسات الاجتماع ية ، والإعلام، وعلم المعلومات .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «تضم الكلية أقساماً إنسانية واجتماعية متنوعة هي : اللغة العربية وآدابها، والتاري خ، والجغرافيا، والدراسات الاجتماع ية ، والإعلام، وعلم المعلومات .»"},{"chapter":3,"id":"KSU-225","page":"46","q":"أكمل العبارة الصحيحة وفق المذكرة: «تنسجم رسالة الكلية انسجاماً وثيقاً مع رؤية المملكة ____ في توظيف الموروث الحضاري السعودي الغن ي وتطوير القطاع السياحي الوطن ي بوصفه محركاً للتنوي ع الاقتصاد ي .»","o":["2035","2030","2031","2032"],"a":1,"e":"ورد في المذكرة: «تنسجم رسالة الكلية انسجاماً وثيقاً مع رؤية المملكة 2030 في توظيف الموروث الحضاري السعودي الغن ي وتطوير القطاع السياحي الوطن ي بوصفه محركاً للتنوي ع الاقتصاد ي .»"},{"chapter":3,"id":"KSU-226","page":"47","q":"ما المقصود بـ «تقدم الكلية برامج دبلوم وبكالوريوس في تخصصات تطبيقية تشمل» وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","العلوم الإدارية والمالية، وعلوم الحاسب والهندسة، والعلوم الصحية والعلوم الإنس انية .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «تقدم الكلية برامج دبلوم وبكالوريوس في تخصصات تطبيقية تشمل : العلوم الإدارية والمالية، وعلوم الحاسب والهندسة، والعلوم الصحية والعلوم الإنس انية .»"},{"chapter":3,"id":"KSU-227","page":"44","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["تمنح الكلية درجات البكالوريوس والماجستب والدكتوراه، وتضم مختبرات حاسوبية حديثة ومراكز ب حثية في مجالات الذكاء الاصطناعي والأمن السيبران ي و الحوسبة السحابية .","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «تمنح الكلية درجات البكالوريوس والماجستب والدكتوراه، وتضم مختبرات حاسوبية حديثة ومراكز ب حثية في مجالات الذكاء الاصطناعي والأمن السيبران ي و الحوسبة السحابية .»"},{"chapter":3,"id":"KSU-228","page":"44","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","حصل قسم العمارة على الاعتماد المكاف من الهيئة الوطنية الأمريكية لاعتماد البرامج المعمارية ( NAAB) وهي أرفر جهة اعتماد معمارية في العالم، وهو ما يعكس مستوى البرامج الأكادية وجودة مخرجاتها ."],"a":3,"e":"ورد في المذكرة: «حصل قسم العمارة على الاعتماد المكاف من الهيئة الوطنية الأمريكية لاعتماد البرامج المعمارية ( NAAB) وهي أرفر جهة اعتماد معمارية في العالم، وهو ما يعكس مستوى البرامج الأكادية وجودة مخرجاتها .»"},{"chapter":3,"id":"KSU-229","page":"50","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","كما تتول عدداً من المهام، من أبرزها تنفيذ سياسات القبول بالير سيق مع الكليات، وإدارة أنظمة القبول الإلكبرون ي، ومتابعة عمليات التسجيل والتوثيق، إل جانب تحديث البيانات الأكادية بشكل مستمر.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":1,"e":"ورد في المذكرة: «كما تتول عدداً من المهام، من أبرزها تنفيذ سياسات القبول بالير سيق مع الكليات، وإدارة أنظمة القبول الإلكبرون ي، ومتابعة عمليات التسجيل والتوثيق، إل جانب تحديث البيانات الأكادية بشكل مستمر.»"},{"chapter":3,"id":"KSU-230","page":"46","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","تمنح الكلية درجة البكالوريوس في الحقوق والعلوم السياسية إضافةً إل برام ج الدراسات العليا في القانون التجاري والجنان ي والدراسات السياسية والعلاقات الدولية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":1,"e":"ورد في المذكرة: «تمنح الكلية درجة البكالوريوس في الحقوق والعلوم السياسية إضافةً إل برام ج الدراسات العليا في القانون التجاري والجنان ي والدراسات السياسية والعلاقات الدولية .»"},{"chapter":3,"id":"KSU-231","page":"41","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","على مستوى الدراسات العليا، توقف برامج الماجستب في رقابة الجودة في الصيدلة والصيدلة الإكلينيكية، وبرامج الإقامة والزمالة بالتعاون مع المدينة الطبية الجامعية، إض افةً إل برامج الدكتوراه .","يُطبق ذلك على التعليم العام فقط.","على مستوى الدراسات العليا، تقدم برامج الماجستب في رقابة الجودة في الصيدلة والصيدلة الإكلينيكية، وبرامج الإقامة والزمالة بالتعاون مع المدينة الطبية الجامعية، إض افةً إل برامج الدكتوراه ."],"a":3,"e":"ورد في المذكرة: «على مستوى الدراسات العليا، تقدم برامج الماجستب في رقابة الجودة في الصيدلة والصيدلة الإكلينيكية، وبرامج الإقامة والزمالة بالتعاون مع المدينة الطبية الجامعية، إض افةً إل برامج الدكتوراه .»"},{"chapter":3,"id":"KSU-232","page":"42","q":"أكمل العبارة الصحيحة وفق المذكرة: «كلية العلوم الطبية التطبيقية تأسست كلية العلوم الطبية التطبيقية عام ____ ه / 1979 م، وتُعدّ أول كليات العلوم الطبية التطبيقية في المملكة العربية السعودية .»","o":["1399","1400","1401","1404"],"a":0,"e":"ورد في المذكرة: «كلية العلوم الطبية التطبيقية تأسست كلية العلوم الطبية التطبيقية عام 1399 ه / 1979 م، وتُعدّ أول كليات العلوم الطبية التطبيقية في المملكة العربية السعودية .»"},{"chapter":3,"id":"KSU-233","page":"44","q":"أكمل العبارة الصحيحة وفق المذكرة: «نشئت ُ أ كلية علوم الحاسب والمعلومات عام ____ ه / 1984 م بموجب الأ مر ال سامي ال كر، استجابةً للحاجة المتنامية إل الكوادر الوطنية في مجال تقنية المعلومات .»","o":["1404","1409","1405","1406"],"a":0,"e":"ورد في المذكرة: «نشئت ُ أ كلية علوم الحاسب والمعلومات عام 1404 ه / 1984 م بموجب الأ مر ال سامي ال كر، استجابةً للحاجة المتنامية إل الكوادر الوطنية في مجال تقنية المعلومات .»"},{"chapter":3,"id":"KSU-234","page":"44","q":"أكمل العبارة الصحيحة وفق المذكرة: «تسعى الكلية إل تخري ج كفا ءات تقنية مواكبة لمتطلبات التحول الرقمي ضمن رؤية المملكة ____ ، وتربطها شراكات أكادية وصناعية مع شركات التقنية العالمية الكبرى .»","o":["2035","2032","2030","2031"],"a":2,"e":"ورد في المذكرة: «تسعى الكلية إل تخري ج كفا ءات تقنية مواكبة لمتطلبات التحول الرقمي ضمن رؤية المملكة 2030 ، وتربطها شراكات أكادية وصناعية مع شركات التقنية العالمية الكبرى .»"},{"chapter":3,"id":"KSU-235","page":"48","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","تُقدّم الكلية برامج في إدارة الأع مال بمنهج تطبيقري يجمع بي المعرفة الإدارية والمهارات العملية الميدانية، وي ُهن ّ الخريجي للانخراط المباشر في سوق العمل ."],"a":3,"e":"ورد في المذكرة: «تُقدّم الكلية برامج في إدارة الأع مال بمنهج تطبيقري يجمع بي المعرفة الإدارية والمهارات العملية الميدانية، وي ُهن ّ الخريجي للانخراط المباشر في سوق العمل .»"},{"chapter":3,"id":"KSU-236","page":"49","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["وتتول العمادة استقب ال طلبات القبول للبرامج المختلفة، والإشراف على قاعدة الإنتاج الأكادي للجامعة، ودعم مسب ة البح ث العلمي والمساهمة في إعداد كوادر مؤهلة.","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «وتتول العمادة استقب ال طلبات القبول للبرامج المختلفة، والإشراف على قاعدة الإنتاج الأكادي للجامعة، ودعم مسب ة البح ث العلمي والمساهمة في إعداد كوادر مؤهلة.»"},{"chapter":3,"id":"KSU-237","page":"52","q":"أكمل العبارة الصحيحة وفق المذكرة: «تعود نشأة عمادة تطوير المهارات إل تاري خ ____ / 11 / 12 ه، لتتول دوراً محورية في تنمية مهارات منسونري الجامعة من أعضاء هيئة التدريس، والموظفي ، والطلاب .»","o":["1433","1429","1430","1428"],"a":3,"e":"ورد في المذكرة: «تعود نشأة عمادة تطوير المهارات إل تاري خ 1428 / 11 / 12 ه، لتتول دوراً محورية في تنمية مهارات منسونري الجامعة من أعضاء هيئة التدريس، والموظفي ، والطلاب .»"},{"chapter":3,"id":"KSU-238","page":"46","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","تمنح الكلية درجات البكالوريوس والماجستب والدكتوراه، وتعتمد منهجاً علمياً متكاملاً يجمع بي الجانبي النظري وا لتطبيقرفيي تأهيل الكوادر الرياضية المتخصصة ."],"a":3,"e":"ورد في المذكرة: «تمنح الكلية درجات البكالوريوس والماجستب والدكتوراه، وتعتمد منهجاً علمياً متكاملاً يجمع بي الجانبي النظري وا لتطبيقرفيي تأهيل الكوادر الرياضية المتخصصة .»"},{"chapter":3,"id":"KSU-239","page":"51","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","وتتول العمادة اليوم دعم التحول الرقمفيي الجامعة، وإدارة الير ية التحتية لتقنية المعلومات، وتقد الدعم الفن ي للأنظمة الإلكبرونية والبوابة الجامعية.","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":1,"e":"ورد في المذكرة: «وتتول العمادة اليوم دعم التحول الرقمفيي الجامعة، وإدارة الير ية التحتية لتقنية المعلومات، وتقد الدعم الفن ي للأنظمة الإلكبرونية والبوابة الجامعية.»"},{"chapter":3,"id":"KSU-240","page":"50","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["ولا تعمل العمادة على تطوير التعل والتعلم والبحث العلمي من خلال توفب مجموعات متنوعة من المصادر الورقية والإلكبرونية، مع توفب بيئة مكتبية ملائمة تلنرّي احتياجات المجتمع الجامعىي .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","وتعمل العمادة على تطوير التعل والتعلم والبحث العلمي من خلال توفب مجموعات متنوعة من المصادر الورقية والإلكبرونية، مع توفب بيئة مكتبية ملائمة تلنرّي احتياجات المجتمع الجامعىي .","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «وتعمل العمادة على تطوير التعل والتعلم والبحث العلمي من خلال توفب مجموعات متنوعة من المصادر الورقية والإلكبرونية، مع توفب بيئة مكتبية ملائمة تلنرّي احتياجات المجتمع الجامعىي .»"},{"chapter":4,"id":"KSU-241","page":"55","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","مراكز التمب البحنري نظرة عامة على البنية البحثية تُعد مراكز الأبحاث والمعاهد العلمية في جامعة الملك سعود من الركائز الأساسية للمنظومة البحنري ة المتكاملة النري تسعى الجامعة من خلالها إل تحقيق التمب في البحث العلمي والابتكار ."],"a":3,"e":"ورد في المذكرة: «مراكز التمب البحنري نظرة عامة على البنية البحثية تُعد مراكز الأبحاث والمعاهد العلمية في جامعة الملك سعود من الركائز الأساسية للمنظومة البحنري ة المتكاملة النري تسعى الجامعة من خلالها إل تحقيق التمب في البحث العلمي والابتكار .»"},{"chapter":4,"id":"KSU-242","page":"55","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["وبحسب الهيكل الموحد للكليات والمعاهد الأكادية في الجامعة، تتبع مراكز البحوث في الكليات إدارياً الك ليات الأكادية ذات العلاقة، في حي تتبع بعض المراكز والمعاهد البحثية إدارياً وكالة الجامعة للدراسات العليا والبحث العلمي، وذلك وفقاً لطبيعة كل مركز واختصاصه .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","وبحسب الهيكل الموحد للكليات والمعاهد الأكادية في الجامعة، تتبع مراكز البحوث في الكليات إدارياً الك ليات الأكادية ذات العلاقة، في حي تتبع بعض المراكز والمعاهد البحثية إدارياً وكالة الجامعة للدراسات العليا والبحث العلمي، وذلك بخلافاً لطبيعة كل مركز واختصاصه ."],"a":0,"e":"ورد في المذكرة: «وبحسب الهيكل الموحد للكليات والمعاهد الأكادية في الجامعة، تتبع مراكز البحوث في الكليات إدارياً الك ليات الأكادية ذات العلاقة، في حي تتبع بعض المراكز والمعاهد البحثية إدارياً وكالة الجامعة للدراسات العليا والبحث العلمي، وذلك وفقاً لطبيعة كل مركز واختصاصه .»"},{"chapter":4,"id":"KSU-243","page":"56","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["مركز التمب البحنرفيي المواد الهندسية متخصص في أبحاث المواد الهندسية المتقدمة، ويُجري بحوثاً في تطوير المواد النانوية والذكية والمركبة ، بما يساهم في ابتكار مواد هندسية مبتكرة ذات خصائص محسنة تُلنري احتياجات مختل ف القطاعات الصناعية في المملكة .","مركز التمب البحنرفيي المواد الهندسية متخصص في أبحاث المواد الهندسية المتوقفة، ويُجري بحوثاً في تطوير المواد النانوية والذكية والمركبة ، بما يساهم في ابتكار مواد هندسية مبتكرة ذات خصائص محسنة تُلنري احتياجات مختل ف القطاعات الصناعية في المملكة .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «مركز التمب البحنرفيي المواد الهندسية متخصص في أبحاث المواد الهندسية المتقدمة، ويُجري بحوثاً في تطوير المواد النانوية والذكية والمركبة ، بما يساهم في ابتكار مواد هندسية مبتكرة ذات خصائص محسنة تُلنري احتياجات مختل ف القطاعات الصناعية في المملكة .»"},{"chapter":4,"id":"KSU-244","page":"56","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","مركز التمب لأمن المعلومات في ظل التطور المتسارع في تقنيات المعلومات والتحول الرقمي، يُعن هذا المركز بإجراء بحوث متقد مة في مجال أمن المعلومات والأمن السيبران ي وتطوير حلول تقنية لحماية البيانات والأنظمة المعلوم اتية في ظل التحول الرقمي .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «مركز التمب لأمن المعلومات في ظل التطور المتسارع في تقنيات المعلومات والتحول الرقمي، يُعن هذا المركز بإجراء بحوث متقد مة في مجال أمن المعلومات والأمن السيبران ي وتطوير حلول تقنية لحماية البيانات والأنظمة المعلوم اتية في ظل التحول الرقمي .»"},{"chapter":4,"id":"KSU-245","page":"57","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","وقد أثبت البرنامج نجاحه الكبب ، حيث تضاعف عدد الأبحاث ونوعيتها وأوعية نشرها عدة مرات منذ أن تم تبن ي البرنامج، مما ساه م في تأهيل الجامعة لأن تتبوأ مكانتها المرموقة في التصنيفات العالمية على المستوى العرنري والإ سلامي والدولي .","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «وقد أثبت البرنامج نجاحه الكبب ، حيث تضاعف عدد الأبحاث ونوعيتها وأوعية نشرها عدة مرات منذ أن تم تبن ي البرنامج، مما ساه م في تأهيل الجامعة لأن تتبوأ مكانتها المرموقة في التصنيفات العالمية على المستوى العرنري والإ سلامي والدولي .»"},{"chapter":4,"id":"KSU-246","page":"59","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["الشراكات البحثية الدولية والمحلية المبادرات الدولية الرئيسية مبادرة الشراكة العلمية الدولية مع العلماء المتمب ين تهدف إل الشراكة البحثية مع علماء من جامعات دولية متقدمة في التصنيفات العالمية بالإضاف ة إل شراكة مع باحثي من ذوي الاستشهاد العالي للوصول إل مخرجات بحثية قابلة للنشر في مجلات عل مية مرموقة .","الشراكات البحثية الدولية والمحلية المبادرات الدولية الرئيسية مبادرة الشراكة العلمية الدولية مع العلماء المتمب ين لا تهدف إل الشراكة البحثية مع علماء من جامعات دولية متقدمة في التصنيفات العالمية بالإضاف ة إل شراكة مع باحثي من ذوي الاستشهاد العالي للوصول إل مخرجات بحثية قابلة للنشر في مجلات عل مية مرموقة .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «الشراكات البحثية الدولية والمحلية المبادرات الدولية الرئيسية مبادرة الشراكة العلمية الدولية مع العلماء المتمب ين تهدف إل الشراكة البحثية مع علماء من جامعات دولية متقدمة في التصنيفات العالمية بالإضاف ة إل شراكة مع باحثي من ذوي الاستشهاد العالي للوصول إل مخرجات بحثية قابلة للنشر في مجلات عل مية مرموقة .»"},{"chapter":4,"id":"KSU-247","page":"60","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","إن النجاحات النري حققتها جامعة الملك سعود في م جال البحث العلمي والابتكار تعكس البر ام الجامعة بمسؤوليتها تجاه المجتمع والوطن، وتُؤكد عزمها على الاستمرار في المسب ة البحثية المتمب ة النري تُسهم في بناء اقتصاد المعرفة وتحقيق التنمية الشاملة .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «إن النجاحات النري حققتها جامعة الملك سعود في م جال البحث العلمي والابتكار تعكس البر ام الجامعة بمسؤوليتها تجاه المجتمع والوطن، وتُؤكد عزمها على الاستمرار في المسب ة البحثية المتمب ة النري تُسهم في بناء اقتصاد المعرفة وتحقيق التنمية الشاملة .»"},{"chapter":4,"id":"KSU-248","page":"58","q":"أكمل العبارة الصحيحة وفق المذكرة: «وأسهم برنامج التمويل المؤسسي للبحث والابت كار المدعوم من وزارة التعل، الذي تُشرف عليه وكالة الجامعة للدراسات العليا والبحث العلمي، بدور مهم في تحقيق هذه المخرجات، حيث بلغ عدد البحوث المدعومة من البرنامج ____ بحوث .»","o":["1009","1008","1007","1012"],"a":2,"e":"ورد في المذكرة: «وأسهم برنامج التمويل المؤسسي للبحث والابت كار المدعوم من وزارة التعل، الذي تُشرف عليه وكالة الجامعة للدراسات العليا والبحث العلمي، بدور مهم في تحقيق هذه المخرجات، حيث بلغ عدد البحوث المدعومة من البرنامج 1007 بحوث .»"},{"chapter":4,"id":"KSU-249","page":"60","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","وتُواصل الجامعة سعيها ال ريادي من خلال تطوير برامجها البحثية، واستقطاب الكفاءات، وتوفب بيئة بحثية محفزة، وتعزيز التعاون م ع القطاعي العام والخاص، وتوجيه البحث العلمي نحو معالجة التحديات الوطنية ودعم رؤية المملكة"],"a":3,"e":"ورد في المذكرة: «وتُواصل الجامعة سعيها ال ريادي من خلال تطوير برامجها البحثية، واستقطاب الكفاءات، وتوفب بيئة بحثية محفزة، وتعزيز التعاون م ع القطاعي العام والخاص، وتوجيه البحث العلمي نحو معالجة التحديات الوطنية ودعم رؤية المملكة»"},{"chapter":4,"id":"KSU-250","page":"60","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","يتضح من استعراض مكونات منظومة البحث العلمي والابتكار في جامعة الملك سعود أن الجامعة بنت بنية تحتية بحثية متكاملة ومتطورة تشمل المراكز البحثية، والمعاهد العلمية، والكراسي البحث ية، وبرامج التمويل المتنوعة ."],"a":3,"e":"ورد في المذكرة: «يتضح من استعراض مكونات منظومة البحث العلمي والابتكار في جامعة الملك سعود أن الجامعة بنت بنية تحتية بحثية متكاملة ومتطورة تشمل المراكز البحثية، والمعاهد العلمية، والكراسي البحث ية، وبرامج التمويل المتنوعة .»"},{"chapter":4,"id":"KSU-251","page":"57","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","برنامج الكراسي البحثية مفهوم الكراسي البحثية وأهدافها يُعد برنامج كراسي البحث في جامعة الملك سعود من أكبر المشاري ع التعلية والبحثية النري تهد ف إل تحقيق التمب في مجال البحث والتطوير واقتصاديات المعرفة .","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «برنامج الكراسي البحثية مفهوم الكراسي البحثية وأهدافها يُعد برنامج كراسي البحث في جامعة الملك سعود من أكبر المشاري ع التعلية والبحثية النري تهد ف إل تحقيق التمب في مجال البحث والتطوير واقتصاديات المعرفة .»"},{"chapter":4,"id":"KSU-252","page":"59","q":"أكمل العبارة الصحيحة وفق المذكرة: «ويشبرط البرنامج انضمام أعضاء هيئة التدريس لمجموعة بحثية دول ية قائمة في إحدى الجامعات المدرجة ضمن أفضل ( ____ ) جامعة عالمياً وفق تصنيف شنغهاي، على أن تضم المجموعة عضواً واحداً إل عضوين من هيئة التدريس .»","o":["505","502","500","501"],"a":2,"e":"ورد في المذكرة: «ويشبرط البرنامج انضمام أعضاء هيئة التدريس لمجموعة بحثية دول ية قائمة في إحدى الجامعات المدرجة ضمن أفضل ( 500 ) جامعة عالمياً وفق تصنيف شنغهاي، على أن تضم المجموعة عضواً واحداً إل عضوين من هيئة التدريس .»"},{"chapter":4,"id":"KSU-253","page":"55","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","وقد أنشأ ت الجامعة واحداً وعشرين مركزاً بحثياً متخصصاً، من بينها مركزان تابعان للكليات النسائية، وتخضع هذ ه المراكز إدارياً لعمادة البحث العلمي، وتُموّل من مب انية الجامعة المخصصة للبحث العلمي .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «وقد أنشأ ت الجامعة واحداً وعشرين مركزاً بحثياً متخصصاً، من بينها مركزان تابعان للكليات النسائية، وتخضع هذ ه المراكز إدارياً لعمادة البحث العلمي، وتُموّل من مب انية الجامعة المخصصة للبحث العلمي .»"},{"chapter":4,"id":"KSU-254","page":"58","q":"أكمل العبارة الصحيحة وفق المذكرة: «النشر العلمي والإنتاجية البحثية مؤشرات النشر العلمي حققت جامعة الملك سعود نشاطاً بحثياً متمب اً، حيث تجاوز عدد البحوث المنشورة عشرة آلاف بحث في عام ____ م، معظمها نُشر في مجلات مصنفة عالمياً .»","o":["2023","2025","2028","2024"],"a":0,"e":"ورد في المذكرة: «النشر العلمي والإنتاجية البحثية مؤشرات النشر العلمي حققت جامعة الملك سعود نشاطاً بحثياً متمب اً، حيث تجاوز عدد البحوث المنشورة عشرة آلاف بحث في عام 2023 م، معظمها نُشر في مجلات مصنفة عالمياً .»"},{"chapter":4,"id":"KSU-255","page":"55","q":"أكمل العبارة الصحيحة وفق المذكرة: «مركز تقنيات الطاقة المستدامة يُركز على البحث في مجال تقنيات الطاقة المتجددة وكفاءة الطاقة، بما يدعم مستهدفات رؤية المملكة ____ في تنوي ع مصادر الطاقة والحد من الاعتماد على المصادر التقليدية .»","o":["2032","2030","2031","2035"],"a":1,"e":"ورد في المذكرة: «مركز تقنيات الطاقة المستدامة يُركز على البحث في مجال تقنيات الطاقة المتجددة وكفاءة الطاقة، بما يدعم مستهدفات رؤية المملكة 2030 في تنوي ع مصادر الطاقة والحد من الاعتماد على المصادر التقليدية .»"},{"chapter":4,"id":"KSU-256","page":"54","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["تنعكس النتا ئج في مؤشرات أداء متمب ة، سواءً من حيث عدد البحوث المنشورة في المجلات العلمية عالية التأثب ، وبراءات اخبراع، ومشاري ع ممولة، وجوائز علمية مع مساهمات في معالجة التحديات المحلية والعالمية لدعم التنمية المستدامة .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «تنعكس النتا ئج في مؤشرات أداء متمب ة، سواءً من حيث عدد البحوث المنشورة في المجلات العلمية عالية التأثب ، وبراءات اخبراع، ومشاري ع ممولة، وجوائز علمية مع مساهمات في معالجة التحديات المحلية والعالمية لدعم التنمية المستدامة .»"},{"chapter":4,"id":"KSU-257","page":"55","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["و تهدف هذه المراكز البحثية إل تنش يط ودعم العمل البحنري لأعضاء هيئة التدريس في الكليات، وتوفب العديد من الخدمات الإدارية والفنية والمالية النري تُسهم في تسهيل إجراء البحوث العلمية المتقدمة .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","و لا تهدف هذه المراكز البحثية إل تنش يط ودعم العمل البحنري لأعضاء هيئة التدريس في الكليات، وتوفب العديد من الخدمات الإدارية والفنية والمالية النري تُسهم في تسهيل إجراء البحوث العلمية المتقدمة .","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «و تهدف هذه المراكز البحثية إل تنش يط ودعم العمل البحنري لأعضاء هيئة التدريس في الكليات، وتوفب العديد من الخدمات الإدارية والفنية والمالية النري تُسهم في تسهيل إجراء البحوث العلمية المتقدمة .»"},{"chapter":4,"id":"KSU-258","page":"60","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["أهداف برنامج التمويل المؤسسي يسعى البرنامج إل توسعة وتعزيز القاعدة البحثية بالبركب على التقنيات المتقدمة ذات الأهمية الاسبراتيجية للقطاعات الاقتصادية والصناعية مثل الطاقة، والمياه، والنفط، والببروكاويات، وال تعدين، والمواد المتقدمة، والصحة، والسياحة، والآثار، والتعل، والاتصالات، وتكنولوجيا المعلومات، والزراعة، والنقل، والبيئة .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","أهداف برنامج التمويل المؤسسي يسعى البرنامج إل توسعة وتعزيز القاعدة البحثية بالبركب على التقنيات المتوقفة ذات الأهمية الاسبراتيجية للقطاعات الاقتصادية والصناعية مثل الطاقة، والمياه، والنفط، والببروكاويات، وال تعدين، والمواد المتقدمة، والصحة، والسياحة، والآثار، والتعل، والاتصالات، وتكنولوجيا المعلومات، والزراعة، والنقل، والبيئة ."],"a":0,"e":"ورد في المذكرة: «أهداف برنامج التمويل المؤسسي يسعى البرنامج إل توسعة وتعزيز القاعدة البحثية بالبركب على التقنيات المتقدمة ذات الأهمية الاسبراتيجية للقطاعات الاقتصادية والصناعية مثل الطاقة، والمياه، والنفط، والببروكاويات، وال تعدين، والمواد المتقدمة، والصحة، والسياحة، والآثار، والتعل، والاتصالات، وتكنولوجيا المعلومات، والزراعة، والنقل، والبيئة .»"},{"chapter":4,"id":"KSU-259","page":"60","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["كما يهدف إل تحقيق الريادة في حجم الإنتاج البحنري وتمب ه ففيروع المعرفة الاسبراتيجية، وتعزيز وتوسيع نطاق الشراكات البحثية محلياً ودولياً، وتعميق الاتجاهات البحثية ف ي العلوم الاجتماعية والإنسانية، وتشكيل قدرات الابتكار وفق رؤية المملكة","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","كما يهدف إل تحقيق الريادة في حجم الإنتاج البحنري وتمب ه ففيروع المعرفة الاسبراتيجية، وتعزيز وتوسيع نطاق الشراكات البحثية محلياً ودولياً، وتعميق الاتجاهات البحثية ف ي العلوم الاجتماعية والإنسانية، وتشكيل قدرات الابتكار بخلاف رؤية المملكة"],"a":0,"e":"ورد في المذكرة: «كما يهدف إل تحقيق الريادة في حجم الإنتاج البحنري وتمب ه ففيروع المعرفة الاسبراتيجية، وتعزيز وتوسيع نطاق الشراكات البحثية محلياً ودولياً، وتعميق الاتجاهات البحثية ف ي العلوم الاجتماعية والإنسانية، وتشكيل قدرات الابتكار وفق رؤية المملكة»"},{"chapter":4,"id":"KSU-260","page":"60","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","وقد أثمرت هذه الجهود عن إنجازات علمية متمب ة تُجسدها المؤشرات المختلفة، من عدد البحوث المنشورة في المجلات المرموقة، إل براءات الاخبراع المسجلة في المكاتب الدولية، والشراكات البحثية الاسبراتيجية مع المؤسسات العلمية الرائدة عالمياً .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «وقد أثمرت هذه الجهود عن إنجازات علمية متمب ة تُجسدها المؤشرات المختلفة، من عدد البحوث المنشورة في المجلات المرموقة، إل براءات الاخبراع المسجلة في المكاتب الدولية، والشراكات البحثية الاسبراتيجية مع المؤسسات العلمية الرائدة عالمياً .»"},{"chapter":4,"id":"KSU-261","page":"59","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["التعاون مع جامعة الإمارات أطلقت جامعة الملك سعود وجامعة الإمارات سلسلة المحاض ات البحثية الافبراضية ضمن الخطة الاسبراتيجية بي الجامعتي الناتجة عن المجلس التنسيقري السعودي - الإمارانري .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «التعاون مع جامعة الإمارات أطلقت جامعة الملك سعود وجامعة الإمارات سلسلة المحاض ات البحثية الافبراضية ضمن الخطة الاسبراتيجية بي الجامعتي الناتجة عن المجلس التنسيقري السعودي - الإمارانري .»"},{"chapter":4,"id":"KSU-262","page":"60","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["وي هدف البرنامج إل إنتاج أبحاث لخدمة المجتمع تُساهم في نقل الاقتصاد السعودي نحو اقتصاديات المستقبل المستدامة باعتماد بيئة بحثية فاعلة ومنتجة، بالإضافة إل الاستخدام الأمثل للم وارد والتقنيات وتفعيل التعاون الدولي .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «وي هدف البرنامج إل إنتاج أبحاث لخدمة المجتمع تُساهم في نقل الاقتصاد السعودي نحو اقتصاديات المستقبل المستدامة باعتماد بيئة بحثية فاعلة ومنتجة، بالإضافة إل الاستخدام الأمثل للم وارد والتقنيات وتفعيل التعاون الدولي .»"},{"chapter":4,"id":"KSU-263","page":"57","q":"أكمل العبارة الصحيحة وفق المذكرة: «معهد التصنيع المتقدم يُركز هذا المعهد على تطوير تقنيات التصنيع المتقدم والثورة الصناعية الرابعة رؤية المملكة ____ ، بما يتماسر مع أهداف في تطوير القطاع الصناعي .»","o":["2035","2030","2032","2031"],"a":1,"e":"ورد في المذكرة: «معهد التصنيع المتقدم يُركز هذا المعهد على تطوير تقنيات التصنيع المتقدم والثورة الصناعية الرابعة رؤية المملكة 2030 ، بما يتماسر مع أهداف في تطوير القطاع الصناعي .»"},{"chapter":4,"id":"KSU-264","page":"57","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","جاء تبن ي جامعة الملك سعود لبرنامج كراسي البحث والتوسع فيه إاناً منها بأن هذا البرنامج يُعتب ر خطوة رائدة ومهمة في سبيل ي الرفر بمستوى البحث العلمفيي المملكة .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «جاء تبن ي جامعة الملك سعود لبرنامج كراسي البحث والتوسع فيه إاناً منها بأن هذا البرنامج يُعتب ر خطوة رائدة ومهمة في سبيل ي الرفر بمستوى البحث العلمفيي المملكة .»"},{"chapter":4,"id":"KSU-265","page":"55","q":"ما المقصود بـ «ومن أبرز مراكز التمب البحنرفيي الجامعة» وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","مركز التمب البحنرفيي تطوير تعل العلوم والرياضيات يُعن بتطوير مناهج وطرق تدريس العلوم والرياضيات ."],"a":3,"e":"ورد في المذكرة: «ومن أبرز مراكز التمب البحنرفيي الجامعة : مركز التمب البحنرفيي تطوير تعل العلوم والرياضيات يُعن بتطوير مناهج وطرق تدريس العلوم والرياضيات .»"},{"chapter":4,"id":"KSU-266","page":"59","q":"أكمل العبارة الصحيحة وفق المذكرة: «برنامج المجموعات البحثية الدولية أطلقته عمادة البحث العلمي لتحقيق أهداف الجامعة الاسبراتيجية KSU ____ ، وتعزيز الشراكة مع المؤسسات العلمية المرموقة .»","o":["2030","2032","2035","2031"],"a":0,"e":"ورد في المذكرة: «برنامج المجموعات البحثية الدولية أطلقته عمادة البحث العلمي لتحقيق أهداف الجامعة الاسبراتيجية KSU 2030 ، وتعزيز الشراكة مع المؤسسات العلمية المرموقة .»"},{"chapter":4,"id":"KSU-267","page":"56","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","ويُ جري المركز بحوثاً متقدمة في مجالات الجينوم، والبروتينات، والخلايا الجذعية، والعلاج الجين ي، وتطوير الأ دوية البيولوجية، والزراعة الحيوية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","ويُ جري المركز بحوثاً متوقفة في مجالات الجينوم، والبروتينات، والخلايا الجذعية، والعلاج الجين ي، وتطوير الأ دوية البيولوجية، والزراعة الحيوية ."],"a":1,"e":"ورد في المذكرة: «ويُ جري المركز بحوثاً متقدمة في مجالات الجينوم، والبروتينات، والخلايا الجذعية، والعلاج الجين ي، وتطوير الأ دوية البيولوجية، والزراعة الحيوية .»"},{"chapter":4,"id":"KSU-268","page":"57","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["ويُجري المعهد بحوثاً في مجالات التصنيع الذكي، والتصنيع ي الإضاف ( الطباعة ثلاثية الأبعاد ) ، والروبوتات الصناعية، وإنبرنت الأشياء الصناعي، والذ كاء الاصطناعفيي التصنيع .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":0,"e":"ورد في المذكرة: «ويُجري المعهد بحوثاً في مجالات التصنيع الذكي، والتصنيع ي الإضاف ( الطباعة ثلاثية الأبعاد ) ، والروبوتات الصناعية، وإنبرنت الأشياء الصناعي، والذ كاء الاصطناعفيي التصنيع .»"},{"chapter":4,"id":"KSU-269","page":"57","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["معهد ريادة الأعمال يُمثل هذا المعهد حلقة الوصل بي البحث الأكادي والتطبيق التجاري، حيث يُعن بدعم الابتكار ور يادة الأعمال وتحويل الأفكار البحثية إل منتجات وخدمات تجارية .","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «معهد ريادة الأعمال يُمثل هذا المعهد حلقة الوصل بي البحث الأكادي والتطبيق التجاري، حيث يُعن بدعم الابتكار ور يادة الأعمال وتحويل الأفكار البحثية إل منتجات وخدمات تجارية .»"},{"chapter":4,"id":"KSU-270","page":"58","q":"أكمل العبارة الصحيحة وفق المذكرة: «وتجاوزت نسبة البحوث المنشورة في مجلات علمية مصنفة ضمن الربعي الأول والثان ي نسبة ____% ، مما يُشب إل جودة النشر العلمي العالية في الجامعة .»","o":["70","75","72","71"],"a":0,"e":"ورد في المذكرة: «وتجاوزت نسبة البحوث المنشورة في مجلات علمية مصنفة ضمن الربعي الأول والثان ي نسبة 70% ، مما يُشب إل جودة النشر العلمي العالية في الجامعة .»"},{"chapter":4,"id":"KSU-271","page":"56","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["المعاهد البحثية المتخصصة إل جانب مراكز التمب البحنري، أنشأت جامعة الملك سعود معاهد بحثية متخصصة تُعن بمجالات بحثية اسبراتيجية للمملكة .","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «المعاهد البحثية المتخصصة إل جانب مراكز التمب البحنري، أنشأت جامعة الملك سعود معاهد بحثية متخصصة تُعن بمجالات بحثية اسبراتيجية للمملكة .»"},{"chapter":4,"id":"KSU-272","page":"54","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","فمنذ تأسيسها، أولت الجامعة اهتماماً ب الغاً بتطوير منظومة البحث العلمي وتعزيز ثقافة الابتكار بي أعضاء هيئة التدريس و الباحثي والطلاب ."],"a":3,"e":"ورد في المذكرة: «فمنذ تأسيسها، أولت الجامعة اهتماماً ب الغاً بتطوير منظومة البحث العلمي وتعزيز ثقافة الابتكار بي أعضاء هيئة التدريس و الباحثي والطلاب .»"},{"chapter":4,"id":"KSU-273","page":"55","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["مراكز الأبحاث والمعاهد العلمية أنشأت جامعة الملك سعود مراكز تمب بحنرفيي مجالات حيوية ذات أولوية اسبراتيجية للمملكة الع ربية السعودية .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «مراكز الأبحاث والمعاهد العلمية أنشأت جامعة الملك سعود مراكز تمب بحنرفيي مجالات حيوية ذات أولوية اسبراتيجية للمملكة الع ربية السعودية .»"},{"chapter":4,"id":"KSU-274","page":"55","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["وتُمثل هذه المراكز قمة التطور في البنية البحثية للجامعة، حيث تتمب بتخصصاتها ال دقيقة، وتجهب اتها المتطورة، وكوادرها البحثية المتمب ة .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «وتُمثل هذه المراكز قمة التطور في البنية البحثية للجامعة، حيث تتمب بتخصصاتها ال دقيقة، وتجهب اتها المتطورة، وكوادرها البحثية المتمب ة .»"},{"chapter":4,"id":"KSU-275","page":"58","q":"ما المقصود بـ «كرسي المؤشرات الحيوية للأمراض المزمنة» وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","باحثي ضمن الأكبر تأثب اً عالمياً في أبحاث فيتامي D والسمنة على مستوى العالم .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «كرسي المؤشرات الحيوية للأمراض المزمنة : 3 باحثي ضمن الأكبر تأثب اً عالمياً في أبحاث فيتامي D والسمنة على مستوى العالم .»"},{"chapter":5,"id":"KSU-276","page":"67","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["ي تصنيف إنجازات جامعة الملك سعود ف QS التصنيف العالمي نقاط القوة في تصنيفQS تتمب جامعة الملك سعود في عدة مؤشرات ضمن تصنيف QS منها : السمعة الأكادية : حققت الجامعة درجات عالية في هذا المؤشر بفضل جهود أعضاء هيئة التدريس المتمب ين والبحوث ذات الجودة العالية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":0,"e":"ورد في المذكرة: «ي تصنيف إنجازات جامعة الملك سعود ف QS التصنيف العالمي نقاط القوة في تصنيفQS تتمب جامعة الملك سعود في عدة مؤشرات ضمن تصنيف QS منها : السمعة الأكادية : حققت الجامعة درجات عالية في هذا المؤشر بفضل جهود أعضاء هيئة التدريس المتمب ين والبحوث ذات الجودة العالية .»"},{"chapter":5,"id":"KSU-277","page":"62","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","وقد حققت جامعة الملك سعود إنجازات متمب ة ومتتالية في مختلف التصنيفات العالمية والإقلية خلال السنوات الأخب ة، مما يعكس البر ام الجامعة ب معايب الجودة والتمب الأكادي، ويؤكد مكانتها الرائدة في منظومة التعل العالي والب حث العلمي .","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «وقد حققت جامعة الملك سعود إنجازات متمب ة ومتتالية في مختلف التصنيفات العالمية والإقلية خلال السنوات الأخب ة، مما يعكس البر ام الجامعة ب معايب الجودة والتمب الأكادي، ويؤكد مكانتها الرائدة في منظومة التعل العالي والب حث العلمي .»"},{"chapter":5,"id":"KSU-278","page":"62","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يهدف هذا الباب إل استعراض مكانة جامعة الملك سعود في أبرز التصنيفات الدولية والمحلية، مع تسليط الضوء على ا لتطور المستمر الذي حققته الجامعة عبر السنوات، والإنجازات النوعية النري تحققت في مخت لف التخصصات الأكادية، إضافة إل تحليل المعايب النري تعتمدها هذه التصنيفات وأثرها على تعزيز المكانة الأكادية للجامعة .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «يهدف هذا الباب إل استعراض مكانة جامعة الملك سعود في أبرز التصنيفات الدولية والمحلية، مع تسليط الضوء على ا لتطور المستمر الذي حققته الجامعة عبر السنوات، والإنجازات النوعية النري تحققت في مخت لف التخصصات الأكادية، إضافة إل تحليل المعايب النري تعتمدها هذه التصنيفات وأثرها على تعزيز المكانة الأكادية للجامعة .»"},{"chapter":5,"id":"KSU-279","page":"64","q":"أكمل العبارة الصحيحة وفق المذكرة: «إنجاز جامعة الملك سعود في تصنيف شنغهاي ____ واصلت جامعة الملك سعود تعزيز حضورها المتقدم في تصنيف شنغهاي العالمي للجامعات ( ARWU ) لعام 2025 م، حيث احتلت المرتبة الأول بي الجامعات السعودية والعربية، وحلّت في المرتبة 116 عالمياً .»","o":["2025","2027","2030","2026"],"a":0,"e":"ورد في المذكرة: «إنجاز جامعة الملك سعود في تصنيف شنغهاي 2025 واصلت جامعة الملك سعود تعزيز حضورها المتقدم في تصنيف شنغهاي العالمي للجامعات ( ARWU ) لعام 2025 م، حيث احتلت المرتبة الأول بي الجامعات السعودية والعربية، وحلّت في المرتبة 116 عالمياً .»"},{"chapter":5,"id":"KSU-280","page":"65","q":"أكمل العبارة الصحيحة وفق المذكرة: «حققت جامعة الملك سعود إنجازاً متقدماً في تصنيف شنغهاي للجامعات ____ ، بدخولها ضمن أفضل 150 جامعة عالمياً وحصولها على المرتبة ( 116 ) ، مع حضور متمب في التخصصات البحثية والعلمية، ما يعكس قوة أدائها الأكادي والبحنري وتنافسيتها الدو ودة التعل والبحث العلمي .»"},{"chapter":5,"id":"KSU-298","page":"71","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["نقاط القوة في تصنيف التاز تبرز جامعة الملك سعود في عدة جوانب ضمن معايب تصنيف التاز : السمعة البحثية : تحط الجامعة بسمعة بحثية قوية مدعومة بتقيات الأكاديي عالمياً .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «نقاط القوة في تصنيف التاز تبرز جامعة الملك سعود في عدة جوانب ضمن معايب تصنيف التاز : السمعة البحثية : تحط الجامعة بسمعة بحثية قوية مدعومة بتقيات الأكاديي عالمياً .»"},{"chapter":5,"id":"KSU-299","page":"77","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["وقد أثبتت جامعة الملك سعود، من خلال حضورها المتوقف والمستمر في مختلف التصنيفات العالمية والإقلية، مكانتها كمؤسسة أكادية رائدة قادر ة على ا لمنافسة على المستويي الإقلي والدولي .","وقد أثبتت جامعة الملك سعود، من خلال حضورها المتقدم والمستمر في مختلف التصنيفات العالمية والإقلية، مكانتها كمؤسسة أكادية رائدة قادر ة على ا لمنافسة على المستويي الإقلي والدولي .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «وقد أثبتت جامعة الملك سعود، من خلال حضورها المتقدم والمستمر في مختلف التصنيفات العالمية والإقلية، مكانتها كمؤسسة أكادية رائدة قادر ة على ا لمنافسة على المستويي الإقلي والدولي .»"},{"chapter":5,"id":"KSU-300","page":"68","q":"أكمل العبارة الصحيحة وفق المذكرة: «كما واصلت تمب ها في تصنيفات QS حسب التخصص لعام ____ ، حيث حققت مراكز متقدمة في عدد من المجالات الأكادية، مما يعكس قوة أدائها الأكادي والبحنري وتنافسيتها عل ى المستوى الدولي .»","o":["2028","2026","2027","2031"],"a":1,"e":"ورد في المذكرة: «كما واصلت تمب ها في تصنيفات QS حسب التخصص لعام 2026 ، حيث حققت مراكز متقدمة في عدد من المجالات الأكادية، مما يعكس قوة أدائها الأكادي والبحنري وتنافسيتها عل ى المستوى الدولي .»"},{"chapter":5,"id":"KSU-301","page":"63","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يتمب تصنيف شنغهاي بمنهجيته الدقيقة والشفافة ، النري تعتمد على بيانات كن التحقق م نها من جهات مستقلة، مما يجعله أحد أكبر التصنيفات مصداقية في الأوساط الأكادية العالمية .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «يتمب تصنيف شنغهاي بمنهجيته الدقيقة والشفافة ، النري تعتمد على بيانات كن التحقق م نها من جهات مستقلة، مما يجعله أحد أكبر التصنيفات مصداقية في الأوساط الأكادية العالمية .»"},{"chapter":5,"id":"KSU-302","page":"73","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["كما لعب التطور في منظومة البحث العلمي والنشر دوراً محورياً في رف ع مستوى التأثب العلمي، مدعوماً باستقطاب الكفاءات الأكادية المتمب ة وتعزيز التعاون الدولي مع الجامعات والمراكز البحثية العالمية .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «كما لعب التطور في منظومة البحث العلمي والنشر دوراً محورياً في رف ع مستوى التأثب العلمي، مدعوماً باستقطاب الكفاءات الأكادية المتمب ة وتعزيز التعاون الدولي مع الجامعات والمراكز البحثية العالمية .»"},{"chapter":5,"id":"KSU-303","page":"76","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","التحديات ي مسب ة التمب العالمي رغم الإنجازات المتمب ة، تواجه جامعة الملك سعود تحديات رئيسية ف : المنافسة العالمية الشديدة مع آلاف الجامعات الرائدة ."],"a":3,"e":"ورد في المذكرة: «التحديات ي مسب ة التمب العالمي رغم الإنجازات المتمب ة، تواجه جامعة الملك سعود تحديات رئيسية ف : المنافسة العالمية الشديدة مع آلاف الجامعات الرائدة .»"},{"chapter":5,"id":"KSU-304","page":"62","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","تُعدّ التصنيفات الدولية والمحلية للجامعات من أبرز المؤشرات النري تعكس مست وى الأداء الأكادي والبحنري والتعلي للمؤسسات الأكادية على المستويي الإقل ي والعالمي .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":2,"e":"ورد في المذكرة: «تُعدّ التصنيفات الدولية والمحلية للجامعات من أبرز المؤشرات النري تعكس مست وى الأداء الأكادي والبحنري والتعلي للمؤسسات الأكادية على المستويي الإقل ي والعالمي .»"},{"chapter":5,"id":"KSU-305","page":"64","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","الريادة على المستوى العرنري، إذ تصدرت جامعة الملك سعود جميع الجامعات العربية في هذا التصنيف، مما يعزز مكانة المملكة كمركز إقلي للتمب الأكادي والبحث العلمي .","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «الريادة على المستوى العرنري، إذ تصدرت جامعة الملك سعود جميع الجامعات العربية في هذا التصنيف، مما يعزز مكانة المملكة كمركز إقلي للتمب الأكادي والبحث العلمي .»"},{"chapter":5,"id":"KSU-306","page":"66","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يصدر هذا التصنيف سنوياً عن مؤسسة Quacquarelli Symonds ا لبريطانية المتخصصة في التعل العالي، ويُعد من أكبر التصنيفات شمولية واعتماداً على مستوى العالم .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «يصدر هذا التصنيف سنوياً عن مؤسسة Quacquarelli Symonds ا لبريطانية المتخصصة في التعل العالي، ويُعد من أكبر التصنيفات شمولية واعتماداً على مستوى العالم .»"},{"chapter":5,"id":"KSU-307","page":"63","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","تصنيف شنغهاي العالمي للجامعات ( ( ARWU يُعد تصنيف شنغهاي الأكادي للجامعات العالمية ( ARWU ) من أعرق وأهم التصنيفات الأكادية العالمية وأكبرها موثوقية ."],"a":3,"e":"ورد في المذكرة: «تصنيف شنغهاي العالمي للجامعات ( ( ARWU يُعد تصنيف شنغهاي الأكادي للجامعات العالمية ( ARWU ) من أعرق وأهم التصنيفات الأكادية العالمية وأكبرها موثوقية .»"},{"chapter":5,"id":"KSU-308","page":"75","q":"أي  سعود 12, 217 بحثاً علمياً منشوراً وفق بيانات Clarivate لعام 2025 ، مما يعكس ي الإنتاج العلمي وتعزيز مكانتها البحثية استمرار تمب ها ف .»"},{"chapter":6,"id":"KSU-339","page":"79","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","وتتنوع هذه الإنج ازات لتشمل الجوائز العالمية والمحلية، وبراءات الاخبراع، والإنجازات البحثية، والإنجازات الط بية، والتكرات، والأوسمة الملكية، والاعتمادات الأكادية، والشراكات الاسبراتيجية ، وغب ها من الإنجازات النري ترسخ مكانة الجامعة كصرح علمي وبحنري رائد على المستويي الإقلي والعالمي .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «وتتنوع هذه الإنج ازات لتشمل الجوائز العالمية والمحلية، وبراءات الاخبراع، والإنجازات البحثية، والإنجازات الط بية، والتكرات، والأوسمة الملكية، والاعتمادات الأكادية، والشراكات الاسبراتيجية ، وغب ها من الإنجازات النري ترسخ مكانة الجامعة كصرح علمي وبحنري رائد على المستويي الإقلي والعالمي .»"},{"chapter":6,"id":"KSU-340","page":"83","q":"أكمل العبارة الصحيحة وفق المذكرة: «جائزة خليفة الدولية لنخيل التمر والابتكار الزراعي ي عامي حققت الجامعة الفوز بالجائزة ف ____ و 2022 ضمن فئة التقنية الحديثة المتمب ة عن بحث بعنوان ي تطوير مستشعر حيوي للك ي خنفساء النخيل، الذي أسهم ف الأساس الجزين ي لاستشعار الروائح ف شف المبكر عن خنافس النخيل، بما يدعم حماية النخيل وتعزيز الزراعة المستدامة .»","o":["2019","2022","2018","2017"],"a":3,"e":"ورد في المذكرة: «جائزة خليفة الدولية لنخيل التمر والابتكار الزراعي ي عامي حققت الجامعة الفوز بالجائزة ف 2017 و 2022 ضمن فئة التقنية الحديثة المتمب ة عن بحث بعنوان ي تطوير مستشعر حيوي للك ي خنفساء النخيل، الذي أسهم ف الأساس الجزين ي لاستشعار الروائح ف شف المبكر عن خنافس النخيل، بما يدعم حماية النخيل وتعزيز الزراعة المستدامة .»"},{"chapter":6,"id":"KSU-341","page":"83","q":"أكمل العبارة الصحيحة وفق المذكرة: «الجوائز الدولية المتخصصة جوائز الجودة والتمتر المؤسسي جائزة التحول إل أساس الاستحقاق المحاسنري ( ____ ) ي إنجاز حققت الجامعة المركز الثان ي ونالت وسام الاستحقاق المحاسنري ضمن فئة الجامعات، ف يعكس تطوير الأنظمة المالية والإدارية .»","o":["2029","2024","2026","2025"],"a":1,"e":"ورد في المذكرة: «الجوائز الدولية المتخصصة جوائز الجودة والتمتر المؤسسي جائزة التحول إل أساس الاستحقاق المحاسنري ( 2024 ) ي إنجاز حققت الجامعة المركز الثان ي ونالت وسام الاستحقاق المحاسنري ضمن فئة الجامعات، ف يعكس تطوير الأنظمة المالية والإدارية .»"},{"chapter":6,"id":"KSU-342","page":"84","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["ي المجلات المرموقة النشر ف ي أرفر المجلات العالمية مثل ي النشر العلمفي حققت الجامعة إنجازات نوعية ف Science , Nature The New England Journal of Medicine , The Lancet , Cell , PNAS وغب ها، شملت أوراقاً بحثية عالية ي مجالات علمية متعددة الجودة وأبحاثاً رائدة ف .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":0,"e":"ورد في المذكرة: «ي المجلات المرموقة النشر ف ي أرفر المجلات العالمية مثل ي النشر العلمفي حققت الجامعة إنجازات نوعية ف Science , Nature The New England Journal of Medicine , The Lancet , Cell , PNAS وغب ها، شملت أوراقاً بحثية عالية ي مجالات علمية متعددة الجودة وأبحاثاً رائدة ف .»"},{"chapter":6,"id":"KSU-343","page":"88","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["المشاركات الدولية شارك عدد من خريخري جامعة الملك سعود في معارض ومحافل دولية معروفة، من أبرزها معرض جنيف الدولي للاخبراعات في سويشا، ومعرض آينا الدولي للاخبراعات ( iENA) في ألمانيا، ومعرض كوريا الدولي للاخبراعات ( SIIF ) ، إضافة إل مشاركاتهم في مؤتمرات علمية دولية متخصصة .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":0,"e":"ورد في المذكرة: «المشاركات الدولية شارك عدد من خريخري جامعة الملك سعود في معارض ومحافل دولية معروفة، من أبرزها معرض جنيف الدولي للاخبراعات في سويشا، ومعرض آينا الدولي للاخبراعات ( iENA) في ألمانيا، ومعرض كوريا الدولي للاخبراعات ( SIIF ) ، إضافة إل مشاركاتهم في مؤتمرات علمية دولية متخصصة .»"},{"chapter":6,"id":"KSU-344","page":"90","q":"أكمل العبارة الصحيحة وفق المذكرة: «وجاءت هذه الإنجاز ات نتيجة الدعم الحكومي غب المحدود في إطار رؤية المملكة ____ ، والاستثمار الكبب في البحث والبنية التحتية، واستقطاب الكفاءات من أعضاء هيئة التدريس والباحثي ، والتعاون الدولي مع أرفر الجامعا ت والمراكز، وامتلاك ثقافة التمب والابتكار المتأصلة في الجامعة، إضافة إل الشراكات الاسبراتيخري ة مع القطاعي الخاص والصناعي .»","o":["2031","2032","2030","2035"],"a":2,"e":"ورد في المذكرة: «وجاءت هذه الإنجاز ات نتيجة الدعم الحكومي غب المحدود في إطار رؤية المملكة 2030 ، والاستثمار الكبب في البحث والبنية التحتية، واستقطاب الكفاءات من أعضاء هيئة التدريس والباحثي ، والتعاون الدولي مع أرفر الجامعا ت والمراكز، وامتلاك ثقافة التمب والابتكار المتأصلة في الجامعة، إضافة إل الشراكات الاسبراتيخري ة مع القطاعي الخاص والصناعي .»"},{"chapter":6,"id":"KSU-345","page":"87","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","اعتماد ( Association to Advance Collegiate Schools of Business) AACSB ي هذا المجال، مما نح الاعتماد الكامل لكلية إدارة الأعمال، ويُعد من أصعب الاعتمادات الدولية ف يعكس جودة البرامج الأكادية والتدريس والمخرجات التعلية ."],"a":3,"e":"ورد في المذكرة: «اعتماد ( Association to Advance Collegiate Schools of Business) AACSB ي هذا المجال، مما نح الاعتماد الكامل لكلية إدارة الأعمال، ويُعد من أصعب الاعتمادات الدولية ف يعكس جودة البرامج الأكادية والتدريس والمخرجات التعلية .»"},{"chapter":6,"id":"KSU-346","page":"90","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","حصل برنامج كلية إدارة الاعمال على الاعتماد الأكادي الدولي من منظمة AACSB ا لذي يُعد من أرفر وأهم الاعتمادات العالمية في مجال تعل وتطوير كليات الأعمال ، بما يعكس البر ام الجامعة بتطبيق أعلى معايب الجودة والتمب الأكادي .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «حصل برنامج كلية إدارة الاعمال على الاعتماد الأكادي الدولي من منظمة AACSB ا لذي يُعد من أرفر وأهم الاعتمادات العالمية في مجال تعل وتطوير كليات الأعمال ، بما يعكس البر ام الجامعة بتطبيق أعلى معايب الجودة والتمب الأكادي .»"},{"chapter":6,"id":"KSU-347","page":"80","q":"ما المقصود بـ «محمد بن صلاح بمستشق طب الأسنان الجامعىي التسجيل» وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","مكتب براءات الاخبراع الأمريكي التقنية : استخدام تقنية النانو لإنتاج جسات فضة دائرية من أوراق القّراص التطبيقات : مضاد للبكتب يا واستخدامات طبية متقدمة تقنيات الطاقة المتجددة المخترعون : د .","يُطبق ذلك على التعليم العام فقط.","مكتب براءات الاخبراع الأمريكي التقنية : استخدام تقنية النانو لإنتاج جسات فضة دائرية من أوراق القّراص التطبيقات : مضاد للبكتب يا واستخدامات طبية متوقفة تقنيات الطاقة المتجددة المخترعون : د ."],"a":1,"e":"ورد في المذكرة: «محمد بن صلاح بمستشق طب الأسنان الجامعىي التسجيل : مكتب براءات الاخبراع الأمريكي التقنية : استخدام تقنية النانو لإنتاج جسات فضة دائرية من أوراق القّراص التطبيقات : مضاد للبكتب يا واستخدامات طبية متقدمة تقنيات الطاقة المتجددة المخترعون : د .»"},{"chapter":6,"id":"KSU-348","page":"90","q":"أكمل العبارة الصحيحة وفق المذكرة: «حققت الجامعة المركز الأول في قائمة التصنيف المتقدم ضمن المؤشر الوطن ي للتعل الرقم ي لعام ____ م، وهو مؤشر يقيس مستوى التحول الرقمي وجودة التعل الإلكبرون ي على مستوى المؤسسات التعلية في المملكة .»","o":["2030","2027","2026","2025"],"a":3,"e":"ورد في المذكرة: «حققت الجامعة المركز الأول في قائمة التصنيف المتقدم ضمن المؤشر الوطن ي للتعل الرقم ي لعام 2025 م، وهو مؤشر يقيس مستوى التحول الرقمي وجودة التعل الإلكبرون ي على مستوى المؤسسات التعلية في المملكة .»"},{"chapter":6,"id":"KSU-349","page":"90","q":"أكمل العبارة الصحيحة وفق المذكرة: «وتواصل جامعة الملك سعود مسب تها لتكون ضمن أفضل ____ جامعات عالمية، مساهمة بذلك في تحقيق التنمية الشاملة وبناء اقتصاد المعرفة في المملكة العربية السعودية، وخدمة المجتمع المحلىي والإقلي والعالمي .»","o":["15","11","10","12"],"a":2,"e":"ورد في المذكرة: «وتواصل جامعة الملك سعود مسب تها لتكون ضمن أفضل 10 جامعات عالمية، مساهمة بذلك في تحقيق التنمية الشاملة وبناء اقتصاد المعر D م ن قبل هيئة ACPE ا لأمريكية، بما يعكس البر ام البرنامج بتطبيق أعلى المعايب الأكادية والمهنية المعتمدة عالميًا في تعل الصيدلة .","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «الحصول على الاعتماد الأكادي الدولي لبرامج دكتور صيدلي PharmD م ن قبل هيئة ACPE ا لأمريكية، بما يعكس البر ام البرنامج بتطبيق أعلى المعايب الأكادية والمهنية المعتمدة عالميًا في تعل الصيدلة .»"},{"chapter":6,"id":"KSU-360","page":"81","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","جوائز المعارض الدولية للاخبراعات م عرض جنيف الدولي للاخبراعات يُعد معرض جنيف من أعرق المعارض العالمية للابتكار، وقد حققت جامعة الملك سعود فيه إنجازات ممب ة .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":2,"e":"ورد في المذكرة: «جوائز المعارض الدولية للاخبراعات م عرض جنيف الدولي للاخبراعات يُعد معرض جنيف من أعرق المعارض العالمية للابتكار، وقد حققت جامعة الملك سعود فيه إنجازات ممب ة .»"},{"chapter":6,"id":"KSU-361","page":"82","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","الأهمية : تُعد جائزة الملك عبد العزيز أعلى وسام علمفيي المملكة العربية السعودية، وتمثل تقديراً ملك ياً للإنجازات العلمية وتشكل حافزاً للتمب والإبداع في المجتمع الأكادي .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «الأهمية : تُعد جائزة الملك عبد العزيز أعلى وسام علمفيي المملكة العربية السعودية، وتمثل تقديراً ملك ياً للإنجازات العلمية وتشكل حافزاً للتمب والإبداع في المجتمع الأكادي .»"},{"chapter":6,"id":"KSU-362","page":"79","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يهدف هذا الباب إل استعراض أبرز الإنجازات النري حققتها جامعة الملك سعود في مختلف المجالات، مع البركب على الإنجازات الحديثة خلال السنوات الأخب ة (","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «يهدف هذا الباب إل استعراض أبرز الإنجازات النري حققتها جامعة الملك سعود في مختلف المجالات، مع البركب على الإنجازات الحديثة خلال السنوات الأخب ة (»"},{"chapter":6,"id":"KSU-363","page":"83","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","شهادات الآيزو العالمية ISO 22301 حصلت الجامعة على شهادة نظام إدارة استمرارية الأعمال، وهو معيار عالمي يعكس الالبر ام بالجودة والكفاءة المؤسسية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «شهادات الآيزو العالمية ISO 22301 حصلت الجامعة على شهادة نظام إدارة استمرارية الأعمال، وهو معيار عالمي يعكس الالبر ام بالجودة والكفاءة المؤسسية .»"},{"chapter":6,"id":"KSU-364","page":"84","q":"أكمل العبارة الصحيحة وفق المذكرة: «الاكتشافات والإنجازات البارزة مركز الأمب نايف للأبحاث الصحية ____ ي مجلات مرموقة، ورقة ف 45 ي مؤتمرات عالمية، خلاصة ف اكتشافات جينية للطب الشخضي .»","o":["39","43","40","38"],"a":3,"e":"ورد في المذكرة: «الاكتشافات والإنجازات البارزة مركز الأمب نايف للأبحاث الصحية 38 ي مجلات مرموقة، ورقة ف 45 ي مؤتمرات عالمية، خلاصة ف اكتشافات جينية للطب الشخضي .»"},{"chapter":6,"id":"KSU-365","page":"88","q":"ما المقصود بـ «إنجازات الطلاب والخريجير المسؤولية المجتمعية الخدمات الصحية المجانية» وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","آلاف المرض سنوياً من منسونري الجامعة والمجتمع المحلىي ."],"a":3,"e":"ورد في المذكرة: «إنجازات الطلاب والخريجير المسؤولية المجتمعية الخدمات الصحية المجانية : آلاف المرض سنوياً من منسونري الجامعة والمجتمع المحلىي .»"},{"chapter":6,"id":"KSU-366","page":"79","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["تُعد الإنجازات النري حققتها جامعة الملك سعود على مدى عقود من الزمن شاهداً حياً على التمب الأكادي والبحنري والعلمي الذي لا تتمتع به الجامعة .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","تُعد الإنجازات النري حققتها جامعة الملك سعود على مدى عقود من الزمن شاهداً حياً على التمب الأكادي والبحنري والعلمي الذي تتمتع به الجامعة ."],"a":3,"e":"ورد في المذكرة: «تُعد الإنجازات النري حققتها جامعة الملك سعود على مدى عقود من الزمن شاهداً حياً على التمب الأكادي والبحنري والعلمي الذي تتمتع به الجامعة .»"},{"chapter":6,"id":"KSU-367","page":"87","q":"ما المقصود بـ «الرعاية المجانية الشاملة» وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","تشمل جميع الفحوصات، الأدوية، العمليات، والمتابعة مجاناً لمنس ونري الجامعة، والطوارئ .","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «الرعاية المجانية الشاملة : تشمل جميع الفحوصات، الأدوية، العمليات، والمتابعة مجاناً لمنس ونري الجامعة، والطوارئ .»"},{"chapter":6,"id":"KSU-368","page":"89","q":"ما المقصود بـ «المشاري ع الرقمية الرئيسية البوابة الإلكبرونية» وفق المذكرة؟","o":["خدمات إلكبرونية متكاملة ، تطبيقات الهواتف الذكية، تسهيل الإجراءات الأكادية والإدارية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":0,"e":"ورد في المذكرة: «المشاري ع الرقمية الرئيسية البوابة الإلكبرونية : خدمات إلكبرونية متكاملة ، تطبيقات الهواتف الذكية، تسهيل الإجراءات الأكادية والإدارية .»"},{"chapter":6,"id":"KSU-369","page":"89","q":"ما المقصود بـ «المبادرات البيئية الرئيسية الطاقة الشمسية» وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","تركيب أنظمة طاقة شمسية متقدمة لتقليل الانبعاثات الكربونية وخفض استهلاك الطاقة التق ليدية .","يُطبق ذلك على التعليم العام فقط.","تركيب أنظمة طاقة شمسية متوقفة لتقليل الانبعاثات الكربونية وخفض استهلاك الطاقة التق ليدية ."],"a":1,"e":"ورد في المذكرة: «المبادرات البيئية الرئيسية الطاقة الشمسية : تركيب أنظمة طاقة شمسية متقدمة لتقليل الانبعاثات الكربونية وخفض استهلاك الطاقة التق ليدية .»"},{"chapter":6,"id":"KSU-370","page":"87","q":"ما المقصود بـ «الاعتمادات الطبية والصحية ( Joint Commission Inter ب 10 براءات اخبراع وحصدت 10 ميداليات منها 7 ذهبية .»"},{"chapter":6,"id":"KSU-379","page":"88","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","وقد أسفرت هذه المشاركات عن تحقيق جوائز وميداليات، بما يعكس تمب ّ طلاب جامعة سعود عالمياً .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":2,"e":"ورد في المذكرة: «وقد أسفرت هذه المشاركات عن تحقيق جوائز وميداليات، بما يعكس تمب ّ طلاب جامعة سعود عالمياً .»"},{"chapter":6,"id":"KSU-380","page":"87","q":"ما المقصود بـ «الوحدات المتخصصة» وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","استجابة شيعة، عناية قلب، طب النوم، علاج ضع، مركز سكري .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":1,"e":"ورد في المذكرة: «الوحدات المتخصصة : استجابة شيعة، عناية قلب، طب النوم، علاج ضع، مركز سكري .»"},{"chapter":6,"id":"KSU-381","page":"87","q":"ما المقصود بـ «التخصصات الدقيقة» وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","جراحة قلب مفتوح، زراعة أعضاء، جراحة أعصاب، أورام معقدة، عيون متوقفة، وجه وفكي .","جراحة قلب مفتوح، زراعة أعضاء، جراحة أعصاب، أورام معقدة، عيون متقدمة، وجه وفكي .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":2,"e":"ورد في المذكرة: «التخصصات الدقيقة : جراحة قلب مفتوح، زراعة أعضاء، جراحة أعصاب، أورام معقدة، عيون متقدمة، وجه وفكي .»"},{"chapter":6,"id":"KSU-382","page":"89","q":"ما المقصود بـ «الحدائق والمساحات الخصر اء» وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","زراعة آلاف الأشجار، مساحات خصر اء واسعة، بيئة جامعية صحية ومستدامة ."],"a":3,"e":"ورد في المذكرة: «الحدائق والمساحات الخصر اء : زراعة آلاف الأشجار، مساحات خصر اء واسعة، بيئة جامعية صحية ومستدامة .»"},{"chapter":6,"id":"KSU-383","page":"89","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["مؤشر التحول الرقمي الحكومي 2028 المركز الثان ي : بي 36 جهة تعلية (","مؤشر التحول الرقمي الح
