<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KSU 101</title>
<style>
:root{
  --blue:#1268d8;--navy:#0d4f7d;--bg:#f2f7fb;--card:#fff;--text:#11243a;
  --muted:#6e8297;--line:#dbe5ef;--green:#28a34a;--red:#dc4a5d;
}
*{box-sizing:border-box}
body{margin:0;font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text)}
button,input,select{font-family:inherit}
header{
  min-height:148px;background:linear-gradient(110deg,#155b90,#1268d8);
  color:#fff;padding:24px 4vw;display:flex;align-items:flex-start;justify-content:space-between
}
.brand h1{margin:0;font-size:52px;line-height:1;font-weight:900}
.brand p{margin:16px 0 0;font-size:22px}
.header-btn{border:1px solid rgba(255,255,255,.55);background:transparent;color:#fff;border-radius:14px;padding:12px 18px;cursor:pointer}
.container{max-width:1180px;margin:0 auto;padding:0 26px}
.home-title{font-size:34px;margin:14px 0 28px;font-weight:900}
.chapter-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:26px}
.chapter-card{
  --accent:#1268d8;background:#fff;border:1px solid var(--line);border-right:10px solid var(--accent);
  border-radius:28px;padding:28px 26px;box-shadow:0 10px 26px rgba(32,72,110,.07);
  cursor:pointer;transition:.18s;min-height:244px
}
.chapter-card:hover{transform:translateY(-3px);box-shadow:0 14px 32px rgba(32,72,110,.12)}
.chapter-card.selected{outline:4px solid color-mix(in srgb,var(--accent) 30%,transparent)}
.card-top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start}
.card-kicker{font-size:20px;color:var(--accent);font-weight:900}
.card-title{font-size:30px;margin:22px 0 34px;font-weight:900}
.count-pill{background:#edf5ff;color:#065fc7;border-radius:999px;padding:13px 18px;font-size:18px;font-weight:900;white-space:nowrap}
.progress{height:14px;background:#e8eef4;border-radius:999px;overflow:hidden}
.progress span{display:block;height:100%;width:var(--progress,0%);background:var(--accent)}
.card-stats{display:flex;justify-content:space-between;color:#6d8298;font-size:19px;margin:18px 0 24px}
.start-card-btn{width:100%;border:0;border-radius:16px;background:var(--accent);color:#fff;padding:17px;font-size:22px;font-weight:900;cursor:pointer}
.controls{background:#fff;border:1px solid var(--line);border-radius:24px;margin:30px 0;padding:22px;display:grid;grid-template-columns:2fr 1fr 1fr;gap:16px}
.field label{display:block;font-size:17px;font-weight:900;margin-bottom:9px}
.field input,.field select{width:100%;height:54px;border:1px solid #cbd9e7;border-radius:13px;padding:0 14px;font-size:18px;background:#fff}
.exam{display:none;max-width:1050px;margin:-32px auto 40px;padding:0 22px}
.exam-card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:30px;box-shadow:0 8px 24px rgba(40,70,100,.06)}
.exam-meta{display:flex;justify-content:space-between;color:#0962cf;font-weight:900;font-size:17px}
.question{font-size:31px;line-height:1.6;font-weight:900;margin:28px 0}
.option{display:flex;align-items:flex-start;gap:14px;border:1px solid #cad9e7;border-radius:18px;padding:19px;margin:12px 0;cursor:pointer;background:#fff}
.option:hover{border-color:#80b8f4}
.letter{width:46px;height:46px;min-width:46px;border-radius:50%;display:grid;place-items:center;background:#edf3f8;color:#4d6982;font-size:21px;font-weight:900}
.option-text{font-size:21px;line-height:1.7;flex:1}
.option.selected{border-color:#4f9df2;background:#f5faff}
.option.correct{background:#dff4e4;border-color:#69c17d}
.option.wrong{background:#fde4e8;border-color:#e67887}
.feedback{margin-top:14px;font-size:18px;line-height:1.8;font-weight:700}
.feedback strong{display:block;margin-bottom:4px}
.nav{display:flex;justify-content:space-between;gap:12px;margin-top:24px}
.nav button{border-radius:13px;padding:14px 24px;font-size:18px;font-weight:900;cursor:pointer}
.primary{border:0;background:#1268d8;color:#fff}
.secondary{border:1px solid #92bdeb;background:#fff;color:#0962cf}
.results{display:none;max-width:760px;margin:-30px auto 40px;padding:0 22px}
.results-card{background:#fff;border-radius:24px;border:1px solid var(--line);padding:34px;text-align:center}
.score-big{font-size:64px;color:#1268d8;font-weight:900}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:24px 0}
.result-box{background:#f4f8fc;border-radius:16px;padding:18px}
.hidden{display:none!important}
footer{text-align:center;color:#73869a;padding:28px}
@media(max-width:800px){
  header{min-height:120px}.brand h1{font-size:40px}.brand p{font-size:18px}
  .chapter-grid{grid-template-columns:1fr}.controls{grid-template-columns:1fr}
  .card-title{font-size:26px}.question{font-size:25px}.exam-card{padding:20px}
}
</style>
</head>
<body>
<header>
  <div class="brand"><h1>KSU 101</h1><p>بنك الأسئلة المعرفي</p></div>
  <button class="header-btn" onclick="goHome()">الصفحة الرئيسية</button>
</header>

<section id="home">
  <div class="container">
    <h2 class="home-title">اختر الباب</h2>
    <div class="chapter-grid" id="chapterGrid"></div>

    <div class="controls">
      <div class="field"><label>الاسم (إجباري)</label><input id="candidateName" placeholder="اكتب اسمك"></div>
      <div class="field"><label>عدد الأسئلة</label>
        <select id="questionCount"><option>10</option><option>20</option><option>30</option><option>50</option><option>100</option><option value="all">الكل</option></select>
      </div>
      <div class="field"><label>ترتيب الأسئلة</label>
        <select id="questionOrder"><option value="random">عشوائي</option><option value="normal">حسب الترتيب</option></select>
      </div>
    </div>
  </div>
</section>

<section class="exam" id="exam">
  <div class="exam-card">
    <div class="exam-meta"><span id="qCounter"></span><span id="qPage"></span></div>
    <div class="question" id="question"></div>
    <div id="options"></div>
    <div class="nav">
      <button class="secondary" id="prevBtn" onclick="prevQ()">السابق</button>
      <button class="primary" id="nextBtn" onclick="nextQ()">التالي</button>
    </div>
  </div>
</section>

<section class="results" id="results">
  <div class="results-card">
    <h2>نتيجة الاختبار</h2>
    <div class="score-big" id="finalPercent">0%</div>
    <div class="result-grid">
      <div class="result-box">الصحيح<br><strong id="correctCount">0</strong></div>
      <div class="result-box">الخطأ<br><strong id="wrongCount">0</strong></div>
      <div class="result-box">الأسئلة<br><strong id="totalCount">0</strong></div>
    </div>
    <button class="primary" style="padding:15px 30px;border-radius:14px" onclick="goHome()">العودة للرئيسية</button>
  </div>
</section>
<footer>KSU 101 Quiz</footer>

<script>

hapter": 8, "page": 119, "score": 3, "q": "ما أثر بيئة العمل الإيجابية؟", "options": ["رفع الإنتاجية وتحسين الأداء وتقليل الدوران الوظيفي.", "خفض الانتماء.", "زيادة التسرب.", "تقليل رضا الموظفين."], "answer": 0, "explanation": "ترفع الإنتاجية وتحسن الأداء وتعزز الانتماء وتحد من الدوران والتسرب."}, {"chapter": 8, "page": 119, "score": 3, "q": "لماذا تعد سياسة أمن المعلومات مهمة؟", "options": ["لحماية معلومات الجهة وأسرارها المهنية.", "لزيادة إفشاء البيانات.", "لإلغاء الصلاحيات.", "لمنع التدريب."], "answer": 0, "explanation": "يلتزم الموظف بسياسة أمن المعلومات ويحافظ على أسرار الجهة."}, {"chapter": 8, "page": 115, "score": 3, "q": "كيف تسهم بيئة العمل في استقطاب الكفاءات؟", "options": ["عبر توفير بيئة داعمة للإبداع والأداء والانتماء.", "عبر زيادة الغموض.", "عبر تقليل فرص التطوير.", "عبر إلغاء العمل التشاركي."], "answer": 0, "explanation": "أصبحت بيئة العمل عنصرًا حاسمًا في استقطاب الكفاءات والمحافظة عليها."}];
const chapterTitles={"1": "نظام الجامعة الأساس", "2": "تاريخ الجامعة", "3": "الهيكل الأكاديمي والتنظيمي", "4": "البحث العلمي والابتكار", "5": "التصنيفات الدولية والمحلية", "6": "المنجزات", "7": "الشراكات والاتفاقيات", "8": "بيئة العمل"};
const chapterCounts={0:500,1:75,2:65,3:100,4:35,5:60,6:50,7:80,8:35};
const colors={0:'#18243d',1:'#1268d8',2:'#2aa04b',3:'#8a39c0',4:'#ef8500',5:'#df3b67',6:'#1ba4a7',7:'#b8792b',8:'#713ac0'};
const ord=['','الأول','الثاني','الثالث','الرابع','الخامس','السادس','السابع','الثامن'];
let activeChapter=1,pool=[],current=0,answers={},startedAt=0;

function statsKey(c){return 'ksu-card-stats-'+c}
function getStats(c){try{return JSON.parse(localStorage.getItem(statsKey(c))||'{"answered":0,"best":0}')}catch(e){return {answered:0,best:0}}}

function buildCards(){
  const grid=document.getElementById('chapterGrid');grid.innerHTML='';

  const allStats=getStats(0), allTotal=chapterCounts[0], allProgress=Math.min(100,Math.round((allStats.answered/allTotal)*100));
  const allCard=document.createElement('article');
  allCard.className='chapter-card'+(activeChapter===0?' selected':'');
  allCard.style.setProperty('--accent',colors[0]);
  allCard.style.gridColumn='1/-1';
  allCard.innerHTML=`<div class="card-top"><div><div class="card-kicker">جميع الأبواب</div><div class="card-title">اختبار شامل من جميع الأبواب</div></div><div class="count-pill">${allTotal} سؤالًا</div></div>
    <div class="progress"><span style="--progress:${allProgress}%"></span></div>
    <div class="card-stats"><span>الإنجاز: ${allProgress}%</span><span>أفضل نتيجة: ${allStats.best}%</span></div>
    <button class="start-card-btn">ابدأ الاختبار الشامل</button>`;
  allCard.onclick=()=>{activeChapter=0;buildCards();startExam()};
  grid.appendChild(allCard);

  for(let c=1;c<=8;c++){
    const s=getStats(c), total=chapterCounts[c], progress=Math.min(100,Math.round((s.answered/total)*100));
    const card=document.createElement('article');
    card.className='chapter-card'+(activeChapter===c?' selected':'');
    card.style.setProperty('--accent',colors[c]);
    card.innerHTML=`<div class="card-top"><div><div class="card-kicker">الباب ${ord[c]}</div><div class="card-title">${chapterTitles[c]}</div></div><div class="count-pill">${total} سؤالًا</div></div>
      <div class="progress"><span style="--progress:${progress}%"></span></div>
      <div class="card-stats"><span>الإنجاز: ${progress}%</span><span>أفضل نتيجة: ${s.best}%</span></div>
      <button class="start-card-btn">ابدأ</button>`;
    card.onclick=()=>{activeChapter=c;buildCards();startExam()};
    grid.appendChild(card);
  }
}

function startExam(){
  const name=document.getElementById('candidateName').value.trim();
  if(!name){alert('اكتب الاسم أولًا.');document.getElementById('candidateName').focus();return}
  localStorage.setItem('ksu101-candidate-name',name);

  const val=document.getElementById('questionCount').value;
  const requested=val==='all'
    ? (activeChapter===0?questions.length:questions.filter(q=>q.chapter===activeChapter).length)
    : Number(val);

  if(activeChapter===0){
    const groups={};
    for(let c=1;c<=8;c++) groups[c]=questions.filter(q=>q.chapter===c);

    if(document.getElementById('questionOrder').value==='random'){
      for(let c=1;c<=8;c++){
        const arr=[...groups[c]];
        for(let i=arr.length-1;i>0;i--){
          const j=Math.floor(Math.random()*(i+1));
          [arr[i],arr[j]]=[arr[j],arr[i]];
        }
        groups[c]=arr;
      }
    }

    pool=[];
    let remaining=Math.min(requested,questions.length);
    let round=0;
    while(remaining>0){
      let added=0;
      for(let c=1;c<=8 && remaining>0;c++){
        if(groups[c][round]){
          pool.push(groups[c][round]);
          remaining--;
          added++;
        }
      }
      if(added===0) break;
      round++;
    }

    if(document.getElementById('questionOrder').value==='random'){
      for(let i=pool.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [pool[i],pool[j]]=[pool[j],pool[i]];
      }
    }
  }else{
    pool=questions.filter(q=>q.chapter===activeChapter);
    if(document.getElementById('questionOrder').value==='random'){
      pool=[...pool];
      for(let i=pool.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [pool[i],pool[j]]=[pool[j],pool[i]];
      }
    }
    pool=pool.slice(0,Math.min(requested,pool.length));
  }

  current=0;answers={};startedAt=Date.now();
  document.getElementById('home').classList.add('hidden');
  document.getElementById('results').style.display='none';
  document.getElementById('exam').style.display='block';
  render();
}

function render(){
  const q=pool[current], answer=answers[current];
  document.getElementById('qCounter').textContent=`السؤال ${current+1} من ${pool.length}`;
  document.getElementById('qPage').textContent=`📖 الصفحة ${q.page}`;
  document.getElementById('question').textContent=q.q;
  const box=document.getElementById('options');box.innerHTML='';
  q.options.forEach((op,i)=>{
    const el=document.createElement('div');el.className='option';
    if(answer){
      if(i===q.answer) el.classList.add('correct');
      if(i===answer.selected && i!==q.answer) el.classList.add('wrong');
    }
    el.innerHTML=`<span class="letter">${'ABCD'[i]}</span><span class="option-text">${op}${answer&&i===q.answer?`<span class="feedback"><strong>✓ ${answer.correct?'إجابة صحيحة':'الإجابة الصحيحة'}</strong>${q.explanation}</span>`:''}</span>`;
    el.onclick=()=>selectAnswer(i);box.appendChild(el);
  });
  document.getElementById('prevBtn').disabled=current===0;
  document.getElementById('nextBtn').textContent=current===pool.length-1?'إنهاء الاختبار':'التالي';
}

function selectAnswer(i){
  if(answers[current]) return;
  const q=pool[current];
  answers[current]={selected:i,correct:i===q.answer};
  render();
}

function nextQ(){
  if(!answers[current]){alert('اختر إجابة أولًا.');return}
  if(current<pool.length-1){current++;render()}else finishExam();
}
function prevQ(){if(current>0){current--;render()}}

function finishExam(){
  const correct=Object.values(answers).filter(a=>a.correct).length;
  const total=pool.length, wrong=total-correct, pct=Math.round(correct/total*100);
  const old=getStats(activeChapter);
  localStorage.setItem(statsKey(activeChapter),JSON.stringify({answered:Math.min(chapterCounts[activeChapter],old.answered+total),best:Math.max(old.best,pct)}));
  document.getElementById('exam').style.display='none';
  document.getElementById('results').style.display='block';
  document.getElementById('finalPercent').textContent=pct+'%';
  document.getElementById('correctCount').textContent=correct;
  document.getElementById('wrongCount').textContent=wrong;
  document.getElementById('totalCount').textContent=total;
}

function goHome(){
  document.getElementById('exam').style.display='none';
  document.getElementById('results').style.display='none';
  document.getElementById('home').classList.remove('hidden');
  buildCards();
}
document.getElementById('candidateName').value=localStorage.getItem('ksu101-candidate-name')||'';
buildCards();
</script>
