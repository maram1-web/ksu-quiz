<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>اختبار KSU 101</title>
<style>
:root{--primary:#087f95;--primary2:#0b7285;--bg:#eef5f7;--card:#fff;--text:#13252e;--muted:#6b7b84;--line:#d9e6ea;--good:#198754;--bad:#c0392b;--gold:#c99a32}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#f8fbfc,var(--bg));font-family:Tahoma,Arial,sans-serif;color:var(--text)}
.wrap{max-width:980px;margin:auto;padding:16px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.brand{display:flex;gap:12px;align-items:center}
.logo{width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,var(--primary),var(--primary2));display:grid;place-items:center;color:white;font-weight:900;box-shadow:0 8px 24px rgba(8,127,149,.25)}
.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:26px;box-shadow:0 16px 40px rgba(25,64,76,.11)}
.hidden{display:none!important}
.hero{display:grid;grid-template-columns:1.15fr .85fr;gap:22px;align-items:center}
.hero h1{margin:0 0 10px;font-size:34px}
.hero p{color:var(--muted);line-height:1.9}
.stat{min-height:230px;border-radius:20px;background:linear-gradient(145deg,var(--primary),#154d61);color:#fff;display:grid;place-items:center;text-align:center}
.stat strong{display:block;font-size:68px}
label{display:block;margin:14px 0 7px;font-weight:700}
select{width:100%;padding:13px;border:1px solid var(--line);border-radius:12px;font-size:16px;background:#fff}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
button{border:0;border-radius:12px;padding:12px 18px;font-size:16px;font-weight:800;cursor:pointer}
.primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:white}
.secondary{background:#edf3f5;color:#284653}
.meta{display:flex;justify-content:space-between;color:var(--muted);gap:10px}
.progress{height:11px;background:#e7eef1;border-radius:999px;overflow:hidden;margin:14px 0 22px}
.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--gold));width:0}
.question{font-size:24px;line-height:1.7;font-weight:900;margin:15px 0}
.option{width:100%;display:flex;gap:12px;align-items:flex-start;text-align:right;padding:14px;margin:9px 0;border:1px solid var(--line);background:#fff;border-radius:14px;font-size:16px;line-height:1.75}
.option.selected{border:2px solid var(--primary);background:#eff9fb}
.badge{width:36px;height:36px;border-radius:10px;background:#edf5f7;display:grid;place-items:center;color:var(--primary);font-weight:900;flex:0 0 auto}
.result{text-align:center}
.score{font-size:58px;color:var(--primary);font-weight:900}
.review-item{border:1px solid var(--line);border-radius:15px;padding:15px;margin:10px 0;line-height:1.8}
.correct{color:var(--good);font-weight:800}
.wrong{color:var(--bad);font-weight:800}
.small{color:var(--muted);font-size:14px}
.notice{background:#f7fafb;border:1px solid var(--line);padding:12px;border-radius:12px;margin-top:14px;color:var(--muted);line-height:1.7}
@media(max-width:700px){.wrap{padding:10px}.hero{grid-template-columns:1fr}.hero h1{font-size:27px}.card{padding:18px}.question{font-size:20px}.grid{grid-template-columns:1fr}.stat{min-height:150px}}
</style>
</head>
<body>
<div class="wrap">
<header class="header">
  <div class="brand">
    <div class="logo">KSU</div>
    <div><strong>اختبار KSU 101</strong><div class="small">أسئلة مستخرجة من المذكرة المعرفية</div></div>
  </div>
</header>

<section id="home" class="card hero">
  <div>
    <h1>تدرّب على المذكرة كاملة</h1>
    <p>يحتوي البنك على 700 سؤال مرتبط بصفحات المذكرة وأبوابها الثمانية.</p>
    <div class="grid">
      <div>
        <label for="category">الباب</label>
        <select id="category"><option value="all">جميع الأبواب</option></select>
      </div>
      <div>
        <label for="questionCount">عدد الأسئلة</label>
        <select id="questionCount">
          <option value="10">10</option>
          <option value="20" selected>20</option>
          <option value="50">50</option>
          <option value="100">100</option>
          <option value="all">كل المتاح</option>
        </select>
      </div>
    </div>
    <label for="orderMode">ترتيب الأسئلة</label>
    <select id="orderMode">
      <option value="random">عشوائي</option>
      <option value="normal">بالترتيب</option>
    </select>
    <div class="actions"><button class="primary" id="startBtn">ابدأ الاختبار</button></div>
    <div class="notice">كل إجابة صحيحة مرتبطة برقم الصفحة والباب داخل المذكرة.</div>
  </div>
  <div class="stat"><div><strong>700</strong><span>سؤال في البنك</span></div></div>
</section>

<section id="quiz" class="card hidden">
  <div class="meta"><span id="counter"></span><span id="page"></span></div>
  <div class="progress"><span id="bar"></span></div>
  <div id="questionText" class="question"></div>
  <div id="options"></div>
  <div class="actions">
    <button class="secondary" id="prevBtn">السابق</button>
    <button class="primary" id="nextBtn">التالي</button>
    <button class="secondary" id="finishBtn">إنهاء الاختبار</button>
  </div>
</section>

<section id="result" class="card result hidden">
  <h2>النتيجة النهائية</h2>
  <div class="score" id="score"></div>
  <p id="percent"></p>
  <div class="actions" style="justify-content:center">
    <button class="primary" id="reviewBtn">مراجعة الإجابات</button>
    <button class="secondary" id="restartBtn">اختبار جديد</button>
  </div>
</section>

<section id="review" class="card hidden">
  <h2>مراجعة الإجابات</h2>
  <div id="reviewList"></div>
  <button class="secondary" id="backBtn">العودة للنتيجة</button>
</section>
</div>

وم الصحة الفموية"}];
const letters = ["أ","ب","ج","د"];
let selected = [], answers = {}, current = 0;
const $ = id => document.getElementById(id);

function show(id) {
  ["home","quiz","result","review"].forEach(x => $(x).classList.add("hidden"));
  $(id).classList.remove("hidden");
}

function shuffle(arr) {
  arr = [...arr];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

(function setup() {
  const cats = [...new Set(bank.map(q => q.category))];
  cats.forEach(cat => $("category").add(new Option(cat, cat)));
})();

$("startBtn").onclick = () => {
  const cat = $("category").value;
  let pool = bank.map((q, i) => ({q, i})).filter(x => cat === "all" || x.q.category === cat);
  if ($("orderMode").value === "random") pool = shuffle(pool);

  const requested = $("questionCount").value;
  const count = requested === "all" ? pool.length : Math.min(Number(requested), pool.length);
  selected = pool.slice(0, count).map(x => x.i);
  answers = {};
  current = 0;
  show("quiz");
  render();
};

function render() {
  const qi = selected[current];
  const q = bank[qi];
  $("counter").textContent = `السؤال ${current + 1} من ${selected.length}`;
  $("page").textContent = `الصفحة: ${q.page}`;
  $("bar").style.width = `${((current + 1) / selected.length) * 100}%`;
  $("questionText").textContent = q.question;

  const box = $("options");
  box.innerHTML = "";
  q.options.forEach((text, i) => {
    const b = document.createElement("button");
    b.className = "option" + (answers[qi] === i ? " selected" : "");
    b.innerHTML = `<span class="badge">${letters[i]}</span><span>${text}</span>`;
    b.onclick = () => { answers[qi] = i; render(); };
    box.appendChild(b);
  });

  $("prevBtn").disabled = current === 0;
  $("nextBtn").textContent = current === selected.length - 1 ? "عرض النتيجة" : "التالي";
}

$("prevBtn").onclick = () => { if (current > 0) { current--; render(); } };
$("nextBtn").onclick = () => {
  if (current < selected.length - 1) { current++; render(); }
  else finish();
};
$("finishBtn").onclick = () => {
  if (confirm("هل تريد إنهاء الاختبار الآن؟")) finish();
};

function finish() {
  let correct = 0;
  selected.forEach(i => { if (answers[i] === bank[i].answer) correct++; });
  $("score").textContent = `${correct} / ${selected.length}`;
  $("percent").textContent = `النسبة: ${Math.round((correct / selected.length) * 100)}٪`;
  show("result");
}

$("reviewBtn").onclick = () => {
  const list = $("reviewList");
  list.innerHTML = "";
  selected.forEach((i, pos) => {
    const q = bank[i];
    const ok = answers[i] === q.answer;
    const yours = answers[i] === undefined ? "لم تُجب" : `${letters[answers[i]]}) ${q.options[answers[i]]}`;
    const item = document.createElement("div");
    item.className = "review-item";
    item.innerHTML = `
      <strong>${pos + 1}. ${q.question}</strong>
      <p class="${ok ? "correct" : "wrong"}">${ok ? "✅ إجابتك صحيحة" : "❌ إجابتك: " + yours}</p>
      <p class="correct">الإجابة الصحيحة: ${letters[q.answer]}) ${q.options[q.answer]}</p>
      <p>${q.explanation}</p>
      <div class="small">الصفحة: ${q.page} | الباب: ${q.category}</div>`;
    list.appendChild(item);
  });
  show("review");
};

$("backBtn").onclick = () => show("result");
$("restartBtn").onclick = () => show("home");
</script>
