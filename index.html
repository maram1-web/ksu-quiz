<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KSU 101 Quiz</title>
<style>
:root{
  --navy:#062f52;--blue:#0b68d8;--bg:#f4f7fb;--card:#fff;--line:#dbe5ef;
  --text:#10253b;--muted:#66788a;--green:#1b9a52;--red:#d53434;--amber:#f0a000;
}
*{box-sizing:border-box}
body{margin:0;font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text)}
button,input,select{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}

.topbar{background:linear-gradient(135deg,#052d4e,#074b7d);color:#fff;padding:22px 28px}
.topbar-inner{max-width:1500px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:20px}
.brand h1{margin:0;font-size:34px;letter-spacing:.5px}
.brand p{margin:5px 0 0;opacity:.9}
.top-actions{display:flex;gap:12px}
.ghost{border:1px solid #ffffff66;background:#ffffff0d;color:#fff;border-radius:14px;padding:11px 15px}

.chapter-strip{background:#fff;border-bottom:1px solid var(--line);padding:14px 18px}
.chapters{max-width:1500px;margin:auto;display:grid;grid-template-columns:repeat(9,minmax(130px,1fr));gap:8px}
.chapter-btn{border:0;border-radius:13px;padding:14px 10px;color:#fff;font-weight:700;min-height:74px;position:relative;box-shadow:0 4px 12px #00000013;transition:.2s}
.chapter-btn:hover{transform:translateY(-2px)}
.chapter-btn.active::after{content:"";position:absolute;right:8px;left:8px;bottom:-8px;height:4px;border-radius:4px;background:#1c75ff}
.chapter-btn[data-chapter="1"]{background:linear-gradient(135deg,#0b68d8,#105ab6)}
.chapter-btn[data-chapter="2"]{background:linear-gradient(135deg,#2ea44f,#23893f)}
.chapter-btn[data-chapter="3"]{background:linear-gradient(135deg,#9a45c6,#7d34aa)}
.chapter-btn[data-chapter="4"]{background:linear-gradient(135deg,#ff8c00,#e87900)}
.chapter-btn[data-chapter="5"]{background:linear-gradient(135deg,#ef4f78,#d73d65)}
.chapter-btn[data-chapter="6"]{background:linear-gradient(135deg,#0cb1b2,#099395)}
.chapter-btn[data-chapter="7"]{background:linear-gradient(135deg,#b17a38,#91602a)}
.chapter-btn[data-chapter="8"]{background:linear-gradient(135deg,#6a42b6,#54339a)}
.chapter-btn[data-chapter="all"]{background:linear-gradient(135deg,#1d2944,#11192e)}
.chapter-title{font-size:16px}
.chapter-count{display:block;font-size:12px;margin-top:6px;opacity:.92}

.page{max-width:1500px;margin:22px auto;padding:0 18px}
.setup-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 8px 22px #1234560c}
.setup-grid{display:grid;grid-template-columns:2fr .8fr .8fr .9fr;gap:16px;align-items:end}
.field label{display:block;font-weight:700;margin-bottom:7px}
.field input,.field select{width:100%;border:1px solid #cbd8e4;border-radius:12px;padding:13px 14px;background:#fff}
.start-btn{width:100%;border:0;border-radius:12px;padding:14px 18px;background:linear-gradient(135deg,#1174e7,#075fc8);color:#fff;font-weight:800}
.note{margin-top:12px;color:var(--muted);font-size:13px}

.quiz-layout{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:16px;margin-top:16px}
.question-card,.side-card,.result-card,.review-card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 22px #1234560b}
.question-card{padding:22px}
.qhead{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:18px}
.qcounter{color:#0a63cc;font-weight:800}
.point-badge{background:#eaf3ff;color:#0b68d8;padding:8px 12px;border-radius:999px;font-size:13px}
.question{font-size:22px;line-height:1.8;margin:8px 0 20px}
.options{display:grid;gap:11px}
.option{display:flex;align-items:flex-start;gap:12px;width:100%;text-align:right;background:#fff;border:1px solid #d6e1ec;border-radius:12px;padding:14px}
.option:hover{border-color:#6aa9ef;background:#f8fbff}
.option.selected{border:2px solid #1473e6;background:#f2f8ff}
.option.correct{border-color:#28a85d;background:#ecf9f1}
.option.wrong{border-color:#df5656;background:#fff3f3}
.radio{min-width:23px;height:23px;border:2px solid #9db0c0;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-top:1px}
.option.selected .radio::after{content:"";width:11px;height:11px;border-radius:50%;background:#1473e6}
.feedback{margin-top:16px;border-radius:12px;padding:15px;line-height:1.8}
.feedback.good{background:#ebf8ef;border-right:5px solid var(--green)}
.feedback.bad{background:#fff0f0;border-right:5px solid var(--red)}
.qnav{display:flex;justify-content:space-between;gap:12px;margin-top:20px}
.nav-btn{border:1px solid #b9d5f6;background:#f5f9ff;color:#0c63cb;border-radius:11px;padding:12px 20px;font-weight:700}
.nav-btn.primary{background:#0c68d7;color:#fff;border-color:#0c68d7}

.side{display:grid;gap:14px}
.side-card{padding:18px}
.side-card h3{margin:0 0 12px;font-size:17px}
.standard-score{text-align:center;font-size:27px;color:#0c68d7;font-weight:800;border-bottom:1px solid var(--line);padding-bottom:12px}
.score-circle{width:120px;height:120px;border-radius:50%;margin:16px auto;background:conic-gradient(var(--green) 0deg,#e5ebf0 0deg);display:grid;place-items:center;position:relative}
.score-circle::before{content:"";width:88px;height:88px;border-radius:50%;background:#fff;position:absolute}
.score-circle span{position:relative;font-size:26px;font-weight:800}
.current-score{text-align:center;font-size:24px;font-weight:800;color:var(--green)}
.progress{height:9px;background:#e5ebf0;border-radius:999px;overflow:hidden;margin:14px 0}
.progress div{height:100%;background:var(--green);width:0}
.meta-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed #e0e7ee}
.meta-row:last-child{border-bottom:0}
.scale-row{display:flex;justify-content:space-between;border-radius:8px;padding:8px 10px;margin-top:7px;font-size:13px}
.scale-row.excellent{background:#e8f7ed;color:#16753b}
.scale-row.verygood{background:#eaf3ff;color:#0b65c5}
.scale-row.good{background:#fff4cf;color:#9a6b00}
.scale-row.review{background:#ffe7e7;color:#b62525}

.result-card,.review-card{padding:26px;max-width:900px;margin:16px auto}
.result-score{font-size:58px;font-weight:900;text-align:center;color:#0c68d7}
.result-grade{text-align:center;font-size:24px;font-weight:800;margin:8px 0}
.result-actions{display:flex;gap:12px;justify-content:center;margin-top:20px}
.review-item{padding:18px 0;border-top:1px solid var(--line)}
.review-item:first-child{border-top:0}
.small{color:var(--muted);font-size:13px}
footer{text-align:center;color:#6b7c8f;padding:24px}

@media(max-width:1100px){
  .chapters{grid-template-columns:repeat(3,1fr)}
  .setup-grid{grid-template-columns:1fr 1fr}
  .quiz-layout{grid-template-columns:1fr}
  .side{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:700px){
  .topbar-inner{align-items:flex-start}
  .brand h1{font-size:28px}
  .chapters{grid-template-columns:repeat(2,1fr)}
  .setup-grid{grid-template-columns:1fr}
  .side{grid-template-columns:1fr}
  .question{font-size:19px}
  .qhead{align-items:flex-start;flex-direction:column}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand"><h1>KSU 101</h1><p>بنك أسئلة المذكرة المعرفية</p></div>
    <div class="top-actions"><button class="ghost" type="button">إحصائياتي</button><button class="ghost" type="button">☾</button></div>
  </div>
</header>

<nav class="chapter-strip"><div id="chapterButtons" class="chapters"></div></nav>

<main class="page">
<section id="home">
  <div class="setup-card">
    <div class="setup-grid">
      <div class="field"><label for="studentName">الاسم <span style="color:#0b68d8">(إجباري)</span></label><input id="studentName" placeholder="اكتب اسمك" maxlength="60"></div>
      <div class="field"><label for="questionCount">عدد الأسئلة</label><select id="questionCount"></select></div>
      <div class="field"><label for="orderMode">ترتيب الأسئلة</label><select id="orderMode"><option value="random">عشوائي</option><option value="ordered">بالترتيب</option></select></div>
      <button id="startBtn" class="start-btn">▶ ابدأ الاختبار</button>
    </div>
    <div id="chapterNote" class="note"></div>
  </div>
</section>

<section id="quiz" class="hidden">
  <div class="quiz-layout">
    <div class="question-card">
      <div class="qhead"><div id="counter" class="qcounter"></div><div class="point-badge">درجة السؤال: <strong id="questionPoint">1</strong></div></div>
      <div id="qid" class="small"></div>
      <h2 id="questionText" class="question"></h2>
      <div id="options" class="options"></div>
      <div id="feedback" class="feedback hidden"></div>
      <div class="qnav"><button id="prevBtn" class="nav-btn">السابق</button><button id="nextBtn" class="nav-btn primary">التالي</button></div>
    </div>
    <aside class="side">
      <div class="side-card">
        <h3>🏆 درجة المعيار</h3>
        <div class="standard-score">30 درجة</div>
        <div id="scoreCircle" class="score-circle"><span id="circlePct">0%</span></div>
        <div id="currentScore" class="current-score">0 / 30</div>
        <div class="progress"><div id="scoreBar"></div></div>
        <div id="remainingText" class="small" style="text-align:center"></div>
      </div>
      <div class="side-card">
        <div class="meta-row"><span>الباب الحالي</span><strong id="currentChapter"></strong></div>
        <div class="meta-row"><span>السؤال الحالي</span><strong id="currentQuestionMeta"></strong></div>
        <div class="meta-row"><span>تمت الإجابة</span><strong id="answeredMeta">0</strong></div>
      </div>
      <div class="side-card">
        <h3>مقياس التقدير (من 30)</h3>
        <div class="scale-row excellent"><span>27–30</span><strong>ممتاز</strong></div>
        <div class="scale-row verygood"><span>24–26</span><strong>جيد جدًا</strong></div>
        <div class="scale-row good"><span>21–23</span><strong>جيد</strong></div>
        <div class="scale-row review"><span>أقل من 21</span><strong>يحتاج مراجعة</strong></div>
      </div>
    </aside>
  </div>
</section>

<section id="result" class="result-card hidden">
  <h2 style="text-align:center">نتيجة الاختبار</h2>
  <div id="resultScore" class="result-score"></div>
  <div id="resultGrade" class="result-grade"></div>
  <p id="resultText" style="text-align:center"></p>
  <div class="result-actions"><button id="reviewBtn" class="nav-btn">مراجعة الإجابات</button><button id="restartBtn" class="nav-btn primary">اختبار جديد</button></div>
</section>

<section id="review" class="review-card hidden">
  <h2>مراجعة الإجابات</h2>
  <div id="reviewList"></div>
  <button id="backResultBtn" class="nav-btn primary">العودة للنتيجة</button>
</section>
</main>

<footer>جميع الحقوق محفوظة © جامعة الملك سعود — KSU 101 Quiz</footer>

<script>
const bank = [
{chapter:1,id:'KSU-001',page:'8',q:'تُعد جامعة الملك سعود وفق النظام الأساس:',o:['مؤسسة حكومية ربحية','مؤسسة أكاديمية مستقلة غير هادفة للربح','هيئة تعليمية تابعة لوزارة التعليم','مؤسسة تعليمية خاصة'],a:1,e:'عرّف النظام جامعة الملك سعود بأنها مؤسسة أكاديمية مستقلة غير هادفة للربح.'},
{chapter:1,id:'KSU-002',page:'8',q:'المقصود بالهيئة في النظام الأساس لجامعة الملك سعود هو:',o:['هيئة تقويم التعليم والتدريب','مجلس شؤون الجامعات','الهيئة الملكية لمدينة الرياض','وزارة التعليم'],a:2,e:'يقصد بالهيئة: الهيئة الملكية لمدينة الرياض.'},
{chapter:1,id:'KSU-003',page:'8',q:'المقصود بالمجلس في النظام الأساس هو:',o:['مجلس إدارة الجامعة','مجلس شؤون الجامعات','مجلس إدارة الهيئة','المجلس الأكاديمي'],a:0,e:'عرّف النظام المجلس بأنه مجلس إدارة الجامعة.'},
{chapter:1,id:'KSU-004',page:'8',q:'تتمتع جامعة الملك سعود وفق النظام الأساس بـ:',o:['الشخصية الاعتبارية والذمة المالية المستقلة','الاستقلال الأكاديمي فقط','الاستقلال الإداري فقط','الاستقلال المالي دون الإداري'],a:0,e:'تتمتع الجامعة بالشخصية الاعتبارية والذمة المالية المستقلة.'},
{chapter:1,id:'KSU-005',page:'8',q:'أي أنواع الاستقلال الآتية تتمتع بها الجامعة؟',o:['المالي فقط','الإداري والأكاديمي فقط','المالي والإداري والأكاديمي','الأكاديمي فقط'],a:2,e:'نص النظام على الاستقلال المالي والإداري والأكاديمي للجامعة.'},
{chapter:1,id:'KSU-006',page:'8',q:'تعود ملكية جامعة الملك سعود إلى:',o:['وزارة التعليم','الهيئة الملكية لمدينة الرياض','مجلس شؤون الجامعات','وزارة المالية'],a:1,e:'تكون الجامعة ملكًا للهيئة الملكية لمدينة الرياض.'},
{chapter:1,id:'KSU-007',page:'8',q:'يقع المقر الرئيس لجامعة الملك سعود في:',o:['جدة','المدينة المنورة','الرياض','الدمام'],a:2,e:'حدد النظام مدينة الرياض مقرًا رئيسًا للجامعة.'},
{chapter:1,id:'KSU-008',page:'8',q:'يجوز للجامعة إنشاء فروع وكليات ومعاهد خارج مقرها الرئيس:',o:['بحسب الحاجة','داخل مدينة الرياض فقط','بعد موافقة وزارة التعليم فقط','ولا يجوز إنشاء مراكز أبحاث خارج المقر'],a:0,e:'أجاز النظام إنشاء فروع وكليات ومعاهد وأقسام ومراكز أبحاث وبرامج خارج المقر الرئيس بحسب الحاجة.'},
{chapter:1,id:'KSU-009',page:'9',q:'من الجهة التي تعتمد رؤى الجامعة وخططها الاستراتيجية وتقاريرها السنوية؟',o:['رئيس الجامعة','مجلس إدارة الجامعة','مجلس إدارة الهيئة','وزارة التعليم'],a:2,e:'يشرف مجلس إدارة الهيئة على الجامعة من خلال اعتماد رؤاها وخططها وتقاريرها.'},
{chapter:1,id:'KSU-010',page:'9',q:'من الجهة التي تعتمد مشروع ميزانية الجامعة وحسابها الختامي؟',o:['مجلس إدارة الهيئة','رئيس الجامعة','وزارة المالية مباشرة','المجلس الأكاديمي'],a:0,e:'من اختصاصات مجلس إدارة الهيئة اعتماد مشروع الميزانية والحساب الختامي.'},
{chapter:1,id:'KSU-011',page:'9',q:'اعتماد ضوابط عقد الجامعة للقروض من اختصاص:',o:['رئيس الجامعة','مجلس إدارة الهيئة','مجلس الكلية','وزارة التعليم'],a:1,e:'يعتمد مجلس إدارة الهيئة ضوابط عقد الجامعة للقروض وغيرها من صور التمويل.'},
{chapter:1,id:'KSU-012',page:'9',q:'من الجهة التي تعيّن رئيس الجامعة بناءً على ترشيح من مجلس إدارة الجامعة؟',o:['وزير التعليم','مجلس إدارة الهيئة','رئيس مجلس الوزراء مباشرة','مجلس شؤون الجامعات'],a:1,e:'يعين مجلس إدارة الهيئة رئيس الجامعة بناءً على ترشيح من مجلس إدارة الجامعة.'},
{chapter:1,id:'KSU-013',page:'10',q:'تتمتع الجامعة بالأهلية والحرية الكاملة في اتخاذ ما يلزم لتحقيق أهدافها:',o:['دون أي قيد نظامي','وفق أحكام النظام واللوائح','بعد موافقة الوزارة في كل قرار','في الشؤون الأكاديمية فقط'],a:1,e:'تمارس الجامعة أهليتها وحريتها الكاملة وفق أحكام النظام واللوائح.'},
{chapter:1,id:'KSU-014',page:'10',q:'يتمتع أعضاء هيئة التدريس في الجامعة بالحريات والحقوق:',o:['المالية والإدارية','الأكاديمية والبحثية','التنفيذية فقط','النقابية'],a:1,e:'يتمتع أعضاء هيئة التدريس بالحريات والحقوق الأكاديمية والبحثية.'},
{chapter:1,id:'KSU-015',page:'10',q:'تلتزم الجامعة بمعايير الاعتماد الأكاديمي المعمول بها لدى:',o:['وزارة المالية فقط','هيئة تقويم التعليم والتدريب وهيئات الاعتماد الدولية','وزارة الموارد البشرية فقط','الهيئة الملكية وحدها'],a:1,e:'تلتزم الجامعة بمعايير الاعتماد لدى هيئة تقويم التعليم والتدريب والهيئات الدولية.'},
{chapter:1,id:'KSU-016',page:'11',q:'من أهداف الجامعة خدمة التعليم العالي في:',o:['مدينة الرياض فقط','المملكة فقط','مدينة الرياض بشكل خاص والمملكة بشكل عام','دول مجلس التعاون فقط'],a:2,e:'من أهداف الجامعة خدمة التعليم العالي في الرياض بشكل خاص والمملكة بشكل عام.'},
{chapter:1,id:'KSU-017',page:'11',q:'تسعى الجامعة إلى تلبية احتياجات:',o:['سوق العمل والاقتصاد المعرفي','القطاع الحكومي فقط','التعليم العام فقط','السوق المحلي فقط'],a:0,e:'من أهداف الجامعة تلبية احتياجات سوق العمل والاقتصاد المعرفي.'},
{chapter:1,id:'KSU-018',page:'11',q:'أي مما يأتي يدخل ضمن أهداف الجامعة؟',o:['تعزيز البحث العلمي والابتكار والإبداع والريادة','تقليص البرامج الأكاديمية','حصر التعليم في الرياض','إيقاف التعاون الدولي'],a:0,e:'من أهداف الجامعة تعزيز البحث العلمي والابتكار والإبداع والريادة.'},
{chapter:1,id:'KSU-019',page:'12',q:'يتكون مجلس إدارة الجامعة من عدد لا يقل عن:',o:['ثمانية أعضاء','عشرة أعضاء','أربعة عشر عضوًا','عشرين عضوًا'],a:2,e:'يتكون المجلس من عدد لا يقل عن أربعة عشر عضوًا.'},
{chapter:1,id:'KSU-020',page:'12',q:'تكون مدة العضوية في مجلس إدارة الجامعة، فيما عدا رئيس الجامعة:',o:['سنتين قابلة للتجديد مرة','ثلاث سنوات قابلة للتجديد مرتين','أربع سنوات غير قابلة للتجديد','خمس سنوات'],a:1,e:'مدة العضوية ثلاث سنوات قابلة للتجديد مرتين.'},

{chapter:8,id:'KSU-113',page:'119',q:'ماذا تقتضي أخلاقيات العمل في الجهات الحكومية؟',o:['الالتزام بسلوكيات إيجابية تعزز الأداء','تقديم المصلحة الشخصية','تجنب التعاون','عدم تحمل المسؤولية'],a:0,e:'تقتضي أخلاقيات العمل الالتزام بسلوكيات إيجابية تسهم في الأداء المؤسسي.'},

{chapter:8,id:'KSU-115',page:'117',q:'أي إجراء يدعم السلامة المهنية في بيئة العمل؟',o:['الحد من المخاطر وتطبيق معايير السلامة','تجاهل الحوادث','إلغاء التدريب','تقليل الإبلاغ عن المخاطر'],a:0,e:'تقوم البيئة الآمنة على تطبيق معايير السلامة والحد من المخاطر.'},
{chapter:8,id:'KSU-116',page:'120',q:'ما التوجه المستقبلي الذي تشير إليه المذكرة في ختامها؟',o:['بناء شراكات فاعلة ومستدامة تدعم التحول المعرفي وخدمة المجتمع','إيقاف الشراكات','تقليص خدمة المجتمع','التركيز على العمل الفردي فقط'],a:0,e:'تطمح الجامعة إلى بناء شراكات فاعلة ومستدامة تدعم التحول المعرفي وخدمة المجتمع.'}
];
const letters=['أ','ب','ج','د'];
const chapterMeta=[
 {id:'1',name:'الباب الأول',title:'نظام الجامعة الأساس'},
 {id:'2',name:'الباب الثاني',title:'تاريخ الجامعة'},
 {id:'3',name:'الباب الثالث',title:'الهيكل الأكاديمي والتنظيمي'},
 {id:'4',name:'الباب الرابع',title:'البحث العلمي والابتكار'},
 {id:'5',name:'الباب الخامس',title:'التصنيفات الدولية والمحلية'},
 {id:'6',name:'الباب السادس',title:'المنجزات'},
 {id:'7',name:'الباب السابع',title:'الشراكات والاتفاقيات'},
 {id:'8',name:'الباب الثامن',title:'بيئة العمل'},
 {id:'all',name:'جميع الأبواب',title:'اختبار شامل'}
];
let selected=[],answers={},submitted={},current=0,studentName='',selectedChapter='1';
const $=id=>document.getElementById(id);
function show(id){['home','quiz','result','review'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function chapterQuestions(){return selectedChapter==='all'?bank:bank.filter(q=>String(q.chapter)===selectedChapter)}
function gradeFrom30(score){if(score>=27)return 'ممتاز';if(score>=24)return 'جيد جدًا';if(score>=21)return 'جيد';return 'يحتاج مراجعة'}
function currentCorrect(){return selected.filter(i=>submitted[i]&&answers[i]===bank[i].a).length}
function score30(){return selected.length?Math.round((currentCorrect()/selected.length)*30):0}
function updateScorePanel(){
  const s=score30(),pct=Math.round((s/30)*100);
  $('currentScore').textContent=`${s} / 30`;
  $('circlePct').textContent=`${pct}%`;
  $('scoreBar').style.width=`${pct}%`;
  $('scoreCircle').style.background=`conic-gradient(var(--green) ${pct*3.6}deg,#e5ebf0 0deg)`;
  $('remainingText').textContent=`${30-s} درجة متبقية للوصول إلى الدرجة الكاملة`;
  $('answeredMeta').textContent=Object.keys(submitted).length;
}
function refreshQuestionCount(){
  const c=$('questionCount'),available=chapterQuestions().length;c.innerHTML='';
  [10,20,30,50].filter(n=>n<available).forEach(n=>c.add(new Option(n,n)));
  if(available>0)c.add(new Option(`كل الأسئلة (${available})`,available));else c.add(new Option('لا توجد أسئلة بعد',0));
  $('startBtn').disabled=available===0;$('startBtn').style.opacity=available===0?'.55':'1';
}
function renderChapterButtons(){
  const box=$('chapterButtons');box.innerHTML='';
  chapterMeta.forEach(ch=>{
    const count=ch.id==='all'?bank.length:bank.filter(q=>String(q.chapter)===ch.id).length;
    const b=document.createElement('button');b.type='button';b.dataset.chapter=ch.id;b.className='chapter-btn'+(selectedChapter===ch.id?' active':'');
    b.innerHTML=`<span class="chapter-title">${ch.name}</span><span class="chapter-count">${count} سؤال</span>`;
    b.onclick=()=>{selectedChapter=ch.id;renderChapterButtons();refreshQuestionCount();$('chapterNote').textContent=count?`سيتم الاختبار من ${ch.name} — ${ch.title}.`:`لم تُضف أسئلة هذا الباب بعد.`};
    box.appendChild(b);
  });
}
renderChapterButtons();refreshQuestionCount();
$('chapterNote').textContent='سيتم الاختبار من الباب الأول — نظام الجامعة الأساس.';
$('startBtn').onclick=()=>{
  studentName=$('studentName').value.trim();
  if(!studentName){alert('اكتب الاسم أولًا');$('studentName').focus();return}
  let pool=chapterQuestions();if(!pool.length){alert('لا توجد أسئلة في هذا الباب بعد');return}
  const n=Number($('questionCount').value);let ids=pool.map(q=>bank.indexOf(q));
  if($('orderMode').value==='random')ids=shuffle(ids);
  selected=ids.slice(0,n);answers={};submitted={};current=0;show('quiz');render();
};
function render(){
  const qi=selected[current],q=bank[qi],done=submitted[qi];
  $('counter').textContent=`السؤال ${current+1} من ${selected.length}`;
  $('questionPoint').textContent=(30/selected.length).toFixed(2);
  $('qid').textContent=`${q.id} — الصفحة ${q.page}`;
  $('questionText').textContent=q.q;
  $('currentChapter').textContent=chapterMeta.find(c=>c.id===String(q.chapter))?.name||'';
  $('currentQuestionMeta').textContent=`${current+1} من ${selected.length}`;
  const box=$('options');box.innerHTML='';
  q.o.forEach((t,i)=>{
    const b=document.createElement('button');
    let state='';
    if(done&&i===q.a)state=' correct';
    else if(done&&answers[qi]===i&&i!==q.a)state=' wrong';
    else if(answers[qi]===i)state=' selected';
    b.className='option'+state;b.disabled=!!done;
    b.innerHTML=`<span class="radio"></span><span>${t}</span>`;
    b.onclick=()=>{answers[qi]=i;render()};
    box.appendChild(b);
  });
  const f=$('feedback');
  if(done){
    const ok=answers[qi]===q.a;f.className='feedback '+(ok?'good':'bad');
    f.innerHTML=`<strong>${ok?'إجابة صحيحة':'إجابة غير صحيحة'}</strong><br>الإجابة الصحيحة: ${letters[q.a]}) ${q.o[q.a]}<br>${q.e}<br><span class="small">الصفحة: ${q.page}</span>`;
  }else{f.className='feedback hidden';f.innerHTML=''}
  $('prevBtn').disabled=current===0;
  $('nextBtn').textContent=!done?'تحقق من الإجابة':current===selected.length-1?'عرض النتيجة':'التالي';
  updateScorePanel();
}
$('prevBtn').onclick=()=>{if(current>0){current--;render()}};
$('nextBtn').onclick=()=>{
  const qi=selected[current];
  if(!submitted[qi]){if(answers[qi]===undefined){alert('اختر إجابة أولًا');return}submitted[qi]=true;render();return}
  if(current<selected.length-1){current++;render()}else finish();
};
function finish(){
  const correct=selected.filter(i=>answers[i]===bank[i].a).length;
  const s30=Math.round(correct/selected.length*30);
  const pct=Math.round(correct/selected.length*100);
  const meta=chapterMeta.find(c=>c.id===selectedChapter);
  $('resultScore').textContent=`${s30} / 30`;
  $('resultGrade').textContent=gradeFrom30(s30);
  $('resultText').textContent=`أحسنت يا ${studentName}، أجبت إجابة صحيحة عن ${correct} من ${selected.length} سؤالًا (${pct}%) في ${meta?.name||'الاختبار'}.`;
  show('result');
}
$('reviewBtn').onclick=()=>{
  const list=$('reviewList');list.innerHTML='';
  selected.forEach((qi,n)=>{
    const q=bank[qi],ok=answers[qi]===q.a,d=document.createElement('div');d.className='review-item';
    d.innerHTML=`<strong>${n+1}. ${q.q}</strong><p>إجابتك: ${answers[qi]===undefined?'لم تجب':letters[answers[qi]]+') '+q.o[answers[qi]]}</p><p>الإجابة الصحيحة: ${letters[q.a]}) ${q.o[q.a]}</p><p>${q.e}</p><span class="small">الصفحة: ${q.page} — ${ok?'صحيحة':'غير صحيحة'}</span>`;
    list.appendChild(d);
  });
  show('review');
};
$('restartBtn').onclick=()=>show('home');
$('backResultBtn').onclick=()=>show('result');
</script>
