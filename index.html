<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KSU 101 Quiz — 500 سؤال</title>
<style>
:root{
  --navy:#062f52;--blue:#0b68d8;--bg:#f4f7fb;--card:#fff;--line:#dbe5ef;
  --text:#10253b;--muted:#66788a;--green:#1b9a52;--red:#d53434;--amber:#f0a000;
}
*{box-sizing:border-box}
body{margin:0;font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text)}
button,input,select{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}

.topbar{background:linear-gradient(135deg,#052d4e,#074b7d);color:#fff;padding:22px 28px}
.topbar-inner{max-width:1500px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:20px}
.brand h1{margin:0;font-size:34px;letter-spacing:.5px}
.brand p{margin:5px 0 0;opacity:.9}
.top-actions{display:flex;gap:12px}
.ghost{border:1px solid #ffffff66;background:#ffffff0d;color:#fff;border-radius:14px;padding:11px 15px}

.chapter-strip{background:#fff;border-bottom:1px solid var(--line);padding:14px 18px}
.chapters{max-width:1500px;margin:auto;display:grid;grid-template-columns:repeat(9,minmax(130px,1fr));gap:8px}
.chapter-btn{border:0;border-radius:13px;padding:14px 10px;color:#fff;font-weight:700;min-height:74px;position:relative;box-shadow:0 4px 12px #00000013;transition:.2s}
.chapter-btn:hover{transform:translateY(-2px)}
.chapter-btn.active::after{content:"";position:absolute;right:8px;left:8px;bottom:-8px;height:4px;border-radius:4px;background:#1c75ff}
.chapter-btn[data-chapter="1"]{background:linear-gradient(135deg,#0b68d8,#105ab6)}
.chapter-btn[data-chapter="2"]{background:linear-gradient(135deg,#2ea44f,#23893f)}
.chapter-btn[data-chapter="3"]{background:linear-gradient(135deg,#9a45c6,#7d34aa)}
.chapter-btn[data-chapter="4"]{background:linear-gradient(135deg,#ff8c00,#e87900)}
.chapter-btn[data-chapter="5"]{background:linear-gradient(135deg,#ef4f78,#d73d65)}
.chapter-btn[data-chapter="6"]{background:linear-gradient(135deg,#0cb1b2,#099395)}
.chapter-btn[data-chapter="7"]{background:linear-gradient(135deg,#b17a38,#91602a)}
.chapter-btn[data-chapter="8"]{background:linear-gradient(135deg,#6a42b6,#54339a)}
.chapter-btn[data-chapter="all"]{background:linear-gradient(135deg,#1d2944,#11192e)}
.chapter-title{font-size:16px}
.chapter-count{display:block;font-size:12px;margin-top:6px;opacity:.92}

.page{max-width:1500px;margin:22px auto;padding:0 18px}
.setup-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 8px 22px #1234560c}
.setup-grid{display:grid;grid-template-columns:2fr .8fr .8fr .9fr;gap:16px;align-items:end}
.field label{display:block;font-weight:700;margin-bottom:7px}
.field input,.field select{width:100%;border:1px solid #cbd8e4;border-radius:12px;padding:13px 14px;background:#fff}
.start-btn{width:100%;border:0;border-radius:12px;padding:14px 18px;background:linear-gradient(135deg,#1174e7,#075fc8);color:#fff;font-weight:800}
.note{margin-top:12px;color:var(--muted);font-size:13px}

.quiz-layout{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:16px;margin-top:16px}
.question-card,.side-card,.result-card,.review-card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 22px #1234560b}
.question-card{padding:22px}
.qhead{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:18px}
.qcounter{color:#0a63cc;font-weight:800}
.point-badge{background:#eaf3ff;color:#0b68d8;padding:8px 12px;border-radius:999px;font-size:13px}
.question{font-size:22px;line-height:1.8;margin:8px 0 20px}
.options{display:grid;gap:11px}
.option{display:flex;align-items:flex-start;gap:12px;width:100%;text-align:right;background:#fff;border:1px solid #d6e1ec;border-radius:12px;padding:14px}
.option:hover{border-color:#6aa9ef;background:#f8fbff}
.option.selected{border:2px solid #1473e6;background:#f2f8ff}
.option.correct{border-color:#28a85d;background:#ecf9f1}
.option.wrong{border-color:#df5656;background:#fff3f3}
.radio{min-width:23px;height:23px;border:2px solid #9db0c0;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-top:1px}
.option.selected .radio::after{content:"";width:11px;height:11px;border-radius:50%;background:#1473e6}
.feedback{margin-top:16px;border-radius:12px;padding:15px;line-height:1.8}
.feedback.good{background:#ebf8ef;border-right:5px solid var(--green)}
.feedback.bad{background:#fff0f0;border-right:5px solid var(--red)}
.qnav{display:flex;justify-content:space-between;gap:12px;margin-top:20px}
.nav-btn{border:1px solid #b9d5f6;background:#f5f9ff;color:#0c63cb;border-radius:11px;padding:12px 20px;font-weight:700}
.nav-btn.primary{background:#0c68d7;color:#fff;border-color:#0c68d7}

.side{display:grid;gap:14px}
.side-card{padding:18px}
.side-card h3{margin:0 0 12px;font-size:17px}
.standard-score{text-align:center;font-size:27px;color:#0c68d7;font-weight:800;border-bottom:1px solid var(--line);padding-bottom:12px}
.score-circle{width:120px;height:120px;border-radius:50%;margin:16px auto;background:conic-gradient(var(--green) 0deg,#e5ebf0 0deg);display:grid;place-items:center;position:relative}
.score-circle::before{content:"";width:88px;height:88px;border-radius:50%;background:#fff;position:absolute}
.score-circle span{position:relative;font-size:26px;font-weight:800}
.current-score{text-align:center;font-size:24px;font-weight:800;color:var(--green)}
.progress{height:9px;background:#e5ebf0;border-radius:999px;overflow:hidden;margin:14px 0}
.progress div{height:100%;background:var(--green);width:0}
.meta-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed #e0e7ee}
.meta-row:last-child{border-bottom:0}
.scale-row{display:flex;justify-content:space-between;border-radius:8px;padding:8px 10px;margin-top:7px;font-size:13px}
.scale-row.excellent{background:#e8f7ed;color:#16753b}
.scale-row.verygood{background:#eaf3ff;color:#0b65c5}
.scale-row.good{background:#fff4cf;color:#9a6b00}
.scale-row.review{background:#ffe7e7;color:#b62525}

.result-card,.review-card{padding:26px;max-width:900px;margin:16px auto}
.result-score{font-size:58px;font-weight:900;text-align:center;color:#0c68d7}
.result-grade{text-align:center;font-size:24px;font-weight:800;margin:8px 0}
.result-actions{display:flex;gap:12px;justify-content:center;margin-top:20px}
.review-item{padding:18px 0;border-top:1px solid var(--line)}
.review-item:first-child{border-top:0}
.small{color:var(--muted);font-size:13px}
footer{text-align:center;color:#6b7c8f;padding:24px}

@media(max-width:1100px){
  .chapters{grid-template-columns:repeat(3,1fr)}
  .setup-grid{grid-template-columns:1fr 1fr}
  .quiz-layout{grid-template-columns:1fr}
  .side{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:700px){
  .topbar-inner{align-items:flex-start}
  .brand h1{font-size:28px}
  .chapters{grid-template-columns:repeat(2,1fr)}
  .setup-grid{grid-template-columns:1fr}
  .side{grid-template-columns:1fr}
  .question{font-size:19px}
  .qhead{align-items:flex-start;flex-direction:column}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand"><h1>KSU 101</h1><p>بنك أسئلة المذكرة المعرفية</p></div>
    <div class="top-actions"><button class="ghost" type="button">إحصائياتي</button><button class="ghost" type="button">☾</button></div>
  </div>
</header>

<nav class="chapter-strip"><div id="chapterButtons" class="chapters"></div></nav>

<main class="page">
<section id="home">
  <div class="setup-card">
    <div class="setup-grid">
      <div class="field"><label for="studentName">الاسم <span style="color:#0b68d8">(إجباري)</span></label><input id="studentName" placeholder="اكتب اسمك" maxlength="60"></div>
      <div class="field"><label for="questionCount">عدد الأسئلة</label><select id="questionCount"></select></div>
      <div class="field"><label for="orderMode">ترتيب الأسئلة</label><select id="orderMode"><option value="random">عشوائي</option><option value="ordered">بالترتيب</option></select></div>
      <button id="startBtn" class="start-btn">▶ ابدأ الاختبار</button>
    </div>
    <div id="chapterNote" class="note"></div>
  </div>
</section>

<section id="quiz" class="hidden">
  <div class="quiz-layout">
    <div class="question-card">
      <div class="qhead"><div id="counter" class="qcounter"></div><div class="point-badge">درجة السؤال: <strong id="questionPoint">1</strong></div></div>
      <div id="qid" class="small"></div>
      <h2 id="questionText" class="question"></h2>
      <div id="options" class="options"></div>
      <div id="feedback" class="feedback hidden"></div>
      <div class="qnav"><button id="prevBtn" class="nav-btn">السابق</button><button id="nextBtn" class="nav-btn primary">التالي</button></div>
    </div>
    <aside class="side">
      <div class="side-card">
        <h3>🏆 درجة المعيار</h3>
        <div class="standard-score">30 درجة</div>
        <div id="scoreCircle" class="score-circle"><span id="circlePct">0%</span></div>
        <div id="currentScore" class="current-score">0 / 30</div>
        <div class="progress"><div id="scoreBar"></div></div>
        <div id="remainingText" class="small" style="text-align:center"></div>
      </div>
      <div class="side-card">
        <div class="meta-row"><span>الباب الحالي</span><strong id="currentChapter"></strong></div>
        <div class="meta-row"><span>السؤال الحالي</span><strong id="currentQuestionMeta"></strong></div>
        <div class="meta-row"><span>تمت الإجابة</span><strong id="answeredMeta">0</strong></div>
      </div>
      <div class="side-card">
        <h3>مقياس التقدير (من 30)</h3>
        <div class="scale-row excellent"><span>27–30</span><strong>ممتاز</strong></div>
        <div class="scale-row verygood"><span>24–26</span><strong>جيد جدًا</strong></div>
        <div class="scale-row good"><span>21–23</span><strong>جيد</strong></div>
        <div class="scale-row review"><span>أقل من 21</span><strong>يحتاج مراجعة</strong></div>
      </div>
    </aside>
  </div>
</section>

<section id="result" class="result-card hidden">
  <h2 style="text-align:center">نتيجة الاختبار</h2>
  <div id="resultScore" class="result-score"></div>
  <div id="resultGrade" class="result-grade"></div>
  <p id="resultText" style="text-align:center"></p>
  <div class="result-actions"><button id="reviewBtn" class="nav-btn">مراجعة الإجابات</button><button id="restartBtn" class="nav-btn primary">اختبار جديد</button></div>
</section>

<section id="review" class="review-card hidden">
  <h2>مراجعة الإجابات</h2>
  <div id="reviewList"></div>
  <button id="backResultBtn" class="nav-btn primary">العودة للنتيجة</button>
</section>
</main>

<footer>جميع الحقوق محفوظة © جامعة الملك سعود — KSU 101 Quiz</footer>

كادية، وغب هم من القيادات الأكادية في الجامعة؛","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «المادة ال عاشرة المادة الحادية عشرة تُرفع قرارات تعيي كل من : أعضاء المجلس، ورئيس الجامعة ونوابه، وعمداء الكليات والمعاهد، ورؤساء الأقسام ونوابهم أو وكلائهم، ورؤساء المجالس العلمية والأكادية، وغب هم من القيادات الأكادية في الجامعة؛»"},{"chapter":1,"id":"KSU-004","page":"16","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":[".1 يكون للجامعة مجالس علمية وأكادية يصدر بتسمية أعضاء ورئيس كل منها وتحديد مهماتها و آلية عملها قرار من المجلس، وتكون مستقلة في أداء مهماتها من الناحية الفنية ( العلمية والأكادية ) ، ولها - عند الاقتضاء - تشكيل لجان فرعية .",".3 يكون للجامعة مجالس علمية وأكادية يصدر بتسمية أعضاء ورئيس كل منها وتحديد مهماتها و آلية عملها قرار من المجلس، وتكون مستقلة في أداء مهماتها من الناحية الفنية ( العلمية والأكادية ) ، ولها - عند الاقتضاء - تشكيل لجان فرعية .",".2 يكون للجامعة مجالس علمية وأكادية يصدر بتسمية أعضاء ورئيس كل منها وتحديد مهماتها و آلية عملها قرار من المجلس، وتكون مستقلة في أداء مهماتها من الناحية الفنية ( العلمية والأكادية ) ، ولها - عند الاقتضاء - تشكيل لجان فرعية .",".6 يكون للجامعة مجالس علمية وأكادية يصدر بتسمية أعضاء ورئيس كل منها وتحديد مهماتها و آلية عملها قرار من المجلس، وتكون مستقلة في أداء مهماتها من الناحية الفنية ( العلمية والأكادية ) ، ولها - عند الاقتضاء - تشكيل لجان فرعية ."],"a":0,"e":"ورد في المذكرة: «.1 يكون للجامعة مجالس علمية وأكادية يصدر بتسمية أعضاء ورئيس كل منها وتحديد مهماتها و آلية عملها قرار من المجلس، وتكون مستقلة في أداء مهماتها من الناحية الفنية ( العلمية والأكادية ) ، ولها - عند الاقتضاء - تشكيل لجان فرعية .»"},{"chapter":1,"id":"KSU-005","page":"20","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","للجامعة إبرام العقود والاتفاقيات - داخل المملكة وخارجها - بغب اللغة العربية بخلاف ما تقتضيه حاجة العمل ومصلحة الجامعة، وتخضع عقود الجامعة واتفاقاتها لأنظمة المملكة وقضائها، إلا ما تقتض ي مصلحة الجامعة إخضاعه منها لقواني أجنبية أو اختصاص محاكم أجنبية أو للتحك، وذل ك في ضوء ما تحدده القواعد والسياسات المعتمدة .","للجامعة إبرام العقود والاتفاقيات - داخل المملكة وخارجها - بغب اللغة العربية وفق ما تقتضيه حاجة العمل ومصلحة الجامعة، وتخضع عقود الجامعة واتفاقاتها لأنظمة المملكة وقضائها، إلا ما تقتض ي مصلحة الجامعة إخضاعه منها لقواني أجنبية أو اختصاص محاكم أجنبية أو للتحك، وذل ك في ضوء ما تحدده القواعد والسياسات المعتمدة .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":2,"e":"ورد في المذكرة: «للجامعة إبرام العقود والاتفاقيات - داخل المملكة وخارجها - بغب اللغة العربية وفق ما تقتضيه حاجة العمل ومصلحة الجامعة، وتخضع عقود الجامعة واتفاقاتها لأنظمة المملكة وقضائها، إلا ما تقتض ي مصلحة الجامعة إخضاعه منها لقواني أجنبية أو اختصاص محاكم أجنبية أو للتحك، وذل ك في ضوء ما تحدده القواعد والسياسات المعتمدة .»"},{"chapter":1,"id":"KSU-006","page":"10","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا تخضع الجامعة لأي من الأنظمة أو اللوائح النري تشي على المؤسسات الأهلية، ولا تخضع هي ولا أعضاء هيئات التدريس فيها لأي من الأنظمة أو اللوائح أو التعلات النري تشي على الجامعات وهي ئات التدريس الأخرى داخل المملكة؛","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «لا تخضع الجامعة لأي من الأنظمة أو اللوائح النري تشي على المؤسسات الأهلية، ولا تخضع هي ولا أعضاء هيئات التدريس فيها لأي من الأنظمة أو اللوائح أو التعلات النري تشي على الجامعات وهي ئات التدريس الأخرى داخل المملكة؛»"},{"chapter":1,"id":"KSU-007","page":"19","q":"أكمل العبارة الصحيحة وفق المذكرة: «المادة الثامنة عشرة ____ يتول تدقيق حسابات الجامعة وسجلاتها المالية مراجع حسابات مرخص ( أو أكبر ) ، يعينه مجلس إدارة الهيئة سنويًّا، وتجوز إعادة تعيينه، ويقدم مراجع الحسابات تقريره إل لجنة المراجعة والالبر ام .»","o":["6","2","3","1"],"a":3,"e":"ورد في المذكرة: «المادة الثامنة عشرة 1 يتول تدقيق حسابات الجامعة وسجلاتها المالية مراجع حسابات مرخص ( أو أكبر ) ، يعينه مجلس إدارة الهيئة سنويًّا، وتجوز إعادة تعيينه، ويقدم مراجع الحسابات تقريره إل لجنة المراجعة والالبر ام .»"},{"chapter":1,"id":"KSU-008","page":"10","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":[".1 دون إخلال بالمادة ( الثالثة ) من النظام، تتمتع الجامعة بالأهلية والحرية الكاملة في اتخاذ جميع م ا يلزم لتحقيق أهدافها وإدارة شؤونها وفروعها وكلياتها ومعاهدها ومراكزها وأقسامها وبرامجها ومرافقها كافة؛",".2 دون إخلال بالمادة ( الثالثة ) من النظام، تتمتع الجامعة بالأهلية والحرية الكاملة في اتخاذ جميع م ا يلزم لتحقيق أهدافها وإدارة شؤونها وفروعها وكلياتها ومعاهدها ومراكزها وأقسامها وبرامجها ومرافقها كافة؛",".3 دون إخلال بالمادة ( الثالثة ) من النظام، تتمتع الجامعة بالأهلية والحرية الكاملة في اتخاذ جميع م ا يلزم لتحقيق أهدافها وإدارة شؤونها وفروعها وكلياتها ومعاهدها ومراكزها وأقسامها وبرامجها ومرافقها كافة؛",".6 دون إخلال بالمادة ( الثالثة ) من النظام، تتمتع الجامعة بالأهلية والحرية الكاملة في اتخاذ جميع م ا يلزم لتحقيق أهدافها وإدارة شؤونها وفروعها وكلياتها ومعاهدها ومراكزها وأقسامها وبرامجها ومرافقها كافة؛"],"a":0,"e":"ورد في المذكرة: «.1 دون إخلال بالمادة ( الثالثة ) من النظام، تتمتع الجامعة بالأهلية والحرية الكاملة في اتخاذ جميع م ا يلزم لتحقيق أهدافها وإدارة شؤونها وفروعها وكلياتها ومعاهدها ومراكزها وأقسامها وبرامجها ومرافقها كافة؛»"},{"chapter":1,"id":"KSU-009","page":"9","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","اعتماد ضوابط تأسيس الجامعة للشركات وغب ها من المنشآت ذات الأغراض الخاصة أو المساهمة فيها، وإنشاء صناديق الاستثمار ونحوها أو المساهمة فيها بما لا يتعارض مع الإجراءات والنصوص النظامية المتبعة .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «اعتماد ضوابط تأسيس الجامعة للشركات وغب ها من المنشآت ذات الأغراض الخاصة أو المساهمة فيها، وإنشاء صناديق الاستثمار ونحوها أو المساهمة فيها بما لا يتعارض مع الإجراءات والنصوص النظامية المتبعة .»"},{"chapter":1,"id":"KSU-010","page":"9","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","اعتماد السياسات المنظمة للموافقة على طلبات الدعم المالي للجامعة وآلية تحفب ه، ولقبول الجامعة للهبات والإعانات والمنح والوصايا والتبرعات والأوقاف والمساهمات الأخرى من داخل المملكة أو خارجها .","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «اعتماد السياسات المنظمة للموافقة على طلبات الدعم المالي للجامعة وآلية تحفب ه، ولقبول الجامعة للهبات والإعانات والمنح والوصايا والتبرعات والأوقاف والمساهمات الأخرى من داخل المملكة أو خارجها .»"},{"chapter":1,"id":"KSU-011","page":"14","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["وللمجلس - بحسب ما يقدره - تشكيل لجان دائمة أو مؤقتة من بي أعضائه أو من غب هم، يعهد إليها ما يراه من مهمات، ويسم في قرار تشكيل كل لجنة رئيسها وأعضاؤها، وتحدد فيه مهماتهم ومكافآتهم بخلافاً لسياسة المكافآت المعتمدة، ولكل لجنة الاستعانة بمن تراه لتأدية المهمات الموكولة إليها .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","وللمجلس - بحسب ما يقدره - تشكيل لجان دائمة أو مؤقتة من بي أعضائه أو من غب هم، يعهد إليها ما يراه من مهمات، ويسم في قرار تشكيل كل لجنة رئيسها وأعضاؤها، وتحدد فيه مهماتهم ومكافآتهم وفقاً لسياسة المكافآت المعتمدة، ولكل لجنة الاستعانة بمن تراه لتأدية المهمات الموكولة إليها .","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «وللمجلس - بحسب ما يقدره - تشكيل لجان دائمة أو مؤقتة من بي أعضائه أو من غب هم، يعهد إليها ما يراه من مهمات، ويسم في قرار تشكيل كل لجنة رئيسها وأعضاؤها، وتحدد فيه مهماتهم ومكافآتهم وفقاً لسياسة المكافآت المعتمدة، ولكل لجنة الاستعانة بمن تراه لتأدية المهمات الموكولة إليها .»"},{"chapter":1,"id":"KSU-012","page":"19","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","ع مراجع الحسابات ممارسة أعماله ومهماته بخلافًا للمعايب والسياسات المحاسبية المعتمدة، والتحقق من مطابقة الموازنة والحسابات الختامية للسجلات المالية والمحاسبية، وما إذا كان مس ك هذه السجلات دقيقًا ومتفقًا مع القواعد المحاسبية السلة .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","ع مراجع الحسابات ممارسة أعماله ومهماته وفقًا للمعايب والسياسات المحاسبية المعتمدة، والتحقق من مطابقة الموازنة والحسابات الختامية للسجلات المالية والمحاسبية، وما إذا كان مس ك هذه السجلات دقيقًا ومتفقًا مع القواعد المحاسبية السلة ."],"a":3,"e":"ورد في المذكرة: «ع مراجع الحسابات ممارسة أعماله ومهماته وفقًا للمعايب والسياسات المحاسبية المعتمدة، والتحقق من مطابقة الموازنة والحسابات الختامية للسجلات المالية والمحاسبية، وما إذا كان مس ك هذه السجلات دقيقًا ومتفقًا مع القواعد المحاسبية السلة .»"},{"chapter":1,"id":"KSU-013","page":"10","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","تلبر م الجامعة بتحقيق معايب الاعتماد الأكادي وفقًا لأفضل المعايب والممارسات المعمول ب ها في هذا المجال لدى هيئة تقو التعل والتدريب في المملكة، ولدى هيئات ومؤسسات الاعتماد الأكادي الدولية .","تلبر م الجامعة بتحقيق معايب الاعتماد الأكادي بخلافًا لأفضل المعايب والممارسات المعمول ب ها في هذا المجال لدى هيئة تقو التعل والتدريب في المملكة، ولدى هيئات ومؤسسات الاعتماد الأكادي الدولية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «تلبر م الجامعة بتحقيق معايب الاعتماد الأكادي وفقًا لأفضل المعايب والممارسات المعمول ب ها في هذا المجال لدى هيئة تقو التعل والتدريب في المملكة، ولدى هيئات ومؤسسات الاعتماد الأكادي الدولية .»"},{"chapter":1,"id":"KSU-014","page":"14","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","وضع ضوابط ترشيح ممثلىي الجامعة وتعيينهم في مجالس إدارة الشركات والكيانات الأخرى النري تمتلكها الجامعة أو تساهم فيها، وتحديد حقوقهم وواجباتهم تجاه الجامعة، ورفعها إل مجلس إدارة الجامعة؛","وضع ضوابط ترشيح ممثلىي الجامعة وتعيينهم في مجالس إدارة الشركات والكيانات الأخرى النري تمتلكها الجامعة أو تساهم فيها، وتحديد حقوقهم وواجباتهم تجاه الجامعة، ورفعها إل مجلس إدارة الهيئة؛","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «وضع ضوابط ترشيح ممثلىي الجامعة وتعيينهم في مجالس إدارة الشركات والكيانات الأخرى النري تمتلكها الجامعة أو تساهم فيها، وتحديد حقوقهم وواجباتهم تجاه الجامعة، ورفعها إل مجلس إدارة الهيئة؛»"},{"chapter":1,"id":"KSU-015","page":"15","q":"ما المقصود بـ «يعي بقرار من المجلس أمي له، يتول» وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","إعداد جدول أعمال المجلس، وتوجيه الدعوة إل الأعضاء وأمانة ش اجتماعات المجلس، وإعداد المحاض والقرارات وتسجيلها في السجل الخاص بذلك، وأي مهمات أخرى يحددها المجلس .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":1,"e":"ورد في المذكرة: «يعي بقرار من المجلس أمي له، يتول : إعداد جدول أعمال المجلس، وتوجيه الدعوة إل الأعضاء وأمانة ش اجتماعات المجلس، وإعداد المحاض والقرارات وتسجيلها في السجل الخاص بذلك، وأي مهمات أخرى يحددها المجلس .»"},{"chapter":1,"id":"KSU-016","page":"20","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":[".3 تمسك الجامعة السجلات والدفاتر الإدارية والمحاسبية النري تحتاجها وفقاً للمعايب والسياسات المحاسبية المعتمدة، ويكون التسجيل والقيد فيها أولاً بأول، وتحفظ في مقر الجامعة الرئيس .",".1 تمسك الجامعة السجلات والدفاتر الإدارية والمحاسبية النري تحتاجها وفقاً للمعايب والسياسات المحاسبية المعتمدة، ويكون التسجيل والقيد فيها أولاً بأول، وتحفظ في مقر الجامعة الرئيس .",".2 تمسك الجامعة السجلات والدفاتر الإدارية والمحاسبية النري تحتاجها وفقاً للمعايب والسياسات المحاسبية المعتمدة، ويكون التسجيل والقيد فيها أولاً بأول، وتحفظ في مقر الجامعة الرئيس .",".6 تمسك الجامعة السجلات والدفاتر الإدارية والمحاسبية النري تحتاجها وفقاً للمعايب والسياسات المحاسبية المعتمدة، ويكون التسجيل والقيد فيها أولاً بأول، وتحفظ في مقر الجامعة الرئيس ."],"a":1,"e":"ورد في المذكرة: «.1 تمسك الجامعة السجلات والدفاتر الإدارية والمحاسبية النري تحتاجها وفقاً للمعايب والسياسات المحاسبية المعتمدة، ويكون التسجيل والقيد فيها أولاً بأول، وتحفظ في مقر الجامعة الرئيس .»"},{"chapter":1,"id":"KSU-017","page":"8","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","لا تتمتع الجامعة - بناءً على النظام - بالشخصية الاعتبارية والذمة المالية المستقلة - باعتب ارها مؤسسة أكادية مستقلة غب هادفة للرب ح - بما في ذلك الاستقلال المالي والإداري والأكادي .","تتمتع الجامعة - بناءً على النظام - بالشخصية الاعتبارية والذمة المالية المستقلة - باعتب ارها مؤسسة أكادية مستقلة غب هادفة للرب ح - بما في ذلك الاستقلال المالي والإداري والأكادي ."],"a":3,"e":"ورد في المذكرة: «تتمتع الجامعة - بناءً على النظام - بالشخصية الاعتبارية والذمة المالية المستقلة - باعتب ارها مؤسسة أكادية مستقلة غب هادفة للرب ح - بما في ذلك الاستقلال المالي والإداري والأكادي .»"},{"chapter":1,"id":"KSU-018","page":"10","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","تمنح الجامعة شهادتها في مستويات التعل العالي بمختلف درجاتها، ودرجات الزمالة وما بعد الدكتوراه، وبرامج التعل المستمر، والتعل عن بعد، والتعل المدمج، وتمنح كذلك الشهاد ات الفخرية؛","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «تمنح الجامعة شهادتها في مستويات التعل العالي بمختلف درجاتها، ودرجات الزمالة وما بعد الدكتوراه، وبرامج التعل المستمر، والتعل عن بعد، والتعل المدمج، وتمنح كذلك الشهاد ات الفخرية؛»"},{"chapter":1,"id":"KSU-019","page":"16","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["المادة ال تاسعة رئيس الجامعة هو كبب الإداريي التنفيذيفييها، ويعَد المسؤول عن إدارة شؤون الجامعة، وترتكز مسؤولياته في حدود النظام، وما يحدده له مجلس إدارة الجامعة من صلاحيات .","المادة ال تاسعة مجلس إدارة الهيئة هو كبب الإداريي التنفيذيفييها، ويعَد المسؤول عن إدارة شؤون الجامعة، وترتكز مسؤولياته في حدود النظام، وما يحدده له مجلس إدارة الهيئة من صلاحيات .","المادة ال تاسعة رئيس الجامعة هو كبب الإداريي التنفيذيفييها، ويعَد المسؤول عن إدارة شؤون الجامعة، وترتكز مسؤولياته في حدود النظام، وما يحدده له مجلس إدارة الهيئة من صلاحيات .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «المادة ال تاسعة رئيس الجامعة هو كبب الإداريي التنفيذيفييها، ويعَد المسؤول عن إدارة شؤون الجامعة، وترتكز مسؤولياته في حدود النظام، وما يحدده له مجلس إدارة الهيئة من صلاحيات .»"},{"chapter":1,"id":"KSU-020","page":"13","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["إعداد السياسات المنظمة للموافقة على طلبات الدعم المالي وآلية تحفب ه، ولقبول الهبات والإع انات والمنح والوصايا والتبرعات والأوقاف والمساهمات الأخرى من داخل المملكة أو خارجها، ورفعها إل مجلس إدارة الهيئة؛","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","إعداد السياسات المنظمة للموافقة على طلبات الدعم المالي وآلية تحفب ه، ولقبول الهبات والإع انات والمنح والوصايا والتبرعات والأوقاف والمساهمات الأخرى من داخل المملكة أو خارجها، ورفعها إل مجلس إدارة الجامعة؛"],"a":0,"e":"ورد في المذكرة: «إعداد السياسات المنظمة للموافقة على طلبات الدعم المالي وآلية تحفب ه، ولقبول الهبات والإع انات والمنح والوصايا والتبرعات والأوقاف والمساهمات الأخرى من داخل المملكة أو خارجها، ورفعها إل مجلس إدارة الهيئة؛»"},{"chapter":1,"id":"KSU-021","page":"13","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["وضع اسبراتيجية الجامعة للاستثمار وسياساته وإجراءاته، بما في ذلك تحديد العوائد المستهدف ة وآلية اتخاذ قرار الاستثمار ومتابعة أدائه والتخارج منه، ورفعها إل مجلس إدارة الجامعة؛","وضع اسبراتيجية الجامعة للاستثمار وسياساته وإجراءاته، بما في ذلك تحديد العوائد المستهدف ة وآلية اتخاذ قرار الاستثمار ومتابعة أدائه والتخارج منه، ورفعها إل مجلس إدارة الهيئة؛","وضع اسبراتيجية الجامعة للاستثمار وسياساته وإجراءاته، بما في ذلك تحديد العوائد المسلا تهدف ة وآلية اتخاذ قرار الاستثمار ومتابعة أدائه والتخارج منه، ورفعها إل مجلس إدارة الهيئة؛","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «وضع اسبراتيجية الجامعة للاستثمار وسياساته وإجراءاته، بما في ذلك تحديد العوائد المستهدف ة وآلية اتخاذ قرار الاستثمار ومتابعة أدائه والتخارج منه، ورفعها إل مجلس إدارة الهيئة؛»"},{"chapter":1,"id":"KSU-022","page":"17","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["للجامعة - وفقًا لما يقره المجلس - القيام بما ي يأتر : 3 أن تتقاض رسومًا مقابل ما تقدمه من برامج دراسية وتدريبية وتأهيلية وما في حكمها، أو غب ها م ن برامج .","للجامعة - وفقًا لما يقره المجلس - القيام بما ي يأتر : 6 أن تتقاض رسومًا مقابل ما تقدمه من برامج دراسية وتدريبية وتأهيلية وما في حكمها، أو غب ها م ن برامج .","للجامعة - وفقًا لما يقره المجلس - القيام بما ي يأتر : 2 أن تتقاض رسومًا مقابل ما تقدمه من برامج دراسية وتدريبية وتأهيلية وما في حكمها، أو غب ها م ن برامج .","للجامعة - وفقًا لما يقره المجلس - القيام بما ي يأتر : 1 أن تتقاض رسومًا مقابل ما تقدمه من برامج دراسية وتدريبية وتأهيلية وما في حكمها، أو غب ها م ن برامج ."],"a":3,"e":"ورد في المذكرة: «للجامعة - وفقًا لما يقره المجلس - القيام بما ي يأتر : 1 أن تتقاض رسومًا مقابل ما تقدمه من برامج دراسية وتدريبية وتأهيلية وما في حكمها، أو غب ها م ن برامج .»"},{"chapter":1,"id":"KSU-023","page":"20","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لعرضها على مجلس إدارة الهيئة، ولمجلس إدارة الهي ئة - خلال تلك المدة - أن يوجه المجلس بإجراء أي تعديل على تلك الاسبراتيجيات والسياسات والمعانيي ر والضوابط والإجراءات والنظم وفق ما يراه مناسبًا .","يُطبق ذلك على التعليم العام فقط.","لعرضها على مجلس إدارة الجامعة، ولمجلس إدارة الهي ئة - خلال تلك المدة - أن يوجه المجلس بإجراء أي تعديل على تلك الاسبراتيجيات والسياسات والمعانيي ر والضوابط والإجراءات والنظم وفق ما يراه مناسبًا .","لعرضها على مجلس إدارة الهيئة، ولمجلس إدارة الهي ئة - خلال تلك المدة - أن يوجه المجلس بإجراء أي تعديل على تلك الاسبراتيجيات والسياسات والمعانيي ر والضوابط والإجراءات والنظم بخلاف ما يراه مناسبًا ."],"a":0,"e":"ورد في المذكرة: «لعرضها على مجلس إدارة الهيئة، ولمجلس إدارة الهي ئة - خلال تلك المدة - أن يوجه المجلس بإجراء أي تعديل على تلك الاسبراتيجيات والسياسات والمعانيي ر والضوابط والإجراءات والنظم وفق ما يراه مناسبًا .»"},{"chapter":1,"id":"KSU-024","page":"9","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","اعتماد ضوابط ترشيح ممثلىي الجامعة وتعيينهم في مجالس إدارة الشركات والكيانات الأخرى النري تمتلكها الجامعة أو تساهم فيها، وتحديد حقوقهم وواجباتهم تجاه الجامعة .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «اعتماد ضوابط ترشيح ممثلىي الجامعة وتعيينهم في مجالس إدارة الشركات والكيانات الأخرى النري تمتلكها الجامعة أو تساهم فيها، وتحديد حقوقهم وواجباتهم تجاه الجامعة .»"},{"chapter":1,"id":"KSU-025","page":"11","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["ه - إبرام الاتفاقيات ومذكرات التفاهم والتعاون والبروتوكولات والعقود، وتبادل الخبرات مع الجامعات والمؤسسات الأكادية الأخرى والهيئات المحلية والإقلية والدولية ذات الصلة بأعمالها ومهماته ا؛","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":0,"e":"ورد في المذكرة: «ه - إبرام الاتفاقيات ومذكرات التفاهم والتعاون والبروتوكولات والعقود، وتبادل الخبرات مع الجامعات والمؤسسات الأكادية الأخرى والهيئات المحلية والإقلية والدولية ذات الصلة بأعمالها ومهماته ا؛»"},{"chapter":1,"id":"KSU-026","page":"11","q":"ما المقصود بـ «ب - تملك الأصول، والتصرف بها واستثمارها، ويشمل ذلك» وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","العقارات، والحقوق العينية والفكرية، والحص ص، والأوراق المالية، والعملات الأجنبية، والسلع، والمشتقات المالية بأنواعها؛","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «ب - تملك الأصول، والتصرف بها واستثمارها، ويشمل ذلك : العقارات، والحقوق العينية والفكرية، والحص ص، والأوراق المالية، والعملات الأجنبية، والسلع، والمشتقات المالية بأنواعها؛»"},{"chapter":1,"id":"KSU-027","page":"9","q":"ما المقصود بـ «وفقاً لأحكام النظام، وله بوجه خاص ما ي يأتر» وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","اعتماد السياسات المتعلقة بأنشطة الجامعة واسبراتيجياتها، والخطط والبرامج اللازمة لتنفيذ ها ."],"a":3,"e":"ورد في المذكرة: «وفقاً لأحكام النظام، وله بوجه خاص ما ي يأتر : 1 اعتماد السياسات المتعلقة بأنشطة الجامعة واسبراتيجياتها، والخطط والبرامج اللازمة لتنفيذ ها .»"},{"chapter":1,"id":"KSU-028","page":"13","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","الموافقة على تأسيس الشركات وغب ها من المنشآت ذات الأغراض الخاصة أو المساهمة فيها، وإنشاء صناديق الاستثمار ونحوها أو المساهمة فيها، وتحديد صلاحيتها والإشراف على إعداد وثائق تأسيس ها؛"],"a":3,"e":"ورد في المذكرة: «الموافقة على تأسيس الشركات وغب ها من المنشآت ذات الأغراض الخاصة أو المساهمة فيها، وإنشاء صناديق الاستثمار ونحوها أو المساهمة فيها، وتحديد صلاحيتها والإشراف على إعداد وثائق تأسيس ها؛»"},{"chapter":1,"id":"KSU-029","page":"11","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","ط - تأسيس وإدارة الأوقاف داخل المملكة وخارجها، وفقًا للإجراءات والنصوص النظامية المتبعة، وما يعتمده مجلس إدارة الهيئة من ضوابط في هذا الشأن بما لا يتعارض مع تلك الإجراءات والنصوص .","ط - تأسيس وإدارة الأوقاف داخل المملكة وخارجها، وفقًا للإجراءات والنصوص النظامية المتبعة، وما يعتمده مجلس إدارة الجامعة من ضوابط في هذا الشأن بما لا يتعارض مع تلك الإجراءات والنصوص .","ط - تأسيس وإدارة الأوقاف داخل المملكة وخارجها، وفقًا للإجراءات والنصوص النظامية المتبعة، وما يرفضه مجلس إدارة الهيئة من ضوابط في هذا الشأن بما لا يتعارض مع تلك الإجراءات والنصوص ."],"a":1,"e":"ورد في المذكرة: «ط - تأسيس وإدارة الأوقاف داخل المملكة وخارجها، وفقًا للإجراءات والنصوص النظامية المتبعة، وما يعتمده مجلس إدارة الهيئة من ضوابط في هذا الشأن بما لا يتعارض مع تلك الإجراءات والنصوص .»"},{"chapter":1,"id":"KSU-030","page":"12","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["إقرار اللوائح المنظمة للشؤون الأكادية والإدارية والمالية والداخلية للجامعة، وغب ها من اللوائح اللازمة لتسيب شؤونها، بناءً على اقبراح من رئيس الجامعة .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","إقرار اللوائح المنظمة للشؤون الأكادية والإدارية والمالية والداخلية للجامعة، وغب ها من اللوائح اللازمة لتسيب شؤونها، بناءً على اقبراح من مجلس إدارة الهيئة .","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «إقرار اللوائح المنظمة للشؤون الأكادية والإدارية والمالية والداخلية للجامعة، وغب ها من اللوائح اللازمة لتسيب شؤونها، بناءً على اقبراح من رئيس الجامعة .»"},{"chapter":1,"id":"KSU-031","page":"9","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","اعتماد اسبراتيجية الجامعة للاستثمار وسياساته وإجراءاته، بما في ذلك تحديد العوائد المسته دفة وآلية اتخاذ قرار الاستثمار ومتابعة أدائه والتخارج منه .","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «اعتماد اسبراتيجية الجامعة للاستثمار وسياساته وإجراءاته، بما في ذلك تحديد العوائد المسته دفة وآلية اتخاذ قرار الاستثمار ومتابعة أدائه والتخارج منه .»"},{"chapter":1,"id":"KSU-032","page":"17","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","يضع المجلس لوائح تنظم ما يتصل بإدارة الحرم الجامعىي، وكل ما يتصل بسلوك الطلاب والطالبات ومنسونري الجامعة من أعضاء هيئة التدريس وغب هم من الموظفي ؛"],"a":3,"e":"ورد في المذكرة: «يضع المجلس لوائح تنظم ما يتصل بإدارة الحرم الجامعىي، وكل ما يتصل بسلوك الطلاب والطالبات ومنسونري الجامعة من أعضاء هيئة التدريس وغب هم من الموظفي ؛»"},{"chapter":1,"id":"KSU-033","page":"15","q":"ما المقصود بـ «يضع المجلس القواعد والإجراءات المنظمة لأعماله، وتشمل» وفق المذكرة؟","o":["إجراءات الدعوة للاجتماعات، وانعقادها حضورية أو من خلال وسائل التقنية الحديثة، والأحكام الخاصة بالقرارات؛","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «يضع المجلس القواعد والإجراءات المنظمة لأعماله، وتشمل : إجراءات الدعوة للاجتماعات، وانعقادها حضورية أو من خلال وسائل التقنية الحديثة، والأحكام الخاصة بالقرارات؛»"},{"chapter":1,"id":"KSU-034","page":"8","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["تكون الجامعة ملكاً للهيئة، ويكون مقرها الرئيس في مدينة الرياض، ولها إنشاء فروع وكليات ومعاهد وأقسام ومراكز أبحاث وبرامج في غب مقرها الرئيس؛","تكون الجامعة ملكاً للهيئة، ولا يكون مقرها الرئيس في مدينة الرياض، ولها إنشاء فروع وكليات ومعاهد وأقسام ومراكز أبحاث وبرامج في غب مقرها الرئيس؛","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «تكون الجامعة ملكاً للهيئة، ويكون مقرها الرئيس في مدينة الرياض، ولها إنشاء فروع وكليات ومعاهد وأقسام ومراكز أبحاث وبرامج في غب مقرها الرئيس؛»"},{"chapter":1,"id":"KSU-035","page":"12","q":"ما المقصود بـ «.1 يكون للجامعة مجلس إدارة، يشكل على النحو الآنري» وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","أ - عدد لا يقل عن ( أربعة عشر ) عضوًا، يكون بينهم رئيس للمجلس ونائب له .","أ - عدد لا يقل عن ( أربعة عشر ) عضوًا، لا يكون بينهم رئيس للمجلس ونائب له .","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «.1 يكون للجامعة مجلس إدارة، يشكل على النحو الآنري : أ - عدد لا يقل عن ( أربعة عشر ) عضوًا، يكون بينهم رئيس للمجلس ونائب له .»"},{"chapter":1,"id":"KSU-036","page":"16","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","مع مراعاة ما قضت به المادة ( السابعة ) من النظام، يشكل المجلس - كل سنتي – اللجان الدائمة الآتية : أ - اللجنة التنفيذية ."],"a":3,"e":"ورد في المذكرة: «مع مراعاة ما قضت به المادة ( السابعة ) من النظام، يشكل المجلس - كل سنتي – اللجان الدائمة الآتية : أ - اللجنة التنفيذية .»"},{"chapter":1,"id":"KSU-037","page":"9","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","من خلال اعتماد رؤاها وخططها الاستراتيجية، وخططها وتقاريرها السنوية، وما تضعه من ضوابط ومعايتر وأطر قياس أداء ذات صلة بالتعل الأكادي العالىي، وغتر ذلك من الجوانب؛","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":1,"e":"ورد في المذكرة: «من خلال اعتماد رؤاها وخططها الاستراتيجية، وخططها وتقاريرها السنوية، وما تضعه من ضوابط ومعايتر وأطر قياس أداء ذات صلة بالتعل الأكادي العالىي، وغتر ذلك من الجوانب؛»"},{"chapter":1,"id":"KSU-038","page":"18","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["للجامعة - بعد موافقة المجلس - قبول الهبات والإعانات والمنح والوصايا والتبرعات والأوقاف، وأي مساهمة أخرى من داخل المملكة أو خارجها؛","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «للجامعة - بعد موافقة المجلس - قبول الهبات والإعانات والمنح والوصايا والتبرعات والأوقاف، وأي مساهمة أخرى من داخل المملكة أو خارجها؛»"},{"chapter":1,"id":"KSU-039","page":"20","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["المادة العشرون المادة الحادية والعشرون لا يجوز بأي حال من الأحوال حل الجامعة ولا دمجها بغب ها ولا تعديل نظامها، إلا بأمر ملكي .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","المادة العشرون المادة الحادية والعشرون لا لا يجوز بأي حال من الأحوال حل الجامعة ولا دمجها بغب ها ولا تعديل نظامها، إلا بأمر ملكي .","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «المادة العشرون المادة الحادية والعشرون لا يجوز بأي حال من الأحوال حل الجامعة ولا دمجها بغب ها ولا تعديل نظامها، إلا بأمر ملكي .»"},{"chapter":1,"id":"KSU-040","page":"20","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يرفع المجلس الاسبراتيجيات والسياسات والمعايب والضوابط والإجراءات والنظم - النري ينص الن ظام على اعتمادها أو إقرارها من مجلس إدارة الجامعة - وأي تعديل عليها؛","يُطبق ذلك على التعليم العام فقط.","يرفع المجلس الاسبراتيجيات والسياسات والمعايب والضوابط والإجراءات والنظم - النري ينص الن ظام على اعتمادها أو إقرارها من مجلس إدارة الهيئة - وأي تعديل عليها؛"],"a":3,"e":"ورد في المذكرة: «يرفع المجلس الاسبراتيجيات والسياسات والمعايب والضوابط والإجراءات والنظم - النري ينص الن ظام على اعتمادها أو إقرارها من مجلس إدارة الهيئة - وأي تعديل عليها؛»"},{"chapter":1,"id":"KSU-041","page":"11","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["ب - أن تكون مؤسسة رائدة إقليًّا وعالميًّا في مجال التعل الجامعىي، تساهم في تنمية الاقتصاد الوطن ي، وتعمل على تلبية احتياجات سوق العمل والاقتصاد ي المعرف .","ب - أن تكون مؤسسة رائدة إقليًّا وعالميًّا في مجال التعل الجامعىي، تساهم في تنمية الاقتصاد الوطن ي، ولا تعمل على تلبية احتياجات سوق العمل والاقتصاد ي المعرف .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «ب - أن تكون مؤسسة رائدة إقليًّا وعالميًّا في مجال التعل الجامعىي، تساهم في تنمية الاقتصاد الوطن ي، وتعمل على تلبية احتياجات سوق العمل والاقتصاد ي المعرف .»"},{"chapter":1,"id":"KSU-042","page":"11","q":"ما المقصود بـ «.1 تهدف الجامعة إل تحقيق ما يأنري» وفق المذكرة؟","o":["أ - خدمة التعل العالفيي مدينة الرياض بشكل خاص، ي وف المملكة بشكل عام .","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «.1 تهدف الجامعة إل تحقيق ما يأنري : أ - خدمة التعل العالفيي مدينة الرياض بشكل خاص، ي وف المملكة بشكل عام .»"},{"chapter":1,"id":"KSU-043","page":"18","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","وعلى أعضاء المجلس العمل على تشجيع تقد الهبات والإعانات والمنح والوصايا والتبرعات والأوقاف ، وغب ها من المساهمات للجامعة ."],"a":3,"e":"ورد في المذكرة: «وعلى أعضاء المجلس العمل على تشجيع تقد الهبات والإعانات والمنح والوصايا والتبرعات والأوقاف ، وغب ها من المساهمات للجامعة .»"},{"chapter":1,"id":"KSU-044","page":"15","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يجتمع المجلس بدعوة من رئيسه مرة كل ( شهرين ) على الأقل، وكلما دعت الحاجة إل ذلك بحسب ما يقدره رئيس المجلس، أو إذا طلب ذلك ( ثلث ) الأعضاء على الأقل .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «يجتمع المجلس بدعوة من رئيسه مرة كل ( شهرين ) على الأقل، وكلما دعت الحاجة إل ذلك بحسب ما يقدره رئيس المجلس، أو إذا طلب ذلك ( ثلث ) الأعضاء على الأقل .»"},{"chapter":1,"id":"KSU-045","page":"15","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["تثبت مداولات المجلس وقراراته في محاض يوقعها رئيس الاجتماع والأعضاء الحاض ون، ولا يجوز للعض و الذي يعبرض على أي قرار أن يثبت اعبراضه مسببًا في المحصر .","يُطبق ذلك على التعليم العام فقط.","تثبت مداولات المجلس وقراراته في محاض يوقعها رئيس الاجتماع والأعضاء الحاض ون، ويجوز للعض و الذي يعبرض على أي قرار أن يثبت اعبراضه مسببًا في المحصر .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":2,"e":"ورد في المذكرة: «تثبت مداولات المجلس وقراراته في محاض يوقعها رئيس الاجتماع والأعضاء الحاض ون، ويجوز للعض و الذي يعبرض على أي قرار أن يثبت اعبراضه مسببًا في المحصر .»"},{"chapter":1,"id":"KSU-046","page":"17","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","بحيث تكون متوافقة مع المخطط العام الاسبراتيخري لمدينة الرياض، والإطار التنظي المعتمد لح وكمة المناطق الخاصة داخل مدينة الرياض، المعتمد من الهيئة .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":2,"e":"ورد في المذكرة: «بحيث تكون متوافقة مع المخطط العام الاسبراتيخري لمدينة الرياض، والإطار التنظي المعتمد لح وكمة المناطق الخاصة داخل مدينة الرياض، المعتمد من الهيئة .»"},{"chapter":1,"id":"KSU-047","page":"18","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["المادة السابعة عشرة لا يجوز أن يكون لعضو المجلس ولا لأي من منسونري الجامعة من أعضاء هيئة التدريس وغب هم من الموظفي ؛","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","المادة السابعة عشرة لا لا يجوز أن يكون لعضو المجلس ولا لأي من منسونري الجامعة من أعضاء هيئة التدريس وغب هم من الموظفي ؛","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «المادة السابعة عشرة لا يجوز أن يكون لعضو المجلس ولا لأي من منسونري الجامعة من أعضاء هيئة التدريس وغب هم من الموظفي ؛»"},{"chapter":1,"id":"KSU-048","page":"11","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["د - رفع تصنيف خدمات التعل العالفيي مدينة الرياض بشكل خاص، ي وف المملكة بشكل عام، في تقارير تصنيف الجامعات الدولية .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":0,"e":"ورد في المذكرة: «د - رفع تصنيف خدمات التعل العالفيي مدينة الرياض بشكل خاص، ي وف المملكة بشكل عام، في تقارير تصنيف الجامعات الدولية .»"},{"chapter":1,"id":"KSU-049","page":"14","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","وللمجلس تفويض بعض صلاحياته إل رئيسه أو أي من أعضائه أو من مسؤولي الجامعة، بخلافًا لما يقتضيه سب العمل في الجامعة .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","وللمجلس تفويض بعض صلاحياته إل رئيسه أو أي من أعضائه أو من مسؤولي الجامعة، وفقًا لما يقتضيه سب العمل في الجامعة ."],"a":3,"e":"ورد في المذكرة: «وللمجلس تفويض بعض صلاحياته إل رئيسه أو أي من أعضائه أو من مسؤولي الجامعة، وفقًا لما يقتضيه سب العمل في الجامعة .»"},{"chapter":1,"id":"KSU-050","page":"11","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","و - تطوير وإعداد المقررات والمواد الدراسية الأكادية والبحثية واعتمادها على أسس متخصصة وبم ا يتوافق مع المعمول به في أفضل الجامعات العالمية ."],"a":3,"e":"ورد في المذكرة: «و - تطوير وإعداد المقررات والمواد الدراسية الأكادية والبحثية واعتمادها على أسس متخصصة وبم ا يتوافق مع المعمول به في أفضل الجامعات العالمية .»"},{"chapter":1,"id":"KSU-051","page":"13","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","الموافقة على إبرام الاتفاقيات ومذكرات التفاهم والتعاون والبروتوكولات والعقود، وتفويض رن ي س الجامعة بتوقيعها ."],"a":3,"e":"ورد في المذكرة: «الموافقة على إبرام الاتفاقيات ومذكرات التفاهم والتعاون والبروتوكولات والعقود، وتفويض رن ي س الجامعة بتوقيعها .»"},{"chapter":1,"id":"KSU-052","page":"14","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["وضع لائحة ضوابط ومعايب العضوية في المجلس، النري تشتمل على ضوابط العضوية، وقواعد اخت يار أعضاء المجلس وعزلهم، ورفعها إل مجلس إدارة الجامعة؛","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","وضع لائحة ضوابط ومعايب العضوية في المجلس، النري تشتمل على ضوابط العضوية، وقواعد اخت يار أعضاء المجلس وعزلهم، ورفعها إل مجلس إدارة الهيئة؛","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «وضع لائحة ضوابط ومعايب العضوية في المجلس، النري تشتمل على ضوابط العضوية، وقواعد اخت يار أعضاء المجلس وعزلهم، ورفعها إل مجلس إدارة الهيئة؛»"},{"chapter":1,"id":"KSU-053","page":"17","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","المادة الثانية عشرة المادة الثالثة عشرة يخضع منسوبو الجامعة لأحكام نظام العمل ونظام التأمينات الاجتماعية .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «المادة الثانية عشرة المادة الثالثة عشرة يخضع منسوبو الجامعة لأحكام نظام العمل ونظام التأمينات الاجتماعية .»"},{"chapter":1,"id":"KSU-054","page":"19","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["وتودع جميع إيرادات الجامعة في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف منها بخلاف مب انية الجامعة .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","وتودع جميع إيرادات الجامعة في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف منها وفق مب انية الجامعة ."],"a":3,"e":"ورد في المذكرة: «وتودع جميع إيرادات الجامعة في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف منها وفق مب انية الجامعة .»"},{"chapter":1,"id":"KSU-055","page":"12","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","الإشراف على سب أعمال الجامعة، ورقابة مسب ة نموها وتطورها، ومساندتها، والمحافظة على استقلاليتها وتمب ها .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «الإشراف على سب أعمال الجامعة، ورقابة مسب ة نموها وتطورها، ومساندتها، والمحافظة على استقلاليتها وتمب ها .»"},{"chapter":1,"id":"KSU-056","page":"11","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","ز - تقد دورات تدريبية وتأهيلية للكوادر الأكادية والعلمية والهندسية والطبية والتنفيذية ، بحسب المعمول به في أفضل الجامعات العالمية ."],"a":3,"e":"ورد في المذكرة: «ز - تقد دورات تدريبية وتأهيلية للكوادر الأكادية والعلمية والهندسية والطبية والتنفيذية ، بحسب المعمول به في أفضل الجامعات العالمية .»"},{"chapter":1,"id":"KSU-057","page":"11","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["د - تأسيس الشركات وغب ها من المنشآت ذات الأغراض الخاصة أو المساهمة فيها، وإنشاء صناديق الاستثمار ونحوها أو المساهمة فيها؛","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «د - تأسيس الشركات وغب ها من المنشآت ذات الأغراض الخاصة أو المساهمة فيها، وإنشاء صناديق الاستثمار ونحوها أو المساهمة فيها؛»"},{"chapter":1,"id":"KSU-058","page":"17","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","داخل الحرم الجامعىي، وكذلك أعمال التخطيط والكود العمران ي والأعمال الإنشائية وأعمال التشغيل والصيانة داخل الحرم الجامعىي؛","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":1,"e":"ورد في المذكرة: «داخل الحرم الجامعىي، وكذلك أعمال التخطيط والكود العمران ي والأعمال الإنشائية وأعمال التشغيل والصيانة داخل الحرم الجامعىي؛»"},{"chapter":1,"id":"KSU-059","page":"15","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","تصدر قرارات المجلس بأصوات أغلبية أعضائه الحاض ين على الأقل، وعند تساوي الأصوات يرجح الجانب الذي يصوت معه رئيس الاجتماع .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «تصدر قرارات المجلس بأصوات أغلبية أعضائه الحاض ين على الأقل، وعند تساوي الأصوات يرجح الجانب الذي يصوت معه رئيس الاجتماع .»"},{"chapter":1,"id":"KSU-060","page":"19","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["الموارد المالية الأخرى النري يقرها المجلس، على ألا تتعارض مع أهداف الجامعة وطبيعة نشاطها .","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما
