id":"KSU-387","page":"101","q":"ما المقصود بـ «ومن أبرز المراكز البحثية النري تتعاون معها الجامعة» وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","المركز الأورونري للأبحاث النووية CERN تتعاون جامعة الملك سعود مع المركز الأورونري للأبحاث النووية في سويشا، وهو أحد أكبر المراكز البحثية في العالم في مجال فب ياء الجسات ."],"a":3,"e":"ورد في المذكرة: «ومن أبرز المراكز البحثية النري تتعاون معها الجامعة : المركز الأورونري للأبحاث النووية CERN تتعاون جامعة الملك سعود مع المركز الأورونري للأبحاث النووية في سويشا، وهو أحد أكبر المراكز البحثية في العالم في مجال فب ياء الجسات .»"},{"chapter":7,"id":"KSU-388","page":"101","q":"ما المقصود بـ «ومن أبرز هذه الشراكات» وفق المذكرة؟","o":["مدينة الملك عبد العزيز للعلوم والتقنية معهد الملك عبد الله للبحوث والدراسات الاستشارية مركز الملك عبد الله للدراسات والبحوث الببرولية مركز الملك فيصل للبحوث والدراسات الإسلامية 103 الشراكات البحثية العالمية عمادة الموارد البشرية KSU 101","مدينة الملك عبد العزيز للعلوم والتقنية معهد الملك عبد الله للبحوث والدراسات الاستشارية مركز الملك عبد الله للدراسات والبحوث الببرولية مركز الملك فيصل للبحوث والدراسات الإسلامية 102 الشراكات البحثية العالمية عمادة الموارد البشرية KSU 101","مدينة الملك عبد العزيز للعلوم والتقنية معهد الملك عبد الله للبحوث والدراسات الاستشارية مركز الملك عبد الله للدراسات والبحوث الببرولية مركز الملك فيصل للبحوث والدراسات الإسلامية 101 الشراكات البحثية العالمية عمادة الموارد البشرية KSU 101","مدينة الملك عبد العزيز للعلوم والتقنية معهد الملك عبد الله للبحوث والدراسات الاستشارية مركز الملك عبد الله للدراسات والبحوث الببرولية مركز الملك فيصل للبحوث والدراسات الإسلامية 106 الشراكات البحثية العالمية عمادة الموارد البشرية KSU 101"],"a":2,"e":"ورد في المذكرة: «ومن أبرز هذه الشراكات : مدينة الملك عبد العزيز للعلوم والتقنية معهد الملك عبد الله للبحوث والدراسات الاستشارية مركز الملك عبد الله للدراسات والبحوث الببرولية مركز الملك فيصل للبحوث والدراسات الإسلامية 101 الشراكات البحثية العالمية عمادة الموارد البشرية KSU 101»"},{"chapter":7,"id":"KSU-389","page":"92","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["وقد أدركت الجامعة منذ وقت مبكر أهمية الانفتاح على العالم وبناء جسور التعاون مع المؤسسات الأكادية والبحثية والصناعية المرموق ة حول العالم، إاناً منها بأن التمب الأكادي والبحنري لا كن تحقيقه في عزلة عن التطورات العلمية والتكنولوجية العالمية .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «وقد أدركت الجامعة منذ وقت مبكر أهمية الانفتاح على العالم وبناء جسور التعاون مع المؤسسات الأكادية والبحثية والصناعية المرموق ة حول العالم، إاناً منها بأن التمب الأكادي والبحنري لا كن تحقيقه في عزلة عن التطورات العلمية والتكنولوجية العالمية .»"},{"chapter":7,"id":"KSU-390","page":"92","q":"أكمل العبارة الصحيحة وفق المذكرة: «تمتد شبكة شراكات جامعة الملك سعود لتشمل أكبر من ____ اتفاقية ومذكرة تفاهم مع مؤسسات أكادية وبحثية في أكبر من 60 دولة حول العالم، مما يعكس مكانتها الدولية وقدرتها على بناء علاقات اسبراتيجية متينة مع أبرز المؤسسات العالمية .»","o":["502","501","500","505"],"a":2,"e":"ورد في المذكرة: «تمتد شبكة شراكات جامعة الملك سعود لتشمل أكبر من 500 اتفاقية ومذكرة تفاهم مع مؤسسات أكادية وبحثية في أكبر من 60 دولة حول العالم، مما يعكس مكانتها الدولية وقدرتها على بناء علاقات اسبراتيجية متينة مع أبرز المؤسسات العالمية .»"},{"chapter":7,"id":"KSU-391","page":"95","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["الشراكة مع جامعة شيكاغو وقعت جامعة الملك سعود شراكة اسبراتيجية مع جامعة شيكاغو تهدف إل تعزيز التعاون في مجالات الذكاء الاصطناعي والتقنيات المتقدمة، وتطوير برامج أكادية مشبركة، وتوسيع نطاق الأ بحاث متعددة التخصصات في الذكاء الاصطناعي .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","الشراكة مع جامعة شيكاغو وقعت جامعة الملك سعود شراكة اسبراتيجية مع جامعة شيكاغو لا تهدف إل تعزيز التعاون في مجالات الذكاء الاصطناعي والتقنيات المتقدمة، وتطوير برامج أكادية مشبركة، وتوسيع نطاق الأ بحاث متعددة التخصصات في الذكاء الاصطناعي ."],"a":0,"e":"ورد في المذكرة: «الشراكة مع جامعة شيكاغو وقعت جامعة الملك سعود شراكة اسبراتيجية مع جامعة شيكاغو تهدف إل تعزيز التعاون في مجالات الذكاء الاصطناعي والتقنيات المتقدمة، وتطوير برامج أكادية مشبركة، وتوسيع نطاق الأ بحاث متعددة التخصصات في الذكاء الاصطناعي .»"},{"chapter":7,"id":"KSU-392","page":"95","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","الشراكة مع معهد ديخري بن التقن ي ي وف مجال صناعة الألعاب الرقمية، عقدت الجامعة شراكة عالمية نوعية مع معهد ديخري بن التقن ي ( DigiPen Institute of Technology ) ، أحد أبرز المؤسسات العالمية المتخصصة في تصم وتطوير الألعاب الإلكبرونية والمحاكاة التفاعلية .","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «الشراكة مع معهد ديخري بن التقن ي ي وف مجال صناعة الألعاب الرقمية، عقدت الجامعة شراكة عالمية نوعية مع معهد ديخري بن التقن ي ( DigiPen Institute of Technology ) ، أحد أبرز المؤسسات العالمية المتخصصة في تصم وتطوير الألعاب الإلكبرونية والمحاكاة التفاعلية .»"},{"chapter":7,"id":"KSU-393","page":"95","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","تُعد هذه الاتفاقيات العالمية امتدادا لجه ود جامعة الملك سعود المستمرة في تعزيز التعاون المشبرك مع الشركاء محليا ودوليا، بهدف تطوير واستحداث برامج دراسية نوعية، ودعم البحث العلمي التطبيقري، وتعزيز تنافسية الجامعة بي الج امعات الدولية الرائدة .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «تُعد هذه الاتفاقيات العالمية امتدادا لجه ود جامعة الملك سعود المستمرة في تعزيز التعاون المشبرك مع الشركاء محليا ودوليا، بهدف تطوير واستحداث برامج دراسية نوعية، ودعم البحث العلمي التطبيقري، وتعزيز تنافسية الجامعة بي الج امعات الدولية الرائدة .»"},{"chapter":7,"id":"KSU-394","page":"105","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","آلية إبرام مذكرات التفاهم تتبع جامعة الملك سعود آلية منظمة لإبرام مذكرات التفاهم مع المؤسسات المختلفة، حيث يتم د راسة كل مقبرح بعناية للتأكد من توافقه مع الأهداف الاسبراتيجية للجامعة وإمكانية تحقيق فائدة مت بادلة من التعاون .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «آلية إبرام مذكرات التفاهم تتبع جامعة الملك سعود آلية منظمة لإبرام مذكرات التفاهم مع المؤسسات المختلفة، حيث يتم د راسة كل مقبرح بعناية للتأكد من توافقه مع الأهداف الاسبراتيجية للجامعة وإمكانية تحقيق فائدة مت بادلة من التعاون .»"},{"chapter":7,"id":"KSU-395","page":"107","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","الاتحادات والمنظمات الأكادية الدولية تحرص جامعة الملك سعود على المشاركة الفاعلة في الاتحادات والمنظمات الأكادية الدولية، مما ي عزز حضورها على الساحة الأكادية العالمية ويتيح لها فرص التعاون مع أبرز المؤسسات الأكادية في العالم .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «الاتحادات والمنظمات الأكادية الدولية تحرص جامعة الملك سعود على المشاركة الفاعلة في الاتحادات والمنظمات الأكادية الدولية، مما ي عزز حضورها على الساحة الأكادية العالمية ويتيح لها فرص التعاون مع أبرز المؤسسات الأكادية في العالم .»"},{"chapter":7,"id":"KSU-396","page":"109","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","برامج الدراسات العليا المشبركة استحدثت جامعة الملك سعود مجموعة من برامج الدراسات العليا المشبركة على مستوى الكليات والأقسام الأكادية، بما يتيح دمج تخصصات متعددة في إطار واحد يعكس توجه الجامعة نحو التكامل ي المعرف وتعزيز البحث العلمي ."],"a":3,"e":"ورد في المذكرة: «برامج الدراسات العليا المشبركة استحدثت جامعة الملك سعود مجموعة من برامج الدراسات العليا المشبركة على مستوى الكليات والأقسام الأكادية، بما يتيح دمج تخصصات متعددة في إطار واحد يعكس توجه الجامعة نحو التكامل ي المعرف وتعزيز البحث العلمي .»"},{"chapter":7,"id":"KSU-397","page":"110","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","وقد شهدت السنوات الأخب ة زيادة ملحوظة في عدد الأبحاث المنشورة بالتعاون مع باحثي دوليي ، حي ث تشب الإحصائيات إل أن نسبة كبب ة من أبحاث جامعة الملك سعود المنشورة في مجلات عالمية محك مة هي أبحاث مشبركة مع باحثي من دول مختلفة .","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «وقد شهدت السنوات الأخب ة زيادة ملحوظة في عدد الأبحاث المنشورة بالتعاون مع باحثي دوليي ، حي ث تشب الإحصائيات إل أن نسبة كبب ة من أبحاث جامعة الملك سعود المنشورة في مجلات عالمية محك مة هي أبحاث مشبركة مع باحثي من دول مختلفة .»"},{"chapter":7,"id":"KSU-398","page":"110","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","المؤتمرات والندوات الدولية تستضيف جامعة الملك سعود العديد من المؤتمرات والندوات الدولية سنوياً، بالتعاون مع جامعات ومنظمات دولية، مما يتيح للباحثفيي الجامعة فرصة التواصل مع نظرائهم من مختلف أنحاء العالم وتبادل الخبرات والمعارف .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «المؤتمرات والندوات الدولية تستضيف جامعة الملك سعود العديد من المؤتمرات والندوات الدولية سنوياً، بالتعاون مع جامعات ومنظمات دولية، مما يتيح للباحثفيي الجامعة فرصة التواصل مع نظرائهم من مختلف أنحاء العالم وتبادل الخبرات والمعارف .»"},{"chapter":7,"id":"KSU-399","page":"112","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["تتطلع جامعة الملك سعود إل تعزيز شراكاتها الدولية والإقلية وتطوير أشكال مبتكرة من التع اون الأكادي والبحنري، وذلك من خلال التوسع في برامج الدرجات العلمية المزدوجة والمشبركة، وزيادة المشاري ع البحثية المشبركة، وتطوير برامج تبادل أعضاء هيئة التدريس والطلاب، إل جانب إنشاء مر اكز بحثية مشبركة .","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «تتطلع جامعة الملك سعود إل تعزيز شراكاتها الدولية والإقلية وتطوير أشكال مبتكرة من التع اون الأكادي والبحنري، وذلك من خلال التوسع في برامج الدرجات العلمية المزدوجة والمشبركة، وزيادة المشاري ع البحثية المشبركة، وتطوير برامج تبادل أعضاء هيئة التدريس والطلاب، إل جانب إنشاء مر اكز بحثية مشبركة .»"},{"chapter":7,"id":"KSU-400","page":"93","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["تشمل هذه الشراكة عدة محاور رئيسية، منها التعاون البحنرفيي المجالات الطبية والصحية بي مستشق الملك خالد الجامعىي ومستشق الملك عب د العزيز الجامعىي مع كلية الطب بجامعة هارفارد في تنفيذ برامج تدريبية متقدمة وأبحاث مشبركة .","تشمل هذه الشراكة عدة محاور رئيسية، منها التعاون البحنرفيي المجالات الطبية والصحية بي مستشق الملك خالد الجامعىي ومستشق الملك عب د العزيز الجامعىي مع كلية الطب بجامعة هارفارد في تنفيذ برامج تدريبية متوقفة وأبحاث مشبركة .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «تشمل هذه الشراكة عدة محاور رئيسية، منها التعاون البحنرفيي المجالات الطبية والصحية بي مستشق الملك خالد الجامعىي ومستشق الملك عب د العزيز الجامعىي مع كلية الطب بجامعة هارفارد في تنفيذ برامج تدريبية متقدمة وأبحاث مشبركة .»"},{"chapter":7,"id":"KSU-401","page":"110","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","برامج الدراسات العليا المشبركة تنفذ جامعة الملك سعود العديد من المشاري ع البحثية المشبركة مع جامعات ومراكز بحثية دولية، و قد حققت هذه المشاري ع إنجازات علمية مهمة ونتج عنها نشر العديد من الأبحاث في مجلات علمية مرموقة ."],"a":3,"e":"ورد في المذكرة: «برامج الدراسات العليا المشبركة تنفذ جامعة الملك سعود العديد من المشاري ع البحثية المشبركة مع جامعات ومراكز بحثية دولية، و قد حققت هذه المشاري ع إنجازات علمية مهمة ونتج عنها نشر العديد من الأبحاث في مجلات علمية مرموقة .»"},{"chapter":7,"id":"KSU-402","page":"107","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","اتحاد الجامعات العربية تُعد جامعة الملك سعود عضواً مؤسساً المية في مختلف المجالات .","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «الشراكات مع المؤسسات البحثية تتعاون جامعة الملك سعود مع العديد من المراكز البحثية المرموقة حول العالم، مما يتيح لباحثيها الوصول إل أحدث التقنيات والمعدات البحثية، والاستفادة من الخبرات العالمية في مختلف المجالات .»"},{"chapter":7,"id":"KSU-405","page":"103","q":"ما المقصود بـ «ومن أبرز هذه الشراكات» وفق المذكرة؟","o":["شركة الاتصالات السعودية ( STC ) شركة موبايلىي شركة الكهرباء السعودية شركة المياه الوطنية مصرف الراجخي البنك الأهلىي السعودي شركة أسمنت الامة 105 عمادة الموارد البشرية KSU 101","شركة الاتصالات السعودية ( STC ) شركة موبايلىي شركة الكهرباء السعودية شركة المياه الوطنية مصرف الراجخي البنك الأهلىي السعودي شركة أسمنت الامة 104 عمادة الموارد البشرية KSU 101","شركة الاتصالات السعودية ( STC ) شركة موبايلىي شركة الكهرباء السعودية شركة المياه الوطنية مصرف الراجخي البنك الأهلىي السعودي شركة أسمنت الامة 108 عمادة الموارد البشرية KSU 101","شركة الاتصالات السعودية ( STC ) شركة موبايلىي شركة الكهرباء السعودية شركة المياه الوطنية مصرف الراجخي البنك الأهلىي السعودي شركة أسمنت الامة 103 عمادة الموارد البشرية KSU 101"],"a":3,"e":"ورد في المذكرة: «ومن أبرز هذه الشراكات : شركة الاتصالات السعودية ( STC ) شركة موبايلىي شركة الكهرباء السعودية شركة المياه الوطنية مصرف الراجخي البنك الأهلىي السعودي شركة أسمنت الامة 103 عمادة الموارد البشرية KSU 101»"},{"chapter":7,"id":"KSU-406","page":"104","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["وتُوّج هذا التعاون بإطلاق أول قمر صناعي لجامعة الملك سعود KSU - CubeSat بنجاح، ضمن مهمة فضائية مشبركة مع مدينة الملك عبد العزيز للعلوم والتقنية، بهدف دعم البحث العلمي وتأهيل الكوادر الوطنية في مجال علوم الفض اء .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «وتُوّج هذا التعاون بإطلاق أول قمر صناعي لجامعة الملك سعود KSU - CubeSat بنجاح، ضمن مهمة فضائية مشبركة مع مدينة الملك عبد العزيز للعلوم والتقنية، بهدف دعم البحث العلمي وتأهيل الكوادر الوطنية في مجال علوم الفض اء .»"},{"chapter":7,"id":"KSU-407","page":"112","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["كما تسعى الجامعة إل تطوير برامج التعل عن بعد المشبركة، وتعزيز شراكاتها مع القطاع الصناعي، والمشاركة الفاعلة في المبادرات الدولية المعنية بالتنمية المستدامة، بما يس هم في تعزيز تنافسيتها العالمية ودورها التنموي .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «كما تسعى الجامعة إل تطوير برامج التعل عن بعد المشبركة، وتعزيز شراكاتها مع القطاع الصناعي، والمشاركة الفاعلة في المبادرات الدولية المعنية بالتنمية المستدامة، بما يس هم في تعزيز تنافسيتها العالمية ودورها التنموي .»"},{"chapter":7,"id":"KSU-408","page":"95","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","كما تركز الاتفاقية على تطوير البرامج الأكادية وتع زيز الأبحاث المشبركة في مجالات الذكاء الاصطناعي، وعلوم البيانات، والطب، والهندسة، وإدارة الأعمال، إل جانب دعم تبادل الخبرات بي أعضاء هيئة التدريس والطلاب ."],"a":3,"e":"ورد في المذكرة: «كما تركز الاتفاقية على تطوير البرامج الأكادية وتع زيز الأبحاث المشبركة في مجالات الذكاء الاصطناعي، وعلوم البيانات، والطب، والهندسة، وإدارة الأعمال، إل جانب دعم تبادل الخبرات بي أعضاء هيئة التدريس والطلاب .»"},{"chapter":7,"id":"KSU-409","page":"93","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","تشمل الاتفاقية أيضاً برامج تدريبية لأعضاء هيئة التدريس والطلاب المتفوقي ، حيث يتاح لهم فرصة المشاركة في برامج صيفية بحثية في المعهد، والاستفادة من المختبرات وا لمرافق البحثية المتقدمة المتوفرة هناك .","تشمل الاتفاقية أيضاً برامج تدريبية لأعضاء هيئة التدريس والطلاب المتفوقي ، حيث يتاح لهم فرصة المشاركة في برامج صيفية بحثية في المعهد، والاستفادة من المختبرات وا لمرافق البحثية المتوقفة المتوفرة هناك .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «تشمل الاتفاقية أيضاً برامج تدريبية لأعضاء هيئة التدريس والطلاب المتفوقي ، حيث يتاح لهم فرصة المشاركة في برامج صيفية بحثية في المعهد، والاستفادة من المختبرات وا لمرافق البحثية المتقدمة المتوفرة هناك .»"},{"chapter":7,"id":"KSU-410","page":"94","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","تشمل الشراكة أيضاً برامج للتبادل الطلانري، حيث يتاح لطلاب الدراسات العليا في جامعة الملك س عود فرصة قضاء فصل دراسي أو أكبر في جامعة كاليفورنيا بب كلىي، والاستفادة من البيئة الأكادي ة المتمب ة هناك .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «تشمل الشراكة أيضاً برامج للتبادل الطلانري، حيث يتاح لطلاب الدراسات العليا في جامعة الملك س عود فرصة قضاء فصل دراسي أو أكبر في جامعة كاليفورنيا بب كلىي، والاستفادة من البيئة الأكادي ة المتمب ة هناك .»"},{"chapter":7,"id":"KSU-411","page":"109","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["كما تبنّت الجامعة برنامج الإشراف الخارحري المشبرك بالتعاون مع أكبر من عشرين جامعة أوروبية وبريطان ي ة وأسبرالية، بما يعزز فرص الإشراف الدولي ويبري الخبرات الأكادية والبحثية لطلاب الدراسات العلىي ا .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":0,"e":"ورد في المذكرة: «كما تبنّت الجامعة برنامج الإشراف الخارحري المشبرك بالتعاون مع أكبر من عشرين جامعة أوروبية وبريطان ي ة وأسبرالية، بما يعزز فرص الإشراف الدولي ويبري الخبرات الأكادية والبحثية لطلاب الدراسات العلىي ا .»"},{"chapter":7,"id":"KSU-412","page":"107","q":"أكمل العبارة الصحيحة وفق المذكرة: «الاتحاد الدولي للجامعات ( IAU ) تحط جامعة الملك سعود بعضوية الاتحاد الدولي للجامعات، وهي منظمة دولية تضم أكبر من ____ جامعة من جميع أنحاء العالم، وتعمل على تعزيز التعاون الدولفيي مجال التعل العالي .»","o":["605","600","602","601"],"a":1,"e":"ورد في المذكرة: «الاتحاد الدولي للجامعات ( IAU ) تحط جامعة الملك سعود بعضوية الاتحاد الدولي للجامعات، وهي منظمة دولية تضم أكبر من 600 جامعة من جميع أنحاء العالم، وتعمل على تعزيز التعاون الدولفيي مجال التعل العالي .»"},{"chapter":7,"id":"KSU-413","page":"97","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","جامعة السوربون في مجال العلوم الإنسانية والاجتماعية، تتعاون جامعة الملك سعود مع جامعة السوربون الفرنسية في تطوير البرامج الأكادية وتنفيذ أبحاث مشبركة في مجالات الآداب واللغات والعلوم الإنسان ي ة ."],"a":3,"e":"ورد في المذكرة: «جامعة السوربون في مجال العلوم الإنسانية والاجتماعية، تتعاون جامعة الملك سعود مع جامعة السوربون الفرنسية في تطوير البرامج الأكادية وتنفيذ أبحاث مشبركة في مجالات الآداب واللغات والعلوم الإنسان ي ة .»"},{"chapter":7,"id":"KSU-414","page":"95","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["تهدف هذه الشراكة إل تقد برامج أكادية مشبركة لطلبة الجامعة، وتعزيز التعاون في تطوير رأس المال البشري وصناعة الألعاب الإلكبرونية وريادة الأعمال، إل جانب تبادل الخبرات الأكادية والبحثية بي الجانبي .","يُطبق ذلك على التعليم العام فقط.","لا تهدف هذه الشراكة إل تقد برامج أكادية مشبركة لطلبة الجامعة، وتعزيز التعاون في تطوير رأس المال البشري وصناعة الألعاب الإلكبرونية وريادة الأعمال، إل جانب تبادل الخبرات الأكادية والبحثية بي الجانبي .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «تهدف هذه الشراكة إل تقد برامج أكادية مشبركة لطلبة الجامعة، وتعزيز التعاون في تطوير رأس المال البشري وصناعة الألعاب الإلكبرونية وريادة الأعمال، إل جانب تبادل الخبرات الأكادية والبحثية بي الجانبي .»"},{"chapter":7,"id":"KSU-415","page":"103","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","شركة Cisco Systems في مجال الشبكات والاتصالات، تتعاون جامعة الملك سعود مع شركة سيسكو العالمية في تقد برامج تدريبية متخصصة ( Cisco Networking Academy ) و تطوير البنية التحتية للشبكات في الجامعة .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «شركة Cisco Systems في مجال الشبكات والاتصالات، تتعاون جامعة الملك سعود مع شركة سيسكو العالمية في تقد برامج تدريبية متخصصة ( Cisco Networking Academy ) و تطوير البنية التحتية للشبكات في الجامعة .»"},{"chapter":7,"id":"KSU-416","page":"96","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","إمبريال كوليدج لندن في مجال الهندسة والتقنية، تتعاون جامعة الملك سعود مع إمبريال كوليدج لندن في تنفيذ مش اري ع بحثية متقدمة، وتطوير البرامج الأكادية، وتبادل الخبرات في مجالات الهندسة المختلفة .","يُطبق ذلك على التعليم العام فقط.","إمبريال كوليدج لندن في مجال الهندسة والتقنية، تتعاون جامعة الملك سعود مع إمبريال كوليدج لندن في تنفيذ مش اري ع بحثية متوقفة، وتطوير البرامج الأكادية، وتبادل الخبرات في مجالات الهندسة المختلفة ."],"a":1,"e":"ورد في المذكرة: «إمبريال كوليدج لندن في مجال الهندسة والتقنية، تتعاون جامعة الملك سعود مع إمبريال كوليدج لندن في تنفيذ مش اري ع بحثية متقدمة، وتطوير البرامج الأكادية، وتبادل الخبرات في مجالات الهندسة المختلفة .»"},{"chapter":7,"id":"KSU-417","page":"104","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","وزارة الصحة تربط جامعة الملك سعود بوزارة الصحة شراكة اسبراتيجية، حيث تساهم المستشفيات الجامعية في تقد الخدمات الصحية للمواطني ، كما يتم تبادل الخبرات في مجالات التدريب الطنري والبحث الع لمي .","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «وزارة الصحة تربط جامعة الملك سعود بوزارة الصحة شراكة اسبراتيجية، حيث تساهم المستشفيات الجامعية في تقد الخدمات الصحية للمواطني ، كما يتم تبادل الخبرات في مجالات التدريب الطنري والبحث الع لمي .»"},{"chapter":7,"id":"KSU-418","page":"112","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","إن البر ام جامعة الملك سعود بتعزيز التعاون الدولي والانفتاح على العالم، مع الحفاظ على هويتها الوطنية وقها الأصيلة، يجعلها نموذجاً يُحتذى به في التوفيق بي الأصالة والمعاضة، المحلية والعالمية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":2,"e":"ورد في المذكرة: «إن البر ام جامعة الملك سعود بتعزيز التعاون الدولي والانفتاح على العالم، مع الحفاظ على هويتها الوطنية وقها الأصيلة، يجعلها نموذجاً يُحتذى به في التوفيق بي الأصالة والمعاضة، المحلية والعالمية .»"},{"chapter":7,"id":"KSU-419","page":"102","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","الشراكات مع الشركات العالمية تدرك جامعة الملك سعود أهمية ربط البحث العلمي بالقطاع الصناعي والإنتاحري، ولذلك أقامت شراكات اسبراتيجية مع العديد من الشركات العالمية الرائدة في مختلف المجالات .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «الشراكات مع الشركات العالمية تدرك جامعة الملك سعود أهمية ربط البحث العلمي بالقطاع الصناعي والإنتاحري، ولذلك أقامت شراكات اسبراتيجية مع العديد من الشركات العالمية الرائدة في مختلف المجالات .»"},{"chapter":7,"id":"KSU-420","page":"92","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","تُعد الشراكات والاتفاقيات الدولية والمحلية من الركائز الأساسية النري تعتمد عل يها جامعة الملك سعود في تحقيق رؤيتها الاسبراتيجية لتكون جامعة رائدة عالمياً ومت مب ة في بناء مجتمع المعرفة .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «تُعد الشراكات والاتفاقيات الدولية والمحلية من الركائز الأساسية النري تعتمد عل يها جامعة الملك سعود في تحقيق رؤيتها الاسبراتيجية لتكون جامعة رائدة عالمياً ومت مب ة في بناء مجتمع المعرفة .»"},{"chapter":7,"id":"KSU-421","page":"96","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","وقد نتج عن هذا التعاون العديد من الأبحاث المشبركة المنشورة في مجلات علمية ي رف عة المستوى، كما شارك أساتذة من جامعة أكسفورد في تقي وتطوير عدد من البرامج الأكادية في جامعة الملك سعود .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «وقد نتج عن هذا التعاون العديد من الأبحاث المشبركة المنشورة في مجلات علمية ي رف عة المستوى، كما شارك أساتذة من جامعة أكسفورد في تقي وتطوير عدد من البرامج الأكادية في جامعة الملك سعود .»"},{"chapter":7,"id":"KSU-422","page":"97","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","جامعة ميونخ التقنية تربط جامعة الملك سعود بجامعة ميونخ التقنية في ألمانيا شراكة في مجالات الهندسة والتقنية ، تركز على البحث العلمي والابتكار، وتبادل الخبرات في مجال التعل الهندسي .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «جامعة ميونخ التقنية تربط جامعة الملك سعود بجامعة ميونخ التقنية في ألمانيا شراكة في مجالات الهندسة والتقنية ، تركز على البحث العلمي والابتكار، وتبادل الخبرات في مجال التعل الهندسي .»"},{"chapter":7,"id":"KSU-423","page":"104","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","وكالة الفضاء السعودية أبرمت جامعة الملك سعود اتفاقية تعاون مع الهيئة السعودية للفضاء لتطوير البحث العلمفيي م جال علوم الفضاء والفلك، وإعداد الكوادر الوطنية المتخصصة في هذا المجال .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":2,"e":"ورد في المذكرة: «وكالة الفضاء السعودية أبرمت جامعة الملك سعود اتفاقية تعاون مع الهيئة السعودية للفضاء لتطوير البحث العلمفيي م جال علوم الفضاء والفلك، وإعداد الكوادر الوطنية المتخصصة في هذا المجال .»"},{"chapter":7,"id":"KSU-424","page":"110","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","كما تشارك الجامعة بفعالية في المؤتمرات والندوات الدولية النري تنظم ف ي مختلف دول العالم، حيث يقدم أعضاء هيئة التدريس والباحثون في الجامعة أوراقاً علمية وأبحاثاً في هذ ه المؤتمرات ."],"a":3,"e":"ورد في المذكرة: «كما تشارك الجامعة بفعالية في المؤتمرات والندوات الدولية النري تنظم ف ي مختلف دول العالم، حيث يقدم أعضاء هيئة التدريس والباحثون في الجامعة أوراقاً علمية وأبحاثاً في هذ ه المؤتمرات .»"},{"chapter":7,"id":"KSU-425","page":"112","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["وتواصل جامعة الملك سعود سعيها الحثيث لتطوير وتعميق شراكاتها الدولية، وإقامة شراكات جديدة مع مؤسسات متمب ة، وذلك في إطار رؤيتها الطموحة لتكون من بي أفضل الجامعات البحثية في العالم .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «وتواصل جامعة الملك سعود سعيها الحثيث لتطوير وتعميق شراكاتها الدولية، وإقامة شراكات جديدة مع مؤسسات متمب ة، وذلك في إطار رؤيتها الطموحة لتكون من بي أفضل الجامعات البحثية في العالم .»"},{"chapter":7,"id":"KSU-426","page":"100","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","وقد أبرمت الجامعة اتفاقيات تعاون مع معظ م الجامعات الرائدة في دول الخليج، تشمل تبادل الخبرات الأكادية والبحثية، وتنفيذ مشاري ع بحث ية مشبركة، وتبادل أعضاء هيئة التدريس والطلاب .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «وقد أبرمت الجامعة اتفاقيات تعاون مع معظ م الجامعات الرائدة في دول الخليج، تشمل تبادل الخبرات الأكادية والبحثية، وتنفيذ مشاري ع بحث ية مشبركة، وتبادل أعضاء هيئة التدريس والطلاب .»"},{"chapter":7,"id":"KSU-427","page":"94","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","جامعة كاليفورنيا، بب كلىي تتعاون جامعة الملك سعود مع جامعة كاليفورنيا في بب كلىي عبر عدة مجالات أكادية وبحثية، مع البركب بشكل خاص على علوم الحاسب والهندسة والعلوم الأساسية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":1,"e":"ورد في المذكرة: «جامعة كاليفورنيا، بب كلىي تتعاون جامعة الملك سعود مع جامعة كاليفورنيا في بب كلىي عبر عدة مجالات أكادية وبحثية، مع البركب بشكل خاص على علوم الحاسب والهندسة والعلوم الأساسية .»"},{"chapter":7,"id":"KSU-428","page":"98","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["جامعة بكفيي إطار تعزيز التعاون مع الجامعات الصينية، أبرمت جامعة الملك سعود اتفاقية تعاون مع جامعة بكي تشمل عدة مجالات أكادية وبحثية، مع البركب على العلوم والهندسة واللغات .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":0,"e":"ورد في المذكرة: «جامعة بكفيي إطار تعزيز التعاون مع الجامعات الصينية، أبرمت جامعة الملك سعود اتفاقية تعاون مع جامعة بكي تشمل عدة مجالات أكادية وبحثية، مع البركب على العلوم والهندسة واللغات .»"},{"chapter":7,"id":"KSU-429","page":"107","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["رابطة الجامعات الإسلامية تساهم جامعة الملك سعود في أنشطة رابطة الجامعات الإسلامية، النري تجمع الجامعات في العالم الإسلامي ولا تعمل على تعزيز التعاون الأكادي والبحنري بينها .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","رابطة الجامعات الإسلامية تساهم جامعة الملك سعود في أنشطة رابطة الجامعات الإسلامية، النري تجمع الجامعات في العالم الإسلامي وتعمل على تعزيز التعاون الأكادي والبحنري بينها .","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «رابطة الجامعات الإسلامية تساهم جامعة الملك سعود في أنشطة رابطة الجامعات الإسلامية، النري تجمع الجامعات في العالم الإسلامي وتعمل على تعزيز التعاون الأكادي والبحنري بينها .»"},{"chapter":7,"id":"KSU-430","page":"100","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","الشراكات مع الجامعات الخليجية تحرص جامعة الملك سعود على تعزيز التعاون مع جامعات دول مجلس التعاون الخليخري، إاناً بأهمية التكامل الأكادي والبحنري على المستوى الإقلي .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «الشراكات مع الجامعات الخليجية تحرص جامعة الملك سعود على تعزيز التعاون مع جامعات دول مجلس التعاون الخليخري، إاناً بأهمية التكامل الأكادي والبحنري على المستوى الإقلي .»"},{"chapter":7,"id":"KSU-431","page":"93","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","تركز هذه الشراكة على تطوير البرامج الأكاد ية في كلية الهندسة، وتنفيذ مشاري ع بحثية مشبركة في مجالات الطاقة المتجددة، والذكاء الاصطن اعي، والروبوتات، وتقنية النانو .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «تركز هذه الشراكة على تطوير البرامج الأكاد ية في كلية الهندسة، وتنفيذ مشاري ع بحثية مشبركة في مجالات الطاقة المتجددة، والذكاء الاصطن اعي، والروبوتات، وتقنية النانو .»"},{"chapter":7,"id":"KSU-432","page":"104","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","الشراكات مع الوزارات والهيئات الحكومية تتعاون جامعة الملك سعود مع مختلف الوزارات والهيئات الحكومية في المملكة، مما يعزز دورها في خدمة المجتمع ودعم التنمية الوطنية .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «الشراكات مع الوزارات والهيئات الحكومية تتعاون جامعة الملك سعود مع مختلف الوزارات والهيئات الحكومية في المملكة، مما يعزز دورها في خدمة المجتمع ودعم التنمية الوطنية .»"},{"chapter":7,"id":"KSU-433","page":"94","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","وقد استفادت كلية الطب في جامعة الملك سعود من خبرات جامعة جونز هوبكب في تطوير مناهجها الدراسية وبرامج التدريب الشيري، مما ساهم في رفع مستوى التعل الطنرفيي الجامعة .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «وقد استفادت كلية الطب في جامعة الملك سعود من خبرات جامعة جونز هوبكب في تطوير مناهجها الدراسية وبرامج التدريب الشيري، مما ساهم في رفع مستوى التعل الطنرفيي الجامعة .»"},{"chapter":7,"id":"KSU-434","page":"101","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["معهد باستور Institut Pasteur في مجال العلوم الطبية والبيولوجية، تتعاون جامعة الملك سعود مع معهد باستور الفرنسي العريق ، خاصة في مجالات الأمراض المعدية واللقاحات .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":0,"e":"ورد في المذكرة: «معهد باستور Institut Pasteur في مجال العلوم الطبية والبيولوجية، تتعاون جامعة الملك سعود مع معهد باستور الفرنسي العريق ، خاصة في مجالات الأمراض المعدية واللقاحات .»"},{"chapter":7,"id":"KSU-435","page":"107","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","رابطة الجامعات البحثية الرائدة ( GCHERA ) انضمت جامعة الملك سعود إل رابطة الجامعات البحثية الرائدة، النري تضم الجامعات المتمب ة في م جال البحث العلمي حول العالم .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":1,"e":"ورد في المذكرة: «رابطة الجامعات البحثية الرائدة ( GCHERA ) انضمت جامعة الملك سعود إل رابطة الجامعات البحثية الرائدة، النري تضم الجامعات المتمب ة في م جال البحث العلمي حول العالم .»"},{"chapter":7,"id":"KSU-436","page":"93","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","معهد ماساتشوستس للتقنية ( ( MIT أبرمت جامعة الملك سعود اتفاقية تعاون اسبراتيخري مع معهد ماساتشوستس للتقنية، أحد أعرق المؤسسات الأكادية في مجال الهندسة والتقنية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":2,"e":"ورد في المذكرة: «معهد ماساتشوستس للتقنية ( ( MIT أبرمت جامعة الملك سعود اتفاقية تعاون اسبراتيخري مع معهد ماساتشوستس للتقنية، أحد أعرق المؤسسات الأكادية في مجال الهندسة والتقنية .»"},{"chapter":7,"id":"KSU-437","page":"98","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","جامعة طوكيو أقامت جامعة الملك سعود شراكة اسبراتيجية مع جامعة طوكيو، أعرق الجامعات اليابانية، تركز على البحث العلمي والابتكار في مجالات الهندسة والعلوم والتقنية .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «جامعة طوكيو أقامت جامعة الملك سعود شراكة اسبراتيجية مع جامعة طوكيو، أعرق الجامعات اليابانية، تركز على البحث العلمي والابتكار في مجالات الهندسة والعلوم والتقنية .»"},{"chapter":7,"id":"KSU-438","page":"103","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","شركة Siemens AG تربط جامعة الملك سعود بشركة سب الألمانية شراكة في مجالات الهندسة والتقنية، تشمل تق د برامج تدريبية وتوفب معدات وأجهزة متقدمة للمختبرات الهندسية .","شركة Siemens AG تربط جامعة الملك سعود بشركة سب الألمانية شراكة في مجالات الهندسة والتقنية، تشمل تق د برامج تدريبية وتوفب معدات وأجهزة متوقفة للمختبرات الهندسية .","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «شركة Siemens AG تربط جامعة الملك سعود بشركة سب الألمانية شراكة في مجالات الهندسة والتقنية، تشمل تق د برامج تدريبية وتوفب معدات وأجهزة متقدمة للمختبرات الهندسية .»"},{"chapter":7,"id":"KSU-439","page":"99","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","جامعة ماكجيل تتعاون جامعة الملك سعود مع جامعة ماكجيل في مونبريال ضمن مجالات الطب والصحة، حيث تستفيد كلية الطب في جامعة الملك سعود من خبرات هذه الجامعة العريقة ."],"a":3,"e":"ورد في المذكرة: «جامعة ماكجيل تتعاون جامعة الملك سعود مع جامعة ماكجيل في مونبريال ضمن مجالات الطب والصحة، حيث تستفيد كلية الطب في جامعة الملك سعود من خبرات هذه الجامعة العريقة .»"},{"chapter":7,"id":"KSU-440","page":"101","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","المراكز البحثية الوطنية تحرص جامعة الملك سعود على التعاون مع المراكز البحثية والمؤسسات العلمية الوطنية، مما يعزز دورها في خدمة التنمية الوطنية ودعم رؤية المملكة"],"a":3,"e":"ورد في المذكرة: «المراكز البحثية الوطنية تحرص جامعة الملك سعود على التعاون مع المراكز البحثية والمؤسسات العلمية الوطنية، مما يعزز دورها في خدمة التنمية الوطنية ودعم رؤية المملكة»"},{"chapter":7,"id":"KSU-441","page":"99","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["جامعة تورنتو تربط جامعة الملك سعود بجامعة تورنتو الكندية شراكة في مجالات الطب والهندسة والعلوم، تشم ل تبادل الخبرات الأكادية والبحثية وتنفيذ مشاري ع مشبركة .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «جامعة تورنتو تربط جامعة الملك سعود بجامعة تورنتو الكندية شراكة في مجالات الطب والهندسة والعلوم، تشم ل تبادل الخبرات الأكادية والبحثية وتنفيذ مشاري ع مشبركة .»"},{"chapter":7,"id":"KSU-442","page":"98","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","المعهد الهندي للتقنية ( IIT) تتعاون جامعة الملك سعود مع المعاهد الهندية للتقنية، خاصة معهد بومباي ومعهد دلهي، في مجالات الهندسة والتقنية والبحث العلمي ."],"a":3,"e":"ورد في المذكرة: «المعهد الهندي للتقنية ( IIT) تتعاون جامعة الملك سعود مع المعاهد الهندية للتقنية، خاصة معهد بومباي ومعهد دلهي، في مجالات الهندسة والتقنية والبحث العلمي .»"},{"chapter":7,"id":"KSU-443","page":"102","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","شركة سابك تتعاون جامعة الملك سعود مع الشركة السعودية للصناعات الأساسية ( سابك ) في مجالات البحث والتطوير، خاصة في مجالات الببروكاويات والمواد المتوقفة .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","شركة سابك تتعاون جامعة الملك سعود مع الشركة السعودية للصناعات الأساسية ( سابك ) في مجالات البحث والتطوير، خاصة في مجالات الببروكاويات والمواد المتقدمة ."],"a":3,"e":"ورد في المذكرة: «شركة سابك تتعاون جامعة الملك سعود مع الشركة السعودية للصناعات الأساسية ( سابك ) في مجالات البحث والتطوير، خاصة في مجالات الببروكاويات والمواد المتقدمة .»"},{"chapter":7,"id":"KSU-444","page":"96","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","جامعة كامبريدج تُعد جامعة كامبريدج من أقدم وأعرق الجامعات في العالم، وقد أقامت جامعة الملك سعود معها شراكة اسبراتيجية تشمل عدة مجالات أكادية وبحثية .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «جامعة كامبريدج تُعد جامعة كامبريدج من أقدم وأعرق الجامعات في العالم، وقد أقامت جامعة الملك سعود معها شراكة اسبراتيجية تشمل عدة مجالات أكادية وبحثية .»"},{"chapter":7,"id":"KSU-445","page":"93","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["جامعة هارفارد تُعد الشراكة بي جامعة الملك سعود وجامعة هارفارد من أبرز الشراكات الاسبراتيجية النري أقامتها الجامعة مع المؤسسات الأكادية العالمية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «جامعة هارفارد تُعد الشراكة بي جامعة الملك سعود وجامعة هارفارد من أبرز الشراكات الاسبراتيجية النري أقامتها الجامعة مع المؤسسات الأكادية العالمية .»"},{"chapter":7,"id":"KSU-446","page":"96","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","كما يتاح لأعضاء هيئة التدريس والباحثفيي جامعة الملك سعود فرصة الزيارة البحثية لجامعة كامبر يدج والاستفادة من مكتباتها ومرافقها البحثية المتمب ة .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":1,"e":"ورد في المذكرة: «كما يتاح لأعضاء هيئة التدريس والباحثفيي جامعة الملك سعود فرصة الزيارة البحثية لجامعة كامبر يدج والاستفادة من مكتباتها ومرافقها البحثية المتمب ة .»"},{"chapter":7,"id":"KSU-447","page":"97","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","جامعة أمسبردام تتعاون جامعة الملك سعود مع جامعة أمسبردام في هولندا بشراكات أكادية وبحثية متعددة، مع تركب خاص على العلوم الاجتماعية والإنسانية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":2,"e":"ورد في المذكرة: «جامعة أمسبردام تتعاون جامعة الملك سعود مع جامعة أمسبردام في هولندا بشراكات أكادية وبحثية متعددة، مع تركب خاص على العلوم الاجتماعية والإنسانية .»"},{"chapter":7,"id":"KSU-448","page":"104","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","هيئة الصحة العامة ( وقاية ) تتعاون جامعة الملك سعود مع هيئة الصحة العامة في مجالات البحث العلمي المتعلقة بالصحة العام ة والوقاية من الأمراض .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «هيئة الصحة العامة ( وقاية ) تتعاون جامعة الملك سعود مع هيئة الصحة العامة في مجالات البحث العلمي المتعلقة بالصحة العام ة والوقاية من الأمراض .»"},{"chapter":7,"id":"KSU-449","page":"96","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","كما تتضمن الاتفاقية برامج للتبادل الأكادي وتنفيذ مشاري ع بحثية مشبركة، بالإضافة إل تبادل الخبرات في مجال تطوير البرامج الأكادية والبحنري ة .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «كما تتضمن الاتفاقية برامج للتبادل الأكادي وتنفيذ مشاري ع بحثية مشبركة، بالإضافة إل تبادل الخبرات في مجال تطوير البرامج الأكادية والبحنري ة .»"},{"chapter":7,"id":"KSU-450","page":"101","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","معهد ماكس بلانك MPG تتعاون جامعة الملك سعود مع عدة معاهد تابعة لجمعية ماكس بلانك الألمانية، خاصة في مجالات الكياء والفب ياء وعلوم المواد .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":2,"e":"ورد في المذكرة: «معهد ماكس بلانك MPG تتعاون جامعة الملك سعود مع عدة معاهد تابعة لجمعية ماكس بلانك الألمانية، خاصة في مجالات الكياء والفب ياء وعلوم المواد .»"},{"chapter":7,"id":"KSU-451","page":"93","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","كذلك تبادل أعضاء هيئة التدريس والباحثي ، حيث يزور عدد من أساتذة جامعة هارفارد جامعة الملك سعود بشكل دوري لإلقاء محاض ات وورش عمل متخصصة .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «كذلك تبادل أعضاء هيئة التدريس والباحثي ، حيث يزور عدد من أساتذة جامعة هارفارد جامعة الملك سعود بشكل دوري لإلقاء محاض ات وورش عمل متخصصة .»"},{"chapter":7,"id":"KSU-452","page":"103","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","الشراكات مع الشركات الوطنية تحرص جامعة الملك سعود على التعاون مع الشركات الوطنية لدعم الاقتصاد الوطن ي والمساهمة في تحقيق رؤية المملكة"],"a":3,"e":"ورد في المذكرة: «الشراكات مع الشركات الوطنية تحرص جامعة الملك سعود على التعاون مع الشركات الوطنية لدعم الاقتصاد الوطن ي والمساهمة في تحقيق رؤية المملكة»"},{"chapter":7,"id":"KSU-453","page":"109","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["برامج التبادل الطلانري تتيح جامعة الملك سعود لطلابها فرصاً متنوعة للدراسة في جامعات شريكة حول العالم من خلال برام ج التبادل الطلانري .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":0,"e":"ورد في المذكرة: «برامج التبادل الطلانري تتيح جامعة الملك سعود لطلابها فرصاً متنوعة للدراسة في جامعات شريكة حول العالم من خلال برام ج التبادل الطلانري .»"},{"chapter":7,"id":"KSU-454","page":"112","q":"أكمل العبارة الصحيحة وفق المذكرة: «حيث نجحت الجامعة في بناء شبكة واسعة تضم أكبر من ____ اتفاقية مع مؤسسات في 60 دولة، مما عزز مكانتها كجامعة بحثية رائدة إقلياً ودولياً .»","o":["505","500","502","501"],"a":1,"e":"ورد في المذكرة: «حيث نجحت الجامعة في بناء شبكة واسعة تضم أكبر من 500 اتفاقية مع مؤسسات في 60 دولة، مما عزز مكانتها كجامعة بحثية رائدة إقلياً ودولياً .»"},{"chapter":7,"id":"KSU-455","page":"98","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","جامعة سنغافورة الوطنية تتعاون جامعة الملك سعود مع جامعة سنغافورة الوطنية في عدة مجالات، مع البركب على الهندسة والتقنية والأعمال .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «جامعة سنغافورة الوطنية تتعاون جامعة الملك سعود مع جامعة سنغافورة الوطنية في عدة مجالات، مع البركب على الهندسة والتقنية والأعمال .»"},{"chapter":7,"id":"KSU-456","page":"101","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يتيح هذا التعاون لباحنري الجامعة المشاركة في الت جارب العلمية المتوقفة والاستفادة من المرافق البحثية الفريدة المتوفرة في المركز .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يتيح هذا التعاون لباحنري الجامعة المشاركة في الت جارب العلمية المتقدمة والاستفادة من المرافق البحثية الفريدة المتوفرة في المركز ."],"a":3,"e":"ورد في المذكرة: «يتيح هذا التعاون لباحنري الجامعة المشاركة في الت جارب العلمية المتقدمة والاستفادة من المرافق البحثية الفريدة المتوفرة في المركز .»"},{"chapter":7,"id":"KSU-457","page":"93","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","وقد ساهمت هذه الشراكة في تطوير برامج الابتكار في الجامعة، وإنشاء مراكز متخصصة لدعم ريادة الأعمال بي الطلاب وأعضاء هيئة التدريس ."],"a":3,"e":"ورد في المذكرة: «وقد ساهمت هذه الشراكة في تطوير برامج الابتكار في الجامعة، وإنشاء مراكز متخصصة لدعم ريادة الأعمال بي الطلاب وأعضاء هيئة التدريس .»"},{"chapter":7,"id":"KSU-458","page":"104","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","وزارة التعل تتعاون جامعة الملك سعود مع وزارة التعل في تطوير السياسات التعلية وتنفيذ برامج تدري بية للمعلمي والقيادات البربوية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «وزارة التعل تتعاون جامعة الملك سعود مع وزارة التعل في تطوير السياسات التعلية وتنفيذ برامج تدري بية للمعلمي والقيادات البربوية .»"},{"chapter":7,"id":"KSU-459","page":"102","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","شركة IBM أبرمت جامعة الملك سعود اتفاقية شراكة خلية، مثل الإضاءة الطبيعية وكفاءة الطاقة، وإدارة المواد .»"},{"chapter":8,"id":"KSU-468","page":"120","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["وختاماً ، وانطلاقاً من دور الجامعة في دعم التحول ي المعرف وخدمة المجتمع ، نطمح مستقبلاً إل بناء شراكات فاعلة ومستدامة مع جهات الجامعة المختلفة ، تسهم في تطوير هذه المذكرة وإصدار نسخ لاحقة منها ، بما يواكب المتغب ات المعرفية ، ويعزز ثقافة القراءة والاطلا ع .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","وختاماً ، وانطلاقاً من دور الجامعة في دعم التحول ي المعرف وخدمة المجتمع ، نطمح مستقبلاً إل بناء شراكات فاعلة ومستدامة مع جهات الجامعة المختلفة ، لا تسهم في تطوير هذه المذكرة وإصدار نسخ لاحقة منها ، بما يواكب المتغب ات المعرفية ، ويعزز ثقافة القراءة والاطلا ع .","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «وختاماً ، وانطلاقاً من دور الجامعة في دعم التحول ي المعرف وخدمة المجتمع ، نطمح مستقبلاً إل بناء شراكات فاعلة ومستدامة مع جهات الجامعة المختلفة ، تسهم في تطوير هذه المذكرة وإصدار نسخ لاحقة منها ، بما يواكب المتغب ات المعرفية ، ويعزز ثقافة القراءة والاطلا ع .»"},{"chapter":8,"id":"KSU-469","page":"116","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","وتتضمن البيئة المكتبية إرشادات لكل العناض المادية في مجال الفراغات والتجهب ات اللازمة للأعمال المكتبية، ومن أبرز مكونات ها ما يلىي : منطقة العمل الرئيسية : ي البيئة الم المنطقة النري يعمل بها الموظف لأداء الأنشطة اليومية ف كتبية .","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «وتتضمن البيئة المكتبية إرشادات لكل العناض المادية في مجال الفراغات والتجهب ات اللازمة للأعمال المكتبية، ومن أبرز مكونات ها ما يلىي : منطقة العمل الرئيسية : ي البيئة الم المنطقة النري يعمل بها الموظف لأداء الأنشطة اليومية ف كتبية .»"},{"chapter":8,"id":"KSU-470","page":"118","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يتول المدير المسؤولية الأول في تهيئة بيئة عمل صحية ومحفزة، فهو القدوة والمحرك الأساسي لتحقيق رضا الموظفي ورفع كفاءتهم، مما يتطلب ي التحلىّ بمجموعة من السلوكيات القيادية الت ي تنعكس إيجاباً على البيئة المحيطة، ومن أبرز ها : تقي الموظفي وفق معايب الجدارة والاستحقاق، بعيداً عن أي تحب أو تميب .","يُطبق ذلك على التعليم العام فقط.","يتول المدير المسؤولية الأول في تهيئة بيئة عمل صحية ومحفزة، فهو القدوة والمحرك الأساسي لتحقيق رضا الموظفي ورفع كفاءتهم، مما يتطلب ي التحلىّ بمجموعة من السلوكيات القيادية الت ي تنعكس إيجاباً على البيئة المحيطة، ومن أبرز ها : تقي الموظفي بخلاف معايب الجدارة والاستحقاق، بعيداً عن أي تحب أو تميب ."],"a":1,"e":"ورد في المذكرة: «يتول المدير المسؤولية الأول في تهيئة بيئة عمل صحية ومحفزة، فهو القدوة والمحرك الأساسي لتحقيق رضا الموظفي ورفع كفاءتهم، مما يتطلب ي التحلىّ بمجموعة من السلوكيات القيادية الت ي تنعكس إيجاباً على البيئة المحيطة، ومن أبرز ها : تقي الموظفي وفق معايب الجدارة والاستحقاق، بعيداً عن أي تحب أو تميب .»"},{"chapter":8,"id":"KSU-471","page":"116","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["البيئة التقنية هي منظومة عمل متكاملة تشمل الأجهزة والتقنيات والبنية التحتية الرقمية النري تخدم سب العم ل داخل المنظمة، حيث تتضمن تنظ وتوزي ع الأجهزة والشبكات، وتخطيط المساحات التقنية، وضمان كفا ءة الأداء والصيانة واستخدام التقنية في العمل عن بُعد .","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «البيئة التقنية هي منظومة عمل متكاملة تشمل الأجهزة والتقنيات والبنية التحتية الرقمية النري تخدم سب العم ل داخل المنظمة، حيث تتضمن تنظ وتوزي ع الأجهزة والشبكات، وتخطيط المساحات التقنية، وضمان كفا ءة الأداء والصيانة واستخدام التقنية في العمل عن بُعد .»"},{"chapter":8,"id":"KSU-472","page":"119","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","سلوكيات الموظف المطلوبة بيئة العمل والشفافية والإفص اح إن الاستثمار في تحسي بيئة العمل ينعكس إيجاب ي اً على المؤسسة بأكملها، وقد أثبتت الدراسات في مجال الإدارة منذ أوائل القرن الماض ي أن ظروف العمل تُؤثر بشكل مباشر في الإنتاجية ورضا الموظفي ؛"],"a":3,"e":"ورد في المذكرة: «سلوكيات الموظف المطلوبة بيئة العمل والشفافية والإفص اح إن الاستثمار في تحسي بيئة العمل ينعكس إيجاب ي اً على المؤسسة بأكملها، وقد أثبتت الدراسات في مجال الإدارة منذ أوائل القرن الماض ي أن ظروف العمل تُؤثر بشكل مباشر في الإنتاجية ورضا الموظفي ؛»"},{"chapter":8,"id":"KSU-473","page":"116","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","ولأن القوى العاملة تمثل الركب ة الأساسية لأي منظومة تسعى إل تحقيق أهدافها الاسبراتيجية، فإن تطوير البيئة المكتبية ينعكس إيجابياً على أداء الموظف، ويرفع من روحه المعن وية ويشعره بالراحة ، مما يؤدي بدوره لرفع الإنتاجية .","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":1,"e":"ورد في المذكرة: «ولأن القوى العاملة تمثل الركب ة الأساسية لأي منظومة تسعى إل تحقيق أهدافها الاسبراتيجية، فإن تطوير البيئة المكتبية ينعكس إيجابياً على أداء الموظف، ويرفع من روحه المعن وية ويشعره بالراحة ، مما يؤدي بدوره لرفع الإنتاجية .»"},{"chapter":8,"id":"KSU-474","page":"116","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","البيئة التشاركية هي بيئة عمل متكاملة تُصمِم لدعم التعاون والتفاعل بي الموظفي ، من خلال توفب مساحات مش تركة مثل غرف الاجتماعات والمرافق الخدمية، مع مراعاة إتاحة الاستخدام لجميع الفئات، بما في ذلك الأشخاص ذوي الإعاقة ."],"a":3,"e":"ورد في المذكرة: «البيئة التشاركية هي بيئة عمل متكاملة تُصمِم لدعم التعاون والتفاعل بي الموظفي ، من خلال توفب مساحات مش تركة مثل غرف الاجتماعات والمرافق الخدمية، مع مراعاة إتاحة الاستخدام لجميع الفئات، بما في ذلك الأشخاص ذوي الإعاقة .»"},{"chapter":8,"id":"KSU-475","page":"117","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","البيئة الصحية والآمنة تُعن هذه البيئة بضمان سلامة الموظفي وصحتهم أثناء العمل، من خلال تطبيق معايب السلامة المهنية، والحد من المخاطر المحتملة في مكان العمل، ورفع مستوى رضا الموظفي ، بما يضمن بن ة عمل آمنه وصحية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":2,"e":"ورد في المذكرة: «البيئة الصحية والآمنة تُعن هذه البيئة بضمان سلامة الموظفي وصحتهم أثناء العمل، من خلال تطبيق معايب السلامة المهنية، والحد من المخاطر المحتملة في مكان العمل، ورفع مستوى رضا الموظفي ، بما يضمن بن ة عمل آمنه وصحية .»"},{"chapter":8,"id":"KSU-476","page":"118","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","ي الجهات الحكومية على مجموعة من المقومات والممارسات النري تعز تعتمد بيئة العمل الإيجابية ف ز الأداء المؤسسي، وتدعم تحقيق الأهداف، ومن أبرزها : تشجيع روح المبادرة والابتكار لدى الموظفي ."],"a":3,"e":"ورد في المذكرة: «ي الجهات الحكومية على مجموعة من المقومات والممارسات النري تعز تعتمد بيئة العمل الإيجابية ف ز الأداء المؤسسي، وتدعم تحقيق الأهداف، ومن أبرزها : تشجيع روح المبادرة والابتكار لدى الموظفي .»"},{"chapter":8,"id":"KSU-477","page":"120","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","ولأي استفسارات أو مقبرحات تطويرية متعلقة بالمذكرة ، كنكم التواصل مع وحدة البرقيات بإدارة شؤون الموظفي بعمادة الموارد البشرية عبر البريد الإلكبرون ي PROMOTIONS@KSU.EDU.SA .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":1,"e":"ورد في المذكرة: «ولأي استفسارات أو مقبرحات تطويرية متعلقة بالمذكرة ، كنكم التواصل مع وحدة البرقيات بإدارة شؤون الموظفي بعمادة الموارد البشرية عبر البريد الإلكبرون ي PROMOTIONS@KSU.EDU.SA .»"},{"chapter":8,"id":"KSU-478","page":"118","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["ي الجهة الحكومية، وضمان حقوق إيجاد أدوات فعّالة لا تهدف إل استقرار الأوضاع الوظيفية ف الموظفي الوظيفية ومعاملتهم بطريقة عادلة ومنصفة دون تميب .","ي الجهة الحكومية، وضمان حقوق إيجاد أدوات فعّالة تهدف إل استقرار الأوضاع الوظيفية ف الموظفي الوظيفية ومعاملتهم بطريقة عادلة ومنصفة دون تميب .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «ي الجهة الحكومية، وضمان حقوق إيجاد أدوات فعّالة تهدف إل استقرار الأوضاع الوظيفية ف الموظفي الوظيفية ومعاملتهم بطريقة عادلة ومنصفة دون تميب .»"},{"chapter":8,"id":"KSU-479","page":"115","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","ي وف ظل التحولات الحديثة، أصبحت بيئة العمل عنصراً حا سماً في استقطاب الكفاءات والمحافظة عليها، لدورها المباشر في تمكي الأداء، وتعزيز الإبداع، وتحقيق ال نجاح المؤسسي ."],"a":3,"e":"ورد في المذكرة: «ي وف ظل التحولات الحديثة، أصبحت بيئة العمل عنصراً حا سماً في استقطاب الكفاءات والمحافظة عليها، لدورها المباشر في تمكي الأداء، وتعزيز الإبداع، وتحقيق ال نجاح المؤسسي .»"},{"chapter":8,"id":"KSU-480","page":"114","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["وي هدف هذا الباب إل استعراض مفهوم بيئة العمل ومكوناتها، وأبرز ممارساتها، بما يدعم تحقيق مستهدفات الجامعة وتوجهاتها المستقبلية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","وي هدف هذا الباب إل استعراض مفهوم بيئة العمل ومكوناتها، وأبرز ممارساتها، بما يدعم تحقيق مسلا تهدفات الجامعة وتوجهاتها المستقبلية .","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «وي هدف هذا الباب إل استعراض مفهوم بيئة العمل ومكوناتها، وأبرز ممارساتها، بما يدعم تحقيق مستهدفات الجامعة وتوجهاتها المستقبلية .»"},{"chapter":8,"id":"KSU-481","page":"117","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["فالتصم الجيد يتطلب تنظاً شاملاً لكافة العناض والمكونات على مستوى المؤسسة بأكملها أو داخل الإدارات والأقسام، بهدف تحسي البيئة وزيادة الفعالية وراحة الموظفي .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «فالتصم الجيد يتطلب تنظاً شاملاً لكافة العناض والمكونات على مستوى المؤسسة بأكملها أو داخل الإدارات والأقسام، بهدف تحسي البيئة وزيادة الفعالية وراحة الموظفي .»"},{"chapter":8,"id":"KSU-482","page":"114","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["كما تقوم بيئة العمل الفاعلة على أدوار ومسؤوليات متوازنة بي القيادات والموظفي ، في إطار من الشفافية والإفصاح، بم ا يعزز الثقة ويرفع مستوى الأداء المؤسسي .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":0,"e":"ورد في المذكرة: «كما تقوم بيئة العمل الفاعلة على أدوار ومسؤوليات متوازنة بي القيادات والموظفي ، في إطار من الشفافية والإفصاح، بم ا يعزز الثقة ويرفع مستوى الأداء المؤسسي .»"},{"chapter":8,"id":"KSU-483","page":"115","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","ومع تطور بيئات العمل ، فإن الاهتمام بها يُسهم في تحقيق الأ هداف ويحسن من جودة العمل ويحقق رضا الموظفي ، ويعزز الإنتاجية على المستويي الفردي والمؤسسي .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «ومع تطور بيئات العمل ، فإن الاهتمام بها يُسهم في تحقيق الأ هداف ويحسن من جودة العمل ويحقق رضا الموظفي ، ويعزز الإنتاجية على المستويي الفردي والمؤسسي .»"},{"chapter":8,"id":"KSU-484","page":"115","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","بيئة العمل هي كل ما يحيط بالموظف داخل جهة العمل، من مكان عمله، إل العلاقات المهنية، مروراً بالثقافة التنظية، وصولاً إل السياسات والإجراءات .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «بيئة العمل هي كل ما يحيط بالموظف داخل جهة العمل، من مكان عمله، إل العلاقات المهنية، مروراً بالثقافة التنظية، وصولاً إل السياسات والإجراءات .»"},{"chapter":8,"id":"KSU-485","page":"116","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","البيئة المكتبية تُ عدّ بيئة العمل لوصف.","يُعد تصم المكاتب من العوامل المؤثرة على جودة بيئة العمل ، ويجب أخذه في الاعتبار عند تطبيق مكونات البيئة .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «يُعد تصم المكاتب من العوامل المؤثرة على جودة بيئة العمل ، ويجب أخذه في الاعتبار عند تطبيق مكونات البيئة .»"},{"chapter":8,"id":"KSU-494","page":"116","q":"ما المقصود بـ «منطقة العمل التعاونية» وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","مخصصة لتعزيز العمل الجماعي ومشاركة المعرفة والتفاعل بي الأفراد ."],"a":3,"e":"ورد في المذكرة: «منطقة العمل التعاونية : مخصصة لتعزيز العمل الجماعي ومشاركة المعرفة والتفاعل بي الأفراد .»"},{"chapter":8,"id":"KSU-495","page":"116","q":"ما المقصود بـ «منطقة عدم الإزعاج» وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","مهيأة لإنجاز بعض المهام الخاصة بالعمل والنري تتطلب الخصوصية والشية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":1,"e":"ورد في المذكرة: «منطقة عدم الإزعاج : مهيأة لإنجاز بعض المهام الخاصة بالعمل والنري تتطلب الخصوصية والشية .»"},{"chapter":8,"id":"KSU-496","page":"116","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","وتهدف إل ضمان أمن المعلومات، وتمكي استمرارية الأعمال بكفاءة وموثوقية .","يُطبق ذلك على التعليم العام فقط.","ولا تهدف إل ضمان أمن المعلومات، وتمكي استمرارية الأعمال بكفاءة وموثوقية ."],"a":1,"e":"ورد في المذكرة: «وتهدف إل ضمان أمن المعلومات، وتمكي استمرارية الأعمال بكفاءة وموثوقية .»"},{"chapter":8,"id":"KSU-497","page":"116","q":"ما المقصود بـ «وحدات الحفظ والتخزين» وفق المذكرة؟","o":["مساحة لحفظ الوثائق والمستلزمات، تُصمم بخلافاً لاحتياجات العمل .","مساحة لحفظ الوثائق والمستلزمات، تُصمم وفقاً لاحتياجات العمل .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «وحدات الحفظ والتخزين : مساحة لحفظ الوثائق والمستلزمات، تُصمم وفقاً لاحتياجات العمل .»"},{"chapter":8,"id":"KSU-498","page":"119","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","السعىي الدائم لتحسي وتطوير أدائه وقدراته المهنية، والمشاركة في برامج التدريب والتطوير الم تاحة ."],"a":3,"e":"ورد في المذكرة: «السعىي الدائم لتحسي وتطوير أدائه وقدراته المهنية، والمشاركة في برامج التدريب والتطوير الم تاحة .»"},{"chapter":8,"id":"KSU-499","page":"119","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","الالبر ام بالروح الإيجابية والتعاون في جميع الممارسات اليومية، بما يسهم في تعزيز بيئة العم ل .","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «الالبر ام بالروح الإيجابية والتعاون في جميع الممارسات اليومية، بما يسهم في تعزيز بيئة العم ل .»"},{"chapter":8,"id":"KSU-500","page":"115","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","تمثل بيئة العمل ركب ة أساسية في تعزيز إنتاجية الموظف، وانتمائه للمكان الذي يعمل فيه .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «تمثل بيئة العمل ركب ة أساسية في تعزيز إنتاجية الموظف، وانتمائه للمكان الذي يعمل فيه .»"}];
const letters=['أ','ب','ج','د'];
const chapterMeta=[
 {id:'1',name:'الباب الأول',title:'نظام الجامعة الأساس'},
 {id:'2',name:'الباب الثاني',title:'تاريخ الجامعة'},
 {id:'3',name:'الباب الثالث',title:'الهيكل الأكاديمي والتنظيمي'},
 {id:'4',name:'الباب الرابع',title:'البحث العلمي والابتكار'},
 {id:'5',name:'الباب الخامس',title:'التصنيفات الدولية والمحلية'},
 {id:'6',name:'الباب السادس',title:'المنجزات'},
 {id:'7',name:'الباب السابع',title:'الشراكات والاتفاقيات'},
 {id:'8',name:'الباب الثامن',title:'بيئة العمل'},
 {id:'all',name:'جميع الأبواب',title:'اختبار شامل'}
];
let selected=[],answers={},submitted={},current=0,studentName='',selectedChapter='1';
const $=id=>document.getElementById(id);
function show(id){['home','quiz','result','review'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function chapterQuestions(){return selectedChapter==='all'?bank:bank.filter(q=>String(q.chapter)===selectedChapter)}
function gradeFrom30(score){if(score>=27)return 'ممتاز';if(score>=24)return 'جيد جدًا';if(score>=21)return 'جيد';return 'يحتاج مراجعة'}
function currentCorrect(){return selected.filter(i=>submitted[i]&&answers[i]===bank[i].a).length}
function score30(){return selected.length?Math.round((currentCorrect()/selected.length)*30):0}
function updateScorePanel(){
  const s=score30(),pct=Math.round((s/30)*100);
  $('currentScore').textContent=`${s} / 30`;
  $('circlePct').textContent=`${pct}%`;
  $('scoreBar').style.width=`${pct}%`;
  $('scoreCircle').style.background=`conic-gradient(var(--green) ${pct*3.6}deg,#e5ebf0 0deg)`;
  $('remainingText').textContent=`${30-s} درجة متبقية للوصول إلى الدرجة الكاملة`;
  $('answeredMeta').textContent=Object.keys(submitted).length;
}
function refreshQuestionCount(){
  const c=$('questionCount'),available=chapterQuestions().length;c.innerHTML='';
  [10,20,30,50,100,200].filter(n=>n<available).forEach(n=>c.add(new Option(n,n)));
  if(available>0)c.add(new Option(`كل الأسئلة (${available})`,available));else c.add(new Option('لا توجد أسئلة بعد',0));
  $('startBtn').disabled=available===0;$('startBtn').style.opacity=available===0?'.55':'1';
}
function renderChapterButtons(){
  const box=$('chapterButtons');box.innerHTML='';
  chapterMeta.forEach(ch=>{
    const count=ch.id==='all'?bank.length:bank.filter(q=>String(q.chapter)===ch.id).length;
    const b=document.createElement('button');b.type='button';b.dataset.chapter=ch.id;b.className='chapter-btn'+(selectedChapter===ch.id?' active':'');
    b.innerHTML=`<span class="chapter-title">${ch.name}</span><span class="chapter-count">${count} سؤال</span>`;
    b.onclick=()=>{selectedChapter=ch.id;renderChapterButtons();refreshQuestionCount();$('chapterNote').textContent=count?`سيتم الاختبار من ${ch.name} — ${ch.title}.`:`لم تُضف أسئلة هذا الباب بعد.`};
    box.appendChild(b);
  });
}
renderChapterButtons();refreshQuestionCount();
$('chapterNote').textContent='سيتم الاختبار من الباب الأول — نظام الجامعة الأساس.';
$('startBtn').onclick=()=>{
  studentName=$('studentName').value.trim();
  if(!studentName){alert('اكتب الاسم أولًا');$('studentName').focus();return}
  let pool=chapterQuestions();if(!pool.length){alert('لا توجد أسئلة في هذا الباب بعد');return}
  const n=Number($('questionCount').value);let ids=pool.map(q=>bank.indexOf(q));
  if($('orderMode').value==='random')ids=shuffle(ids);
  selected=ids.slice(0,n);answers={};submitted={};current=0;show('quiz');render();
};
function render(){
  const qi=selected[current],q=bank[qi],done=submitted[qi];
  $('counter').textContent=`السؤال ${current+1} من ${selected.length}`;
  $('questionPoint').textContent=(30/selected.length).toFixed(2);
  $('qid').textContent=`${q.id} — الصفحة ${q.page}`;
  $('questionText').textContent=q.q;
  $('currentChapter').textContent=chapterMeta.find(c=>c.id===String(q.chapter))?.name||'';
  $('currentQuestionMeta').textContent=`${current+1} من ${selected.length}`;
  const box=$('options');box.innerHTML='';
  q.o.forEach((t,i)=>{
    const b=document.createElement('button');
    let state='';
    if(done&&i===q.a)state=' correct';
    else if(done&&answers[qi]===i&&i!==q.a)state=' wrong';
    else if(answers[qi]===i)state=' selected';
    b.className='option'+state;b.disabled=!!done;
    b.innerHTML=`<span class="radio"></span><span>${t}</span>`;
    b.onclick=()=>{answers[qi]=i;render()};
    box.appendChild(b);
  });
  const f=$('feedback');
  if(done){
    const ok=answers[qi]===q.a;f.className='feedback '+(ok?'good':'bad');
    f.innerHTML=`<strong>${ok?'إجابة صحيحة':'إجابة غير صحيحة'}</strong><br>الإجابة الصحيحة: ${letters[q.a]}) ${q.o[q.a]}<br>${q.e}<br><span class="small">الصفحة: ${q.page}</span>`;
  }else{f.className='feedback hidden';f.innerHTML=''}
  $('prevBtn').disabled=current===0;
  $('nextBtn').textContent=!done?'تحقق من الإجابة':current===selected.length-1?'عرض النتيجة':'التالي';
  updateScorePanel();
}
$('prevBtn').onclick=()=>{if(current>0){current--;render()}};
$('nextBtn').onclick=()=>{
  const qi=selected[current];
  if(!submitted[qi]){if(answers[qi]===undefined){alert('اختر إجابة أولًا');return}submitted[qi]=true;render();return}
  if(current<selected.length-1){current++;render()}else finish();
};
function finish(){
  const correct=selected.filter(i=>answers[i]===bank[i].a).length;
  const s30=Math.round(correct/selected.length*30);
  const pct=Math.round(correct/selected.length*100);
  const meta=chapterMeta.find(c=>c.id===selectedChapter);
  $('resultScore').textContent=`${s30} / 30`;
  $('resultGrade').textContent=gradeFrom30(s30);
  $('resultText').textContent=`أحسنت يا ${studentName}، أجبت إجابة صحيحة عن ${correct} من ${selected.length} سؤالًا (${pct}%) في ${meta?.name||'الاختبار'}.`;
  show('result');
}
$('reviewBtn').onclick=()=>{
  const list=$('reviewList');list.innerHTML='';
  selected.forEach((qi,n)=>{
    const q=bank[qi],ok=answers[qi]===q.a,d=document.createElement('div');d.className='review-item';
    d.innerHTML=`<strong>${n+1}. ${q.q}</strong><p>إجابتك: ${answers[qi]===undefined?'لم تجب':letters[answers[qi]]+') '+q.o[answers[qi]]}</p><p>الإجابة الصحيحة: ${letters[q.a]}) ${q.o[q.a]}</p><p>${q.e}</p><span class="small">الصفحة: ${q.page} — ${ok?'صحيحة':'غير صحيحة'}</span>`;
    list.appendChild(d);
  });
  show('review');
};
$('restartBtn').onclick=()=>show('home');
$('backResultBtn').onclick=()=>show('result');
</script>
