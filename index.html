ا رئيس الجامعة، تكون مدة العضوية في المجلس ( ثلاث ) سنوات قابلة للتجديد مرتي .»"},{"chapter":1,"id":"KSU-069","page":"19","q":"ما المقصود بـ «تتألف موارد الجامعة مما ي يأتر» وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","ما قد يخصص لها من إعانات حكومية ."],"a":3,"e":"ورد في المذكرة: «تتألف موارد الجامعة مما ي يأتر : 1 ما قد يخصص لها من إعانات حكومية .»"},{"chapter":1,"id":"KSU-070","page":"9","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["اعتماد لائحة ضوابط ومعايب العضوية في المجلس، النري تشتمل على ضوابط العضوية، وقواعد ا ختيار أعضاء المجلس وعزلهم .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «اعتماد لائحة ضوابط ومعايب العضوية في المجلس، النري تشتمل على ضوابط العضوية، وقواعد ا ختيار أعضاء المجلس وعزلهم .»"},{"chapter":1,"id":"KSU-071","page":"13","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":[".12 الموافقة على إنشاء الفروع والكليات والمعاهد والأقسام ومراكز الأبحاث والبرامج؛",".7 الموافقة على إنشاء الفروع والكليات والمعاهد والأقسام ومراكز الأبحاث والبرامج؛",".9 الموافقة على إنشاء الفروع والكليات والمعاهد والأقسام ومراكز الأبحاث والبرامج؛",".8 الموافقة على إنشاء الفروع والكليات والمعاهد والأقسام ومراكز الأبحاث والبرامج؛"],"a":1,"e":"ورد في المذكرة: «.7 الموافقة على إنشاء الفروع والكليات والمعاهد والأقسام ومراكز الأبحاث والبرامج؛»"},{"chapter":1,"id":"KSU-072","page":"18","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","أي مصلحة شخصية في عقود الجامعة، إلا إذا أفصح عن ذلك واتُبعت الإجراءات والسياسات؛"],"a":3,"e":"ورد في المذكرة: «أي مصلحة شخصية في عقود الجامعة، إلا إذا أفصح عن ذلك واتُبعت الإجراءات والسياسات؛»"},{"chapter":1,"id":"KSU-073","page":"14","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["إقرار الإجراءات المنظمة للتواصل الإعلامي، بناءً على ما يقبرحه مجلس إدارة الهيئة .","إقرار الإجراءات المنظمة للتواصل الإعلامي، بناءً على ما يقبرحه رئيس الجامعة .","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":1,"e":"ورد في المذكرة: «إقرار الإجراءات المنظمة للتواصل الإعلامي، بناءً على ما يقبرحه رئيس الجامعة .»"},{"chapter":1,"id":"KSU-074","page":"12","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["بناءً عل ى توصية من رئيس الجامعة، وتعيي أعضاء هيئة التدريس وفقًا للوائح .","يُطبق ذلك على التعليم العام فقط.","بناءً عل ى توصية من رئيس الجامعة، وتعيي أعضاء هيئة التدريس بخلافًا للوائح .","بناءً عل ى توصية من مجلس إدارة الهيئة، وتعيي أعضاء هيئة التدريس وفقًا للوائح ."],"a":0,"e":"ورد في المذكرة: «بناءً عل ى توصية من رئيس الجامعة، وتعيي أعضاء هيئة التدريس وفقًا للوائح .»"},{"chapter":1,"id":"KSU-075","page":"14","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["وضع سياسة الإفصاح وتعارض المصالح في الجامعة، ورفعها إل مجلس إدارة الهيئة؛","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","وضع سياسة الإفصاح وتعارض المصالح في الجامعة، ورفعها إل مجلس إدارة الجامعة؛"],"a":0,"e":"ورد في المذكرة: «وضع سياسة الإفصاح وتعارض المصالح في الجامعة، ورفعها إل مجلس إدارة الهيئة؛»"},{"chapter":2,"id":"KSU-076","page":"25","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","قادة الجامعة عتر التاري خ بعد وفاة الدكتور عبد الوهاب بن محمد عزام، تعاقب على رئاسة الجامعة عدد من الشخصيات الأكادية السعودية المرموقة النري أسهمت في تطوير الجامعة ونموها، وهم على النحو التالي : الأستاذ ناض بن حمد المنقور (","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «قادة الجامعة عتر التاري خ بعد وفاة الدكتور عبد الوهاب بن محمد عزام، تعاقب على رئاسة الجامعة عدد من الشخصيات الأكادية السعودية المرموقة النري أسهمت في تطوير الجامعة ونموها، وهم على النحو التالي : الأستاذ ناض بن حمد المنقور (»"},{"chapter":2,"id":"KSU-077","page":"27","q":"ما المقصود بـ «ه ) بدأت الجامعة بكليتي أساسيتي هما» وفق المذكرة؟","o":["كلية الآداب ( 1382 ه ) أنشئت بموجب المرسوم الملكي رقم 18 ، بتاري خ 21 ربيع الآخر عام 1377 ه وكانت أول كلية تبدأ فيها الدراسة الفعلية عام 1378 ه، وضمت أقساماً في التاري خ، واللغة العربية وآدابها، والدراسات الاجتماعية، والإعلام، والجغرافيا، وغب ها من التخصصات الإنسانية .","كلية الآداب ( 1377 ه ) أنشئت بموجب المرسوم الملكي رقم 18 ، بتاري خ 21 ربيع الآخر عام 1377 ه وكانت أول كلية تبدأ فيها الدراسة الفعلية عام 1378 ه، وضمت أقساماً في التاري خ، واللغة العربية وآدابها، والدراسات الاجتماعية، والإعلام، والجغرافيا، وغب ها من التخصصات الإنسانية .","كلية الآداب ( 1379 ه ) أنشئت بموجب المرسوم الملكي رقم 18 ، بتاري خ 21 ربيع الآخر عام 1377 ه وكانت أول كلية تبدأ فيها الدراسة الفعلية عام 1378 ه، وضمت أقساماً في التاري خ، واللغة العربية وآدابها، والدراسات الاجتماعية، والإعلام، والجغرافيا، وغب ها من التخصصات الإنسانية .","كلية الآداب ( 1378 ه ) أنشئت بموجب المرسوم الملكي رقم 18 ، بتاري خ 21 ربيع الآخر عام 1377 ه وكانت أول كلية تبدأ فيها الدراسة الفعلية عام 1378 ه، وضمت أقساماً في التاري خ، واللغة العربية وآدابها، والدراسات الاجتماعية، والإعلام، والجغرافيا، وغب ها من التخصصات الإنسانية ."],"a":1,"e":"ورد في المذكرة: «1380 ه ) بدأت الجامعة بكليتي أساسيتي هما : كلية الآداب ( 1377 ه ) أنشئت بموجب المرسوم الملكي رقم 18 ، بتاري خ 21 ربيع الآخر عام 1377 ه وكانت أول كلية تبدأ فيها الدراسة الفعلية عام 1378 ه، وضمت أقساماً في التاري خ، واللغة العربية وآدابها، والدراسات الاجتماعية، والإعلام، والجغرافيا، وغب ها من التخصصات الإنسانية .»"},{"chapter":2,"id":"KSU-078","page":"23","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","النشأة والتأسيس البدايات المبكرة جاءت فكرة إنشاء أول جامعة في المملكة العربية السعودية استجابة طبيعية للنهضة التعلية ال نري شهدتها المملكة منذ قيامها على يد الملك المؤسس عبد العزيز بن عب د ال رحمن آل سعود طيب الله ث راه، الذي حرص منذ بداية عهده على نشر التعل في ربوع البلاد .","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":1,"e":"ورد في المذكرة: «النشأة والتأسيس البدايات المبكرة جاءت فكرة إنشاء أول جامعة في المملكة العربية السعودية استجابة طبيعية للنهضة التعلية ال نري شهدتها المملكة منذ قيامها على يد الملك المؤسس عبد العزيز بن عب د ال رحمن آل سعود طيب الله ث راه، الذي حرص منذ بداية عهده على نشر التعل في ربوع البلاد .»"},{"chapter":2,"id":"KSU-079","page":"23","q":"أكمل العبارة الصحيحة وفق المذكرة: «بعد مض ي ثلاث سنوات على إنشاء وزارة المعارف في المملكة، أدل الملك فهد بن عبد العزيز آل سعود رحمه الله، الذي كان يتول منصب وزير المعارف، في عام ____ ه بتصري ح أكّد فيه أن وزارة المعارف تفكّر جدياً في إخراج الجامعة السعودية إل حب ّ التنفيذ .»","o":["1378","1376","1377","1381"],"a":1,"e":"ورد في المذكرة: «بعد مض ي ثلاث سنوات على إنشاء وزارة المعارف في المملكة، أدل الملك فهد بن عبد العزيز آل سعود رحمه الله، الذي كان يتول منصب وزير المعارف، في عام 1376 ه بتصري ح أكّد فيه أن وزارة المعارف تفكّر جدياً في إخراج الجامعة السعودية إل حب ّ التنفيذ .»"},{"chapter":2,"id":"KSU-080","page":"23","q":"أكمل العبارة الصحيحة وفق المذكرة: «المرسوم الملكي بالتأسيس في يوم الأربعاء الموافق الحادي والعشرين من شهر ربيع الآخر عام ____ ه، الموافق الثان ي عشر من شهر نوفمبر عام 1957 م، صدر المرسوم الملكي الكر رقم ( 17 ) من المغفور له بإذن الله الملك سعود بن عبد العزيز آل سعود رحمه الله، بإنشاء جامعة الملك سعود .»","o":["1377","1378","1379","1382"],"a":0,"e":"ورد في المذكرة: «المرسوم الملكي بالتأسيس في يوم الأربعاء الموافق الحادي والعشرين من شهر ربيع الآخر عام 1377 ه، الموافق الثان ي عشر من شهر نوفمبر عام 1957 م، صدر المرسوم الملكي الكر رقم ( 17 ) من المغفور له بإذن الله الملك سعود بن عبد العزيز آل سعود رحمه الله، بإنشاء جامعة الملك سعود .»"},{"chapter":2,"id":"KSU-081","page":"24","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["القادة المدير المؤسس الدكتور عبد الوهاب بن محمد عزام اختيار الشخصية المناسبة بعد صدور المرسوم الملكي بإنشاء الجامعة، كان لا بد من البحث عن شخصية أكادية مرموقة قادرة على تحمل مسؤولية تأسيس هذا الصرح العلمي الكبب وقيادته نحو أهدافه النبيلة .","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «القادة المدير المؤسس الدكتور عبد الوهاب بن محمد عزام اختيار الشخصية المناسبة بعد صدور المرسوم الملكي بإنشاء الجامعة، كان لا بد من البحث عن شخصية أكادية مرموقة قادرة على تحمل مسؤولية تأسيس هذا الصرح العلمي الكبب وقيادته نحو أهدافه النبيلة .»"},{"chapter":2,"id":"KSU-082","page":"24","q":"أكمل العبارة الصحيحة وفق المذكرة: «وبناء على ذلك عُي ِ العالم الموسوعي الأديب والفيلسوف والدبلوماسي المصري الدكتور عبد الوهاب بن محمد حسن عزام ، حيث اختاره الملك سعود بن عبد العزيز رحمه الله ليكون أول مدير ومؤسس لجامعة الملك سعود في الرياض عام ____ ه ( 1957 م ) .»","o":["1382","1379","1378","1377"],"a":3,"e":"ورد في المذكرة: «وبناء على ذلك عُي ِ العالم الموسوعي الأديب والفيلسوف والدبلوماسي المصري الدكتور عبد الوهاب بن محمد حسن عزام ، حيث اختاره الملك سعود بن عبد العزيز رحمه الله ليكون أول مدير ومؤسس لجامعة الملك سعود في الرياض عام 1377 ه ( 1957 م ) .»"},{"chapter":2,"id":"KSU-083","page":"25","q":"أكمل العبارة الصحيحة وفق المذكرة: «المرسوم الملكي رقم م / ____ لعام 1387 ه في عام 1387 ه ( 1967 م ) ، صدر المرسوم الملكي رقم ( م / 11 ) بتاري خ 8 جمادى الأول 1387 ه المتضمن الموافقة على نظام جامعة الرياض ( جامعة الملك سعود حالياً ) وإلغاء الأنظمة والأوامر والتعلات السابقة المتعلقة بالجامعة .»","o":["13","12","11","16"],"a":2,"e":"ورد في المذكرة: «المرسوم الملكي رقم م / 11 لعام 1387 ه في عام 1387 ه ( 1967 م ) ، صدر المرسوم الملكي رقم ( م / 11 ) بتاري خ 8 جمادى الأول 1387 ه المتضمن الموافقة على نظام جامعة الرياض ( جامعة الملك سعود حالياً ) وإلغاء الأنظمة والأوامر والتعلات السابقة المتعلقة بالجامعة .»"},{"chapter":2,"id":"KSU-084","page":"26","q":"أكمل العبارة الصحيحة وفق المذكرة: «تغيتر الاسم وإعادته المرسوم الملكي رقم م / ____ لعام 1392 ه في عام 1392 ه ( 1972 م ) ، صدر المرسوم الملكي رقم ( م / 6 ) المتضمن الموافقة على نظام جامعة الرياض وإلغاء نظام الجامعة الصادر في عام 1387 ه وجميع ما يتعارض معه من أنظمة وأوامر وتعلات سابقة .»","o":["8","11","6","7"],"a":2,"e":"ورد في المذكرة: «تغيتر الاسم وإعادته المرسوم الملكي رقم م / 6 لعام 1392 ه في عام 1392 ه ( 1972 م ) ، صدر المرسوم الملكي رقم ( م / 6 ) المتضمن الموافقة على نظام جامعة الرياض وإلغاء نظام الجامعة الصادر في عام 1387 ه وجميع ما يتعارض معه من أنظمة وأوامر وتعلات سابقة .»"},{"chapter":2,"id":"KSU-085","page":"26","q":"أكمل العبارة الصحيحة وفق المذكرة: «الموافقة على نظام مجلس التعل العالي والجامعات عام ____ ه في عام 1414 ه ( 1993 م ) ، صدرت الموافقة السامية على نظام مجلس التعل العالي والجامعات، والذي نص على إنشاء مجلس لكل جامعة يتول تصريف الشؤون العلمية والإدارية والمالية وتنفيذ السي اسة العامة للجامعة .»","o":["1414","1415","1416","1419"],"a":0,"e":"ورد في المذكرة: «الموافقة على نظام مجلس التعل العالي والجامعات عام 1414 ه في عام 1414 ه ( 1993 م ) ، صدرت الموافقة السامية على نظام مجلس التعل العالي والجامعات، والذي نص على إنشاء مجلس لكل جامعة يتول تصريف الشؤون العلمية والإدارية والمالية وتنفيذ السي اسة العامة للجامعة .»"},{"chapter":2,"id":"KSU-086","page":"27","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","وشكهل هذا القرار نقطة تحول مهمة للمرأة في تاري خ التعل العالفيي المملكة، حيث أصبح بإمكانها الحصول على تعل جامعىي متمب ّ في بيئة أكاد ية محفزة، وقد كان قسم اللغة الإنجلب ية بكلية الآداب أول قسم استقبل الطالبات المتوقفات وكان عددهن أرب ع طالبات سعوديات .","يُطبق ذلك على التعليم العام فقط.","وشكهل هذا القرار نقطة تحول مهمة للمرأة في تاري خ التعل العالفيي المملكة، حيث أصبح بإمكانها الحصول على تعل جامعىي متمب ّ في بيئة أكاد ية محفزة، وقد كان قسم اللغة الإنجلب ية بكلية الآداب أول قسم استقبل الطالبات المتقدمات وكان عددهن أرب ع طالبات سعوديات ."],"a":3,"e":"ورد في المذكرة: «وشكهل هذا القرار نقطة تحول مهمة للمرأة في تاري خ التعل العالفيي المملكة، حيث أصبح بإمكانها الحصول على تعل جامعىي متمب ّ في بيئة أكاد ية محفزة، وقد كان قسم اللغة الإنجلب ية بكلية الآداب أول قسم استقبل الطالبات المتقدمات وكان عددهن أرب ع طالبات سعوديات .»"},{"chapter":2,"id":"KSU-087","page":"28","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["وأصبحتا من أهم كليات الجامعة، وتضم كلية الهندسة أقساماً في الهندسة الكيائية، والهندسة المدنية، والهندسة الميكانيكية، والهندسة الكهربائية، والهندسة الصناعية، وهندسة الببرول والغاز الطبيع ي، وهندسة التعدين، أما كلية البربية فقد تولّت مسؤولية إعداد المعلمي والمعلمات المؤهلي لمخ تلف مراحل التعل .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «وأصبحتا من أهم كليات الجامعة، وتضم كلية الهندسة أقساماً في الهندسة الكيائية، والهندسة المدنية، والهندسة الميكانيكية، والهندسة الكهربائية، والهندسة الصناعية، وهندسة الببرول والغاز الطبيع ي، وهندسة التعدين، أما كلية البربية فقد تولّت مسؤولية إعداد المعلمي والمعلمات المؤهلي لمخ تلف مراحل التعل .»"},{"chapter":2,"id":"KSU-088","page":"29","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","وتعد أول كلية للعلوم الطبية التطبيقية في المم لكة في ذلك الحي ، ولقد لعبت دورا هاما في توفب القوى البشرية العاملة لكل من القطاعفيي الصحة الخاص والعام مع درجة عالية من الكفاءة المهنية من الخريجي وتزويدهم بالمعارف والمهارات الحديثة في رعايتهم الصحية في هذه المجالات .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «وتعد أول كلية للعلوم الطبية التطبيقية في المم لكة في ذلك الحي ، ولقد لعبت دورا هاما في توفب القوى البشرية العاملة لكل من القطاعفيي الصحة الخاص والعام مع درجة عالية من الكفاءة المهنية من الخريجي وتزويدهم بالمعارف والمهارات الحديثة في رعايتهم الصحية في هذه المجالات .»"},{"chapter":2,"id":"KSU-089","page":"30","q":"أكمل العبارة الصحيحة وفق المذكرة: «المرحلة الثامنة عهد الاحتفال بالرب ع قرن ( ____ ه ) شهدت هذه المرحلة تطوراً ملحوظاً في عمادة خدمة المجتمع والتعل المستمر ، حيث نشِئت ُ أ باعتبار ها تطوراً حديثاً لمركز خدمة المجتمع السابق، النري تحولت لاحقاً إل كلية الدراسات التطبيقية وخدمة المجتمع .»","o":["1402","1407","1403","1404"],"a":0,"e":"ورد في المذكرة: «المرحلة الثامنة عهد الاحتفال بالرب ع قرن ( 1402 ه ) شهدت هذه المرحلة تطوراً ملحوظاً في عمادة خدمة المجتمع والتعل المستمر ، حيث نشِئت ُ أ باعتبار ها تطوراً حديثاً لمركز خدمة المجتمع السابق، النري تحولت لاحقاً إل كلية الدراسات التطبيقية وخدمة المجتمع .»"},{"chapter":2,"id":"KSU-090","page":"31","q":"أكمل العبارة الصحيحة وفق المذكرة: «المرحلة الحادية عشرة البحث العلمي والاستشارات ( ____ ه ) معهد البحوث والدراسات الاستشارية ( 1417 ه / 1996 م ) صدر قرار مجلس التعل العالي رقم 1282 / أ بالموافقة على إنشاء معهد للبحوث والدراسات الاستشارية بجامعة الملك سعود، وتحول اسمه لاحقاً إل معهد الملك عبد الله للبحوث والدراسات الاستشارية .»","o":["1419","1417","1422","1418"],"a":1,"e":"ورد في المذكرة: «المرحلة الحادية عشرة البحث العلمي والاستشارات ( 1417 ه ) معهد البحوث والدراسات الاستشارية ( 1417 ه / 1996 م ) صدر قرار مجلس التعل العالي رقم 1282 / أ بالموافقة على إنشاء معهد للبحوث والدراسات الاستشارية بجامعة الملك سعود، وتحول اسمه لاحقاً إل معهد الملك عبد الله للبحوث والدراسات الاستشارية .»"},{"chapter":2,"id":"KSU-091","page":"32","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","المرحلة الثالثة عشرة الكليات الحديثة واستمرت جامعة الملك سعود في التوسع والتطور بإنشاء المزيد من الكليات لتصل إل ثلاث وعش رين كلية تشمل كلية السياحة والآثار وكلية الفنون وكلية علوم الرياضة والنشاط البدن ي وكلية الحق وق والعلوم السياسية وكلية الأمب سلطان بن عبدالعزيز للخدمات الطبية الطارئة .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «المرحلة الثالثة عشرة الكليات الحديثة واستمرت جامعة الملك سعود في التوسع والتطور بإنشاء المزيد من الكليات لتصل إل ثلاث وعش رين كلية تشمل كلية السياحة والآثار وكلية الفنون وكلية علوم الرياضة والنشاط البدن ي وكلية الحق وق والعلوم السياسية وكلية الأمب سلطان بن عبدالعزيز للخدمات الطبية الطارئة .»"},{"chapter":2,"id":"KSU-092","page":"33","q":"أكمل العبارة الصحيحة وفق المذكرة: «وقد تم افتتاح المدينة الجام عية للطالبات مع بداية العام الدراسي ____ 5 / 143 4 ه، واستقبلت الطالبات فيها في الفصل الدراسي الأول من ذلك العام، وذلك ضمن مراحل توسّع الجامعة في تطوير بنيتها التحتية وتعزيز جودة البيئة التعل ية للطالبات .»","o":["143","148","145","144"],"a":0,"e":"ورد في المذكرة: «وقد تم افتتاح المدينة الجام عية للطالبات مع بداية العام الدراسي 143 5 / 143 4 ه، واستقبلت الطالبات فيها في الفصل الدراسي الأول من ذلك العام، وذلك ضمن مراحل توسّع الجامعة في تطوير بنيتها التحتية وتعزيز جودة البيئة التعل ية للطالبات .»"},{"chapter":2,"id":"KSU-093","page":"33","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","وتتمثل مشروعات برنامج الأ وقاف في أبراج الجامعة النري تشمل برج الفندق من فئة الخمس نجوم، وبرج مصرف الراجخي الطنري، وبرج السري خ صالح كامل، وبرج الأجنحة الفندقية، وبرج المعلم محمد بن لادن المكتنري، وبرج الأمب سلطان بن عبد العزيز للأبحاث، وبرج الدكتور ناض الرشيد، وبرج الشيخ عبد الرحمن بن عبد الله الهليل .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":2,"e":"ورد في المذكرة: «وتتمثل مشروعات برنامج الأ وقاف في أبراج الجامعة النري تشمل برج الفندق من فئة الخمس نجوم، وبرج مصرف الراجخي الطنري، وبرج السري خ صالح كامل، وبرج الأجنحة الفندقية، وبرج المعلم محمد بن لادن المكتنري، وبرج الأمب سلطان بن عبد العزيز للأبحاث، وبرج الدكتور ناض الرشيد، وبرج الشيخ عبد الرحمن بن عبد الله الهليل .»"},{"chapter":2,"id":"KSU-094","page":"34","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","منذ بداياتها الأول بكليتفيقط وعدد م حدود من الطلاب، نمت الجامعة لتصبح ضحاً أكادياً شامخاً يضم ثلاث وعشرين كلية، وآلاف الطلاب والطالبات من مختلف أنحاء المملكة والعالم، وأعضاء هيئة تدريس متمب ين من مختلف الجنسيات والتخصصات ."],"a":3,"e":"ورد في المذكرة: «منذ بداياتها الأول بكليتفيقط وعدد م حدود من الطلاب، نمت الجامعة لتصبح ضحاً أكادياً شامخاً يضم ثلاث وعشرين كلية، وآلاف الطلاب والطالبات من مختلف أنحاء المملكة والعالم، وأعضاء هيئة تدريس متمب ين من مختلف الجنسيات والتخصصات .»"},{"chapter":2,"id":"KSU-095","page":"34","q":"أكمل العبارة الصحيحة وفق المذكرة: «تقف الجامعة اليوم على أعتاب مرحلة جديدة من التمب والريادة، مستندة إل تاريخها العريق وإرثها الأكادي الغن ي، ومتطلعة نحو مستقبل واعد يضعها في مصاف أفضل الجامعات العالمية، وذلك في ظل رؤية المملكة ____ النري تولي التعل والبحث العلمي والابتكار أهمية قصوى في عملية التنم ية الشاملة .»","o":["2031","2032","2035","2030"],"a":3,"e":"ورد في المذكرة: «تقف الجامعة اليوم على أعتاب مرحلة جديدة من التمب والريادة، مستندة إل تاريخها العريق وإرثها الأكادي الغن ي، ومتطلعة نحو مستقبل واعد يضعها في مصاف أفضل الجامعات العالمية، وذلك في ظل رؤية المملكة 2030 النري تولي التعل والبحث العلمي والابتكار أهمية قصوى في عملية التنم ية الشاملة .»"},{"chapter":2,"id":"KSU-096","page":"31","q":"أكمل العبارة الصحيحة وفق المذكرة: «المرحلة التاسعة التقنية والعمارة ( ____ ه ) كلية العمارة والتخطيط ( 1404 ه / 1984 م ) لتلبية احتياجات المملكة في مجال التخطيط العمران ي والتصم المعماري، وتضم الكلية أقسام اً في العمارة وعلوم البناء، والتخطيط العمران ي .»","o":["1409","1404","1405","1406"],"a":1,"e":"ورد في المذكرة: «المرحلة التاسعة التقنية والعمارة ( 1404 ه ) كلية العمارة والتخطيط ( 1404 ه / 1984 م ) لتلبية احتياجات المملكة في مجال التخطيط العمران ي والتصم المعماري، وتضم الكلية أقسام اً في العمارة وعلوم البناء، والتخطيط العمران ي .»"},{"chapter":2,"id":"KSU-097","page":"22","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","تمثل جامعة الملك سعود معلماً تاريخياً بارزاً في مسب ة التعل العالي بالمملك ة العربية السعودية، فهي أول جامعة حكومية نشئت ُ أ في المملكة، وتُعد نقطة انطلاق نحو بناء منظومة تعلية عالية الجودة تُواكب التطورات العالمية ."],"a":3,"e":"ورد في المذكرة: «تمثل جامعة الملك سعود معلماً تاريخياً بارزاً في مسب ة التعل العالي بالمملك ة العربية السعودية، فهي أول جامعة حكومية نشئت ُ أ في المملكة، وتُعد نقطة انطلاق نحو بناء منظومة تعلية عالية الجودة تُواكب التطورات العالمية .»"},{"chapter":2,"id":"KSU-098","page":"24","q":"ما المقصود بـ «وقد صدر مع هذا المرسوم الملكي مرسومان ملكيان آخران» وفق المذكرة؟","o":["المرسوم الملكي رقم ( 19 ) والمرسوم الملكي رقم ( 19 ) ، وكلاهما صدرا في نفس التاري خ الموافق الحادي والعشرين من شهر ربيع الآخر عام 1377 ه .","المرسوم الملكي رقم ( 20 ) والمرسوم الملكي رقم ( 19 ) ، وكلاهما صدرا في نفس التاري خ الموافق الحادي والعشرين من شهر ربيع الآخر عام 1377 ه .","المرسوم الملكي رقم ( 18 ) والمرسوم الملكي رقم ( 19 ) ، وكلاهما صدرا في نفس التاري خ الموافق الحادي والعشرين من شهر ربيع الآخر عام 1377 ه .","المرسوم الملكي رقم ( 23 ) والمرسوم الملكي رقم ( 19 ) ، وكلاهما صدرا في نفس التاري خ الموافق الحادي والعشرين من شهر ربيع الآخر عام 1377 ه ."],"a":2,"e":"ورد في المذكرة: «وقد صدر مع هذا المرسوم الملكي مرسومان ملكيان آخران : المرسوم الملكي رقم ( 18 ) والمرسوم الملكي رقم ( 19 ) ، وكلاهما صدرا في نفس التاري خ الموافق الحادي والعشرين من شهر ربيع الآخر عام 1377 ه .»"},{"chapter":2,"id":"KSU-099","page":"27","q":"أكمل العبارة الصحيحة وفق المذكرة: «المرحلة الثانية التوسع الأولي للكليات ( ____ ه ) نشئت ُ أ كلية التجارة، النري أصبحت لاحقاً كلية إدارة الأعمال، وتضم أقساماً في الإدارة، والمحاسبة، والتسويق، والاقتصاد، ونظم المعلومات الإدارية .»","o":["1380","1379","1384","1381"],"a":1,"e":"ورد في المذكرة: «المرحلة الثانية التوسع الأولي للكليات ( 1379 ه ) نشئت ُ أ كلية التجارة، النري أصبحت لاحقاً كلية إدارة الأعمال، وتضم أقساماً في الإدارة، والمحاسبة، والتسويق، والاقتصاد، ونظم المعلومات الإدارية .»"},{"chapter":2,"id":"KSU-100","page":"30","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["ي وف عام 1419 ه، صدر الأمر السامي القاض ي بإنشاء جامعة الملك خالد بالجنوب، ودمج فرعي جامعة الإمام محمد بن سعود الإسلامية وجامعة الملك سعود في أبها ليصبحا جامعة مستقلة تحت اسم جامعة الملك خالد .","ي وف عام 1421 ه، صدر الأمر السامي القاض ي بإنشاء جامعة الملك خالد بالجنوب، ودمج فرعي جامعة الإمام محمد بن سعود الإسلامية وجامعة الملك سعود في أبها ليصبحا جامعة مستقلة تحت اسم جامعة الملك خالد .","ي وف عام 1424 ه، صدر الأمر السامي القاض ي بإنشاء جامعة الملك خالد بالجنوب، ودمج فرعي جامعة الإمام محمد بن سعود الإسلامية وجامعة الملك سعود في أبها ليصبحا جامعة مستقلة تحت اسم جامعة الملك خالد .","ي وف عام 1420 ه، صدر الأمر السامي القاض ي بإنشاء جامعة الملك خالد بالجنوب، ودمج فرعي جامعة الإمام محمد بن سعود الإسلامية وجامعة الملك سعود في أبها ليصبحا جامعة مستقلة تحت اسم جامعة الملك خالد ."],"a":0,"e":"ورد في المذكرة: «ي وف عام 1419 ه، صدر الأمر السامي القاض ي بإنشاء جامعة الملك خالد بالجنوب، ودمج فرعي جامعة الإمام محمد بن سعود الإسلامية وجامعة الملك سعود في أبها ليصبحا جامعة مستقلة تحت اسم جامعة الملك خالد .»"},{"chapter":2,"id":"KSU-101","page":"27","q":"أكمل العبارة الصحيحة وفق المذكرة: «المرحلة الثالثة قبول الطالبات ( ____ ه ) انطلاقاً من أهمية المرأة في تنمية المجتمع فتحت الجامعة أبوابها للفتاة السعودية لأول مرة، فأنري ح لها فرصة الانتساب إل كلينري الآداب والعلوم الإدارية .»","o":["1382","1383","1381","1386"],"a":2,"e":"ورد في المذكرة: «المرحلة الثالثة قبول الطالبات ( 1381 ه ) انطلاقاً من أهمية المرأة في تنمية المجتمع فتحت الجامعة أبوابها للفتاة السعودية لأول مرة، فأنري ح لها فرصة الانتساب إل كلينري الآداب والعلوم الإدارية .»"},{"chapter":2,"id":"KSU-102","page":"32","q":"أكمل العبارة الصحيحة وفق المذكرة: «المدينة الجامعية بالدرعية في عام ( ____ ه ) تفضل خادم الحرمي الشريفي الملك فهد بن عبد العزيز آل سعود بافتتاح المدينة الجامعية بالدرعية النري تصل مساحتها الإجمالية إل حوالي 9 ملايي مبر مرب ع .»","o":["1410","1407","1406","1405"],"a":3,"e":"ورد في المذكرة: «المدينة الجامعية بالدرعية في عام ( 1405 ه ) تفضل خادم الحرمي الشريفي الملك فهد بن عبد العزيز آل سعود بافتتاح المدينة الجامعية بالدرعية النري تصل مساحتها الإجمالية إل حوالي 9 ملايي مبر مرب ع .»"},{"chapter":2,"id":"KSU-103","page":"25","q":"أكمل العبارة الصحيحة وفق المذكرة: «التطور التنظي والإداري المرسوم الملكي رقم ____ لعام 1380 ه في عام 1380 ه ( 1961 م ) ، صدر المرسوم الملكي رقم ( 112 ) بتاري خ 26 ذي الحجة 1380 ه المتضمن الموافقة على نظام جامعة الملك سعود .»","o":["112","113","114","117"],"a":0,"e":"ورد في المذكرة: «التطور التنظي والإداري المرسوم الملكي رقم 112 لعام 1380 ه في عام 1380 ه ( 1961 م ) ، صدر المرسوم الملكي رقم ( 112 ) بتاري خ 26 ذي الحجة 1380 ه المتضمن الموافقة على نظام جامعة الملك سعود .»"},{"chapter":2,"id":"KSU-104","page":"33","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","المدينة الطبية الجامعية تُعدّ المدينة الطبية الجامعية في جامعة الملك سعود إحدى الركائز الرئيسة النري تدعم التعل الط نري والبحث العلمي، إل جانب تقد خدمات صحية متقدمة وفق أعلى المعايب .","المدينة الطبية الجامعية تُعدّ المدينة الطبية الجامعية في جامعة الملك سعود إحدى الركائز الرئيسة النري تدعم التعل الط نري والبحث العلمي، إل جانب تقد خدمات صحية متوقفة وفق أعلى المعايب .","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «المدينة الطبية الجامعية تُعدّ المدينة الطبية الجامعية في جامعة الملك سعود إحدى الركائز الرئيسة النري تدعم التعل الط نري والبحث العلمي، إل جانب تقد خدمات صحية متقدمة وفق أعلى المعايب .»"},{"chapter":2,"id":"KSU-105","page":"27","q":"أكمل العبارة الصحيحة وفق المذكرة: «وقد اقتصر القبول فيها على الطلاب فقط وعددهم ( ____ ) طالباً، ي وف عام 1380 ه تخرجت الدفعة الأول وعددها ( 15 ) خريجاً، وقد غُب ِ اسم الكلية مؤخرًا إل كلية العلوم الإنسانية والاجتماعية .»","o":["21","26","22","23"],"a":0,"e":"ورد في المذكرة: «وقد اقتصر القبول فيها على الطلاب فقط وعددهم ( 21 ) طالباً، ي وف عام 1380 ه تخرجت الدفعة الأول وعددها ( 15 ) خريجاً، وقد غُب ِ اسم الكلية مؤخرًا إل كلية العلوم الإنسانية والاجتماعية .»"},{"chapter":2,"id":"KSU-106","page":"30","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","كما شهدت هذه المرحلة افتتاح مستشق الملك خالد الجامعىي رسمياً، الذي بدأ العمل في المدينة الجامعية، واقتصر في بدايته على مجمع عيادات خارجية، ثم تطور ليصبح منشأة صحية متك املة تضم عيادات متخصصة وخدمات صحية متكاملة .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «كما شهدت هذه المرحلة افتتاح مستشق الملك خالد الجامعىي رسمياً، الذي بدأ العمل في المدينة الجامعية، واقتصر في بدايته على مجمع عيادات خارجية، ثم تطور ليصبح منشأة صحية متك املة تضم عيادات متخصصة وخدمات صحية متكاملة .»"},{"chapter":2,"id":"KSU-107","page":"28","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["وأصبحت الكلية من أعرق كليات الطب في المملكة العربية السعودية، وتضم أقساماً في الجراحة، والباطنة، وطب الأطفال، وطب الأشة والمجتمع، وعلم الأمراض، والأشعة، وغب ها من التخصصات الطبية .","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «وأصبحت الكلية من أعرق كليات الطب في المملكة العربية السعودية، وتضم أقساماً في الجراحة، والباطنة، وطب الأطفال، وطب الأشة والمجتمع، وعلم الأمراض، والأشعة، وغب ها من التخصصات الطبية .»"},{"chapter":2,"id":"KSU-108","page":"24","q":"أكمل العبارة الصحيحة وفق المذكرة: «بداية الدراسة الفعلية بدأت الدراسة الفعلية في الجامعة بافتتاح كلية الآداب في العام الجامعىي ____ / 137 7 ه، حيث استقبلت الكلية أول دفعة من الطلاب الذين التحقوا ببرامجها الأكادية .»","o":["1378","1383","1380","1379"],"a":0,"e":"ورد في المذكرة: «بداية الدراسة الفعلية بدأت الدراسة الفعلية في الجامعة بافتتاح كلية الآداب في العام الجامعىي 1378 / 137 7 ه، حيث استقبلت الكلية أول دفعة من الطلاب الذين التحقوا ببرامجها الأكادية .»"},{"chapter":2,"id":"KSU-109","page":"29","q":"أكمل العبارة الصحيحة وفق المذكرة: «كما يوجد بالكلية حاليا أكبر من ____ برنامج من برامج البكالوريوس المختلفة النري تعمل تحت سبعة أقسام رئيسية وعلاوة على ذلك يوجد برامج للدراسات العليا في ا لعديد من التخصصات الصحية .»","o":["14","17","13","12"],"a":3,"e":"ورد في المذكرة: «كما يوجد بالكلية حاليا أكبر من 12 برنامج من برامج البكالوريوس المختلفة النري تعمل تحت سبعة أقسام رئيسية وعلاوة على ذلك يوجد برامج للدراسات العليا في ا لعديد من التخصصات الصحية .»"},{"chapter":2,"id":"KSU-110","page":"22","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","وعلى مدى أكبر م ن ستة عقود، شهدت الجامعة تطوراً متواصلاً ونمواً مستمراً، حيث انتقلت من جامعة ناشئة بكليتي إل ضح أكادي شامخ يضم ثلاثاً وعشرين كلية ومعاهد ومراكز ب حثية متمب ة .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «وعلى مدى أكبر م ن ستة عقود، شهدت الجامعة تطوراً متواصلاً ونمواً مستمراً، حيث انتقلت من جامعة ناشئة بكليتي إل ضح أكادي شامخ يضم ثلاثاً وعشرين كلية ومعاهد ومراكز ب حثية متمب ة .»"},{"chapter":2,"id":"KSU-111","page":"33","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","المدينة الجامعية للطالبات خصصت الجامعة مدينة جامعية متكاملة للطالبات، تضم كافة الكليات والمرافق التعلية والخد مية، مما يوفر بيئة تعلية متمب ة تراعي خصوصية الطالبة السعودية ."],"a":3,"e":"ورد في المذكرة: «المدينة الجامعية للطالبات خصصت الجامعة مدينة جامعية متكاملة للطالبات، تضم كافة الكليات والمرافق التعلية والخد مية، مما يوفر بيئة تعلية متمب ة تراعي خصوصية الطالبة السعودية .»"},{"chapter":2,"id":"KSU-112","page":"26","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["وخلال هذا الاحتفال الكبب الذي تم تحت رعاية صاحب الجلالة الملك خالد بن عبد العزيز رحمه الله، أمر جلالته بإعادة الاسم القد للجامعة \" جامعة الملك سعود \" كما كان عند تأسيسها .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «وخلال هذا الاحتفال الكبب الذي تم تحت رعاية صاحب الجلالة الملك خالد بن عبد العزيز رحمه الله، أمر جلالته بإعادة الاسم القد للجامعة \" جامعة الملك سعود \" كما كان عند تأسيسها .»"},{"chapter":2,"id":"KSU-113","page":"22","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","حيث شهدت الجامعة عبر مراحلها المختلفة تطوراً ملحوظاً في هياكلها الأكادية، وبرامجها التعلية، وأنشطتها البحثية، بما يعكس قدرتها على التكفي مع المتغب ات المحلية والعالمية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":2,"e":"ورد في المذكرة: «حيث شهدت الجامعة عبر مراحلها المختلفة تطوراً ملحوظاً في هياكلها الأكادية، وبرامجها التعلية، وأنشطتها البحثية، بما يعكس قدرتها على التكفي مع المتغب ات المحلية والعالمية .»"},{"chapter":2,"id":"KSU-114","page":"29","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["ي وف عام 1446 ه عِيدَ ُ أ هيكلة كل من كلية اللغات والبرجمة وقسم اللغة الإنجلب ية وآدابها بكلية الآداب ومعهد اللغويات العربية في الجامعة ليكون اسمها كلية اللغات وعلومها .","ي وف عام 1444 ه عِيدَ ُ أ هيكلة كل من كلية اللغات والبرجمة وقسم اللغة الإنجلب ية وآدابها بكلية الآداب ومعهد اللغويات العربية في الجامعة ليكون اسمها كلية اللغات وعلومها .","ي وف عام 1445 ه عِيدَ ُ أ هيكلة كل من كلية اللغات والبرجمة وقسم اللغة الإنجلب ية وآدابها بكلية الآداب ومعهد اللغويات العربية في الجامعة ليكون اسمها كلية اللغات وعلومها .","ي وف عام 1449 ه عِيدَ ُ أ هيكلة كل من كلية اللغات والبرجمة وقسم اللغة الإنجلب ية وآدابها بكلية الآداب ومعهد اللغويات العربية في الجامعة ليكون اسمها كلية اللغات وعلومها ."],"a":1,"e":"ورد في المذكرة: «ي وف عام 1444 ه عِيدَ ُ أ هيكلة كل من كلية اللغات والبرجمة وقسم اللغة الإنجلب ية وآدابها بكلية الآداب ومعهد اللغويات العربية في الجامعة ليكون اسمها كلية اللغات وعلومها .»"},{"chapter":2,"id":"KSU-115","page":"31","q":"أكمل العبارة الصحيحة وفق المذكرة: «كلية علوم الحاسب والمعلومات ( ____ ه / 1984 م ) لمواكبة التطور التقن ي العالمي، وتقدم الكلية برامج متمب ة في علوم الحاسب ونظم المعلومات وهندسة الحاسب وهندسة البرمجيات .»","o":["1405","1404","1409","1406"],"a":1,"e":"ورد في المذكرة: «كلية علوم الحاسب والمعلومات ( 1404 ه / 1984 م ) لمواكبة التطور التقن ي العالمي، وتقدم الكلية برامج متمب ة في علوم الحاسب ونظم المعلومات وهندسة الحاسب وهندسة البرمجيات .»"},{"chapter":2,"id":"KSU-116","page":"29","q":"أكمل العبارة الصحيحة وفق المذكرة: «كلية العلوم الطبية التطبيقية تأسست كلية العلوم الطبية التطبيقية في عام ____ م لتلبية الحاجة في المملكة العربية السعودية لكوادر مؤهلة متخصصفيي الرعاية الصحية .»","o":["1984","1980","1979","1981"],"a":2,"e":"ورد في المذكرة: «كلية العلوم الطبية التطبيقية تأسست كلية العلوم الطبية التطبيقية في عام 1979 م لتلبية الحاجة في المملكة العربية السعودية لكوادر مؤهلة متخصصفيي الرعاية الصحية .»"},{"chapter":2,"id":"KSU-117","page":"30","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["فرع القص ( 1403 ه ) في عام 1401 ه ( 1980 / 1981 م ) ، أنسر فرع آخر للجامعة في منطقة القص، وافتتح فيه كلية الزراعة، والطب البيطري ،وكلية الاقتصاد ،والإدارة .","فرع القص ( 1402 ه ) في عام 1401 ه ( 1980 / 1981 م ) ، أنسر فرع آخر للجامعة في منطقة القص، وافتتح فيه كلية الزراعة، والطب البيطري ،وكلية الاقتصاد ،والإدارة .","فرع القص ( 1401 ه ) في عام 1401 ه ( 1980 / 1981 م ) ، أنسر فرع آخر للجامعة في منطقة القص، وافتتح فيه كلية الزراعة، والطب البيطري ،وكلية الاقتصاد ،والإدارة .","فرع القص ( 1406 ه ) في عام 1401 ه ( 1980 / 1981 م ) ، أنسر فرع آخر للجامعة في منطقة القص، وافتتح فيه كلية الزراعة، والطب البيطري ،وكلية الاقتصاد ،والإدارة ."],"a":2,"e":"ورد في المذكرة: «فرع القص ( 1401 ه ) في عام 1401 ه ( 1980 / 1981 م ) ، أنسر فرع آخر للجامعة في منطقة القص، وافتتح فيه كلية الزراعة، والطب البيطري ،وكلية الاقتصاد ،والإدارة .»"},{"chapter":2,"id":"KSU-118","page":"28","q":"أكمل العبارة الصحيحة وفق المذكرة: «كما شهدت هذه المرحلة وتحديداً في عام ( ____ ه ) إنشاء عمادات مساندة مهمة، من أبرزها عمادة شؤون القبول والتسجيل، وعمادة شؤون الطلاب، وعمادة شؤون المكتبات .»","o":["1394","1399","1396","1395"],"a":0,"e":"ورد في المذكرة: «كما شهدت هذه المرحلة وتحديداً في عام ( 1394 ه ) إنشاء عمادات مساندة مهمة، من أبرزها عمادة شؤون القبول والتسجيل، وعمادة شؤون الطلاب، وعمادة شؤون المكتبات .»"},{"chapter":2,"id":"KSU-119","page":"24","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","وشكّل هذا الحدث نقطة تحول مهمة في تاري خ التعل العالي بالمملكة العربية السعودية، إذ أصبحت الجامعة منارة علمية تشع بالمع رفة والثقافة على مستوى الوطن .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":2,"e":"ورد في المذكرة: «وشكّل هذا الحدث نقطة تحول مهمة في تاري خ التعل العالي بالمملكة العربية السعودية، إذ أصبحت الجامعة منارة علمية تشع بالمع رفة والثقافة على مستوى الوطن .»"},{"chapter":2,"id":"KSU-120","page":"28","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","وأصبحت فا بعد ك لية علوم الأغذية والزراعة، وتضم أقساماً في الإنتاج النبانري، ووقاية النبات، والهندسة الزراعية، وعلوم الأغ ذية والتغذية، والاقتصاد الزراعي، والإنتاج الحيوان ي .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":2,"e":"ورد في المذكرة: «وأصبحت فا بعد ك لية علوم الأغذية والزراعة، وتضم أقساماً في الإنتاج النبانري، ووقاية النبات، والهندسة الزراعية، وعلوم الأغ ذية والتغذية، والاقتصاد الزراعي، والإنتاج الحيوان ي .»"},{"chapter":2,"id":"KSU-121","page":"25","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","وكان أبرز ما جاء في هذا النظام أن للجامعة شخصية اعتبارية ومب انية خاصة يوافق عليها وزير المعارف ويعرضها على الجهات ذات الاختصاص لاعتمادها .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «وكان أبرز ما جاء في هذا النظام أن للجامعة شخصية اعتبارية ومب انية خاصة يوافق عليها وزير المعارف ويعرضها على الجهات ذات الاختصاص لاعتمادها .»"},{"chapter":2,"id":"KSU-122","page":"34","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","ع مدى أكبر من ستة عقود من الزمان، رسمت جامعة الملك سعود مساراً متمب اً في تاري خ التعل العالي بالمملكة العربية السعودية والمنطقة العربية .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «ع مدى أكبر من ستة عقود من الزمان، رسمت جامعة الملك سعود مساراً متمب اً في تاري خ التعل العالي بالمملكة العربية السعودية والمنطقة العربية .»"},{"chapter":2,"id":"KSU-123","page":"22","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["كما أسهمت في دعم التنمية الوطنية من خلال إعداد الكفاءات وتأهيلها بما يتوافق مع متطلبات سوق العمل، وتعزيز دورها كمؤسسة أكادية رائدة لا تسهم في بناء المعرفة وخدمة المجتمع .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","كما أسهمت في دعم التنمية الوطنية من خلال إعداد الكفاءات وتأهيلها بما يتوافق مع متطلبات سوق العمل، وتعزيز دورها كمؤسسة أكادية رائدة تسهم في بناء المعرفة وخدمة المجتمع .","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «كما أسهمت في دعم التنمية الوطنية من خلال إعداد الكفاءات وتأهيلها بما يتوافق مع متطلبات سوق العمل، وتعزيز دورها كمؤسسة أكادية رائدة تسهم في بناء المعرفة وخدمة المجتمع .»"},{"chapter":2,"id":"KSU-124","page":"24","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","ال مادة الرابعة بعد إنشاء كليتي من كليات الجامعة، يوضع النظام الجامعىي الذي يبي الصلات بي الكليات وإدارة الجامعة وبي الكليات بعضها وبعض ."],"a":3,"e":"ورد في المذكرة: «ال مادة الرابعة بعد إنشاء كليتي من كليات الجامعة، يوضع النظام الجامعىي الذي يبي الصلات بي الكليات وإدارة الجامعة وبي الكليات بعضها وبعض .»"},{"chapter":2,"id":"KSU-125","page":"30","q":"أكمل العبارة الصحيحة وفق المذكرة: «كما امتد التوسع ليشمل فروعاً أخرى، حيث صدر في عام ____ ه المرسوم الملكي رقم 33 بإنشاء كلية المجتمع بجازان ال تابعة لجامعة الملك سعود .»","o":["1423","1418","1419","1420"],"a":1,"e":"ورد في المذكرة: «كما امتد التوسع ليشمل فروعاً أخرى، حيث صدر في عام 1418 ه المرسوم الملكي رقم 33 بإنشاء كلية المجتمع بجازان ال تابعة لجامعة الملك سعود .»"},{"chapter":2,"id":"KSU-126","page":"28","q":"أكمل العبارة الصحيحة وفق المذكرة: «معهد اللغة العربية ( ____ ه ) نسرِ ُ أ المعهد حرصاً من الجامعة على نشر اللغة العربية وتعلها للناطقي بغب ها من مختلف أنحاء العالم .»","o":["1399","1395","1394","1396"],"a":2,"e":"ورد في المذكرة: «معهد اللغة العربية ( 1394 ه ) نسرِ ُ أ المعهد حرصاً من الجامعة على نشر اللغة العربية وتعلها للناطقي بغب ها من مختلف أنحاء العالم .»"},{"chapter":2,"id":"KSU-127","page":"30","q":"أكمل العبارة الصحيحة وفق المذكرة: «واستمر الفرع في النمو والتوسع، حيث نشِئت ُ أ كلية العلوم بالق ص عام ____ ه، وكلية الطب عام 1421 ه ، وكلية الهندسة عام 142 4 ه .»","o":["1423","1419","1420","1418"],"a":3,"e":"ورد في المذكرة: «واستمر الفرع في النمو والتوسع، حيث نشِئت ُ أ كلية العلوم بالق ص عام 1418 ه، وكلية الطب عام 1421 ه ، وكلية الهندسة عام 142 4 ه .»"},{"chapter":2,"id":"KSU-128","page":"32","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","وتضم مرافق متكاملة تشمل المبان ي الأكادية، والمستشفيات الجامعية، ومراكز الأبحاث، والمكتبات، والمرافق الرياض ية والبرفيهية، والسكن الجامعىي للطلاب والطالبات .","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «وتضم مرافق متكاملة تشمل المبان ي الأكادية، والمستشفيات الجامعية، ومراكز الأبحاث، والمكتبات، والمرافق الرياض ية والبرفيهية، والسكن الجامعىي للطلاب والطالبات .»"},{"chapter":2,"id":"KSU-129","page":"28","q":"أكمل العبارة الصحيحة وفق المذكرة: «كليتا الهندسة والبربية ( ____ / 138 8 ه ) ضُمَّتا إل الجامعة بعد أن كانتا تحت إشراف وزارة المعارف بالتعاون مع منظمة اليونسكو .»","o":["1387","1392","1389","1388"],"a":0,"e":"ورد في المذكرة: «كليتا الهندسة والبربية ( 1387 / 138 8 ه ) ضُمَّتا إل الجامعة بعد أن كانتا تحت إشراف وزارة المعارف بالتعاون مع منظمة اليونسكو .»"},{"chapter":2,"id":"KSU-130","page":"31","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["ي وف عام 1415 ه ( 1994 م ) ، ضُمَّ إل كلية اللغات والبرجمة، وأصبحت تقدم برامج متمب ة في اللغات الأوروبية والآسيوية والبرجمة .","ي وف عام 1416 ه ( 1994 م ) ، ضُمَّ إل كلية اللغات والبرجمة، وأصبحت تقدم برامج متمب ة في اللغات الأوروبية والآسيوية والبرجمة .","ي وف عام 1420 ه ( 1994 م ) ، ضُمَّ إل كلية اللغات والبرجمة، وأصبحت تقدم برامج متمب ة في اللغات الأوروبية والآسيوية والبرجمة .","ي وف عام 1417 ه ( 1994 م ) ، ضُمَّ إل كلية اللغات والبرجمة، وأصبحت تقدم برامج متمب ة في اللغات الأوروبية والآسيوية والبرجمة ."],"a":0,"e":"ورد في المذكرة: «ي وف عام 1415 ه ( 1994 م ) ، ضُمَّ إل كلية اللغات والبرجمة، وأصبحت تقدم برامج متمب ة في اللغات الأوروبية والآسيوية والبرجمة .»"},{"chapter":2,"id":"KSU-131","page":"30","q":"أكمل العبارة الصحيحة وفق المذكرة: «المرحلة السابعة الفروع الخارجية فرع أبها ( ____ ه ) في عام 1400 ه، أنشئت كلية الطب بأبها باعتبارها فرعاً لجامعة الملك سعود .»","o":["1400","1405","1402","1401"],"a":0,"e":"ورد في المذكرة: «المرحلة السابعة الفروع الخارجية فرع أبها ( 1400 ه ) في عام 1400 ه، أنشئت كلية الطب بأبها باعتبارها فرعاً لجامعة الملك سعود .»"},{"chapter":2,"id":"KSU-132","page":"27","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","وضمت أقساماً في الرياضيات، والفب ياء والفلك، والكياء، والجيولوجيا والجيوفب ياء، وعلم الحيوان ، وعلم النبات، والكياء الحيوية، وغب ها من التخصصات العلمية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":2,"e":"ورد في المذكرة: «وضمت أقساماً في الرياضيات، والفب ياء والفلك، والكياء، والجيولوجيا والجيوفب ياء، وعلم الحيوان ، وعلم النبات، والكياء الحيوية، وغب ها من التخصصات العلمية .»"},{"chapter":2,"id":"KSU-133","page":"27","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["كلية العلوم ( 1377 ه ) تأسست بموجب المرسوم الملكي رقم 19 بتاري خ 21 ربيع الآخر عام 1377 ه، وبدأت الدراسة فيها عام 1379 ه .","كلية العلوم ( 1378 ه ) تأسست بموجب المرسوم الملكي رقم 19 بتاري خ 21 ربيع الآخر عام 1377 ه، وبدأت الدراسة فيها عام 1379 ه .","كلية العلوم ( 1379 ه ) تأسست بموجب المرسوم الملكي رقم 19 بتاري خ 21 ربيع الآخر عام 1377 ه، وبدأت الدراسة فيها عام 1379 ه .","كلية العلوم ( 1382 ه ) تأسست بموجب المرسوم الملكي رقم 19 بتاري خ 21 ربيع الآخر عام 1377 ه، وبدأت الدراسة فيها عام 1379 ه ."],"a":0,"e":"ورد في المذكرة: «كلية العلوم ( 1377 ه ) تأسست بموجب المرسوم الملكي رقم 19 بتاري خ 21 ربيع الآخر عام 1377 ه، وبدأت الدراسة فيها عام 1379 ه .»"},{"chapter":2,"id":"KSU-134","page":"33","q":"أكمل العبارة الصحيحة وفق المذكرة: «أسست جامعة الملك سعود برنامج أوقاف الجامعة، وخصصت له مساحة تُقدر بنحو ____ ألف مبر مرب ع، بهدف دعم الجامعة مالياً وبحثياً .»","o":["180","185","181","182"],"a":0,"e":"ورد في المذكرة: «أسست جامعة الملك سعود برنامج أوقاف الجامعة، وخصصت له مساحة تُقدر بنحو 180 ألف مبر مرب ع، بهدف دعم الجامعة مالياً وبحثياً .»"},{"chapter":2,"id":"KSU-135","page":"23","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["ا لمادة الثانية يكون وزير المعارف في حكومتنا الرئيس الأعلى للجامعة، يصادق على قرارات مجلس الجامعة، ويعي عمداء الكليات .","ا لمادة الثانية لا يكون وزير المعارف في حكومتنا الرئيس الأعلى للجامعة، يصادق على قرارات مجلس الجامعة، ويعي عمداء الكليات .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «ا لمادة الثانية يكون وزير المعارف في حكومتنا الرئيس الأعلى للجامعة، يصادق على قرارات مجلس الجامعة، ويعي عمداء الكليات .»"},{"chapter":2,"id":"KSU-136","page":"31","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["1420 ه ) معهد اللغات والبرجمة ( 1411 ه / 1990 م ) نسرِ ُ أ تجسيداً لاهتمام المملكة بتدريس اللغات الأجنبية والبرجمة .","1416 ه ) معهد اللغات والبرجمة ( 1411 ه / 1990 م ) نسرِ ُ أ تجسيداً لاهتمام المملكة بتدريس اللغات الأجنبية والبرجمة .","1417 ه ) معهد اللغات والبرجمة ( 1411 ه / 1990 م ) نسرِ ُ أ تجسيداً لاهتمام المملكة بتدريس اللغات الأجنبية والبرجمة .","1415 ه ) معهد اللغات والبرجمة ( 1411 ه / 1990 م ) نسرِ ُ أ تجسيداً لاهتمام المملكة بتدريس اللغات الأجنبية والبرجمة ."],"a":3,"e":"ورد في المذكرة: «1415 ه ) معهد اللغات والبرجمة ( 1411 ه / 1990 م ) نسرِ ُ أ تجسيداً لاهتمام المملكة بتدريس اللغات الأجنبية والبرجمة .»"},{"chapter":2,"id":"KSU-137","page":"28","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["1388 ه ) كلية الزراعة ( 1385 ه ) اُفتُتِحت هذه الكلية لتلبية احتياجات المملكة في مجال الزراعة والأمن الغذان ي .","1387 ه ) كلية الزراعة ( 1385 ه ) اُفتُتِحت هذه الكلية لتلبية احتياجات المملكة في مجال الزراعة والأمن الغذان ي .","1389 ه ) كلية الزراعة ( 1385 ه ) اُفتُتِحت هذه الكلية لتلبية احتياجات المملكة في مجال الزراعة والأمن الغذان ي .","1392 ه ) كلية الزراعة ( 1385 ه ) اُفتُتِحت هذه الكلية لتلبية احتياجات المملكة في مجال الزراعة والأمن الغذان ي ."],"a":1,"e":"ورد في المذكرة: «1387 ه ) كلية الزراعة ( 1385 ه ) اُفتُتِحت هذه الكلية لتلبية احتياجات المملكة في مجال الزراعة والأمن الغذان ي .»"},{"chapter": تعلي بالمملكة العربية السعودية، وهو أحد المستشفيات الجامعية التابعة لكلىي ة الطب .","في العام 144 6 ه استلمت الجامعة مستشق الملك عبد العزيز ليصبح بمسماه الحالي ويعتبر أول مستشق تعلي بالمملكة العربية السعودية، وهو أحد المستشفيات الجامعية التابعة لكلىي ة الطب .","في العام 140 6 ه استلمت الجامعة مستشق الملك عبد العزيز ليصبح بمسماه الحالي ويعتبر أول مستشق تعلي بالمملكة العربية السعودية، وهو أحد المستشفيات الجامعية التابعة لكلىي ة الطب ."],"a":0,"e":"ورد في المذكرة: «المدينة الطبية الجامعية مستشق الملك عبدالعزيز الجامعىي : في العام 139 6 ه استلمت الجامعة مستشق الملك عبد العزيز ليصبح بمسماه الحالي ويعتبر أول مستشق تعلي بالمملكة العربية السعودية، وهو أحد المستشفيات الجامعية التابعة لكلىي ة الطب .»"},{"chapter":3,"id":"KSU-142","page":"40","q":"ما المقصود بـ «مستشق الملك خالد الجامعىي» وفق المذكرة؟","o":["تم افتتاحه عام 1407 ه في المدينة الجامعية، وهو مستشق تعلي يقدم خدمات طبية عالية الجودة للمرض في كثب من التخصصات الطبية كالعناية الفائقة، والجراحة، وطب الأطفال، والأمراض الباطن ي ة، والأ مراض النسائية، وطب الطوارئ، وغب ها .","تم افتتاحه عام 1404 ه في المدينة الجامعية، وهو مستشق تعلي يقدم خدمات طبية عالية الجودة للمرض في كثب من التخصصات الطبية كالعناية الفائقة، والجراحة، وطب الأطفال، والأمراض الباطن ي ة، والأ مراض النسائية، وطب الطوارئ، وغب ها .","تم افتتاحه عام 1403 ه في المدينة الجامعية، وهو مستشق تعلي يقدم خدمات طبية عالية الجودة للمرض في كثب من التخصصات الطبية كالعناية الفائقة، والجراحة، وطب الأطفال، والأمراض الباطن ي ة، والأ مراض النسائية، وطب الطوارئ، وغب ها .","تم افتتاحه عام 1402 ه في المدينة الجامعية، وهو مستشق تعلي يقدم خدمات طبية عالية الجودة للمرض في كثب من التخصصات الطبية كالعناية الفائقة، والجراحة، وطب الأطفال، والأمراض الباطن ي ة، والأ مراض النسائية، وطب الطوارئ، وغب ها ."],"a":3,"e":"ورد في المذكرة: «مستشق الملك خالد الجامعىي : تم افتتاحه عام 1402 ه في المدينة الجامعية، وهو مستشق تعلي يقدم خدمات طبية عالية الجودة للمرض في كثب من التخصصات الطبية كالعناية الفائقة، والجراحة، وطب الأطفال، والأمراض الباطن ي ة، والأ مراض النسائية، وطب الطوارئ، وغب ها .»"},{"chapter":3,"id":"KSU-143","page":"41","q":"ما المقصود بـ «مستشق طب الأسنان الجامعىي» وفق المذكرة؟","o":["كلية الصيدلة تُعدّ كلية الصيدلة من أوائل الكليات النري نشئت ُ أ في جامعة الملك سعود، إذ بدأت الدراسة بها عام 1384 ه / 1959 م أي بعد تأسيس الجامعة بعامفيقط، وكانت الكلية الثالثة في ترتيب التأسيس بالجامعة .","كلية الصيدلة تُعدّ كلية الصيدلة من أوائل الكليات النري نشئت ُ أ في جامعة الملك سعود، إذ بدأت الدراسة بها عام 1380 ه / 1959 م أي بعد تأسيس الجامعة بعامفيقط، وكانت الكلية الثالثة في ترتيب التأسيس بالجامعة .","كلية الصيدلة تُعدّ كلية الصيدلة من أوائل الكليات النري نشئت ُ أ في جامعة الملك سعود، إذ بدأت الدراسة بها عام 1381 ه / 1959 م أي بعد تأسيس الجامعة بعامفيقط، وكانت الكلية الثالثة في ترتيب التأسيس بالجامعة .","كلية الصيدلة تُعدّ كلية الصيدلة من أوائل الكليات النري نشئت ُ أ في جامعة الملك سعود، إذ بدأت الدراسة بها عام 1379 ه / 1959 م أي بعد تأسيس الجامعة بعامفيقط، وكانت الكلية الثالثة في ترتيب التأسيس بالجامعة ."],"a":3,"e":"ورد في المذكرة: «مستشق طب الأسنان الجامعىي : كلية الصيدلة تُعدّ كلية الصيدلة من أوائل الكليات النري نشئت ُ أ في جامعة الملك سعود، إذ بدأت الدراسة بها عام 1379 ه / 1959 م أي بعد تأسيس الجامعة بعامفيقط، وكانت الكلية الثالثة في ترتيب التأسيس بالجامعة .»"},{"chapter":3,"id":"KSU-144","page":"42","q":"ما المقصود بـ «تضم الكلية سبعة أقسام أكادية هي» وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","العلوم الإشعاعية ، والبص ريات، وعلوم التأهيل الصخي ( الذي يشمل العلاج الطبيعىي والوظيق ي والتنفسي وعلاج علل النطق والسمع ) ، و التكنولوجيا الطبية الحيوية، وعلوم صحة المجتمع، وعلوم المختبرات الإكلينيكية، وصحة الأسنا ن .","يُطبق ذلك على التعليم العام فقط.","العلوم الإشعاعية ، والبص ريات، وعلوم التأهيل الصخي ( الذي لا يشمل العلاج الطبيعىي والوظيق ي والتنفسي وعلاج علل النطق والسمع ) ، و التكنولوجيا الطبية الحيوية، وعلوم صحة المجتمع، وعلوم المختبرات الإكلينيكية، وصحة الأسنا ن ."],"a":1,"e":"ورد في المذكرة: «تضم الكلية سبعة أقسام أكادية هي : العلوم الإشعاعية ، والبص ريات، وعلوم التأهيل الصخي ( الذي يشمل العلاج الطبيعىي والوظيق ي والتنفسي وعلاج علل النطق والسمع ) ، و التكنولوجيا الطبية الحيوية، وعلوم صحة المجتمع، وعلوم المختبرات الإكلينيكية، وصحة الأسنا ن .»"},{"chapter":3,"id":"KSU-145","page":"42","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["في عام 1977 م تحوّلت إل قسم ا لتمريض ضمن كلية العلوم الطبية المساعدة ( كلية العلوم الطبية التطبيقية حاليا ) ، ي وف عام 1988 م أطلقت أول برنامج ماجستب في التمريض على مستوى المملكة بأربعة تخصصات دقيقة هي : إدارة التمريض، وتمريض الأمومة والط فولة، والتمريض الجراحي الباطن ي، وتمريض صحة المجتمع .","في عام 1982 م تحوّلت إل قسم ا لتمريض ضمن كلية العلوم الطبية المساعدة ( كلية العلوم الطبية التطبيقية حاليا ) ، ي وف عام 1988 م أطلقت أول برنامج ماجستب في التمريض على مستوى المملكة بأربعة تخصصات دقيقة هي : إدارة التمريض، وتمريض الأمومة والط فولة، والتمريض الجراحي الباطن ي، وتمريض صحة المجتمع .","في عام 1978 م تحوّلت إل قسم ا لتمريض ضمن كلية العلوم الطبية المساعدة ( كلية العلوم الطبية التطبيقية حاليا ) ، ي وف عام 1988 م أطلقت أول برنامج ماجستب في التمريض على مستوى المملكة بأربعة تخصصات دقيقة هي : إدارة التمريض، وتمريض الأمومة والط فولة، والتمريض الجراحي الباطن ي، وتمريض صحة المجتمع .","في عام 1979 م تحوّلت إل قسم ا لتمريض ضمن كلية العلوم الطبية المساعدة ( كلية العلوم الطبية التطبيقية حاليا ) ، ي وف عام 1988 م أطلقت أول برنامج ماجستب في التمريض على مستوى المملكة بأربعة تخصصات دقيقة هي : إدارة التمريض، وتمريض الأمومة والط فولة، والتمريض الجراحي الباطن ي، وتمريض صحة المجتمع ."],"a":0,"e":"ورد في المذكرة: «في عام 1977 م تحوّلت إل قسم ا لتمريض ضمن كلية العلوم الطبية المساعدة ( كلية العلوم الطبية التطبيقية حاليا ) ، ي وف عام 1988 م أطلقت أول برنامج ماجستب في التمريض على مستوى المملكة بأربعة تخصصات دقيقة هي : إدارة التمريض، وتمريض الأمومة والط فولة، والتمريض الجراحي الباطن ي، وتمريض صحة المجتمع .»"},{"chapter":3,"id":"KSU-146","page":"44","q":"أكمل العبارة الصحيحة وفق المذكرة: «كلية علوم الحاسب والمعلومات تم إنشاء كلية علوم الأغذية والزراعة عام ____ ه / 1965 م، وتضم أقساماً متخصصة تشمل : الإنتاج النبانري، والهندسة الزراعية، والإنتاج الحيوان ي، وعلوم البربة، وعلوم الأغذية و ال تغذية، ووقاية النبات، والاقتص اد الزراعي .»","o":["1385","1390","1387","1386"],"a":0,"e":"ورد في المذكرة: «كلية علوم الحاسب والمعلومات تم إنشاء كلية علوم الأغذية والزراعة عام 1385 ه / 1965 م، وتضم أقساماً متخصصة تشمل : الإنتاج النبانري، والهندسة الزراعية، والإنتاج الحيوان ي، وعلوم البربة، وعلوم الأغذية و ال تغذية، ووقاية النبات، والاقتص اد الزراعي .»"},{"chapter":3,"id":"KSU-147","page":"47","q":"ما المقصود بـ «تضم الكلية ثلاثة أقسام رئيسية» وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","قسم التصم و يشمل التصم الجرافيكي الحركي والمنس وجات والأزياء وتصم المجوهرات، وقسم الفنون الأدائية و يضم المشح والسينما والموسيقر، وقسم ال فنون البصرية و يغطي الطباعة والرسم والنحت والخط العرنري .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","قسم التصم و لا يشمل التصم الجرافيكي الحركي والمنس وجات والأزياء وتصم المجوهرات، وقسم الفنون الأدائية و يضم المشح والسينما والموسيقر، وقسم ال فنون البصرية و يغطي الطباعة والرسم والنحت والخط العرنري ."],"a":1,"e":"ورد في المذكرة: «تضم الكلية ثلاثة أقسام رئيسية : قسم التصم و يشمل التصم الجرافيكي الحركي والمنس وجات والأزياء وتصم المجوهرات، وقسم الفنون الأدائية و يضم المشح والسينما والموسيقر، وقسم ال فنون البصرية و يغطي الطباعة والرسم والنحت والخط العرنري .»"},{"chapter":3,"id":"KSU-148","page":"45","q":"ما المقصود بـ «تضم الكلية أقساماً لغوية متنوعة تشمل» وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","اللغة الإنجلب ية، واللسانيات، واللغة الفرنسية، واللغات الحديثة وال ترجمة النري تغطي لغات عديدة كالصينية والإسبانية والألمانية والروسية والفارسية، والبركية، واليابانية، وغ يرها .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «تضم الكلية أقساماً لغوية متنوعة تشمل : اللغة الإنجلب ية، واللسانيات، واللغة الفرنسية، واللغات الحديثة وال ترجمة النري تغطي لغات عديدة كالصينية والإسبانية والألمانية والروسية والفارسية، والبركية، واليابانية، وغ يرها .»"},{"chapter":3,"id":"KSU-149","page":"45","q":"ما المقصود بـ «تضم الكلية أقساماً تربوية ونفسية وإسلامية تشمل» وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","الدراسات الإ سلامية، والدراسات القرآنية، وعلم النفس، والبربية الخاصة، وتقنيات التعل، والإدارة البربوية والسياسي ات البربوية والطفولة المبكرة والمناهج وطرق التدريس .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «تضم الكلية أقساماً تربوية ونفسية وإسلامية تشمل : الدراسات الإ سلامية، والدراسات القرآنية، وعلم النفس، والبربية الخاصة، وتقنيات التعل، والإدارة البربوية والسياسي ات البربوية والطفولة المبكرة والمناهج وطرق التدريس .»"},{"chapter":3,"id":"KSU-150","page":"50","q":"أكمل العبارة الصحيحة وفق المذكرة: «عمادة القبول والتسجيل عمادة شؤون المكتبات مكتبة الملك سلمان المركزي ة : تقع مكتبة الملك سلمان المركزية في قلب المدينة الجامعية بالدرعية، وقد افتُتح مبناها الجديد عام ____ ه عند انتقال العمادة إل الحرم الجامعىي .»","o":["1407","1405","1406","1410"],"a":1,"e":"ورد في المذكرة: «عمادة القبول والتسجيل عمادة شؤون المكتبات مكتبة الملك سلمان المركزي ة : تقع مكتبة الملك سلمان المركزية في قلب المدينة الجامعية بالدرعية، وقد افتُتح مبناها الجديد عام 1405 ه عند انتقال العمادة إل الحرم الجامعىي .»"},{"chapter":3,"id":"KSU-151","page":"36","q":"أكمل العبارة الصحيحة وفق المذكرة: «يتناول هذا الباب الجوانب الرئيسة للهيكل الأكادي والتنظي لجامعة الملك س عود، بما في ذلك الكليات والعمادات وأبرز أدوارها مع التعريف بالمعاهد التابعة للجامعة، م ما يوفر صورة شاملة وكاملة عن الهيكل التنظي الذي يدعم تحقيق أهداف الجامعة الاسبراتيجية ورؤية المملكة ____ والتطلعات المستقبلية .»","o":["2035","2032","2031","2030"],"a":3,"e":"ورد في المذكرة: «يتناول هذا الباب الجوانب الرئيسة للهيكل الأكادي والتنظي لجامعة الملك س عود، بما في ذلك الكليات والعمادات وأبرز أدوارها مع التعريف بالمعاهد التابعة للجامعة، م ما يوفر صورة شاملة وكاملة عن الهيكل التنظي الذي يدعم تحقيق أهداف الجامعة الاسبراتيجية ورؤية المملكة 2030 والتطلعات المستقبلية .»"},{"chapter":3,"id":"KSU-152","page":"37","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","الهيكل الأكادي والتنظي تضم جامعة الملك سعود العديد من الكليات النري تغطي مختلف التخصصات الأكادية، وتنقسم إل فئات رئيسية تشمل الكليات الصحية، والكليات العلمية، والكليات الإنسانية وكلية الدراسات ال تطبيقية، والكليات الجامعية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «الهيكل الأكادي والتنظي تضم جامعة الملك سعود العديد من الكليات النري تغطي مختلف التخصصات الأكادية، وتنقسم إل فئات رئيسية تشمل الكليات الصحية، والكليات العلمية، والكليات الإنسانية وكلية الدراسات ال تطبيقية، والكليات الجامعية .»"},{"chapter":3,"id":"KSU-153","page":"37","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","كما تضم جامعة الملك سعود عدداً من العمادات النري تُسهم في تطوير المنظومة التعلية والإدارية، حيث تتول الإشراف على مجالات متعددة تشمل البحث العلمي، والجودة والتطوير، والموارد البشرية، والتعاملات الإلكبرونية، وشؤون الطلاب، وتنمية المهارات، وغب ها من المجالات المساندة .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":2,"e":"ورد في المذكرة: «كما تضم جامعة الملك سعود عدداً من العمادات النري تُسهم في تطوير المنظومة التعلية والإدارية، حيث تتول الإشراف على مجالات متعددة تشمل البحث العلمي، والجودة والتطوير، والموارد البشرية، والتعاملات الإلكبرونية، وشؤون الطلاب، وتنمية المهارات، وغب ها من المجالات المساندة .»"},{"chapter":3,"id":"KSU-154","page":"40","q":"أكمل العبارة الصحيحة وفق المذكرة: «تعود نشأة كلية الطب إل عام ____ ه / 1967 م لتكون أول كلية طب في المملكة العربية السعودية، وذلك في عهد الملك فيصل بن عبدالعزيز رحمه الله، وبدأت الدراسة الفعلية بها عام 1389 ه بالتعاون مع جامعة لندن في الإشراف الأكادي حنر عام 1978 م .»","o":["1388","1387","1389","1392"],"a":1,"e":"ورد في المذكرة: «تعود نشأة كلية الطب إل عام 1387 ه / 1967 م لتكون أول كلية طب في المملكة العربية السعودية، وذلك في عهد الملك فيصل بن عبدالعزيز رحمه الله، وبدأت الدراسة الفعلية بها عام 1389 ه بالتعاون مع جامعة لندن في الإشراف الأكادي حنر عام 1978 م .»"},{"chapter":3,"id":"KSU-155","page":"41","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["تمنح الكلية درجة البكالوريوس في طب وجراحة الفم والأسنان ، إضافةً إل برامج الماجستب في تخصصات تقو الأسن ان وطب أسنان الأطفال وعلاج جذور الأسنان، وبرامج دكتوراه العلوم في طب الأسنان في تخصصات إصلاح الأسنان والتعويضات السنية وغب ها .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «تمنح الكلية درجة البكالوريوس في طب وجراحة الفم والأسنان ، إضافةً إل برامج الماجستب في تخصصات تقو الأسن ان وطب أسنان الأطفال وعلاج جذور الأسنان، وبرامج دكتوراه العلوم في طب الأسنان في تخصصات إصلاح الأسنان والتعويضات السنية وغب ها .»"},{"chapter":3,"id":"KSU-156","page":"42","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["تقدم الكلية 13 برنامجاً للبكالوريوس إضافةً إل عدد من برامج الدراسات العليا في بعض التخصصات، وتعتم د مناهجها على برامج عالمية رائدة كبرنامج جامعة فلندرز الأسبرالية في الخدمات الطبية الطارئة وبرامج جامعات أمريكية متخصصة في المختبرات الإكلينيكية والعلاج التنفسي .","تقدم الكلية 17 برنامجاً للبكالوريوس إضافةً إل عدد من برامج الدراسات العليا في بعض التخصصات، وتعتم د مناهجها على برامج عالمية رائدة كبرنامج جامعة فلندرز الأسبرالية في الخدمات الطبية الطارئة وبرامج جامعات أمريكية متخصصة في المختبرات الإكلينيكية والعلاج التنفسي .","تقدم الكلية 12 برنامجاً للبكالوريوس إضافةً إل عدد من برامج الدراسات العليا في بعض التخصصات، وتعتم د مناهجها على برامج عالمية رائدة كبرنامج جامعة فلندرز الأسبرالية في الخدمات الطبية الطارئة وبرامج جامعات أمريكية متخصصة في المختبرات الإكلينيكية والعلاج التنفسي .","تقدم الكلية 14 برنامجاً للبكالوريوس إضافةً إل عدد من برامج الدراسات العليا في بعض التخصصات، وتعتم د مناهجها على برامج عالمية رائدة كبرنامج جامعة فلندرز الأسبرالية في الخدمات الطبية الطارئة وبرامج جامعات أمريكية متخصصة في المختبرات الإكلينيكية والعلاج التنفسي ."],"a":2,"e":"ورد في المذكرة: «تقدم الكلية 12 برنامجاً للبكالوريوس إضافةً إل عدد من برامج الدراسات العليا في بعض التخصصات، وتعتم د مناهجها على برامج عالمية رائدة كبرنامج جامعة فلندرز الأسبرالية في الخدمات الطبية الطارئة وبرامج جامعات أمريكية متخصصة في المختبرات الإكلينيكية والعلاج التنفسي .»"},{"chapter":3,"id":"KSU-157","page":"42","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["حصلت الكلية على اعتماد جمعية القلب السعودية كمركز تدرينري معتمد، كما تربطها شراكات فاعل ة مع هيئات الإسعاف والطوارئ الوطنية لدعم تطوير منظومة الاستجابة الطارئة في المملكة، وتسعى إ ل تحقيق ريادة إقلية وتمب عالمفيي إعداد مخرجات مؤهلة بخلاف أعلى المعايب المهنية في تخصصات العلوم الطبية الطارئة .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","حصلت الكلية على اعتماد جمعية القلب السعودية كمركز تدرينري معتمد، كما تربطها شراكات فاعل ة مع هيئات الإسعاف والطوارئ الوطنية لدعم تطوير منظومة الاستجابة الطارئة في المملكة، وتسعى إ ل تحقيق ريادة إقلية وتمب عالمفيي إعداد مخرجات مؤهلة وفق أعلى المعايب المهنية في تخصصات العلوم الطبية الطارئة .","يُطبق ذلك على التعليم العام فقط."],"a":2,"e":"ورد في المذكرة: «حصلت الكلية على اعتماد جمعية القلب السعودية كمركز تدرينري معتمد، كما تربطها شراكات فاعل ة مع هيئات الإسعاف والطوارئ الوطنية لدعم تطوير منظومة الاستجابة الطارئة في المملكة، وتسعى إ ل تحقيق ريادة إقلية وتمب عالمفيي إعداد مخرجات مؤهلة وفق أعلى المعايب المهنية في تخصصات العلوم الطبية الطارئة .»"},{"chapter":3,"id":"KSU-158","page":"43","q":"أكمل العبارة الصحيحة وفق المذكرة: «بدأت كلية الهندسة مسب تها عام ____ ه / 1962 م بوصفها مشروعاً مشبركاً بي حكومة المملكة العربية السعودية ومنظمة اليونسكو، وانضمت رسمياً إل جامعة الملك سعود عام 1388 ه لتصبح ركب ةً علمية راسخة في المنظومة الهندسية للمملكة .»","o":["1384","1387","1382","1383"],"a":2,"e":"ورد في المذكرة: «بدأت كلية الهندسة مسب تها عام 1382 ه / 1962 م بوصفها مشروعاً مشبركاً بي حكومة المملكة العربية السعودية ومنظمة اليونسكو، وانضمت رسمياً إل جامعة الملك سعود عام 1388 ه لتصبح ركب ةً علمية راسخة في المنظومة الهندسية للمملكة .»"},{"chapter":3,"id":"KSU-159","page":"43","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","تتمب الكلية بشراكاتها الاسبراتيخري ة مع كبرى الشركات الصناعية كأرامكو السعودية وسابك وغب هما، مما يوفر للطلاب فرصاً تدريبية تطبيقية ومساراتٍ وظيفية متمب ة، وتُعدّ مساهماً رئيسياً في دعم التنمية الصناعية والاقتصادية في المملكة .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «تتمب الكلية بشراكاتها الاسبراتيخري ة مع كبرى الشركات الصناعية كأرامكو السعودية وسابك وغب هما، مما يوفر للطلاب فرصاً تدريبية تطبيقية ومساراتٍ وظيفية متمب ة، وتُعدّ مساهماً رئيسياً في دعم التنمية الصناعية والاقتصادية في المملكة .»"},{"chapter":3,"id":"KSU-160","page":"44","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتمتع الكلية بمزرعة بحثية تجريبية تدعم تطبيق نتائج الأبحاث على أرض الواقع، وتُسهم في تطوير الزراعة المس تدامة وتحقيق الأمن الغذان فيي المملكة، كما تُعدّ شريكاً فاعلاً في المبادرات الوطنية لتطوير القطاع الزر اعي وتوظيف التقنيات الحديثة في زيادة الإنتاجية .","تتمتع الكلية بمزرعة بحثية تجريبية تدعم تطبيق نتائج الأبحاث على أرض الواقع، وتُسهم في تطوير الزراعة المس تدامة وتحقيق الأمن الغذان فيي المملكة، كما تُعدّ شريكاً فاعلاً في المبادرات الوطنية لتطوير القطاع الزر اعي وتوظيف التقنيات الحديثة في زيادة الإنتاجية .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «تتمتع الكلية بمزرعة بحثية تجريبية تدعم تطبيق نتائج الأبحاث على أرض الواقع، وتُسهم في تطوير الزراعة المس تدامة وتحقيق الأمن الغذان فيي المملكة، كما تُعدّ شريكاً فاعلاً في المبادرات الوطنية لتطوير القطاع الزر اعي وتوظيف التقنيات الحديثة في زيادة الإنتاجية .»"},{"chapter":3,"id":"KSU-161","page":"45","q":"أكمل العبارة الصحيحة وفق المذكرة: «كلية اللغات وعلومها كلية العلوم الإنسانية والاجتماعية الكليات الإنسانية تعود بدايات كلية البربية إل عام ____ ه / 1967 م بموجب اتفاقية بي وزارة المعارف ( وزارة التعل حالياً ) وبرنامج الأمم المتحدة للتنمية بالتعاون مع منظمة اليونسكو، وبدأت عملها بشكل مستقل قب ل أن تنضم رسمياً إل جامعة الملك سعود .»","o":["1387","1389","1388","1392"],"a":0,"e":"ورد في المذكرة: «كلية اللغات وعلومها كلية العلوم الإنسانية والاجتماعية الكليات الإنسانية تعود بدايات كلية البربية إل عام 1387 ه / 1967 م بموجب اتفاقية بي وزارة المعارف ( وزارة التعل حالياً ) وبرنامج الأمم المتحدة للتنمية بالتعاون مع منظمة اليونسكو، وبدأت عملها بشكل مستقل قب ل أن تنضم رسمياً إل جامعة الملك سعود .»"},{"chapter":3,"id":"KSU-162","page":"47","q":"أكمل العبارة الصحيحة وفق المذكرة: «كلية الدراسات التطبيقية صدر القرار السامي بإنشاء كلية الفنون بجامعة الملك سعود عام ____ ه / 2020 م ، يليه صدور قرار مجلس الجامعات عام 1442 ه / 2021 م بإنشائها ونقل قسم البربية الفنية إليها ، لتكون أوّل كلية سعودية حكوم ية متخصصة في تعل الفنون .»","o":["1446","1441","1442","1443"],"a":1,"e":"ورد في المذكرة: «كلية الدراسات التطبيقية صدر القرار السامي بإنشاء كلية الفنون بجامعة الملك سعود عام 1441 ه / 2020 م ، يليه صدور قرار مجلس الجامعات عام 1442 ه / 2021 م بإنشائها ونقل قسم البربية الفنية إليها ، لتكون أوّل كلية سعودية حكوم ية متخصصة في تعل الفنون .»"},{"chapter":3,"id":"KSU-163","page":"48","q":"أكمل العبارة الصحيحة وفق المذكرة: «كلية الهندسة التطبيقية فرع المزاحمية كلية علوم الحاسب التطبيقرفيرع المزاحمية أنشئت كلية الهندسة التطبيقية بمحافظة المزاحمية عام ____ ه / 2013 م، بتوجيه من وزارة التعل العالي آنذاك كجزء من مبادرة توسيع التعل العالفيي المناطق والمحافظات خارج العاصمة .»","o":["1435","1437","1436","1440"],"a":0,"e":"ورد في المذكرة: «كلية الهندسة التطبيقية فرع المزاحمية كلية علوم الحاسب التطبيقرفيرع المزاحمية أنشئت كلية الهندسة التطبيقية بمحافظة المزاحمية عام 1435 ه / 2013 م، بتوجيه من وزارة التعل العالي آنذاك كجزء من مبادرة توسيع التعل العالفيي المناطق والمحافظات خارج العاصمة .»"},{"chapter":3,"id":"KSU-164","page":"48","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","تُقدّم الكلية برامج أكادية هندسية تطبيقية تجمع بي العلوم الهندسية النظرية والمهارات التطبيقية الع ملية، وتضم تخصصات في الهندسة الكهربائية والميكانيكية والمدنية والصناعية وغب ها بنظام تطنرفيير يُهن ّ الخريجي لسوق العمل مباشرةً ."],"a":3,"e":"ورد في المذكرة: «تُقدّم الكلية برامج أكادية هندسية تطبيقية تجمع بي العلوم الهندسية النظرية والمهارات التطبيقية الع ملية، وتضم تخصصات في الهندسة الكهربائية والميكانيكية والمدنية والصناعية وغب ها بنظام تطنرفيير يُهن ّ الخريجي لسوق العمل مباشرةً .»"},{"chapter":3,"id":"KSU-165","page":"49","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["ولا تهدف العمادة إل توفب الرعاية والخدمات والأنشطة اللاصفية لطلاب وطالبات الجامعة وتهيئة البيئة الملائمة لا كتساب المعرفة، وتدريبهم في مجالات متعددة لصقل مهاراتهم وتنمية قدراتهم الذهنية والجسمية، وإعدادهم إعداداً متكاملاً يُمكّنهم من المنافسة في المجالات الأكادية والمهنية.","وتهدف العمادة إل توفب الرعاية والخدمات والأنشطة اللاصفية لطلاب وطالبات الجامعة وتهيئة البيئة الملائمة لا كتساب المعرفة، وتدريبهم في مجالات متعددة لصقل مهاراتهم وتنمية قدراتهم الذهنية والجسمية، وإعدادهم إعداداً متكاملاً يُمكّنهم من المنافسة في المجالات الأكادية والمهنية.","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":1,"e":"ورد في المذكرة: «وتهدف العمادة إل توفب الرعاية والخدمات والأنشطة اللاصفية لطلاب وطالبات الجامعة وتهيئة البيئة الملائمة لا كتساب المعرفة، وتدريبهم في مجالات متعددة لصقل مهاراتهم وتنمية قدراتهم الذهنية والجسمية، وإعدادهم إعداداً متكاملاً يُمكّنهم من المنافسة في المجالات الأكادية والمهنية.»"},{"chapter":3,"id":"KSU-166","page":"50","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["ي وف عام 1389 ه قررت الجامعة إنشاء مكتبة مركزية تضم جميع مكتباتها وتشرف عليها، ثم أسِست عمادة شؤون المكتبات رسمياً عام 1394 ه لتتول الإشراف الفن ي والإداري على منظومة المكتبات، وباتت كياناً أكادياً مستقلاً ثله عميد في مجلس الجامعة .","ي وف عام 1386 ه قررت الجامعة إنشاء مكتبة مركزية تضم جميع مكتباتها وتشرف عليها، ثم أسِست عمادة شؤون المكتبات رسمياً عام 1394 ه لتتول الإشراف الفن ي والإداري على منظومة المكتبات، وباتت كياناً أكادياً مستقلاً ثله عميد في مجلس الجامعة .","ي وف عام 1384 ه قررت الجامعة إنشاء مكتبة مركزية تضم جميع مكتباتها وتشرف عليها، ثم أسِست عمادة شؤون المكتبات رسمياً عام 1394 ه لتتول الإشراف الفن ي والإداري على منظومة المكتبات، وباتت كياناً أكادياً مستقلاً ثله عميد في مجلس الجامعة .","ي وف عام 1385 ه قررت الجامعة إنشاء مكتبة مركزية تضم جميع مكتباتها وتشرف عليها، ثم أسِست عمادة شؤون المكتبات رسمياً عام 1394 ه لتتول الإشراف الفن ي والإداري على منظومة المكتبات، وباتت كياناً أكادياً مستقلاً ثله عميد في مجلس الجامعة ."],"a":2,"e":"ورد في المذكرة: «ي وف عام 1384 ه قررت الجامعة إنشاء مكتبة مركزية تضم جميع مكتباتها وتشرف عليها، ثم أسِست عمادة شؤون المكتبات رسمياً عام 1394 ه لتتول الإشراف الفن ي والإداري على منظومة المكتبات، وباتت كياناً أكادياً مستقلاً ثله عميد في مجلس الجامعة .»"},{"chapter":3,"id":"KSU-167","page":"41","q":"ما المقصود بـ «تضم الكلية ستة أقسام أكادية هي» وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","جراحة الوجه والفكي ، وط ب الفم وعلوم التشخيص، وطب أسنان الأطفال وتقو الأسنان، والأنسجة المحيطة بالأسنان وصحة أس نان المجتمع، وعلوم الاستعاضة السنية، وعلوم إصلاح الأسنان .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «تضم الكلية ستة أقسام أكادية هي : جراحة الوجه والفكي ، وط ب الفم وعلوم التشخيص، وطب أسنان الأطفال وتقو الأسنان، والأنسجة المحيطة بالأسنان وصحة أس نان المجتمع، وعلوم الاستعاضة السنية، وعلوم إصلاح الأسنان .»"},{"chapter":3,"id":"KSU-168","page":"42","q":"ما المقصود بـ «تمنح الكلية برنامجي للبكالوريوس هما» وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","البكالوريوس في علو م التمريض، وبكالوريوس القبالة، إضافةً إل برامج الماجستب والدكتوراه ودبلوم التمريض الإكلي يكفيي الصحة النفسية بالتعاون مع المدينة الطبية الجامعية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «تمنح الكلية برنامجي للبكالوريوس هما : البكالوريوس في علو م التمريض، وبكالوريوس القبالة، إضافةً إل برامج الماجستب والدكتوراه ودبلوم التمريض الإكلي يكفيي الصحة النفسية بالتعاون مع المدينة الطبية الجامعية .»"},{"chapter":3,"id":"KSU-169","page":"50","q":"أكمل العبارة الصحيحة وفق المذكرة: «أدركت جامعة الملك سعود منذ نشأتها أهمية المكتبة الجامعية بوصفها أحد الركائز الأساسية في العملية التعلية والبحثية، فأنشأت أول مكتباتها عام ____ ه مصاحبةً لإنشاء كلية الآداب، وتزايد عدد المكتبات مع توسع كليات الجامعة .»","o":["1382","1377","1378","1379"],"a":1,"e":"ورد في المذكرة: «أدركت جامعة الملك سعود منذ نشأتها أهمية المكتبة الجامعية بوصفها أحد الركائز الأساسية في العملية التعلية والبحثية، فأنشأت أول مكتباتها عام 1377 ه مصاحبةً لإنشاء كلية الآداب، وتزايد عدد المكتبات مع توسع كليات الجامعة .»"},{"chapter":3,"id":"KSU-170","page":"47","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["تعمل الكلية على إعداد كفاءات وطنية مؤهلة لسوق العمل، وتعزيز دورها المجتمعىي عبر برامج مرنة تل نري احتياجات مختلف القطاعات، وتستهدف تطوير المهارات الإدارية والتقنية والإنسانية بما يتوافق مع متطلبات سوق العمل .","تعمل الكلية على إعداد كفاءات وطنية مؤهلة لسوق العمل، وتعزيز دورها المجتمعىي عبر برامج مرنة تل نري احتياجات مختلف القطاعات، وتسلا تهدف تطوير المهارات الإدارية والتقنية والإنسانية بما يتوافق مع متطلبات سوق العمل .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «تعمل الكلية على إعداد كفاءات وطنية مؤهلة لسوق العمل، وتعزيز دورها المجتمعىي عبر برامج مرنة تل نري احتياجات مختلف القطاعات، وتستهدف تطوير المهارات الإدارية والتقنية والإنسانية بما يتوافق مع متطلبات سوق العمل .»"},{"chapter":3,"id":"KSU-171","page":"48","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["تُقدّم الكلية برنامجاً في علوم الحاسب التطبيقري يتضمن مسارين تخصص يي هما : شبكات الحاسب، وتقنية الويب، يُمكِّنان الطالب من اكتساب المهارات التقنية والقدرة على التطبيق العملىفيي مجاله المختار .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط."],"a":0,"e":"ورد في المذكرة: «تُقدّم الكلية برنامجاً في علوم الحاسب التطبيقري يتضمن مسارين تخصص يي هما : شبكات الحاسب، وتقنية الويب، يُمكِّنان الطالب من اكتساب المهارات التقنية والقدرة على التطبيق العملىفيي مجاله المختار .»"},{"chapter":3,"id":"KSU-172","page":"50","q":"أكمل العبارة الصحيحة وفق المذكرة: «وقد استُحدث اسمها بمكتبة الأمب سلمان المركزية في ____ / 06 / 27 ه تكراً لدعمه ورعايته المتواصلة للجامعة، ثم تغب ّ مسماها إل “ مكتبة الملك سلمان المركزية ” بتاري خ 1436 / 04 / 03 ه عقب توليه مقاليد الحكم .»","o":["1427","1423","1422","1424"],"a":2,"e":"ورد في المذكرة: «وقد استُحدث اسمها بمكتبة الأمب سلمان المركزية في 1422 / 06 / 27 ه تكراً لدعمه ورعايته المتواصلة للجامعة، ثم تغب ّ مسماها إل “ مكتبة الملك سلمان المركزية ” بتاري خ 1436 / 04 / 03 ه عقب توليه مقاليد الحكم .»"},{"chapter":3,"id":"KSU-173","page":"44","q":"أكمل العبارة الصحيحة وفق المذكرة: «كلية علوم الأغذية والزراعة تعود نشأة كلية العمارة والتخطيط ل عام ____ ه / 1984 م، إلا أن بداياتها تعود إل عام 1387 ه / 1967 م عندما كانت قسماً ضمن كلية الهندسة، ثم استقلت لتصبح كلية العمارة والتخطيط .»","o":["1404","1406","1409","1405"],"a":0,"e":"ورد في المذكرة: «كلية علوم الأغذية والزراعة تعود نشأة كلية العمارة والتخطيط ل عام 1404 ه / 1984 م، إلا أن بداياتها تعود إل عام 1387 ه / 1967 م عندما كانت قسماً ضمن كلية الهندسة، ثم استقلت لتصبح كلية العمارة والتخطيط .»"},{"chapter":3,"id":"KSU-174","page":"43","q":"أكمل العبارة الصحيحة وفق المذكرة: «كلية العلوم تأسست كلية إدارة الأ عمال عام ____ ه / 1959 م تحت مسم \" كلية التجارة \" ، ثم تحوّلت إل \" كلية العلوم الإدارية \" عام 139 9 ه، وأخذت مسماها الحالي عام 1426 ه / 2006 م بعد إعادة هيكلة شاملة .»","o":["1384","1379","1380","1381"],"a":1,"e":"ورد في المذكرة: «كلية العلوم تأسست كلية إدارة الأ عمال عام 1379 ه / 1959 م تحت مسم \" كلية التجارة \" ، ثم تحوّلت إل \" كلية العلوم الإدارية \" عام 139 9 ه، وأخذت مسماها الحالي عام 1426 ه / 2006 م بعد إعادة هيكلة شاملة .»"},{"chapter":3,"id":"KSU-175","page":"48","q":"أكمل العبارة الصحيحة وفق المذكرة: «كلية إدارة الأعمال التطبيقية فرع المزاحمية تأسست كلية إدارة الأعمال التطبيقية بمحافظة المزاحمية عام ____ ه / 2013 م، وهي الكلية الثالثة ضمن منظومة الكليات التطبيقية بفرع جامعة الملك سعود بالمزاحمية .»","o":["1436","1440","1435","1437"],"a":2,"e":"ورد في المذكرة: «كلية إدارة الأعمال التطبيقية فرع المزاحمية تأسست كلية إدارة الأعمال التطبيقية بمحافظة المزاحمية عام 1435 ه / 2013 م، وهي الكلية الثالثة ضمن منظومة الكليات التطبيقية بفرع جامعة الملك سعود بالمزاحمية .»"},{"chapter":3,"id":"KSU-176","page":"41","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","تمنح الكلية حالياً برنامج دكتور الصيدلة ( PharmD ) ب وصفه برنامجها الرئيسي على مستوى البكالوريوس بمدة ست سنوات تتضمن في سنتها الأخب ة تدريباً شيرياً مكثفاً في الم ستشفيات والصيدليات المجتمعية .","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «تمنح الكلية حالياً برنامج دكتور الصيدلة ( PharmD ) ب وصفه برنامجها الرئيسي على مستوى البكالوريوس بمدة ست سنوات تتضمن في سنتها الأخب ة تدريباً شيرياً مكثفاً في الم ستشفيات والصيدليات المجتمعية .»"},{"chapter":3,"id":"KSU-177","page":"45","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","تُولي الكلية اهتماماً خاصاً بتطو ير مناهج التعل وتوظيف التقنية الحديثة في البيئات التعلية، وتُسهم في دعم منظومة التعل ال عام عبر تأهيل معلمي أكفاء ومتخصصفيي البربية الخاصة وعلم النفس البربوي ."],"a":3,"e":"ورد في المذكرة: «تُولي الكلية اهتماماً خاصاً بتطو ير مناهج التعل وتوظيف التقنية الحديثة في البيئات التعلية، وتُسهم في دعم منظومة التعل ال عام عبر تأهيل معلمي أكفاء ومتخصصفيي البربية الخاصة وعلم النفس البربوي .»"},{"chapter":3,"id":"KSU-178","page":"36","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["كما يشمل هذا الهي كل مجموعة شاملة ومتنوعة من الكليات والمعاهد والمراكز البحثية والبرامج الأكادي ة المتقدمة والمتخصصة، النري تخدم بكفاءة واحبرافية عالية احتياجات المجتمع السعودي والمنطقة العربية والدول الخليجية والعالم أجمع .","يُطبق ذلك على التعليم العام فقط.","كما لا يشمل هذا الهي كل مجموعة شاملة ومتنوعة من الكليات والمعاهد والمراكز البحثية والبرامج الأكادي ة المتقدمة والمتخصصة، النري تخدم بكفاءة واحبرافية عالية احتياجات المجتمع السعودي والمنطقة العربية والدول الخليجية والعالم أجمع .","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «كما يشمل هذا الهي كل مجموعة شاملة ومتنوعة من الكليات والمعاهد والمراكز البحثية والبرامج الأكادي ة المتقدمة والمتخصصة، النري تخدم بكفاءة واحبرافية عالية احتياجات المجتمع السعودي والمنطقة العربية والدول الخليجية والعالم أجمع .»"},{"chapter":3,"id":"KSU-179","page":"41","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","ويوفر المستشق رعاية متخصصة تشمل علاج حالات فلح الشفة والحنك، وخدمات طب الأسنان لذوي الاحتياجات الخاصة، وعلاج الألم الفموي والقحق ي الوجهي، إل جانب رعاية المرض ذوي الحالات الصحية الخاصة والمصابي بالتوحد، كما يضم مرافق داعمة مثل صيدلية العيادات الخارجية، وبنك الدم، ومخ تبر التشري ح المرض ي لأمراض الفم والوجه والفكي .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «ويوفر المستشق رعاية متخصصة تشمل علاج حالات فلح الشفة والحنك، وخدمات طب الأسنان لذوي الاحتياجات الخاصة، وعلاج الألم الفموي والقحق ي الوجهي، إل جانب رعاية المرض ذوي الحالات الصحية الخاصة والمصابي بالتوحد، كما يضم مرافق داعمة مثل صيدلية العيادات الخارجية، وبنك الدم، ومخ تبر التشري ح المرض ي لأمراض الفم والوجه والفكي .»"},{"chapter":3,"id":"KSU-180","page":"43","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["بدأت بأقسام الجيولوجيا، وعلم الحيوان، وعلم النبات، والفب ياء، والك ياء، والرياضيات، وتوسّعت لتضم اليوم أقساماً علمية متطورة تشمل الفب ياء والفلك، والجيولوجيا والجيوفب ياء، والرياضيات، والكياء والكياء الحيوية، و النبات والأحياء الدقيقة .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «بدأت بأقسام الجيولوجيا، وعلم الحيوان، وعلم النبات، والفب ياء، والك ياء، والرياضيات، وتوسّعت لتضم اليوم أقساماً علمية متطورة تشمل الفب ياء والفلك، والجيولوجيا والجيوفب ياء، والرياضيات، والكياء والكياء الحيوية، و النبات والأحياء الدقيقة .»"},{"chapter":3,"id":"KSU-181","page":"48","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["يُركّز البرنامج على الموازنة بي العمق ي المعرف والمهارة التقنية والتطبيق المي دان ي، وي ُهن ّ خريجيه للعمل في مجالات تحليل وتطوير الأنظمة والبرامج، وتصم مواقع الإنبرنت، وإدارة شبكات الحاسب وقواعد البيانات، وإدارة مشاري ع تقنية المعلومات، مع تنمية قدرة الطالب على التط وير الذانري والمشاركة المجتمعية في مجال الحاسب .","يُطبق ذلك على التعليم العام فقط.","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","لا تتضمن المذكرة هذا الاختصاص أو الوصف."],"a":0,"e":"ورد في المذكرة: «يُركّز البرنامج على الموازنة بي العمق ي المعرف والمهارة التقنية والتطبيق المي دان ي، وي ُهن ّ خريجيه للعمل في مجالات تحليل وتطوير الأنظمة والبرامج، وتصم مواقع الإنبرنت، وإدارة شبكات الحاسب وقواعد البيانات، وإدارة مشاري ع تقنية المعلومات، مع تنمية قدرة الطالب على التط وير الذانري والمشاركة المجتمعية في مجال الحاسب .»"},{"chapter":3,"id":"KSU-182","page":"49","q":"أكمل العبارة الصحيحة وفق المذكرة: «عمادة الدراسات العليا عمادة شؤون الطلاب نشئت ُ أ عمادة البحث العلمفيي جامعة الملك سعود في عام ____ ه، لتكون الجهة المعنية برعاية النشاط البحنرفيي الجامعة والإشراف على مراكز البحوث المختلفة .»","o":["1424","1421","1419","1420"],"a":2,"e":"ورد في المذكرة: «عمادة الدراسات العليا عمادة شؤون الطلاب نشئت ُ أ عمادة البحث العلمفيي جامعة الملك سعود في عام 1419 ه، لتكون الجهة المعنية برعاية النشاط البحنرفيي الجامعة والإشراف على مراكز البحوث المختلفة .»"},{"chapter":3,"id":"KSU-183","page":"49","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["وتعمل العمادة على تمويل المش اري ع البحثية عبر برامج متخصصة ، من بينها برنامج التمويل المؤسسي المدعوم من وزارة التعل، إل ج انب تعزيز الشراكات العلمية محلياً ودولياً، واستقطاب الب احثي المتمب ين وتقد حلول تطبيقية ت خدم المجتمع .","يُطبق ذلك على التعليم العام فقط.","لا تتضمن المذكرة هذا الاختصاص أو الوصف.","ولا تعمل العمادة على تمويل المش اري ع البحثية عبر برامج متخصصة ، من بينها برنامج التمويل المؤسسي المدعوم من وزارة التعل، إل ج انب تعزيز الشراكات العلمية محلياً ودولياً، واستقطاب الب احثي المتمب ين وتقد حلول تطبيقية ت خدم المجتمع ."],"a":0,"e":"ورد في المذكرة: «وتعمل العمادة على تمويل المش اري ع البحثية عبر برامج متخصصة ، من بينها برنامج التمويل المؤسسي المدعوم من وزارة التعل، إل ج انب تعزيز الشراكات العلمية محلياً ودولياً، واستقطاب الب احثي المتمب ين وتقد حلول تطبيقية ت خدم المجتمع .»"},{"chapter":3,"id":"KSU-184","page":"41","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يرتبط بالكلية مستشق أسنان جامع ي يستقبل المرض ويوفر بيئة إكلينيكية تدريبية متكاملة، ويضم عدداً من الكراسي البحثية ال متخصصة ومركزاً للأبحاث يدعم النشاط البحنري لأعضاء هيئة التدريس والطلاب .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة.","يُطبق ذلك على التعليم العام فقط."],"a":1,"e":"ورد في المذكرة: «يرتبط بالكلية مستشق أسنان جامع ي يستقبل المرض ويوفر بيئة إكلينيكية تدريبية متكاملة، ويضم عدداً من الكراسي البحثية ال متخصصة ومركزاً للأبحاث يدعم النشاط البحنري لأعضاء هيئة التدريس والطلاب .»"},{"chapter":3,"id":"KSU-185","page":"36","q":"أكمل العبارة الصحيحة وفق المذكرة: «تمثل جامعة الملك سعود، بوصفها أول جامعة حكومية أنشئت في المملكة العربية السعودية عام ____ م، ضحاً أكادياً متمب اً ومتطوراً يعكس البر ام المملكة بالتعلىي م العالي والبحث العلمي والابتكار .»","o":["1957","1958","1962","1959"],"a":0,"e":"ورد في المذكرة: «تمثل جامعة الملك سعود، بوصفها أول جامعة حكومية أنشئت في المملكة العربية السعودية عام 1957 م، ضحاً أكادياً متمب اً ومتطوراً يعكس البر ام المملكة بالتعلىي م العالي والبحث العلمي والابتكار .»"},{"chapter":3,"id":"KSU-186","page":"46","q":"أي العبارات الآتية صحيحة وفق المذكرة؟","o":["لا تتضمن المذكرة هذا الاختصاص أو الوصف.","يُطبق ذلك على التعليم العام فقط.","تُعن الكلية ب دراسة الأنظمة القانونية السعودية والمقارنة والقانون الدولي، وتُسهم في تأهيل الكوادر القانونية للقطاع ات الحكومية والخاصة في ظل مرحلة الإصلاح التشريعىي المتسارعة في المملكة .","لا ينطبق ما ورد في العبارة على جامعة الملك سعود وفق المذكرة."],"a":2,"e":"ورد في المذكرة: «تُعن الكلية ب دراسة الأنظمة القانونية السعودية والمقارنة والقانون الدولي، وتُسهم في تأهيل الكوادر القانونية للقطاع ات الحكومية وا
