let current = 0;
let selected = null;
let results = Array(questions.length).fill(null);

function render() {
  const q = questions[current];
  selected = results[current]?.selected ?? null;
  document.getElementById('qnum').textContent = `السؤال ${current+1} من ${questions.length}`;
  document.getElementById('position').textContent = `${current+1} من ${questions.length}`;
  document.getElementById('page').textContent = `KSU-${String(current+31).padStart(3,'0')} — الصفحة ${q.page}`;
  document.getElementById('question').textContent = q.q;
  document.getElementById('degree').textContent = `درجة السؤال: ${q.score.toFixed(2)}`;
  const box = document.getElementById('options');
  box.innerHTML = '';
  q.options.forEach((op,i)=>{
    const label = document.createElement('label');
    label.className='option';
    if(results[current]) {
      if(i===q.answer) label.classList.add('correct');
      if(i===results[current].selected && i!==q.answer) label.classList.add('wrong');
    }
    label.innerHTML = `<input type="radio" name="opt" ${selected===i?'checked':''} ${results[current]?'disabled':''}> <span>${op}</span>`;
    label.onclick=()=>{ if(!results[current]){ selected=i; [...document.querySelectorAll('input[name=opt]')].forEach((x,j)=>x.checked=j===i); } };
    box.appendChild(label);
  });
  const ex=document.getElementById('explain');
  if(results[current]){ ex.style.display='block'; ex.innerHTML=`<b>${results[current].correct?'إجابة صحيحة ✔':'إجابة غير صحيحة'}</b><br>${q.explanation}`; }
  else{ ex.style.display='none'; ex.innerHTML=''; }
  document.getElementById('checkBtn').disabled=!!results[current];
  document.getElementById('prevBtn').disabled=current===0;
  document.getElementById('nextBtn').disabled=current===questions.length-1;
  updateStats();
}

function checkAnswer(){
  if(selected===null){ alert('اختر إجابة أولًا.'); return; }
  results[current]={selected,correct:selected===questions[current].answer};
  localStorage.setItem('ksu101-results',JSON.stringify(results));
  render();
}

function nextQ(){if(current<questions.length-1){current++;render();}}
function prevQ(){if(current>0){current--;render();}}
function setChapter(){current=0;render();}
function locked(){alert('هذا الباب سيضاف في النسخة التالية.');}
function resetQuiz(){
  if(confirm('هل تريد مسح جميع الإجابات والبدء من جديد؟')){
    results=Array(questions.length).fill(null);
    localStorage.removeItem('ksu101-results');
    current=0;render();
  }
}
function updateStats(){
  const answered=results.filter(Boolean).length;
  const correct=results.filter(x=>x?.correct).length;
  const score=correct*3;
  const pct=Math.round((score/90)*100);
  document.getElementById('answeredCount').textContent=answered;
  document.getElementById('correctCount').textContent=score;
  document.getElementById('percent').textContent=pct+'%';
  document.getElementById('ring').style.setProperty('--p',pct+'%');
}
try {
 const saved=JSON.parse(localStorage.getItem('ksu101-results'));
 if(Array.isArray(saved) && saved.length===questions.length) results=saved;
} catch(e) {}
render();
</script>
