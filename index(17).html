function chapterQuestions(){

  if(!holder) return;

  for(let i=1;i<=8;i++){

 for(let i=1;i<=8;i++){let b=document.createElement('button');b.className='tab'+(activeChapter===i?' active':'');b.innerHTML=`الباب ${['الأول','الثاني','الثالث','الرابع','الخامس','السادس','السابع','الثامن'][i-1]}<small>${questions.filter(q=>q.chapter===i).length} سؤال</small>`;b.onclick=()=>setChapter(i);t.appendChild(b)}
