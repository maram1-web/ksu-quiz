<!DOCTYPE html>
<html lang="ar" dir="rtl"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KSU Quiz Pro</title>
<script src="KSU%20Quiz%20Pro_files/xlsx.full.min_sPPc.js"></script>
<style>
:root{--p:#0d6d8b;--p2:#0b8aa5;--bg:#eef5f8;--card:#fff;--text:#14212b;--muted:#6c7a86;--line:#d9e3e8;--good:#198754;--bad:#c83b3b;--shadow:0 18px 45px rgba(15,57,72,.12)}
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Segoe UI",Tahoma,Arial,sans-serif;background:linear-gradient(180deg,#f7fbfd,var(--bg));color:var(--text)}
.shell{max-width:940px;margin:auto;padding:24px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.brand{display:flex;align-items:center;gap:14px}
.logo{width:58px;height:58px;border-radius:18px;background:linear-gradient(135deg,var(--p),var(--p2));color:white;display:grid;place-items:center;font-weight:900;font-size:20px}
.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:28px;box-shadow:var(--shadow)}.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:28px;align-items:center}
.hero h2{font-size:34px;margin:0 0 12px}.hero p{font-size:17px;line-height:1.9;color:var(--muted)}.art{min-height:240px;border-radius:22px;background:linear-gradient(145deg,var(--p),#124b63);color:#fff;display:grid;place-items:center;text-align:center}
.big{font-size:64px;font-weight:900}.btn{border:0;border-radius:13px;padding:13px 19px;font-size:16px;font-weight:800;cursor:pointer}.primary{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff}.secondary{background:#edf3f6;color:#214454}
input[type=text]{width:100%;padding:14px 16px;border:1px solid var(--line);border-radius:13px;font-size:16px}.filebox{margin-top:18px;border:1px dashed #aebfc8;border-radius:14px;padding:14px;background:#f9fcfd}.hidden{display:none!important}
.progress{height:12px;background:#e7edf1;border-radius:999px;overflow:hidden;margin:18px 0 24px}.progress>div{height:100%;background:linear-gradient(90deg,var(--p),#d5a646)}
.meta{display:flex;justify-content:space-between;color:var(--muted)}.question{font-size:24px;font-weight:850;line-height:1.7;margin:22px 0 16px}.option{width:100%;display:flex;gap:12px;text-align:right;padding:15px 16px;margin:10px 0;border:1px solid var(--line);background:#fff;border-radius:15px;font-size:17px;cursor:pointer}.option.selected{border:2px solid var(--p);background:#f1f9fb}
.tag{min-width:34px;height:34px;border-radius:10px;background:#eef5f8;display:grid;place-items:center;font-weight:900;color:var(--p)}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.result{text-align:center}.score{font-size:52px;font-weight:900;color:var(--p)}.review{border:1px solid var(--line);border-radius:16px;padding:16px;margin:12px 0}
@media(max-width:760px){.shell{padding:14px}.hero{grid-template-columns:1fr}.hero h2{font-size:28px}.card{padding:20px}}
</style>
</head>
<body>
<div class="shell">
  <div class="top">
    <div class="brand"><div class="logo">KSU</div><div><h1 style="margin:0">KSU Quiz Pro</h1><small>اختبارات KSU 101</small></div></div>
    <div id="status">تم التحميل</div>
  </div>

  <section class="card hero" id="home">
    <div>
      <h2>اختبر معرفتك بثقة</h2>
      <p>حمّل ملف Excel، ثم ابدأ الاختبار. كل صف في Excel يتحول إلى سؤال مستقل تلقائيًا.</p>
      <label>اسم المتدرب</label>
      <input id="name" type="text" placeholder="اكتب الاسم هنا">
      <div class="actions">
        <button class="btn primary" id="start">ابدأ الاختبار</button>
        <button class="btn secondary" id="shuffle">تفعيل الترتيب العشوائي</button>
      </div>
      <div class="filebox">
        <strong>تحميل بنك الأسئلة Excel</strong><br>
        <small>اختر ملف بنك_الأسئلة.xlsx المرفق.</small><br><br>
        <input type="file" id="file" accept=".xlsx,.xls">
      </div>
    </div>
    <div class="art"><div><div class="big" id="count">10</div><div>سؤال محمّل</div></div></div>
  </section>

  <section class="card hidden" id="quiz">
    <div class="meta"><span id="counter"></span><span id="page"></span></div>
    <div class="progress"><div id="bar"></div></div>
    <div class="question" id="q"></div>
    <div id="opts"></div>
    <div class="actions">
      <button class="btn secondary" id="prev">السابق</button>
      <button class="btn primary" id="next">التالي</button>
      <button class="btn secondary" id="finish">إنهاء الاختبار</button>
    </div>
  </section>

  <section class="card hidden result" id="result">
    <h2>النتيجة النهائية</h2>
    <div class="score" id="score"></div>
    <p id="msg"></p>
    <div class="actions" style="justify-content:center">
      <button class="btn primary" id="reviewBtn">مراجعة الإجابات</button>
      <button class="btn secondary" id="restart">إعادة الاختبار</button>
    </div>
  </section>

  <section class="card hidden" id="review">
    <h2>مراجعة الإجابات</h2>
    <div id="reviewList"></div>
    <button class="btn secondary" id="back">العودة</button>
  </section>
</div>

<script>
let questions=[], order=[], answers=[], current=0, randomize=false;
const letters=['أ','ب','ج','د'];
const $=id=>document.getElementById(id);
function show(id){['home','quiz','result','review'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

$('file').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{defval:''});
      questions=data.map(row=>({
        question:String(row['السؤال']||'').trim(),
        options:[row['أ'],row['ب'],row['ج'],row['د']].map(x=>String(x).trim()),
        answer:letters.indexOf(String(row['الإجابة']||'أ').trim()),
        explanation:String(row['الشرح']||'').trim(),
        page:String(row['الصفحة']||'').trim()
      })).filter(q=>q.question&&q.options.every(Boolean));
      if(!questions.length) throw new Error('لا توجد أسئلة صالحة');
      $('count').textContent=questions.length;
      $('status').textContent='تم التحميل';
      alert('تم تحميل '+questions.length+' سؤالًا');
    }catch(err){alert('تعذر قراءة الملف: '+err.message)}
  };
  r.readAsArrayBuffer(f);
});

$('shuffle').onclick=()=>{randomize=!randomize;$('shuffle').textContent=randomize?'الترتيب العشوائي: مفعّل':'تفعيل الترتيب العشوائي'};
$('start').onclick=()=>{
  if(!questions.length){alert('حمّل ملف Excel أولًا');return}
  order=randomize?shuffle([...questions.keys()]):[...questions.keys()];
  answers=Array(questions.length).fill(null);current=0;show('quiz');render();
};
function render(){
  const qi=order[current],q=questions[qi];
  $('counter').textContent='السؤال '+(current+1)+' من '+questions.length;
  $('page').textContent='الصفحة: '+(q.page||'—');
  $('bar').style.width=((current+1)/questions.length*100)+'%';
  $('q').textContent=q.question;
  const box=$('opts');box.innerHTML='';
  q.options.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='option'+(answers[qi]===i?' selected':'');
    b.innerHTML='<span class="tag">'+letters[i]+'</span><span>'+o+'</span>';
    b.onclick=()=>{answers[qi]=i;render()};box.appendChild(b);
  });
  $('prev').disabled=current===0;
  $('next').textContent=current===questions.length-1?'النتيجة':'التالي';
}
$('prev').onclick=()=>{if(current>0){current--;render()}};
$('next').onclick=()=>{if(current<questions.length-1){current++;render()}else finish()};
$('finish').onclick=()=>{if(confirm('إنهاء الاختبار؟'))finish()};
function finish(){
  const score=questions.reduce((s,q,i)=>s+(answers[i]===q.answer?1:0),0);
  const pct=Math.round(score/questions.length*100);
  $('score').textContent=score+' / '+questions.length;
  $('msg').textContent='النسبة '+pct+'٪';
  show('result');
}
$('reviewBtn').onclick=()=>{
  const list=$('reviewList');list.innerHTML='';
  questions.forEach((q,i)=>{
    const d=document.createElement('div');d.className='review';
    d.innerHTML='<strong>'+(i+1)+'. '+q.question+'</strong><p>إجابتك: '+(answers[i]===null?'لم تُجب':letters[answers[i]])+'</p><p>الصحيحة: '+letters[q.answer]+') '+q.options[q.answer]+'</p><p>'+q.explanation+'</p><small>الصفحة: '+(q.page||'—')+'</small>';
    list.appendChild(d);
  });show('review');
};
$('back').onclick=()=>show('result');
$('restart').onclick=()=>show('home');
</script>

</body></html>
