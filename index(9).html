const $=id=>document.getElementById(id);
function show(id){['home','quiz','result','review'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function chapterQuestions(){return selectedChapter==='all'?bank:bank.filter(q=>String(q.chapter)===selectedChapter)}
function refreshQuestionCount(){const c=$('questionCount'),available=chapterQuestions().length;c.innerHTML='';[10,20,30,50].filter(n=>n<available).forEach(n=>c.add(new Option(n,n)));if(available>0)c.add(new Option(`كل الأسئلة (${available})`,available));else c.add(new Option('لا توجد أسئلة بعد',0));$('startBtn').disabled=available===0;$('startBtn').style.opacity=available===0?'.55':'1'}
function renderChapterButtons(){const box=$('chapterButtons');box.innerHTML='';chapterMeta.forEach(ch=>{const count=ch.id==='all'?bank.length:bank.filter(q=>String(q.chapter)===ch.id).length;const b=document.createElement('button');b.type='button';b.dataset.chapter=ch.id;b.className='chapter-btn'+(selectedChapter===ch.id?' active':'');b.innerHTML=`${ch.name}<span class="chapter-count">${ch.title} — ${count} سؤال</span>`;b.onclick=()=>{selectedChapter=ch.id;renderChapterButtons();refreshQuestionCount();$('chapterDescription').textContent=`المحدد: ${ch.name} — ${ch.title}`;$('chapterNote').textContent=count?`يمكنك الآن اختيار عدد الأسئلة وبدء الاختبار.`:`لم تُضف أسئلة هذا الباب بعد.`};box.appendChild(b)})}
renderChapterButtons();refreshQuestionCount();
$('startBtn').onclick=()=>{studentName=$('studentName').value.trim();if(!studentName){alert('اكتب الاسم أولًا');$('studentName').focus();return}let pool=chapterQuestions();if(!pool.length){alert('لا توجد أسئلة في هذا الباب بعد');return}const n=Number($('questionCount').value);let ids=pool.map(q=>bank.indexOf(q));if($('orderMode').value==='random')ids=shuffle(ids);selected=ids.slice(0,n);answers={};submitted={};current=0;show('quiz');render()};
function render(){const qi=selected[current],q=bank[qi],done=submitted[qi];$('counter').textContent=`السؤال ${current+1} من ${selected.length}`;$('scoreLive').textContent=`تمت الإجابة: ${Object.keys(submitted).length}`;$('bar').style.width=`${((current+1)/selected.length)*100}%`;$('qid').textContent=`${q.id} — ${chapterMeta.find(c=>c.id===String(q.chapter))?.name||''}`;$('questionText').textContent=q.q;const box=$('options');box.innerHTML='';q.o.forEach((t,i)=>{const b=document.createElement('button');b.className='option'+(answers[qi]===i?' selected':'');b.disabled=!!done;b.innerHTML=`<span class="badge">${letters[i]}</span><span>${t}</span>`;b.onclick=()=>{answers[qi]=i;render()};box.appendChild(b)});const f=$('feedback');if(done){const ok=answers[qi]===q.a;f.className='feedback '+(ok?'good':'bad');f.innerHTML=`<strong>${ok?'إجابة صحيحة':'إجابة غير صحيحة'}</strong><br>الإجابة الصحيحة: ${letters[q.a]}) ${q.o[q.a]}<br>${q.e}<br><span class="small">الصفحة: ${q.page}</span>`}else{f.className='feedback hidden';f.innerHTML=''}$('prevBtn').disabled=current===0;$('nextBtn').textContent=!done?'تحقق من الإجابة':current===selected.length-1?'عرض النتيجة':'التالي'}
$('prevBtn').onclick=()=>{if(current>0){current--;render()}};
$('nextBtn').onclick=()=>{const qi=selected[current];if(!submitted[qi]){if(answers[qi]===undefined){alert('اختر إجابة أولًا');return}submitted[qi]=true;render();return}if(current<selected.length-1){current++;render()}else finish()};
function finish(){const correct=selected.filter(i=>answers[i]===bank[i].a).length,pct=Math.round(correct/selected.length*100),meta=chapterMeta.find(c=>c.id===selectedChapter);$('resultNumber').textContent=`${pct}%`;$('resultText').textContent=`أحسنت يا ${studentName}، نتيجتك في ${meta?.name||'الاختبار'}: ${correct} من ${selected.length}.`;show('result')}
$('reviewBtn').onclick=()=>{const list=$('reviewList');list.innerHTML='';selected.forEach((qi,n)=>{const q=bank[qi],ok=answers[qi]===q.a,d=document.createElement('div');d.className='review-item';d.innerHTML=`<strong>${n+1}. ${q.q}</strong><p>إجابتك: ${answers[qi]===undefined?'لم تجب':letters[answers[qi]]+') '+q.o[answers[qi]]}</p><p>الإجابة الصحيحة: ${letters[q.a]}) ${q.o[q.a]}</p><p>${q.e}</p><span class="small">الصفحة: ${q.page} — ${ok?'صحيحة':'غير صحيحة'}</span>`;list.appendChild(d)});show('review')};
$('restartBtn').onclick=()=>show('home');$('backResultBtn').onclick=()=>show('result');
</script></body></html>
