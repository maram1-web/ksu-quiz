<style>
:root{--primary:#0968d8;--primary2:#0757b7;--bg:#f4f7fb;--card:#fff;--text:#132238;--muted:#687b91;--line:#dbe4ee;--ok:#16833a;--okbg:#ddf5e5;--bad:#c43a3a;--badbg:#fde3e3}
*{box-sizing:border-box} body{margin:0;font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text)}
button,input,select{font-family:inherit} button{cursor:pointer}
.app-header{background:linear-gradient(135deg,#0c4d7a,#0968d8);color:#fff;padding:18px 22px;position:sticky;top:0;z-index:20;box-shadow:0 4px 15px #0d4a7830}
.header-inner{max-width:1180px;margin:auto;display:flex;justify-content:space-between;gap:16px;align-items:center}
.brand-title{font-size:27px;font-weight:900} .brand-sub{opacity:.9;margin-top:4px;font-size:14px}
.header-btn{border:1px solid #ffffff66;background:#ffffff14;color:#fff;border-radius:10px;padding:10px 14px;font-weight:800}
.container{max-width:1180px;margin:24px auto;padding:0 18px}
.hero{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 5px 18px #24445f10;margin-bottom:20px}
.hero h1{margin:0 0 8px;font-size:27px} .hero p{margin:0;color:var(--muted);line-height:1.8}
.name-row{display:grid;grid-template-columns:1fr 220px;gap:12px;margin-top:18px}

.chapter-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 4px 14px #24445f0c;transition:.2s;position:relative;overflow:hidden}
.chapter-card:hover{transform:translateY(-2px);box-shadow:0 8px 22px #24445f18}
.chapter-card:before{content:"";position:absolute;right:0;top:0;bottom:0;width:6px;background:var(--c)}
.chapter-top{display:flex;justify-content:space-between;align-items:start;gap:12px}
.chapter-no{font-size:14px;font-weight:900;color:var(--c)} .chapter-name{font-size:18px;font-weight:900;margin-top:6px;line-height:1.5}

.side-card{padding:18px;position:sticky;top:104px;height:max-content}
.stat-line{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid #edf1f5}

.q-number{color:var(--primary)} .question-text{font-size:24px;font-weight:900;line-height:1.7;margin:22px 0}

.option.correct{background:var(--okbg);border-color:#72c78a} .option.correct .letter{background:#43aa63;color:#fff}
.option.wrong{background:var(--badbg);border-color:#df7777} .option.wrong .letter{background:#d95858;color:#fff}
.option.dim{opacity:.62}

.feedback-title{font-size:18px;font-weight:900;margin-bottom:5px} .source{margin-top:8px;color:#50677d;font-size:13px}

.btn{border:0;border-radius:10px;padding:12px 18px;font-weight:900;font-size:16px} .btn-primary{background:var(--primary);color:#fff} .btn-light{background:#fff;border:1px solid #aac7e7;color:#075fbf}

@media(max-width:620px){.chapters{grid-template-columns:1fr}.name-row{grid-template-columns:1fr}.question-card{padding:20px 15px}.question-text{font-size:20px}.result-grid{grid-template-columns:1fr}.header-inner{align-items:flex-start}}
</style>
</head>

const chapterTitles={1:"نظام الجامعة الأساس",2:"تاريخ الجامعة",3:"الهيكل الأكاديمي والتنظيمي",4:"البحث العلمي والابتكار",5:"التصنيفات الدولية والمحلية",6:"المنجزات",7:"الشراكات والاتفاقيات",8:"بيئة العمل"};
const chapterColors=['#1769d5','#2b9b45','#8b3bc0','#f28100','#df3c69','#14a5a8','#ad712c','#17243c'];
let pool=[],current=0,answers=[],activeChapter=1,lastConfig=null;
const $=id=>document.getElementById(id);
function savedStats(c){return JSON.parse(localStorage.getItem('ksu101-ch-'+c)||'{"answered":0,"best":0}')}
function renderHome(){
 const holder=$('chapterCards');holder.innerHTML='';
 for(let c=1;c<=8;c++){const count=questions.filter(q=>q.chapter===c).length,s=savedStats(c),pct=count?Math.min(100,Math.round(s.answered/count*100)):0;holder.insertAdjacentHTML('beforeend',cardHtml(c,chapterTitles[c],count,s.best,pct,chapterColors[c-1]));}
 const total=questions.length,allStats=savedStats(0),pct=total?Math.min(100,Math.round(allStats.answered/total*100)):0;
 holder.insertAdjacentHTML('beforeend',`<article class="chapter-card all-card" style="--c:#0968d8"><div class="chapter-top"><div><div class="chapter-no">اختبار شامل</div><div class="chapter-name">جميع الأبواب</div></div><div class="count-pill">${total} سؤال</div></div><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div><div class="card-meta"><span>الإنجاز: ${pct}%</span><span>أفضل نتيجة: ${allStats.best||0}%</span></div><button class="start-card-btn" onclick="startExam(0)">ابدأ الاختبار</button></article>`);
}
function cardHtml(c,title,count,best,pct,color){return `<article class="chapter-card" style="--c:${color}"><div class="chapter-top"><div><div class="chapter-no">الباب ${['الأول','الثاني','الثالث','الرابع','الخامس','السادس','السابع','الثامن'][c-1]}</div><div class="chapter-name">${title}</div></div><div class="count-pill">${count} سؤال</div></div><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div><div class="card-meta"><span>الإنجاز: ${pct}%</span><span>أفضل نتيجة: ${best||0}%</span></div><button class="start-card-btn" onclick="startExam(${c})">ابدأ</button></article>`}
function startExam(c){const name=$('candidateName').value.trim();if(!name){alert('اكتب اسم المختبر أولًا.');$('candidateName').focus();return}localStorage.setItem('ksu101-name',name);activeChapter=c;let base=c===0?[...questions]:questions.filter(q=>q.chapter===c);for(let i=base.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[base[i],base[j]]=[base[j],base[i]]}let n=$('questionCount').value;if(n!=='all')base=base.slice(0,Math.min(Number(n),base.length));pool=base;answers=Array(pool.length).fill(null);current=0;lastConfig={c,name,n};$('home').classList.add('hidden');$('result').classList.add('hidden');$('exam').style.display='block';$('homeBtn').classList.remove('hidden');$('sideName').textContent=name;$('sideTitle').textContent=c===0?'جميع الأبواب':chapterTitles[c];renderQuestion()}
function renderQuestion(){const q=pool[current],a=answers[current];$('qNumber').textContent=`السؤال ${current+1} من ${pool.length}`;$('qPage').textContent=`📖 الصفحة ${q.page}`;$('qText').textContent=q.q;$('sidePos').textContent=`${current+1} / ${pool.length}`;$('examProgress').style.width=((current+1)/pool.length*100)+'%';const box=$('options');box.innerHTML='';q.options.forEach((op,i)=>{const b=document.createElement('button');b.className='option';if(a!==null){if(i===q.answer)b.classList.add('correct');else if(i===a)b.classList.add('wrong');else b.classList.add('dim')}b.innerHTML=`<span class="letter">${'ABCD'[i]}</span><span>${op}</span>`;b.disabled=a!==null;b.onclick=()=>answer(i);box.appendChild(b)});const f=$('feedback');if(a===null){f.className='feedback';f.innerHTML=''}else{const ok=a===q.answer;f.className='feedback '+(ok?'ok':'bad');f.innerHTML=`<div class="feedback-title">${ok?'✓ إجابة صحيحة':'✕ إجابة غير صحيحة'}</div><div>${q.explanation}</div><div class="source">📖 المرجع: الصفحة ${q.page}</div>`}$('prevBtn').disabled=current===0;$('nextBtn').textContent=current===pool.length-1?'إنهاء الاختبار':'التالي';updateSide()}
function answer(i){if(answers[current]!==null)return;answers[current]=i;renderQuestion()}
function updateSide(){let done=answers.filter(x=>x!==null).length,correct=answers.reduce((n,a,i)=>n+(a!==null&&a===pool[i].answer),0);$('sideCorrect').textContent=correct;$('sideWrong').textContent=done-correct}
function nextQuestion(){if(answers[current]===null){alert('اختر إجابة أولًا.');return}if(current<pool.length-1){current++;renderQuestion()}else finishExam()}
function prevQuestion(){if(current>0){current--;renderQuestion()}}
function finishExam(){let correct=answers.reduce((n,a,i)=>n+(a===pool[i].answer),0),wrong=pool.length-correct,pct=Math.round(correct/pool.length*100);$('exam').style.display='none';$('result').classList.remove('hidden');$('resultPct').textContent=pct+'%';$('resultTitle').textContent=pct>=80?'ممتاز — أداء قوي':pct>=60?'جيد — استمر بالمراجعة':'تحتاج إلى مراجعة إضافية';$('resultCorrect').textContent=correct;$('resultWrong').textContent=wrong;$('resultTotal').textContent=pool.length;let s=savedStats(activeChapter);s.answered=Math.max(s.answered,pool.length);s.best=Math.max(s.best,pct);localStorage.setItem('ksu101-ch-'+activeChapter,JSON.stringify(s));}
function restartSame(){$('result').classList.add('hidden');startExam(lastConfig.c)}
